sourceFile: job-management-integration-export.yml
category: Boolean PaintOS
flow:
  name: 01 Register Connection
  description: This flow creates the trigger in Airtable and registers the Won
    stage ID in the HS router.
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: instanceDeploy
        component:
          isPublic: true
          key: management-triggers
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Instance Deploy - Webhook
    - action:
        key: createObject
        component:
          isPublic: true
          key: collection-tools
          version: LATEST
      description: ""
      inputs:
        keyValueInput:
          type: complex
          value:
            - name:
                type: value
                value: event
              type: value
              value: register
            - name:
                type: value
                value: uniqueId
              type: configVar
              value: Won Job Stage
            - name:
                type: value
                value: instanceWebhookUrl
              type: reference
              value: instanceDeployWebhook.results.webhookUrls.03 Process Deal
      name: Process Deal
    - action:
        key: create
        component:
          isPublic: true
          key: collection-tools
          version: LATEST
      description: ""
      inputs:
        items:
          type: complex
          value:
            - type: reference
              value: processDeal.results
      name: Create List
    - action:
        key: loopOverItems
        component:
          isPublic: true
          key: loop
          version: LATEST
      description: ""
      inputs:
        items:
          type: reference
          value: createList.results
      name: Loop Over Items
      steps:
        - action:
            key: httpPost
            component:
              isPublic: true
              key: http
              version: LATEST
          description: ""
          inputs:
            connection:
              type: configVar
              value: ""
            data:
              type: reference
              value: loopOverItems.currentItem
            debugRequest:
              type: value
              value: "false"
            headers:
              type: complex
              value: []
            ignoreSslErrors:
              type: value
              value: "false"
            includeFullResponse:
              type: value
              value: "false"
            maxRetries:
              type: value
              value: "0"
            queryParams:
              type: complex
              value: []
            responseType:
              type: value
              value: json
            retryDelayMS:
              type: value
              value: "0"
            retryOnAllErrors:
              type: value
              value: "false"
            timeout:
              type: value
              value: ""
            url:
              type: configVar
              value: HubSpot Route Registration URL
            useExponentialBackoff:
              type: value
              value: "false"
          name: Register Endpoint
