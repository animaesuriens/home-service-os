sourceFile: job-management-integration-export.yml
category: Boolean PaintOS
flow:
  name: "05 Sub Flow Contract Sent "
  description: " Sub Flow Contract Sent for eSignature Contract for all Addendum Type"
  isSynchronous: true
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: crossFlow
        component:
          isPublic: true
          key: cross-flow
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Contract Sent Trigger
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: Has Point of contact
          steps:
            - action:
                key: branchOnExpression
                component:
                  isPublic: true
                  key: branch
                  version: LATEST
              branches:
                - name: If Change Order
                  steps:
                    - action:
                        key: runCode
                        component:
                          isPublic: true
                          key: code
                          version: LATEST
                      description: ""
                      inputs:
                        code:
                          type: value
                          value: "module.exports = async ({ logger, configVars }, stepResults) => {

                            \    // Get contract properties from a previous step

                            \    const contractData =
                            stepResults.contractSentTrigger.results?.body?.data\
                            ?.current_item

                            \    const firstSender =
                            stepResults.contractSentTrigger.results?.body?.data\
                            ?.first_sender;

                            \    const option =

                            \      configVars[\"Send to Employee and Customer At
                            The Same Time\"] === \"true\"

                            \          ? true

                            \          : false;

                            \ \ 

                            \    if (!contractData) {

                            \      logger.error(\"Contract data is undefined or
                            missing.\");

                            \      throw new Error(\"Contract data is
                            missing.\");

                            \    }

                            \ \ 

                            \    // Log the contract data for debugging

                            \    logger.info(`Contract Data:
                            ${JSON.stringify(contractData)}`);

                            \ \ 

                            \    // Get the mapping Config Variable for
                            eSignature fields

                            \    const mapping = configVars[\"Change Order
                            Fields\"]

                            \    logger.info(mapping)

                            \ \ 

                            \    // Map contract properties to eSignature fields
                            based on Config Var mapping

                            \    const mappedFields = mapping.reduce(

                            \      (acc, { source, destination }) => ({

                            \        [destination]: contractData.fields[source]
                            || null,

                            \        ...acc,

                            \      }),

                            \      {},

                            \    );

                            \ \ 

                            \    let signers = [

                            \        {

                            \            name: contractData.fields[\"Point of
                            Contact\"],

                            \            email: contractData.fields[\"Addendum
                            Point of Contact Email\"],

                            \            signing_order: \"1\",

                            \            signature_request_delivery_methods:
                            [\"email\"],

                            \            signed_document_delivery_method:
                            \"email\",

                            \        },

                            \    ];

                            \ \ 

                            \    if (firstSender && option) {

                            \        signers.push(firstSender?.signer_payload);

                            \    }

                            \    // Define the payload for the eSignature API
                            request

                            \    const payload = {

                            \      template_id: configVars[\"Change Order
                            Template\"],

                            \      metadata: contractData.id || \"\",

                            \      expires_in_hours: 48,

                            \      signers: signers,

                            \      placeholder_fields:
                            Object.entries(mappedFields).map(([api_key, value])
                            => ({

                            \        api_key,

                            \        value: Array.isArray(value)\ 

                            \          ? value[0]\ 

                            \          : (typeof value === \"number\"\ 

                            \              ? value.toFixed(2)\ 

                            \              : value || \"\")

                            \      })),

                            \    };

                            \ \ 

                            \    let stringify = JSON.stringify(payload)

                            \ \ 

                            \    // Return the response data

                            \    return stringify;

                            \  };

                            \  "
                      name: CO Payload
                - name: If Hold Harmless
                  steps:
                    - action:
                        key: runCode
                        component:
                          isPublic: true
                          key: code
                          version: LATEST
                      description: ""
                      inputs:
                        code:
                          type: value
                          value: "module.exports = async ({ logger, configVars }, stepResults) => {

                            \    // Get contract properties from a previous step

                            \    const contractData =
                            stepResults.contractSentTrigger.results?.body?.data\
                            ?.current_item

                            \    const firstSender =
                            stepResults.contractSentTrigger.results?.body?.data\
                            ?.first_sender;

                            \    const option =

                            \        configVars[\"Send to Employee and Customer
                            At The Same Time\"] === \"true\"

                            \            ? true

                            \            : false;


                            \    if (!contractData) {

                            \      logger.error(\"Contract data is undefined or
                            missing.\");

                            \      throw new Error(\"Contract data is
                            missing.\");

                            \    }

                            \ \ 

                            \    // Log the contract data for debugging

                            \    logger.info(`Contract Data:
                            ${JSON.stringify(contractData)}`);

                            \ \ 

                            \    // Get the mapping Config Variable for
                            eSignature fields

                            \    const mapping = configVars[\"Hold Harmless
                            Agreement Fields\"]

                            \    logger.info(mapping)

                            \ \ 

                            \    // Map contract properties to eSignature fields
                            based on Config Var mapping

                            \    const mappedFields = mapping.reduce(

                            \      (acc, { source, destination }) => ({

                            \        [destination]: contractData.fields[source]
                            || null,

                            \        ...acc,

                            \      }),

                            \      {},

                            \    );

                            \ \ 

                            \    let signers = [

                            \        {

                            \            name: contractData.fields[\"Point of
                            Contact\"],

                            \            email: contractData.fields[\"Addendum
                            Point of Contact Email\"],

                            \            signing_order: \"1\",

                            \            signature_request_delivery_methods:
                            [\"email\"],

                            \            signed_document_delivery_method:
                            \"email\",

                            \        },

                            \    ];

                            \ \ 

                            \    if (firstSender && option) {

                            \        signers.push(firstSender?.signer_payload);

                            \    }

                            \ \ 

                            \    // Define the payload for the eSignature API
                            request

                            \    const payload = {

                            \      template_id: configVars[\"Hold Harmless
                            Agreement Template\"],

                            \      metadata: contractData.id || \"\",

                            \      expires_in_hours: 48,

                            \      signers: signers,

                            \      placeholder_fields:
                            Object.entries(mappedFields).map(([api_key, value])
                            => ({

                            \        api_key,

                            \        value: Array.isArray(value)\ 

                            \          ? value[0]\ 

                            \          : (typeof value === \"number\"\ 

                            \              ? value.toFixed(2)\ 

                            \              : value || \"\")

                            \      })),

                            \    };

                            \ \ 

                            \    let stringify = JSON.stringify(payload)

                            \ \ 

                            \    // Log the payload for verification

                            \    logger.info(`Payload for eSignature:
                            ${stringify}`);

                            \ \ 

                            \    // Return the response data

                            \    return stringify;

                            \  };

                            \  "
                      name: Hold Harmless Agreement Payload
                - name: If Cost Plus
                  steps:
                    - action:
                        key: runCode
                        component:
                          isPublic: true
                          key: code
                          version: LATEST
                      description: ""
                      inputs:
                        code:
                          type: value
                          value: "module.exports = async ({ logger, configVars }, stepResults) => {

                            \    // Get contract properties from a previous step

                            \    const contractData =
                            stepResults.contractSentTrigger.results?.body?.data\
                            ?.current_item

                            \    const firstSender =
                            stepResults.contractSentTrigger.results?.body?.data\
                            ?.first_sender;

                            \    const option =

                            \        configVars[\"Send to Employee and Customer
                            At The Same Time\"] === \"true\"

                            \            ? true

                            \            : false;


                            \    if (!contractData) {

                            \      logger.error(\"Contract data is undefined or
                            missing.\");

                            \      throw new Error(\"Contract data is
                            missing.\");

                            \    }

                            \ \ 

                            \    // Log the contract data for debugging

                            \    logger.info(`Contract Data:
                            ${JSON.stringify(contractData)}`);

                            \ \ 

                            \    // Get the mapping Config Variable for
                            eSignature fields

                            \    const mapping = configVars[\"Cost Plus
                            Fields\"]

                            \    logger.info(mapping)

                            \ \ 

                            \    // Map contract properties to eSignature fields
                            based on Config Var mapping

                            \    const mappedFields = mapping.reduce(

                            \      (acc, { source, destination }) => ({

                            \        [destination]: contractData.fields[source]
                            || null,

                            \        ...acc,

                            \      }),

                            \      {},

                            \    );

                            \ \ 

                            \    let signers = [

                            \        {

                            \            name: contractData.fields[\"Point of
                            Contact\"],

                            \            email: contractData.fields[\"Addendum
                            Point of Contact Email\"],

                            \            signing_order: \"1\",

                            \            signature_request_delivery_methods:
                            [\"email\"],

                            \            signed_document_delivery_method:
                            \"email\",

                            \        },

                            \    ];

                            \ \ 

                            \    if (firstSender && option) {

                            \        signers.push(firstSender?.signer_payload);

                            \    }

                            \ \ 

                            \    // Define the payload for the eSignature API
                            request

                            \    const payload = {

                            \      template_id: configVars[\"Cost Plus
                            Template\"],

                            \      metadata: contractData.id || \"\",

                            \      expires_in_hours: 48,

                            \      signers: signers,

                            \      placeholder_fields:
                            Object.entries(mappedFields).map(([api_key, value])
                            => ({

                            \        api_key,

                            \        value: Array.isArray(value)\ 

                            \          ? value[0]\ 

                            \          : (typeof value === \"number\"\ 

                            \              ? value.toFixed(2)\ 

                            \              : value || \"\")

                            \      })),

                            \    };

                            \ \ 

                            \    let stringify = JSON.stringify(payload)

                            \ \ 

                            \    // Log the payload for verification

                            \    logger.info(`Payload for eSignature:
                            ${stringify}`);

                            \ \ 

                            \    // Return the response data

                            \    return stringify;

                            \  };

                            \  "
                      name: Cost Plus Payload
                - name: Else
                  steps: []
              description: ""
              inputs:
                conditions:
                  type: complex
                  value:
                    - name: If Change Order
                      type: complex
                      value:
                        - and
                        - - equal
                          - name: ""
                            type: reference
                            value: contractSentTrigger.results.body.data.current_item.fields.Addendum Type
                          - name: ""
                            type: value
                            value: Change Order
                    - name: If Hold Harmless
                      type: complex
                      value:
                        - and
                        - - equal
                          - name: ""
                            type: reference
                            value: contractSentTrigger.results.body.data.current_item.fields.Addendum Type
                          - name: ""
                            type: value
                            value: Hold Harmless
                    - name: If Cost Plus
                      type: complex
                      value:
                        - and
                        - - equal
                          - name: ""
                            type: reference
                            value: contractSentTrigger.results.body.data.current_item.fields.Addendum Type
                          - name: ""
                            type: value
                            value: Cost Plus
              name: Branch on Expression
        - name: Else
          steps:
            - action:
                key: writeLog
                component:
                  isPublic: true
                  key: log
                  version: LATEST
              description: Point of contact and point of contact email MUST have a value
              inputs:
                level:
                  type: value
                  value: info
                message:
                  type: value
                  value: Point of contact and point of contact email MUST have a value
              name: Point of contact and point of contact email MUST have a value
            - action:
                key: stopExecution
                component:
                  isPublic: true
                  key: stop-execution
                  version: LATEST
              description: ""
              inputs:
                contentType:
                  type: value
                  value: application/json
                headers:
                  type: complex
                  value: []
                jsonBody:
                  type: value
                  value: ""
                statusCode:
                  type: value
                  value: "200"
              name: Stop Execution 2
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: Has Point of contact
              type: complex
              value:
                - and
                - - isTrue
                  - name: ""
                    type: reference
                    value: contractSentTrigger.results.body.data.current_item.isComleteRequiredFieldsRESEND
      name: Check all required fields are met
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            /*
              Access config variables by name through the configVars object. e.g.
                const apiEndpoint = `${configVars["App Base URL"]}/api`;

              Access previous steps' results through the stepResults object. Trigger
              and step names are camelCased. If the step "Get Data from API" returned
              {"foo": "bar", "baz": 123}, you could destructure that data with:
                const { foo, baz } = stepResults.getDataFromApi.results;

              You can return string, number or complex object data. e.g.
                return { data: { foo: "Hello", bar: 123.45, baz: true } };
            */


            module.exports = async ({ logger, configVars }, stepResults) => {
              let changeOrder = stepResults?.coPayload?.results
              let harmLess = stepResults?.holdHarmlessAgreementPayload?.results
              let costPlustPlayload = stepResults?.costPlusPayload?.results
              
              
              return changeOrder || harmLess || costPlustPlayload;
            };
      name: Addendums Payload
    - action:
        key: httpPost
        component:
          isPublic: true
          key: http
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: null
        errorHandlerType: ignore
        ignoreFinalError: null
        maxAttempts: null
        usesExponentialBackoff: null
      inputs:
        connection:
          type: configVar
          value: ""
        data:
          type: reference
          value: addendumsPayload.results
        debugRequest:
          type: value
          value: "false"
        headers:
          type: complex
          value:
            - name:
                type: value
                value: Content-Type
              type: value
              value: application/json
        ignoreSslErrors:
          type: value
          value: "false"
        includeFullResponse:
          type: value
          value: "false"
        maxRetries:
          type: value
          value: "0"
        queryParams:
          type: complex
          value: []
        responseType:
          type: value
          value: json
        retryDelayMS:
          type: value
          value: "0"
        retryOnAllErrors:
          type: value
          value: "false"
        timeout:
          type: value
          value: ""
        url:
          type: template
          value: https://esignatures.io/api/contracts?token={{#eSignature Secret Token}}
        useExponentialBackoff:
          type: value
          value: "false"
      name: Send CO Contract
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: If Error
          steps:
            - action:
                key: updateRecord
                component:
                  isPublic: true
                  key: airtable
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: 10
                errorHandlerType: retry
                ignoreFinalError: false
                maxAttempts: 5
                usesExponentialBackoff: false
              inputs:
                airtableConnection:
                  type: configVar
                  value: Airtable Connection
                baseId:
                  type: configVar
                  value: Project Management Base
                record:
                  type: reference
                  value: contractSentTrigger.results.body.data.current_item.id
                recordFields:
                  type: complex
                  value:
                    - name:
                        type: value
                        value: Automation Status
                      type: reference
                      value: sendCoContract.results.error.message
                tableName:
                  type: configVar
                  value: Addendums Table
              name: Automation Status
        - name: Else
          steps:
            - action:
                key: updateRecord
                component:
                  isPublic: true
                  key: airtable
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: 10
                errorHandlerType: retry
                ignoreFinalError: false
                maxAttempts: 5
                usesExponentialBackoff: false
              inputs:
                airtableConnection:
                  type: configVar
                  value: Airtable Connection
                baseId:
                  type: configVar
                  value: Project Management Base
                record:
                  type: reference
                  value: contractSentTrigger.results.body.data.current_item.id
                recordFields:
                  type: complex
                  value:
                    - name:
                        type: value
                        value: Status
                      type: value
                      value: Sent
                    - name:
                        type: value
                        value: eSignatures Signer ID
                      type: reference
                      value: sendCoContract.results.data.contract.signers.0.id
                    - name:
                        type: value
                        value: eSignatures Contract ID
                      type: reference
                      value: sendCoContract.results.data.contract.id
                tableName:
                  type: configVar
                  value: Addendums Table
              name: Update Record
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: If Error
              type: complex
              value:
                - and
                - - exists
                  - name: ""
                    type: reference
                    value: sendCoContract.results.error.message
      name: Error Handler
