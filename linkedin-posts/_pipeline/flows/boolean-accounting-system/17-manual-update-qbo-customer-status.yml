sourceFile: boolean-accounting-system-export.yml
category: Boolean PaintOS
flow:
  name: 17 Manual Update QBO Customer Status
  description: ""
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: webhook
        component:
          isPublic: true
          key: webhook-triggers
          version: LATEST
      description: ""
      inputs:
        body:
          type: value
          value: ""
        contentType:
          type: value
          value: ""
        headers:
          type: complex
          value: []
        statusCode:
          type: value
          value: ""
      isTrigger: true
      name: Manual Update QBO Customer Status Trigger
    - action:
        key: listRecords
        component:
          isPublic: true
          key: airtable
          version: LATEST
      description: By Last Modified
      errorConfig:
        delaySeconds: 5
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 3
        usesExponentialBackoff: false
      inputs:
        airtableConnection:
          type: configVar
          value: Airtable Connection
        baseId:
          type: configVar
          value: Project Management Base
        fields:
          type: complex
          value: []
        filterByFormula:
          type: template
          value: "{Update Record in Next Sync} = TRUE()"
        tableName:
          type: configVar
          value: Existing QBO Customers
        view:
          type: value
          value: ""
      name: List Records
    - action:
        key: loopOverItems
        component:
          isPublic: true
          key: loop
          version: LATEST
      description: ""
      inputs:
        items:
          type: reference
          value: listRecords.results
      name: Loop Over Items
      steps:
        - action:
            key: getCustomerById
            component:
              isPublic: true
              key: quickbooks
              version: LATEST
          description: ""
          errorConfig:
            delaySeconds: 5
            errorHandlerType: retry
            ignoreFinalError: false
            maxAttempts: 3
            usesExponentialBackoff: false
          inputs:
            debug:
              type: value
              value: "false"
            id:
              type: reference
              value: loopOverItems.currentItem.fields.QBO Customer ID
            quickbooksConnection:
              type: configVar
              value: QuickBooks Connection
          name: Get Customer By Id
        - action:
            key: runCode
            component:
              isPublic: true
              key: code
              version: LATEST
          description: ""
          inputs:
            code:
              type: value
              value: >
                module.exports = async ({ logger, configVars }, stepResults) =>
                {
                  const customer = stepResults.loopOverItems.currentItem.fields;

                  const payload = {
                    Id: stepResults.getCustomerById.results.Id,
                    Active: customer["Customer Status"] === "Active" ? true : false,
                    SyncToken: stepResults.getCustomerById.results.SyncToken,
                    sparse: true,
                    // SUPER IMPORTANT:
                    // sparse has to be set as true, otherwise it will OVERWRITE everything
                    // that is not set here to null. ( Thanks QBO for having such a nice API :) )
                  };

                  return { data: payload };
                };
          name: Request Payload
        - action:
            key: rawRequest
            component:
              isPublic: true
              key: quickbooks
              version: LATEST
          description: ""
          errorConfig:
            delaySeconds: 5
            errorHandlerType: retry
            ignoreFinalError: true
            maxAttempts: 3
            usesExponentialBackoff: false
          inputs:
            connection:
              type: configVar
              value: QuickBooks Connection
            data:
              type: reference
              value: requestPayload.results
            debugRequest:
              type: value
              value: "false"
            fileData:
              type: complex
              value: []
            formData:
              type: complex
              value: []
            headers:
              type: complex
              value:
                - name:
                    type: value
                    value: Content-Type
                  type: value
                  value: application/json
            maxRetries:
              type: value
              value: "0"
            method:
              type: value
              value: POST
            queryParams:
              type: complex
              value: []
            responseType:
              type: value
              value: json
            retryAllErrors:
              type: value
              value: "false"
            retryDelayMS:
              type: value
              value: "0"
            timeout:
              type: value
              value: ""
            url:
              type: template
              value: customer
            useExponentialBackoff:
              type: value
              value: "false"
          name: Set as Active
        - action:
            key: getCurrentDateTime
            component:
              isPublic: true
              key: datetime
              version: LATEST
          description: ""
          inputs:
            displayEpochInSeconds:
              type: value
              value: "false"
          name: Get Current Date
        - action:
            key: updateRecord
            component:
              isPublic: true
              key: airtable
              version: LATEST
          description: ""
          errorConfig:
            delaySeconds: 3
            errorHandlerType: retry
            ignoreFinalError: false
            maxAttempts: 3
            usesExponentialBackoff: false
          inputs:
            airtableConnection:
              type: configVar
              value: Airtable Connection
            baseId:
              type: configVar
              value: Project Management Base
            dynamicFields:
              type: value
              value: ""
            record:
              type: reference
              value: loopOverItems.currentItem.id
            recordFields:
              type: complex
              value:
                - name:
                    type: value
                    value: Last Synced with QBO
                  type: reference
                  value: getCurrentDate.results
            tableName:
              type: configVar
              value: Existing QBO Customers
          name: Update Record
