sourceFile: boolean-accounting-system-export.yml
category: Boolean PaintOS
name: Boolean Accounting System
description: This integrates with QuickBooks Online to simplify invoicing, track
  expenses, and manage subcontractor payments. By connecting job and project
  data to financial processes, it ensures accurate billing, expense allocation,
  and streamlined payment workflows for efficient business operations.
configPages:
  - elements:
      - type: configVar
        value: QuickBooks Connection
    name: Connections
    tagline: ""
  - elements:
      - type: configVar
        value: Project Management Base
      - type: configVar
        value: Invoice Example ID
    name: Project Management
    tagline: ""
    userLevelConfigured: false
  - elements:
      - type: configVar
        value: Jobs Table
      - type: configVar
        value: Projects Table
      - type: configVar
        value: Project Type(s) Table
      - type: configVar
        value: Invoices Table
      - type: configVar
        value: Invoice Lines Table
      - type: configVar
        value: Customer Transactions Table
      - type: configVar
        value: Existing QBO Customers
    name: Production Tables
    tagline: ""
    userLevelConfigured: false
  - elements:
      - type: configVar
        value: Allow Online ACH Payment
      - type: configVar
        value: Allow Online Credit Card Payment
      - type: configVar
        value: Include TaxCodeRef
      - type: configVar
        value: QBO to AT Custom Fields Mapper
      - type: configVar
        value: Include Ship To
      - type: configVar
        value: Choose Payment Term
      - type: configVar
        value: Active Customers Only
      - type: configVar
        value: Use Customer names for PrintOnCheckName
