  - elements:
      - type: configVar
        value: Vendors Table
      - type: configVar
        value: Expenses Table
      - type: configVar
        value: Sync Bills and Vendor Credits
      - type: configVar
        value: Associate Customer/Project on Initial Sync
      - type: configVar
        value: Days Ago (Deployment)
    name: Expenses Setup
    tagline: ""
    userLevelConfigured: false
  - elements:
