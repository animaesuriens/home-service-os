sourceFile: boolean-accounting-system-export.yml
category: Boolean PaintOS
flow:
  name: 08 Initial Sync QB Bills
  description: ""
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: instanceDeploy
        component:
          isPublic: true
          key: management-triggers
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Instance Deploy - QB Expenses
    - action:
        key: getCurrentDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: For Stopwatch
      inputs:
        displayEpochInSeconds:
          type: value
          value: "false"
      name: Current Time
    - action:
        key: adjustDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: Current + 12 minutes
      inputs:
        dateTimeInput:
          type: reference
          value: currentTime.results
        daysInput:
          type: value
          value: ""
        hoursInput:
          type: value
          value: ""
        minutesInput:
          type: value
          value: "12"
        secondsInput:
          type: value
          value: ""
      name: Stopwatch Time
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: Yes
          steps: []
        - name: Else
          steps:
            - action:
                key: stopExecution
                component:
                  isPublic: true
                  key: stop-execution
                  version: LATEST
              description: ""
              inputs:
                contentType:
                  type: value
                  value: application/json
                headers:
                  type: complex
                  value: []
                jsonBody:
                  type: value
                  value: ""
                statusCode:
                  type: value
                  value: "200"
              name: Stop Execution
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: Yes
              type: complex
              value:
                - and
                - - equal
                  - name: ""
                    type: configVar
                    value: Sync Bills and Vendor Credits
                  - name: ""
                    type: value
                    value: "true"
      name: Expenses Sync enabled?
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: Get it from trigger or set as 1
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              const prevStartPosition =
                stepResults.instanceDeployQbExpenses.results.body.data?.prevStartPosition;

              const startPosition = prevStartPosition ? prevStartPosition : 1;

              return { data: startPosition };
            };
      name: Start Position Value
    - action:
        key: saveExecutionValue
        component:
          isPublic: true
          key: persist-data
          version: LATEST
      description: ""
      inputs:
        dynamicValues:
          type: complex
          value: []
        keyInput:
          type: value
          value: index
        valueInput:
          type: reference
          value: startPositionValue.results
      name: Set Start Position
    - action:
        key: adjustDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: Based on Days Ago (Deployment) CVar
      inputs:
        dateTimeInput:
          type: reference
          value: instanceDeployQbExpenses.results.startedAt
        daysInput:
          type: configVar
          value: Days Ago (Deployment)
        hoursInput:
          type: value
          value: ""
        minutesInput:
          type: value
          value: ""
        secondsInput:
          type: value
          value: ""
      name: Calculated Date
    - action:
        key: formatDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: ""
      inputs:
        dateTime:
          type: reference
          value: calculatedDate.results
        format:
          type: value
          value: YYYY-MM-DDTHH:mm:ss
        timeZone:
          type: value
          value: etc/UTC
      name: Format Date/Time
    - action:
        key: loopNTimes
        component:
          isPublic: true
          key: loop
          version: LATEST
      description: ""
      inputs:
        iterationCount:
          type: value
          value: "50"
      name: Loop N Times
      steps:
        - action:
            key: getExecutionValue
            component:
              isPublic: true
              key: persist-data
              version: LATEST
          description: ""
          inputs:
            defaultValueInput:
              type: value
              value: "1"
            keyInput:
              type: value
              value: index
          name: Get Start Position
        - action:
            key: getCurrentDateTime
            component:
              isPublic: true
              key: datetime
              version: LATEST
          description: To check against Stopwatch
          inputs:
            displayEpochInSeconds:
              type: value
              value: "false"
          name: Current Time 2
        - action:
            key: branchOnExpression
            component:
              isPublic: true
              key: branch
              version: LATEST
          branches:
            - name: Yes
              steps:
                - action:
                    key: saveExecutionValue
                    component:
                      isPublic: true
                      key: persist-data
                      version: LATEST
                  description: ""
                  inputs:
                    dynamicValues:
                      type: complex
                      value: []
                    keyInput:
                      type: value
                      value: result
                    valueInput:
                      type: template
                      value: '{"prevStartPosition": {{$getStartPosition.results}}}'
                  name: Save Progress
                - action:
                    key: breakLoop
                    component:
                      isPublic: true
                      key: loop
                      version: LATEST
                  description: ""
                  inputs: {}
                  name: Break Loop 2
            - name: Else
              steps: []
          description: ""
          inputs:
            conditions:
              type: complex
              value:
                - name: Yes
                  type: complex
                  value:
                    - and
                    - - dateTimeAfter
                      - name: ""
                        type: reference
                        value: currentTime2.results
                      - name: ""
                        type: reference
                        value: stopwatchTime.results
          name: Execution time exceeded?
        - action:
            key: runCode
            component:
              isPublic: true
              key: code
              version: LATEST
          description: ""
          inputs:
            code:
              type: value
              value: >
                module.exports = async ({ logger, configVars }, stepResults) =>
                {
                  const date = stepResults.formatDateTime.results;
                  const startPos = stepResults.getStartPosition.results;
                  const query = `SELECT * FROM Bill WHERE MetaData.LastUpdatedTime > '${date}' STARTPOSITION ${startPos} MAXRESULTS 50`;
                  return { data: encodeURIComponent(query) };
                };
          name: Create Query
        - action:
            key: rawRequest
            component:
              isPublic: true
              key: quickbooks
              version: LATEST
          description: ""
          inputs:
            connection:
              type: configVar
              value: QuickBooks Connection
            data:
              type: value
              value: ""
            debugRequest:
              type: value
              value: "false"
            fileData:
              type: complex
              value: []
            formData:
              type: complex
              value: []
            headers:
              type: complex
              value: []
            maxRetries:
              type: value
              value: "0"
            method:
              type: value
              value: GET
            queryParams:
              type: complex
              value: []
            responseType:
              type: value
              value: json
            retryAllErrors:
              type: value
              value: "false"
            retryDelayMS:
              type: value
              value: "0"
            timeout:
              type: value
              value: ""
            url:
              type: template
              value: /query?query={{$createQuery.results}}
            useExponentialBackoff:
              type: value
              value: "false"
          name: Get Bills
        - action:
            key: branchOnExpression
            component:
              isPublic: true
              key: branch
              version: LATEST
          branches:
            - name: Yes
              steps:
                - action:
                    key: loopOverItems
                    component:
                      isPublic: true
                      key: loop
                      version: LATEST
                  description: ""
                  inputs:
                    items:
                      type: reference
                      value: getBills.results.QueryResponse.Bill
                  name: Loop Over Bills
                  steps:
                    - action:
                        key: runCode
                        component:
                          isPublic: true
                          key: code
                          version: LATEST
                      description: ""
                      inputs:
                        code:
                          type: value
                          value: >
                            module.exports = async ({ logger, configVars },
                            stepResults) => {

                              let vendorData = stepResults.loopOverBills.currentItem["VendorRef"]
                              let vendorId = vendorData.value
                              let vendorName = vendorData.name


                              let payload = {
                                  "performUpsert": {
                                    "fieldsToMergeOn": [
                                      "QBO Vendor ID"
                                    ]
                                  },
                                  "records": [
                                    {
                                      "fields": {
                                        "QBO Vendor ID": vendorId,
                                        "Status": "Whitelist",
                                        "Display Name": vendorName,
                                      }
                                    }
                                  ]
                                }

                              return payload;
                            };
                      name: Vendor Payload
                    - action:
                        key: rawRequest
                        component:
                          isPublic: true
                          key: airtable
                          version: LATEST
                      description: ""
                      errorConfig:
                        delaySeconds: 10
                        errorHandlerType: retry
                        ignoreFinalError: false
                        maxAttempts: 5
                        usesExponentialBackoff: false
                      inputs:
                        connection:
                          type: configVar
                          value: Airtable Connection
                        data:
                          type: reference
                          value: vendorPayload.results
                        debugRequest:
                          type: value
                          value: "false"
                        fileData:
                          type: complex
                          value: []
                        fileDataFileNames:
                          type: complex
                          value: []
                        formData:
                          type: complex
                          value: []
                        headers:
                          type: complex
                          value:
                            - name:
                                type: value
                                value: Content-Type
                              type: value
                              value: application/json
                        maxRetries:
                          type: value
                          value: "0"
                        method:
                          type: value
                          value: PATCH
                        queryParams:
                          type: complex
                          value: []
                        responseType:
                          type: value
                          value: json
                        retryAllErrors:
                          type: value
                          value: "false"
                        retryDelayMS:
                          type: value
                          value: "0"
                        timeout:
                          type: value
                          value: ""
                        url:
                          type: template
                          value: /v0/{{#Project Management Base}}/{{#Vendors Table}}
                        useExponentialBackoff:
                          type: value
                          value: "false"
                      name: Upsert Vendor Record
                    - action:
                        key: loopOverItems
                        component:
                          isPublic: true
                          key: loop
                          version: LATEST
                      description: ""
                      inputs:
                        items:
                          type: reference
                          value: loopOverBills.currentItem.Line
                      name: Loop Line Items
                      steps:
                        - action:
                            key: runCode
                            component:
                              isPublic: true
                              key: code
                              version: LATEST
                          description: ""
                          inputs:
                            code:
                              type: value
                              value: >
                                module.exports = async ({ logger, configVars },
                                stepResults) => {
                                  const bill = stepResults.loopOverBills.currentItem;
                                  const line = stepResults.loopLineItems.currentItem;
                                  const upsertVendorResult =
                                    stepResults?.upsertVendorRecord?.results?.data?.records[0] ?? null;

                                  const payload = {
                                    bill: bill,
                                    currentLine: line,
                                    vendor: upsertVendorResult ? upsertVendorResult : null,
                                  };

                                  return { data: payload };
                                };
                          name: Crossflow Payload
                        - action:
                            key: invokeFlow
                            component:
                              isPublic: true
                              key: cross-flow
                              version: LATEST
                          description: ""
                          errorConfig:
                            delaySeconds: null
                            errorHandlerType: ignore
                            ignoreFinalError: null
                            maxAttempts: null
                            usesExponentialBackoff: null
                          inputs:
                            data:
                              type: reference
                              value: crossflowPayload.results
                            flowName:
                              type: value
                              value: 08.1 Quickbooks Sync Bills Subflow
                          name: Invoke Subflow
                - action:
                    key: incrementExecutionValue
                    component:
                      isPublic: true
                      key: persist-data
                      version: LATEST
                  description: ""
                  inputs:
                    amountInput:
                      type: value
                      value: "50"
                    keyInput:
                      type: value
                      value: index
                  name: Increment Start Position
            - name: Else
              steps:
                - action:
                    key: saveExecutionValue
                    component:
                      isPublic: true
                      key: persist-data
                      version: LATEST
                  description: ""
                  inputs:
                    dynamicValues:
                      type: complex
                      value: []
                    keyInput:
                      type: value
                      value: result
                    valueInput:
                      type: value
                      value: No records left to process
                  name: Save Progress 2
                - action:
                    key: writeLog
                    component:
                      isPublic: true
                      key: log
                      version: LATEST
                  description: ""
                  inputs:
                    level:
                      type: value
                      value: info
                    message:
                      type: value
                      value: No records found
                  name: Write Log Message
                - action:
                    key: breakLoop
                    component:
                      isPublic: true
                      key: loop
                      version: LATEST
                  description: ""
                  inputs: {}
                  name: Break Loop
          description: ""
          inputs:
            conditions:
              type: complex
              value:
                - name: Yes
                  type: complex
                  value:
                    - and
                    - - exists
                      - name: ""
                        type: reference
                        value: getBills.results.QueryResponse.Bill.0
          name: Records found?
    - action:
        key: getExecutionValue
        component:
          isPublic: true
          key: persist-data
          version: LATEST
      description: ""
      inputs:
        defaultValueInput:
          type: value
          value: ""
        keyInput:
          type: value
          value: result
      name: Get Progress
    - action:
        key: stopExecution
        component:
          isPublic: true
          key: stop-execution
          version: LATEST
      description: ""
      inputs:
        contentType:
          type: value
          value: application/json
        headers:
          type: complex
          value: []
        jsonBody:
          type: reference
          value: getProgress.results
        statusCode:
          type: value
          value: "200"
      name: Stop Execution 2
