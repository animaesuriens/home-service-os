sourceFile: boolean-accounting-system-export.yml
category: Boolean PaintOS
flow:
  name: 29 Delete Webhook (Airtable)
  description: ""
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: instanceRemove
        component:
          isPublic: true
          key: management-triggers
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Delete Webhook Trigger
    - action:
        key: listWebhooks
        component:
          isPublic: true
          key: airtable
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 10
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 5
        usesExponentialBackoff: false
      inputs:
        airtableConnection:
          type: configVar
          value: Airtable Connection
        baseId:
          type: configVar
          value: Project Management Base
      name: List Webhooks
    - action:
        key: loopOverItems
        component:
          isPublic: true
          key: loop
          version: LATEST
      description: ""
      inputs:
        items:
          type: reference
          value: listWebhooks.results
      name: Loop Over Items
      steps:
        - action:
            key: deleteWebhook
            component:
              isPublic: true
              key: airtable
              version: LATEST
          description: ""
          errorConfig:
            delaySeconds: 10
            errorHandlerType: retry
            ignoreFinalError: false
            maxAttempts: 5
            usesExponentialBackoff: false
          inputs:
            airtableConnection:
              type: configVar
              value: Airtable Connection
            baseId:
              type: configVar
              value: Project Management Base
            webhookId:
              type: reference
              value: loopOverItems.currentItem.id
          name: Delete Record
