sourceFile: boolean-accounting-system-export.yml
category: Boolean PaintOS
flow:
  name: 22 Update Invoice in QBO
  description: ""
  isSynchronous: true
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: webhook
        component:
          isPublic: true
          key: webhook-triggers
          version: LATEST
      description: Receives a Invoice record ID
      inputs:
        body:
          type: value
          value: ""
        contentType:
          type: value
          value: ""
        headers:
          type: complex
          value: []
        statusCode:
          type: value
          value: ""
      isTrigger: true
      name: Trigger
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: Invoice Exist
          steps: []
        - name: Else
          steps:
            - action:
                key: stopExecution
                component:
                  isPublic: true
                  key: stop-execution
                  version: LATEST
              description: ""
              inputs:
                contentType:
                  type: value
                  value: application/text
                headers:
                  type: complex
                  value: []
                jsonBody:
                  type: value
                  value: Invoice Record Does Not Exist
                statusCode:
                  type: value
                  value: "204"
              name: Stop Execution
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: Invoice Exist
              type: complex
              value:
                - and
                - - exists
                  - name: ""
                    type: reference
                    value: trigger.results.body.data.invoiceId
      name: Branch on Expression
    - action:
        key: getRecord
        component:
          isPublic: true
          key: airtable
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 5
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 3
        usesExponentialBackoff: false
      inputs:
        airtableConnection:
          type: configVar
          value: Airtable Connection
        baseId:
          type: configVar
          value: Project Management Base
        record:
          type: reference
          value: trigger.results.body.data.invoiceId
        tableName:
          type: configVar
          value: Invoices Table
      name: Get Invoice
    - action:
        key: getInvoiceById
        component:
          isPublic: true
          key: quickbooks
          version: LATEST
      description: ""
      inputs:
        debug:
          type: value
          value: "false"
        id:
          type: reference
          value: getInvoice.results.fields.QBO Invoice ID
        quickbooksConnection:
          type: configVar
          value: QuickBooks Connection
      name: Get Invoice By Id
    - action:
        key: getRecord
        component:
          isPublic: true
          key: airtable
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 5
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 3
        usesExponentialBackoff: false
      inputs:
        airtableConnection:
          type: configVar
          value: Airtable Connection
        baseId:
          type: configVar
          value: Project Management Base
        record:
          type: reference
          value: getInvoice.results.fields.Job.0
        tableName:
          type: configVar
          value: Jobs Table
      name: Get Job
    - action:
        key: listRecords
        component:
          isPublic: true
          key: airtable
          version: LATEST
      description: Used to calculate suffix for docNumber
      errorConfig:
        delaySeconds: 5
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 3
        usesExponentialBackoff: false
      inputs:
        airtableConnection:
          type: configVar
          value: Airtable Connection
        baseId:
          type: configVar
          value: Project Management Base
        fields:
          type: complex
          value: []
        filterByFormula:
          type: template
          value: "{Job Record ID}='{{$getJob.results.fields.Job Record ID}}'"
        tableName:
          type: configVar
          value: Invoices Table
        view:
          type: value
          value: ""
      name: List Invoices Linked to Job
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: |
            module.exports = async ({ logger, configVars }, stepResults) => {
              const invoice = stepResults.getInvoice.results.fields;
              const lines = invoice["Invoice Line Items"];

              return { data: lines.join(",") };
            };
      name: Invoice Lines IDs string
    - action:
        key: listRecords
        component:
          isPublic: true
          key: airtable
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 5
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 3
        usesExponentialBackoff: false
      inputs:
        airtableConnection:
          type: configVar
          value: Airtable Connection
        baseId:
          type: configVar
          value: Project Management Base
        fields:
          type: complex
          value: []
        filterByFormula:
          type: template
          value: SEARCH({Record ID}, "{{$invoiceLinesIdsString.results}}")
        tableName:
          type: configVar
          value: Invoice Lines Table
        view:
          type: value
          value: ""
      name: Get Invoice Lines
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              const job = stepResults.getJob.results.fields;
              const lines = stepResults.getInvoiceLines.results;
              const includeTaxCodeRef = configVars["Include TaxCodeRef"];

              const linesPayload = lines.map((line) => {
                const taxCode =
                  includeTaxCodeRef && line.fields["Line Item Sales Tax ID"]
                    ? {
                        TaxCodeRef: {
                          value: line.fields["Line Item Sales Tax ID"],
                        },
                      }
                    : "";

                return {
                  DetailType: "SalesItemLineDetail",
                  Amount: line.fields["Line Item Total Before Tax"],
                  Description: line.fields["Description"],
                  LineNum: line.fields["Line Item Number"]?.toString(),
                  // ProjectRef: {
                  //   value: job["QBO Parent Customer ID"],
                  // },
                  // -> We're not yet sure about which field should this be filled with.
                  // CurrencyRef might not be needed as for now.
                  SalesItemLineDetail: {
                    ItemRef: {
                      value: line.fields["Line Item Item ID"]?.[0] ?? "",
                    },
                    ...taxCode,
                    // ClassRef: {
                    //   value: Array.isArray(line.fields["Line Item Class ID"])
                    //     ? line.fields["Line Item Class ID"][0]
                    //     : line.fields["Line Item Class ID"],
                    // },
                    ...(line.fields["Line Item Service Date"] && {
                      ServiceDate: line.fields["Line Item Service Date"],
                    }),
                    Qty: line.fields["Line Item Qty"],
                    UnitPrice: line.fields["Line Item Rate"],
                  },
                };
              });

              linesPayload.sort((a, b) => a.LineNum - b.LineNum);

              return { data: linesPayload };
            };
      name: Create Lines Array
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              const fieldsMapping = configVars["QBO to AT Custom Fields Mapper"];

              // Only do this if we actually have stuff coming in the mapper.
              if (!fieldsMapping || fieldsMapping.length === 0) {
                return { data: [] };
              }

              const qboCustomFields =
                stepResults.getPreferences.results.Preferences.SalesFormsPrefs.CustomField.flatMap(
                  (entry) => entry.CustomField,
                );
              const invoice = stepResults.getInvoice.results.fields;

              const customFields = fieldsMapping.map((field) => {
                let match = qboCustomFields.find((a) => a.StringValue === field.source);
                let suffix = match.Type.replace(/Type$/, "");

                return {
                  DefinitionId: match.Name.slice(-1),
                  Type: match.Type,
                  [`${suffix}Value`]: invoice[field.destination],
                };
              });

              return { data: customFields };
            };
      name: Fill Custom Fields
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              // const customFields = configVars["QBO to AT Custom Fields Mapper"];
              // I think we don't have customfields here, since we've created the invoice from AT first?
              const job = stepResults.getJob.results.fields;
              const invoice = stepResults.getInvoice.results.fields;
              const linesArray = stepResults.createLinesArray.results;
              const suffix = stepResults.listInvoicesLinkedToJob.results.length + 1;
              const includeShipTo = configVars["Include Ship To"] === "true" ? true : false;
              const customFields = stepResults.fillCustomFields.results;
              const paymentTerm = configVars["Choose Payment Term"];
              const qboInvoice = stepResults.getInvoiceById.results

              const billToLines = (invoice["Bill To"] || "")
                .split("\n")
                .map((l) => l.trim())
                .filter(Boolean);

              const payload = {
                Id: qboInvoice.Id,
                SyncToken: qboInvoice.SyncToken || 0,
                sparse: true,
                DocNumber: invoice["Invoice Number"],
                CustomerRef: {
                  value: invoice["QBO Customer ID"]?.[0] ?? "",
                },
                BillEmail: {
                  Address: invoice["Billing Contact Email"]?.[0] ?? "",
                },
                FreeFormAddress: false,
                BillAddr: {
                  Line1: billToLines[0] || "",
                  Line2: billToLines[1] || "",
                  Line3: billToLines[2] || "",
                  Line4: billToLines[3] || "",
                  Line5: billToLines[4] || "",
                },
                SalesTermRef: {
                  value: paymentTerm,
                },
                ...(includeShipTo && {
                  ShipAddr: {
                    Line1: job["Job Site Street Address"],
                    City: job["Job Site City"],
                    CountrySubDivisionCode: job["Job Site State"]?.slice(0, 2) || "",
                    PostalCode: job["Job Site Postal Code"],
                  },
                }),
                Line: linesArray,
                ...(customFields?.length && {
                  CustomField: customFields,
                }),
                AllowOnlineACHPayment: configVars["Allow Online ACH Payment"],
                AllowOnlineCreditCardPayment:
                  configVars["Allow Online Credit Card Payment"],
              };

              // customMapper.forEach((field) => {
              //   const { source, destination } = field;
              //   if (invoice[destination]) {
              //     payload[source] = invoice[destination];
              //   }
              // });

              // ---> Can't pass custom fields in the payload it'd seem. Need to check how.

              return { data: payload };
            };
      name: Update Invoice Payload
    - action:
        key: rawRequest
        component:
          isPublic: true
          key: quickbooks
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 3
        errorHandlerType: retry
        ignoreFinalError: true
        maxAttempts: 2
        usesExponentialBackoff: false
      inputs:
        connection:
          type: configVar
          value: QuickBooks Connection
        data:
          type: reference
          value: updateInvoicePayload.results
        debugRequest:
          type: value
          value: "false"
        fileData:
          type: complex
          value: []
        formData:
          type: complex
          value: []
        headers:
          type: complex
          value: []
        maxRetries:
          type: value
          value: "0"
        method:
          type: value
          value: POST
        queryParams:
          type: complex
          value: []
        responseType:
          type: value
          value: json
        retryAllErrors:
          type: value
          value: "false"
        retryDelayMS:
          type: value
          value: "0"
        timeout:
          type: value
          value: ""
        url:
          type: value
          value: /invoice?minorversion=70
        useExponentialBackoff:
          type: value
          value: "false"
      name: Update Invoice
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: Yes
          steps:
            - action:
                key: rawRequest
                component:
                  isPublic: true
                  key: quickbooks
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: 5
                errorHandlerType: retry
                ignoreFinalError: false
                maxAttempts: 3
                usesExponentialBackoff: false
              inputs:
                connection:
                  type: configVar
                  value: QuickBooks Connection
                data:
                  type: value
                  value: ""
                debugRequest:
                  type: value
                  value: "false"
                fileData:
                  type: complex
                  value: []
                formData:
                  type: complex
                  value: []
                headers:
                  type: complex
                  value: []
                maxRetries:
                  type: value
                  value: "0"
                method:
                  type: value
                  value: GET
                queryParams:
                  type: complex
                  value: []
                responseType:
                  type: value
                  value: json
                retryAllErrors:
                  type: value
                  value: "false"
                retryDelayMS:
                  type: value
                  value: "0"
                timeout:
                  type: value
                  value: ""
                url:
                  type: template
                  value: /invoice/{{$updateInvoice.results.Id}}?minorversion=65&include=invoiceLink
                useExponentialBackoff:
                  type: value
                  value: "false"
              name: Get QBO Invoice
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {
                      const invoice = stepResults.getQboInvoice.results;

                      return { data: invoice?.InvoiceLink ?? "" };
                    };
              name: QBO Invoice Link
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {
                      const qboInvoice = stepResults.updateInvoice.results;
                      const atInvoice = stepResults.getInvoice.results;

                      const payload = {
                        qboInvoiceId: qboInvoice.Id,
                        atInvoiceId: atInvoice.id,
                      };

                      return { data: payload };
                    };
              name: Save PDF Payload
            - action:
                key: invokeFlow
                component:
                  isPublic: true
                  key: cross-flow
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: null
                errorHandlerType: ignore
                ignoreFinalError: null
                maxAttempts: null
                usesExponentialBackoff: null
              inputs:
                data:
                  type: reference
                  value: savePdfPayload.results
                flowName:
                  type: value
                  value: 30 Save Invoice's PDF in Airtable
              name: Save PDF in AT
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {
                      const invoice = stepResults.getQboInvoice.results;

                      const billAddr = invoice.BillAddr;

                      if (!billAddr) {
                        return { data: null };
                      }

                      const lines = [];

                      if (billAddr.Line1) lines.push(billAddr.Line1);
                      if (billAddr.Line2) lines.push(billAddr.Line2);
                      if (billAddr.Line3) lines.push(billAddr.Line3);
                      if (billAddr.Line4) lines.push(billAddr.Line4);

                      const billToAddress = lines.join("\n");

                      return {
                        data: billToAddress,
                      };
                    };
              name: Parse Bill To
            - action:
                key: updateRecord
                component:
                  isPublic: true
                  key: airtable
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: 5
                errorHandlerType: retry
                ignoreFinalError: false
                maxAttempts: 3
                usesExponentialBackoff: false
              inputs:
                airtableConnection:
                  type: configVar
                  value: Airtable Connection
                baseId:
                  type: configVar
                  value: Project Management Base
                dynamicFields:
                  type: value
                  value: ""
                record:
                  type: reference
                  value: getJob.results.id
                recordFields:
                  type: complex
                  value:
                    - name:
                        type: value
                        value: Invoice Automation Status
                      type: value
                      value: Invoice Updated Successfully
                tableName:
                  type: configVar
                  value: Jobs Table
              name: Update Job Status (Success)
            - action:
                key: updateRecord
                component:
                  isPublic: true
                  key: airtable
                  version: LATEST
              description: And Invoice URL, QBO Invoice ID
              errorConfig:
                delaySeconds: 5
                errorHandlerType: retry
                ignoreFinalError: false
                maxAttempts: 3
                usesExponentialBackoff: false
              inputs:
                airtableConnection:
                  type: configVar
                  value: Airtable Connection
                baseId:
                  type: configVar
                  value: Project Management Base
                dynamicFields:
                  type: value
                  value: ""
                record:
                  type: reference
                  value: getInvoice.results.id
                recordFields:
                  type: complex
                  value:
                    - name:
                        type: value
                        value: ⚙️ Automation Status
                      type: value
                      value: Invoice Updated Successfully
                    - name:
                        type: value
                        value: QBO Invoice ID
                      type: reference
                      value: updateInvoice.results.Id
                    - name:
                        type: value
                        value: Invoice URL
                      type: reference
                      value: qboInvoiceLink.results
                    - name:
                        type: value
                        value: Due Date
                      type: reference
                      value: getQboInvoice.results.DueDate
                    - name:
                        type: value
                        value: Invoice Date
                      type: reference
                      value: getQboInvoice.results.TxnDate
                    - name:
                        type: value
                        value: QBO Invoice Balance
                      type: reference
                      value: getQboInvoice.results.Balance
                    - name:
                        type: value
                        value: Bill To
                      type: reference
                      value: parseBillTo.results
                    - name:
                        type: value
                        value: QBO Record Id
                      type: reference
                      value: updateInvoice.results.Id
                tableName:
                  type: configVar
                  value: Invoices Table
              name: Update Invoice Status (Success)
            - action:
                key: stopExecution
                component:
                  isPublic: true
                  key: stop-execution
                  version: LATEST
              description: ""
              inputs:
                contentType:
                  type: value
                  value: application/json
                headers:
                  type: complex
                  value: []
                jsonBody:
                  type: reference
                  value: updateInvoice.results.Id
                statusCode:
                  type: value
                  value: "200"
              name: Stop Execution (Success)
        - name: Else
          steps:
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {
                      const error = JSON.parse(stepResults.updateInvoice.results.error.message);
                      const errorMessages = error.data.Fault.Error.map(
                        (error) => error.Detail,
                      ).join(" | ");
                      return { data: errorMessages };
                    };
              name: Parse Errors
            - action:
                key: updateRecord
                component:
                  isPublic: true
                  key: airtable
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: 5
                errorHandlerType: retry
                ignoreFinalError: false
                maxAttempts: 3
                usesExponentialBackoff: false
              inputs:
                airtableConnection:
                  type: configVar
                  value: Airtable Connection
                baseId:
                  type: configVar
                  value: Project Management Base
                dynamicFields:
                  type: value
                  value: ""
                record:
                  type: reference
                  value: getJob.results.id
                recordFields:
                  type: complex
                  value:
                    - name:
                        type: value
                        value: Invoice Automation Status
                      type: reference
                      value: parseErrors.results
                tableName:
                  type: configVar
                  value: Jobs Table
              name: Update Job Status (Error)
            - action:
                key: updateRecord
                component:
                  isPublic: true
                  key: airtable
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: 5
                errorHandlerType: retry
                ignoreFinalError: false
                maxAttempts: 3
                usesExponentialBackoff: false
              inputs:
                airtableConnection:
                  type: configVar
                  value: Airtable Connection
                baseId:
                  type: configVar
                  value: Project Management Base
                dynamicFields:
                  type: value
                  value: ""
                record:
                  type: reference
                  value: getInvoice.results.id
                recordFields:
                  type: complex
                  value:
                    - name:
                        type: value
                        value: ⚙️ Automation Status
                      type: reference
                      value: parseErrors.results
                tableName:
                  type: configVar
                  value: Invoices Table
              name: Update Invoice Status (Error)
            - action:
                key: stopExecution
                component:
                  isPublic: true
                  key: stop-execution
                  version: LATEST
              description: ""
              inputs:
                contentType:
                  type: value
                  value: application/json
                headers:
                  type: complex
                  value: []
                jsonBody:
                  type: reference
                  value: parseErrors.results
                statusCode:
                  type: value
                  value: "400"
              name: Stop Execution (Error)
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: Yes
              type: complex
              value:
                - and
                - - exists
                  - name: ""
                    type: reference
                    value: updateInvoice.results.Id
                - - doesNotExist
                  - name: ""
                    type: reference
                    value: updateInvoice.results.error
      name: Invoice created successfully?
