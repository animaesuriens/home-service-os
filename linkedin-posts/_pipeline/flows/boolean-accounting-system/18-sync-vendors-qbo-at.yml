sourceFile: boolean-accounting-system-export.yml
category: Boolean PaintOS
flow:
  name: 18 Sync Vendors QBO -> AT
  description: Fetch Vendors from QBO and sync in AT
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: webhook
        component:
          isPublic: true
          key: webhook-triggers
          version: LATEST
      description: ""
      inputs:
        body:
          type: value
          value: ""
        contentType:
          type: value
          value: ""
        headers:
          type: complex
          value: []
        statusCode:
          type: value
          value: ""
      isTrigger: true
      name: New Flow Trigger
    - action:
        key: saveExecutionValue
        component:
          isPublic: true
          key: persist-data
          version: LATEST
      description: ""
      inputs:
        dynamicValues:
          type: complex
          value: []
        keyInput:
          type: value
          value: startPosition
        valueInput:
          type: value
          value: "1"
      name: Execution - Save Value
    - action:
        key: loopNTimes
        component:
          isPublic: true
          key: loop
          version: LATEST
      description: ""
      inputs:
        iterationCount:
          type: value
          value: "5"
      name: Loop N Times
      steps:
        - action:
            key: getExecutionValue
            component:
              isPublic: true
              key: persist-data
              version: LATEST
          description: ""
          inputs:
            defaultValueInput:
              type: value
              value: "1"
            keyInput:
              type: value
              value: startPosition
          name: Execution - Get Value
        - action:
            key: rawRequest
            component:
              isPublic: true
              key: quickbooks
              version: LATEST
          description: ""
          inputs:
            connection:
              type: configVar
              value: QuickBooks Connection
            data:
              type: value
              value: ""
            debugRequest:
              type: value
              value: "false"
            fileData:
              type: complex
              value: []
            formData:
              type: complex
              value: []
            headers:
              type: complex
              value: []
            maxRetries:
              type: value
              value: "0"
            method:
              type: value
              value: GET
            queryParams:
              type: complex
              value: []
            responseType:
              type: value
              value: json
            retryAllErrors:
              type: value
              value: "false"
            retryDelayMS:
              type: value
              value: "0"
            timeout:
              type: value
              value: ""
            url:
              type: template
              value: /query?query=SELECT * FROM Vendor STARTPOSITION
                {{$executionGetValue.results}} MAXRESULTS 200
            useExponentialBackoff:
              type: value
              value: "false"
          name: Fetch Vendors
        - action:
            key: branchOnExpression
            component:
              isPublic: true
              key: branch
              version: LATEST
          branches:
            - name: Yes
              steps:
                - action:
                    key: runCode
                    component:
                      isPublic: true
                      key: code
                      version: LATEST
                  description: ""
                  inputs:
                    code:
                      type: value
                      value: >
                        const _ = require("lodash");


                        module.exports = async ({ logger, configVars },
                        stepResults) => {
                          const records = stepResults.fetchVendors.results.QueryResponse.Vendor;

                          const batches = _.chunk(records, 10);

                          return { data: batches };
                        };
                  name: Prepare batches
                - action:
                    key: loopOverItems
                    component:
                      isPublic: true
                      key: loop
                      version: LATEST
                  description: ""
                  inputs:
                    items:
                      type: reference
                      value: prepareBatches.results
                  name: Loop Over Batches
                  steps:
                    - action:
                        key: runCode
                        component:
                          isPublic: true
                          key: code
                          version: LATEST
                      description: ""
                      inputs:
                        code:
                          type: value
                          value: >
                            module.exports = async ({ logger, configVars },
                            stepResults) => {
                              const records = stepResults.loopOverBatches.currentItem;

                              const payloadRecords = records.map((record) => {
                                const value = {
                                  fields: {
                                    "QBO Vendor ID": record.Id,
                                    "Display Name": record.DisplayName,
                                    Balance: record.Balance,
                                  },
                                };
                                return value;
                              });

                              const payload = {
                                performUpsert: {
                                  fieldsToMergeOn: ["QBO Vendor ID"],
                                },
                                records: payloadRecords,
                              };

                              return { data: payload };
                            };
                      name: Create Payload
                    - action:
                        key: rawRequest
                        component:
                          isPublic: true
                          key: airtable
                          version: LATEST
                      description: ""
                      inputs:
                        connection:
                          type: configVar
                          value: Airtable Connection
                        data:
                          type: reference
                          value: createPayload.results
                        debugRequest:
                          type: value
                          value: "false"
                        fileData:
                          type: complex
                          value: []
                        fileDataFileNames:
                          type: complex
                          value: []
                        formData:
                          type: complex
                          value: []
                        headers:
                          type: complex
                          value: []
                        maxRetries:
                          type: value
                          value: "0"
                        method:
                          type: value
                          value: PATCH
                        queryParams:
                          type: complex
                          value: []
                        responseType:
                          type: value
                          value: json
                        retryAllErrors:
                          type: value
                          value: "false"
                        retryDelayMS:
                          type: value
                          value: "0"
                        timeout:
                          type: value
                          value: ""
                        url:
                          type: template
                          value: /v0/{{#Project Management Base}}/{{#Vendors Table}}
                        useExponentialBackoff:
                          type: value
                          value: "false"
                      name: Upsert Vendors
                - action:
                    key: incrementExecutionValue
                    component:
                      isPublic: true
                      key: persist-data
                      version: LATEST
                  description: ""
                  inputs:
                    amountInput:
                      type: value
                      value: "200"
                    keyInput:
                      type: value
                      value: startPosition
                  name: Execution - Increment Value
            - name: Else
              steps:
                - action:
                    key: breakLoop
                    component:
                      isPublic: true
                      key: loop
                      version: LATEST
                  description: ""
                  inputs: {}
                  name: Break Loop
          description: ""
          inputs:
            conditions:
              type: complex
              value:
                - name: Yes
                  type: complex
                  value:
                    - and
                    - - exists
                      - name: ""
                        type: reference
                        value: fetchVendors.results.QueryResponse.Vendor
          name: Request has records?
