            const axios = require('axios');


            module.exports = async ({ logger, configVars }, stepResults) => {
              const tsheetToken = configVars["QuickBooks Time Token"];

              // Initialize TSheets API client.
              const tsheetClient = axios.create({
                baseURL: `https://rest.tsheets.com/api/v1`,
                headers: {
                  Authorization: `Bearer ${tsheetToken}`,
                  'Content-Type': 'application/json'
                },
              });

              let allJobCodes = [];
              let page = 1;
              const pageSize = 200; // maximum records per call

              while (true) {
                try {
                  const jobCodes = await retryOperation(
                    () => retriveJobCodes(tsheetClient, '/jobcodes', page),
                    [3, 3, 3]
                  );
                  logger.log(`Retrieved ${jobCodes.length} job codes on page ${page}`);
                  
                  // Filter for active job codes
                  allJobCodes = allJobCodes.concat(jobCodes);
                  
                  if (jobCodes.length < pageSize) break;
                  page++;
                } catch (err) {
                  logger.error(`Error retrieving JobCodes on page ${page}:`, err.message);
                  break;
                }
              }
              
              logger.log("Total Active JobCodes Retrieved: ", allJobCodes.length);
              return allJobCodes;
            };


            async function retriveJobCodes(client, endpoint, page) {
              try {
                const params = new URLSearchParams({ page: page, per_page: 200, active: true }).toString();
                const response = await client.get(`${endpoint}?${params}`);
                if (!response.data || !response.data.results || !response.data.results.jobcodes) return [];
                return Object.values(response.data.results.jobcodes);
              } catch (error) {
                console.error(`${endpoint} retrieval failed:`, error.response?.data || error.message);
                throw error;
              }
            }


            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }


            async function retryOperation(operationFn, retryDelaysInSeconds =
            [5, 5, 5]) {
              let lastError;
              for (const delayInSeconds of retryDelaysInSeconds) {
                try {
                  return await operationFn();
                } catch (error) {
                  lastError = error;
                  console.warn(`Operation failed: ${error.message}. Retrying in ${delayInSeconds} seconds...`);
                  await sleep(delayInSeconds * 1000);
                }
              }
              throw lastError;
            }
      name: Retrieve All Active JobCodes
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: From PaintOS Projects Table
      inputs:
        code:
          type: value
          value: >-
            const axios = require('axios');


            module.exports = async ({ logger, configVars }, stepResults) => {
              const projectTable = configVars["Projects Table"];
              const base = configVars["Project Management Base"];
              const { apiKey } = configVars["Airtable Connection"].fields;

              // Initialize Airtable client.
              const airtableClient = axios.create({
                baseURL: `https://api.airtable.com/v0/${base}`,
                headers: {
                  Authorization: `Bearer ${apiKey}`,
                  'Content-Type': 'application/json'
                },
              });

              let allProjects = [];
              let offset = null;
              const pageSize = 100; // Airtable page size

              do {
                // Build the URL with pageSize and offset (if available)
                let url = `/${encodeURIComponent(projectTable)}?pageSize=${pageSize}`;
                if (offset) {
                  url += `&offset=${encodeURIComponent(offset)}`;
                }
                
                try {
                  // Use retryOperation for robust API call.
                  const response = await retryOperation(
                    () => airtableClient.get(url),
                    [3, 3, 3]
                  );
                  
                  const records = response.data.records || [];
                  allProjects = allProjects.concat(records);
                  logger.log(`Retrieved ${records.length} records; offset: ${response.data.offset || "none"}`);
                  
                  offset = response.data.offset;
                } catch (error) {
                  logger.error("Error retrieving projects:", error.message);
                  break;
                }
              } while (offset);

              logger.log("Total Projects Retrieved:", allProjects.length);
              return allProjects.map(record => ({
                  id: record.id,
                  fields: {
                    "QB Time Jobcode ID": record.fields["QB Time Jobcode ID"]
                  }
              }));
            };


            //

            // --- Retry Operation Function and Sleep Helper ---

            //


            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }


            /**
             * Retries an async operation using specified delays (in seconds).
             *
             * @param {Function} operationFn - The async function to execute.
             * @param {Array<number>} retryDelaysInSeconds - Delays (in seconds) between retries.
             * @returns {Promise<any>} - The result of the async function if successful.
             */
            async function retryOperation(operationFn, retryDelaysInSeconds =
            [5, 5, 5]) {
              let lastError;
              for (const delayInSeconds of retryDelaysInSeconds) {
                try {
                  return await operationFn();
                } catch (error) {
                  lastError = error;
                  console.warn(`Operation failed: ${error.message}. Retrying in ${delayInSeconds} seconds...`);
                  await sleep(delayInSeconds * 1000);
                }
              }
              throw lastError;
            }
      name: Retrieve All Projects
