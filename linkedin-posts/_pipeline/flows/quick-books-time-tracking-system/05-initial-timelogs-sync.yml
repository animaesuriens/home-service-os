sourceFile: quick-books-time-tracking-system-export.yml
category: Boolean PaintOS
flow:
  name: 05 Initial Timelogs Sync
  description: ""
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: instanceDeploy
        component:
          isPublic: true
          key: management-triggers
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Trigger
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >-
            module.exports = async ({ logger, configVars }, stepResults) => {
              let type = stepResults.trigger.results.body.contentType;
              let data = stepResults.trigger.results.body.data;

              if (type === "application/xml") {
                let days = String(data) === '{}' ? -30 : data;
                logger.log(days);
                return days;
              } else {
                logger.warn("Content-Type must be application/xml, so I use '-30' as default duration.")
                return -30;
              }
            };
      name: Default Days
    - action:
        key: adjustDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: ""
      inputs:
        dateTimeInput:
          type: reference
          value: trigger.results.startedAt
        daysInput:
          type: reference
          value: defaultDays.results
        hoursInput:
          type: value
          value: ""
        minutesInput:
          type: value
          value: ""
        secondsInput:
          type: value
          value: ""
      name: Adjust Date/Time
    - action:
        key: formatDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: ""
      inputs:
        dateTime:
          type: reference
          value: adjustDateTime.results
        format:
          type: value
          value: YYYY-MM-DDTHH:mm:ssZ
        timeZone:
          type: value
          value: Etc/UTC
      name: Format to ISO Date
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: From QuickBooks Time
      inputs:
        code:
          type: value
          value: >-
            const axios = require('axios');


            module.exports = async ({ logger, configVars }, stepResults) => {
              // Example: ISO date string for filtering timesheets (passed as a parameter)
              const date = stepResults.formatToIsoDate.results;  

              // Retrieve TSheets token from configVars (assuming it's defined)
              const tsheetToken = configVars["QuickBooks Time Token"];

              // Initialize TSheets API client.
              const tsheetClient = axios.create({
                baseURL: `https://rest.tsheets.com/api/v1`,
                headers: {
                  Authorization: `Bearer ${tsheetToken}`,
                  'Content-Type': 'application/json'
                },
              });

              let allTimesheets = [];
              let page = 1;
              const pageSize = 200; // maximum records per call

              while (true) {
                try {
                  // Use retryOperation to call the API for this page.
                  const timesheets = await retryOperation(
                    () => retriveSheets(tsheetClient, '/timesheets', date, page),
                    [3, 3, 3]
                  );
                  logger.log(`Retrieved ${timesheets.length} records on page ${page}`);
                  // Append the records from this page to allTimesheets.
                  allTimesheets = allTimesheets.concat(timesheets);

                  // If the number of records returned is less than the pageSize, we assume this is the last page.
                  if (timesheets.length < pageSize) {
                    break;
                  }
                  // Otherwise, move to the next page.
                  page++;
                } catch (err) {
                  logger.error(`Error retrieving Time Sheets on page ${page}:`, err.message);
                  break;
                }
              }
                
              // Sort timesheets from earliest to latest using last_modified
              allTimesheets.sort((a, b) => new Date(a.last_modified) - new Date(b.last_modified));
              
              logger.log("Total Timesheets Retrieved: ", allTimesheets.length);
              return allTimesheets;
            };


            async function retriveSheets(client, endpoint, date, page) {
              try {
                // Construct query parameters.
                // Adjust the query string parameters as required by the API.
                const params = new URLSearchParams({ modified_since: date, page: page }).toString();    
                const response = await client.get(`${endpoint}?${params}`);
                
                // Assuming your API returns a JSON object where timesheets are nested under a key (e.g. "results")
                // and that each page returns an object with a property "timesheets"
                const data = extractAllTimesheetIds(response.data);
                return data || [];
              } catch (error) {
                console.error(`${endpoint} retrieval failed:`, error.response?.data || error.message);
                throw error;
              }
            }


            function extractAllTimesheetIds(data) {
              // Adjust this function based on the structure of your API's response.
              // For example, if response data looks like: { results: { timesheets: { id1: {}, id2: {} } }, more: true }
              if (!data || !data.results || !data.results.timesheets) return [];
              
              return Object.values(data.results.timesheets);
            }


            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }


            /**
             * Retry an async operation using specified delays (in seconds).
             *
             * @param {Function} operationFn - The async function to execute.
             * @param {Array<number>} retryDelaysInSeconds - Array of delays (seconds) between retries.
             * @returns {Promise<any>} - The result of the async function if successful.
             */
            async function retryOperation(operationFn, retryDelaysInSeconds =
            [5, 5, 5]) {
              let lastError;
              for (const delayInSeconds of retryDelaysInSeconds) {
                try {
                  return await operationFn();
                } catch (error) {
                  lastError = error;
                  console.warn(`Operation failed: ${error.message}. Retrying in ${delayInSeconds} seconds...`);
                  await sleep(delayInSeconds * 1000);
                }
              }
              throw lastError;
            }
      name: Retrieve All Time Sheets
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: From QuickBooks Time
      inputs:
        code:
          type: value
          value: >-
            const axios = require('axios');


            module.exports = async ({ logger, configVars }, stepResults) => {
              const tsheetToken = configVars["QuickBooks Time Token"];

              // Initialize TSheets API client.
              const tsheetClient = axios.create({
                baseURL: `https://rest.tsheets.com/api/v1`,
                headers: {
                  Authorization: `Bearer ${tsheetToken}`,
                  'Content-Type': 'application/json'
                },
              });

              let allUsers = [];
              let page = 1;
              const pageSize = 200; // maximum records per call

              while (true) {
                try {
                  const users = await retryOperation(
                    () => retriveUsers(tsheetClient, '/users', page),
                    [3, 3, 3]
                  );
                  logger.log(`Retrieved ${users.length} user records on page ${page}`);
                  allUsers = allUsers.concat(users);
                  if (users.length < pageSize) break;
                  page++;
                } catch (err) {
                  logger.error(`Error retrieving Users on page ${page}:`, err.message);
                  break;
                }
              }
              
              logger.log("Total Users Retrieved: ", allUsers.length);
              return allUsers;
            };


            async function retriveUsers(client, endpoint, page) {
              try {
                // Construct query parameters.
                const params = new URLSearchParams({ page: page, per_page: 200 }).toString();
                const response = await client.get(`${endpoint}?${params}`);
                // Assuming the response structure contains user objects under results.users.
                if (!response.data || !response.data.results || !response.data.results.users) return [];
                return Object.values(response.data.results.users);
              } catch (error) {
                console.error(`${endpoint} retrieval failed:`, error.response?.data || error.message);
                throw error;
              }
            }


            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }


            async function retryOperation(operationFn, retryDelaysInSeconds =
            [5, 5, 5]) {
              let lastError;
              for (const delayInSeconds of retryDelaysInSeconds) {
                try {
                  return await operationFn();
                } catch (error) {
                  lastError = error;
                  console.warn(`Operation failed: ${error.message}. Retrying in ${delayInSeconds} seconds...`);
                  await sleep(delayInSeconds * 1000);
                }
              }
              throw lastError;
            }
      name: Retrieve All Users
