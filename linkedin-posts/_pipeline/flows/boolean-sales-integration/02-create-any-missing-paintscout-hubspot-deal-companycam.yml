                            const axios = require('axios');


                            module.exports = async ({ logger, configVars },
                            stepResults) => {
                              try {
                                const access_token = configVars['HubSpot Private App Connection']?.fields?.accessToken;
                                const estimateSources = stepResults?.trigger?.results?.body?.data?.number;
                                const dealIds = stepResults?.findDealByRawEstimateNumber?.results?.results?.map(item => item?.id) || [];

                                if (!access_token) throw new Error('Missing HubSpot access token');
                                if (!estimateSources) throw new Error('Missing estimate source value');
                                if (!dealIds.length) {
                                  logger.info('No deals found to update.');
                                  return { message: 'No deals to update', dealIds };
                                }

                                logger.info(`Updating ${dealIds.length} deal(s) with raw_paintscout_estimate_number = ${estimateSources}`);

                                // Update each deal in sequence
                                for (const dealId of dealIds) {
                                  const url = `https://api.hubapi.com/crm/v3/objects/deals/${dealId}`;
                                  const body = {
                                    properties: {
                                      raw_paintscout_estimate_number: estimateSources
                                    }
                                  };

                                  await axios.patch(url, body, {
                                    headers: {
                                      Authorization: `Bearer ${access_token}`,
                                      'Content-Type': 'application/json'
                                    }
                                  });

                                  logger.info(`✅ Updated deal ${dealId}`);
                                }

                                return {
                                  message: `Successfully updated ${dealIds.length} deal(s).`,
                                  estimateSources,
                                  dealIds
                                };
                              } catch (error) {
                                logger.error('❌ Error updating deals:', error.response?.data || error.message);
                                throw error;
                              }
                            };
