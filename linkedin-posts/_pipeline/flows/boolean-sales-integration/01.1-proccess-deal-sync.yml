sourceFile: boolean-sales-integration-export.yml
category: Marketing and Sales System
flow:
  name: 01.1 Proccess Deal Sync
  description: PaintScout > HubSpot | Process Quote - Estimate > Deal Sync
  isSynchronous: true
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: crossFlow
        component:
          isPublic: true
          key: cross-flow
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Trigger
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: Not Declined
          steps:
            - action:
                key: writeLog
                component:
                  isPublic: true
                  key: log
                  version: LATEST
              description: ""
              inputs:
                level:
                  type: value
                  value: info
                message:
                  type: reference
                  value: trigger.results.body.data.getQuote
              name: Quote Data
            - action:
                key: branchOnExpression
                component:
                  isPublic: true
                  key: branch
                  version: LATEST
              branches:
                - name: If Accepted
                  steps:
                    - action:
                        key: rawRequest
                        component:
                          isPublic: true
                          key: hubspot
                          version: LATEST
                      description: Unenroll contact to the sales follow-up sequence created in
                        HubSpot.
                      errorConfig:
                        delaySeconds: 10
                        errorHandlerType: retry
                        ignoreFinalError: true
                        maxAttempts: 2
                        usesExponentialBackoff: false
                      inputs:
                        connection:
                          type: configVar
                          value: HubSpot Private App Connection
                        data:
                          type: template
                          value: >-
                            {

                            "fields": [
                                {
                                  "objectTypeId": "0-1",
                                  "name": "email",
                                  "value": "{{$trigger.results.body.data.getQuote.contact.email}}"
                                }
                              ]
                            }
                        debugRequest:
                          type: value
                          value: "false"
                        fileData:
                          type: complex
                          value: []
                        fileDataFileNames:
                          type: complex
                          value: []
                        formData:
                          type: complex
                          value: []
                        headers:
                          type: complex
                          value:
                            - name:
                                type: value
                                value: Content-Type
                              type: value
                              value: application/json
                        maxRetries:
                          type: value
                          value: "0"
                        method:
                          type: value
                          value: POST
                        queryParams:
                          type: complex
                          value: []
                        responseType:
                          type: value
                          value: json
                        retryAllErrors:
                          type: value
                          value: "false"
                        retryDelayMS:
                          type: value
                          value: "0"
                        timeout:
                          type: value
                          value: ""
                        url:
                          type: template
                          value: https://api.hsforms.com/submissions/v3/integration/submit/{{#HubSpot
                            Portal ID}}/{{#Unenroll Sequence Form ID}}
                        useExponentialBackoff:
                          type: value
                          value: "false"
                      name: Unenroll Sequence
                - name: If Sent
                  steps:
                    - action:
                        key: rawRequest
                        component:
                          isPublic: true
                          key: hubspot
                          version: LATEST
                      description: Enroll contact to the sales follow-up sequence created in HubSpot.
                      errorConfig:
                        delaySeconds: 10
                        errorHandlerType: retry
                        ignoreFinalError: true
                        maxAttempts: 2
                        usesExponentialBackoff: false
                      inputs:
                        connection:
                          type: configVar
                          value: HubSpot Private App Connection
                        data:
                          type: template
                          value: >-
                            {

                            "fields": [
                                {
                                  "objectTypeId": "0-1",
                                  "name": "email",
                                  "value": "{{$trigger.results.body.data.getQuote.contact.email}}"
                                }
                              ]
                            }
                        debugRequest:
                          type: value
                          value: "false"
                        fileData:
                          type: complex
                          value: []
                        fileDataFileNames:
                          type: complex
                          value: []
                        formData:
                          type: complex
                          value: []
                        headers:
                          type: complex
                          value:
                            - name:
                                type: value
                                value: Content-Type
                              type: value
                              value: application/json
                        maxRetries:
                          type: value
                          value: "0"
                        method:
                          type: value
                          value: POST
                        queryParams:
                          type: complex
                          value: []
                        responseType:
                          type: value
                          value: json
                        retryAllErrors:
                          type: value
                          value: "false"
                        retryDelayMS:
                          type: value
                          value: "0"
                        timeout:
                          type: value
                          value: ""
                        url:
                          type: template
                          value: https://api.hsforms.com/submissions/v3/integration/submit/{{#HubSpot
                            Portal ID}}/{{#Enroll Sequence Form ID}}
                        useExponentialBackoff:
                          type: value
                          value: "false"
                      name: Enroll Sequence
                - name: Else
                  steps: []
              description: ""
              inputs:
                conditions:
                  type: complex
                  value:
                    - name: If Accepted
                      type: complex
                      value:
                        - and
                        - - equal
                          - name: ""
                            type: reference
                            value: trigger.results.body.data.getQuote.status
                          - name: ""
                            type: value
                            value: accepted
                        - - greaterThan
                          - name: ""
                            type: reference
                            value: trigger.results.body.data.getQuote.statusHistory.accepted.timestamp
                          - name: ""
                            type: reference
                            value: trigger.results.body.data.timeXMinutesAgoToEpoch
                    - name: If Sent
                      type: complex
                      value:
                        - and
                        - - equal
                          - name: ""
                            type: reference
                            value: trigger.results.body.data.getQuote.status
                          - name: ""
                            type: value
                            value: sent
                        - - greaterThan
                          - name: ""
                            type: reference
                            value: trigger.results.body.data.getQuote.dates.sent
                          - name: ""
                            type: reference
                            value: trigger.results.body.data.timeXMinutesAgoToEpoch
              name: Enroll Sequence Branch
            - action:
                key: branchOnExpression
                component:
                  isPublic: true
                  key: branch
                  version: LATEST
              branches:
                - name: If Source ID Do Not Exist
                  steps:
                    - action:
                        key: invokeFlow
                        component:
                          isPublic: true
                          key: cross-flow
                          version: LATEST
                      description: 02 Create Any Missing PaintScout, HubSpot Deal & CompanyCam
                      errorConfig:
                        delaySeconds: null
                        errorHandlerType: fail
                        ignoreFinalError: null
                        maxAttempts: null
                        usesExponentialBackoff: null
                      inputs:
                        data:
                          type: reference
                          value: trigger.results.body.data.getQuote
                        flowName:
                          type: value
                          value: 02 Create Any Missing PaintScout, HubSpot Deal & CompanyCam
                      name: Invoke Flow 02
                - name: Else
                  steps:
                    - action:
                        key: runCode
                        component:
                          isPublic: true
                          key: code
                          version: LATEST
                      description: ""
                      errorConfig:
                        delaySeconds: null
                        errorHandlerType: fail
                        ignoreFinalError: null
                        maxAttempts: null
                        usesExponentialBackoff: null
                      inputs:
                        code:
                          type: value
                          value: >
                            module.exports = async ({ logger, configVars },
                            stepResults) => {
                              let sources = stepResults?.trigger?.results?.body?.data?.getQuote?.source?.id
                              return sources?.split(',') ;
                            };
                      name: Convert Sources to Array
                    - action:
                        key: loopOverItems
                        component:
                          isPublic: true
                          key: loop
                          version: LATEST
                      description: ""
                      inputs:
                        items:
                          type: reference
                          value: convertSourcesToArray.results
                      name: Look Source IDs
                      steps:
                        - action:
                            key: getDealById
                            component:
                              isPublic: true
                              key: hubspot
                              version: LATEST
                          description: ""
                          errorConfig:
                            delaySeconds: 30
                            errorHandlerType: retry
                            ignoreFinalError: false
                            maxAttempts: 2
                            usesExponentialBackoff: false
                          inputs:
                            additionalProperties:
                              type: complex
                              value:
                                - type: value
                                  value: dealstage
                                - type: value
                                  value: amount
                                - type: value
                                  value: hours___contract
                                - type: value
                                  value: airtable_awo_record_id
                                - type: value
                                  value: airtable_job_record_id
                                - type: value
                                  value: hubspot_owner_id
                                - type: value
                                  value: estimate_date
                                - type: value
                                  value: companycam_public_url
                                - type: value
                                  value: companycam_project_url
                                - type: value
                                  value: description
                                - type: value
                                  value: source
                                - type: value
                                  value: previous_customer
                                - type: value
                                  value: scheduled_by
                                - type: value
                                  value: tags
                                - type: value
                                  value: house_built_before_1978
                                - type: value
                                  value: deposit_amount
                                - type: value
                                  value: project_type
                                - type: value
                                  value: companycam_project_id
                                - type: value
                                  value: gross_sales_after_discount__including_tax
                                - type: value
                                  value: contract_type
                                - type: value
                                  value: estimate_date_2
                            archived:
                              type: value
                              value: "false"
                            associationsList:
                              type: complex
                              value:
                                - type: value
                                  value: Contacts
                            dealId:
                              type: reference
                              value: lookSourceIds.currentItem
                            dealName:
                              type: value
                              value: ""
                            debugRequest:
                              type: value
                              value: "false"
                            hubspotConnection:
                              type: configVar
                              value: HubSpot Private App Connection
                            timeout:
                              type: value
                              value: ""
                          name: Get Deal
                        - action:
                            key: runCode
                            component:
                              isPublic: true
                              key: code
                              version: LATEST
                          description: This is to avoid issue when the deal name contains numbers only
                          inputs:
                            code:
                              type: value
                              value: >
                                module.exports = async ({ logger, configVars },
                                stepResults) => {
                                  let dealName = stepResults?.getDeal?.results?.properties?.dealname?.toString();

                                  if (/^\d+$/.test(dealName)) {
                                    // If dealName is all digits, add "s"
                                    return { data: dealName + "s" };
                                  } else {
                                    // If not all digits, return as is
                                    return { data: dealName };
                                  }
                                };
                          name: To String Deal Name
                        - action:
                            key: branchOnExpression
                            component:
                              isPublic: true
                              key: branch
                              version: LATEST
                          branches:
                            - name: If Original Deal
                              steps:
                                - action:
                                    key: branchOnExpression
                                    component:
                                      isPublic: true
                                      key: branch
                                      version: LATEST
                                  branches:
                                    - name: If Not "Won"
                                      steps:
                                        - action:
                                            key: runCode
                                            component:
                                              isPublic: true
                                              key: code
                                              version: LATEST
                                          description: ""
                                          inputs:
                                            code:
                                              type: value
                                              value: >
                                                module.exports = async ({
                                                logger, configVars },
                                                stepResults) => {
                                                  let quoteLabel = stepResults?.trigger?.results?.body?.data?.getQuote?.quoteType?.label
                                                 
                                                  return { 
                                                    data: {
                                                      properties:{
                                                        customer_selected_project_type:quoteLabel
                                                      }
                                                    } 
                                                  };
                                                };
                                          name: Generate Payload Get Project Type
                                        - action:
                                            key: invokeFlow
                                            component:
                                              isPublic: true
                                              key: cross-flow
                                              version: LATEST
                                          description: ""
                                          errorConfig:
                                            delaySeconds: 10
                                            errorHandlerType: retry
                                            ignoreFinalError: false
                                            maxAttempts: 2
                                            usesExponentialBackoff: false
                                          inputs:
                                            data:
                                              type: reference
                                              value: generatePayloadGetProjectType.results
                                            flowName:
                                              type: value
                                              value: 12 Customer-Selected Project Type -> Project Type Conversion
                                          name: Get Project Type
                                        - action:
                                            key: listRecords
                                            component:
                                              isPublic: true
                                              key: airtable
                                              version: LATEST
                                          description: ""
                                          errorConfig:
                                            delaySeconds: 10
                                            errorHandlerType: retry
                                            ignoreFinalError: false
                                            maxAttempts: 3
                                            usesExponentialBackoff: false
                                          inputs:
                                            airtableConnection:
                                              type: configVar
                                              value: Airtable Connection
                                            baseId:
                                              type: configVar
                                              value: Project Management Base
                                            fields:
                                              type: complex
                                              value: []
                                            filterByFormula:
                                              type: template
                                              value: AND({Work
                                                Email}="{{$trigger.results.body.data.getQuote.owner.email}}",{Work
                                                Email})
                                            tableName:
                                              type: configVar
                                              value: People Table
                                            view:
                                              type: value
                                              value: ""
                                          name: Get Owner
                                        - action:
                                            key: runCode
                                            component:
                                              isPublic: true
                                              key: code
                                              version: LATEST
                                          description: ""
                                          inputs:
                                            code:
                                              type: value
                                              value: >
                                                module.exports = async ({
                                                logger, configVars },
                                                stepResults) => {
                                                  // Get PaintScout data from the previous step results
                                                  const psData = stepResults?.trigger?.results?.body?.data?.getQuote;
                                                  const quoteStatus = psData.status || "";
                                                  const quoteDate = Number(psData.dates.quote) || 0; // Ensure quoteDate is a number
                                                  const quotePrice = psData.totals.price || 0;
                                                  const sentStage = configVars["Bid Sent"];
                                                  const acceptedStage = configVars["Customer Accepted Proposal"];
                                                  const bidScheduledStage = configVars["Bid Scheduled"];
                                                  const inProgressStage = configVars["Bid in Progress"];
                                                  const dealData = stepResults.getDeal.results;
                                                  const currentStage = dealData.properties.dealstage;

                                                  logger.log("Current Stage: ", currentStage)
                                                  logger.log("Current Status: ", quoteStatus)


                                                  let status = bidScheduledStage; // Default to Bid Scheduled

                                                  // Get today's date in epoch format at midnight
                                                  const todayEpoch = new Date().setHours(0, 0, 0, 0);

                                                  if (quoteStatus === "accepted") {
                                                    status = acceptedStage;
                                                  } else if (quoteStatus === "sent" || quoteStatus === "viewed") {
                                                    if (currentStage ==  bidScheduledStage || currentStage ==  inProgressStage) {
                                                      status = sentStage;
                                                    } else {
                                                      status = currentStage
                                                    }
                                                  } else {
                                                    // Flow Implementation using Epoch Comparison
                                                    if (quoteDate >= todayEpoch) {
                                                      // Quote Date is today or in the future
                                                      status = bidScheduledStage;
                                                    } else {
                                                      // Quote Date is before today
                                                      if (quotePrice > 0) {
                                                        status = inProgressStage;
                                                      } else {
                                                        status = bidScheduledStage;
                                                      }
                                                    }
                                                  }

                                                  logger.log(`Quote Date (Epoch): ${quoteDate}`);
                                                  logger.log(`Today (Epoch): ${todayEpoch}`);
                                                  logger.log(`Quote Price: ${quotePrice}`);
                                                  logger.log(`Determined Status: ${status}`);

                                                  // Return the status
                                                  return status;
                                                };
                                          name: Deal Stage Logic
                                        - action:
                                            key: runCode
                                            component:
                                              isPublic: true
                                              key: code
                                              version: LATEST
                                          description: ""
                                          inputs:
                                            code:
                                              type: value
                                              value: >
                                                module.exports = async ({
                                                logger, configVars },
                                                stepResults) => {
                                                  try {
                                                    const accessToken = configVars?.["CompanyCam API Connection"]?.token?.access_token || "";
                                                    const projectId = stepResults?.getDeal?.results?.properties?.companycam_project_id || "";
                                                    const dealData = stepResults?.getDeal?.results?.properties || {};
                                                    const dealName = dealData?.dealname || "";

                                                    let psData = stepResults?.trigger?.results?.body?.data?.getQuote || {};
                                                    let firstName = psData?.contact?.firstName || "";
                                                    let lastName = psData?.contact?.lastName || "";
                                                    let phone = psData?.contact?.phoneNumber || "";
                                                    let email = psData?.contact?.email || "";

                                                    let address = psData?.jobAddress?.address || address
                                                    let city = psData?.jobAddress?.city || city
                                                    let state = psData?.jobAddress?.state || state
                                                    let zip = psData?.jobAddress?.zip || zip

                                                    // Payload to be used for create or update
                                                    let payload = {
                                                      name: dealName || "",
                                                      address: {
                                                        street_address_1: address || "",
                                                        city: city || "",
                                                        state: state || "",
                                                        postal_code: zip || "",
                                                        country: "US",
                                                      },
                                                      primary_contact: {
                                                        name: `${firstName || ""} ${lastName || ""}`.trim(),
                                                        email: email || "",
                                                        phone_number: phone || "",
                                                      },
                                                    };

                                                    // Fetch project details if projectId exists
                                                    let currentProject = {};
                                                    let companyCamProjectName = "";

                                                    // const getProjectDetails = async (projectId) => {
                                                    //   const url = `https://api.companycam.com/v2/projects/${projectId}`;
                                                    //   const response = await fetch(url, {
                                                    //     method: "GET",
                                                    //     headers: {
                                                    //       Authorization: `Bearer ${accessToken}`,
                                                    //     },
                                                    //   });

                                                    //   if (!response.ok) {
                                                    //     const errorData = await response.json();
                                                    //     throw new Error(`Error fetching project: ${errorData?.message || "Unknown error"}`);
                                                    //   }

                                                    //   return await response.json();
                                                    // };

                                                    // Update project function
                                                    const updateCompanyCamProject = async (projectId, newName, currentProject) => {
                                                      if (!newName || !accessToken) throw new Error("Missing required parameters.");

                                                      const updatedData = {
                                                        ...currentProject,
                                                        name: newName || "",
                                                      };

                                                      const url = `https://api.companycam.com/v2/projects/${projectId}`;
                                                      const response = await fetch(url, {
                                                        method: "PUT",
                                                        headers: {
                                                          Authorization: `Bearer ${accessToken}`,
                                                          "Content-Type": "application/json",
                                                        },
                                                        body: JSON.stringify(updatedData),
                                                      });

                                                      if (!response.ok) {
                                                        const errorData = await response.json();
                                                        throw new Error(`Error updating project: ${errorData?.message || "Unknown error"}`);
                                                      }

                                                      const updatedProject = await response.json();
                                                      logger.info("Project updated successfully:", updatedProject);
                                                      return updatedProject;
                                                    };

                                                    // Create project function
                                                    const createCompanyCamProject = async (payload) => {
                                                      const url = `https://api.companycam.com/v2/projects`;
                                                      const response = await fetch(url, {
                                                        method: "POST",
                                                        headers: {
                                                          Authorization: `Bearer ${accessToken}`,
                                                          "Content-Type": "application/json",
                                                        },
                                                        body: JSON.stringify(payload),
                                                      });

                                                      if (!response.ok) {
                                                        const errorData = await response.json();
                                                        throw new Error(`Error creating project: ${errorData?.message || "Unknown error"}`);
                                                      }

                                                      const createdProject = await response.json();
                                                      logger.info("Project created successfully:", createdProject);
                                                      return createdProject;
                                                    };

                                                    // Logic to update or create
                                                    if (projectId) {
                                                      // currentProject = await getProjectDetails(projectId);
                                                      // companyCamProjectName = currentProject?.name || "";

                                                    //   if (
                                                    //     String(companyCamProjectName)?.trim()?.toLowerCase() ===
                                                    //     String(dealName)?.trim()?.toLowerCase()
                                                    //   ) {
                                                    //     logger.info("Same project name, no update performed.");
                                                    //     return { message: "Project name is already up to date.", projectId };
                                                    //   } else {
                                                    //     const updated = await updateCompanyCamProject(projectId, dealName, currentProject);
                                                    //     return { message: "Project updated.", updated };
                                                    //   }
                                                        const dataResults = await updateCompanyCamProject(projectId, dealName, payload);
                                                        return { message: "Project updated.", dataResults };
                                                    } else {
                                                      const dataResults = await createCompanyCamProject(payload);
                                                      return { message: "Project created.", dataResults };
                                                    }
                                                  } catch (error) {
                                                    logger.error("Error:", error?.message || error);
                                                    return error?.message || "An unknown error occurred.";
                                                  }
                                                };
                                          name: CompanyCam
                                        - action:
                                            key: runCode
                                            component:
                                              isPublic: true
                                              key: code
                                              version: LATEST
                                          description: ""
                                          inputs:
                                            code:
                                              type: value
                                              value: >-
                                                const axios = require("axios");


                                                module.exports = async ({
                                                logger, configVars },
                                                stepResults) => {
                                                  // Get PaintScout data from the previous step results
                                                  const psData = stepResults?.trigger?.results?.body?.data?.getQuote;
                                                  // const dealData = stepResults.getDeal.results;
                                                  // const projectType = dealData.properties.project_type;
                                                  const quoteId = psData.id;
                                                  const dealStage = stepResults.dealStageLogic.results || configVars["Bid Scheduled"];
                                                  const projectTypeData = stepResults.getProjectType.results || "";
                                                  const companyCamID = stepResults?.companycam?.results?.dataResults?.id
                                                  // Get the mapping Config Variable
                                                  const mapping = configVars["PS Quote Data to HS Properties Mapping"];

                                                  const estimatedDate = configVars["Estimate Date Type"]

                                                  // Helper function to retrieve nested properties safely
                                                  function getNestedValue(obj, path) {
                                                    return path
                                                      .split(".")
                                                      .reduce(
                                                        (acc, key) => (acc && acc[key] !== undefined ? acc[key] : undefined),
                                                        obj
                                                      );
                                                  }

                                                  /**
                                                   * Looks up a phone number and returns only the national format.
                                                   * Logs the full lookup results for debugging.
                                                   */
                                                  const lookupPhoneNumber = async (number) => {
                                                    if (!number) return number;

                                                    const url = "https://phoneformatter.netlify.app/api/lookup";

                                                    try {
                                                      const response = await axios.get(url, {
                                                        params: { phoneNumber: number },
                                                        timeout: 5000,
                                                      });

                                                      // 🔎 Log full axios response payload
                                                      console.log("Phone lookup full result:", response.data);

                                                      const results = response?.data;
                                                      if (!results) return number;

                                                      return results.phoneNumber || number;
                                                    } catch (error) {
                                                      console.error(
                                                        "Phone lookup error:",
                                                        error.response?.data || error.message
                                                      );
                                                      return number;
                                                    }
                                                  };

                                                  function cleanText(htmlString) {
                                                    if (typeof htmlString !== "string") return htmlString; // Ensure input is a string

                                                    return htmlString
                                                      .replace(/<\/p>\s*<p>/g, "\n") // Replace closing & opening <p> tags with a newline
                                                      .replace(/<br\s*\/?>/gi, "\n") // Replace <br> tags with a newline
                                                      .replace(/<p>\s*<\/p>/g, "") // Remove empty <p> tags
                                                      .replace(/<[^>]+>/g, "") // Remove remaining HTML tags
                                                      .replace(/\n+/g, "\n") // Collapse multiple newlines into a single newline
                                                      .trim(); // Trim leading/trailing spaces
                                                  }

                                                  const convertUnixToISO = (unixTime) => {
                                                    return new Date(Math.floor(unixTime)).toISOString().split(".")[0] + "Z";
                                                  };

                                                const mappedEntries = await
                                                Promise.all(
                                                  mapping.map(async ({ source, destination }) => {
                                                    let value = getNestedValue(psData, source);

                                                    if (source.includes("dates")) {
                                                      value = convertUnixToISO(value);
                                                    }

                                                    if (source.includes("Note") && typeof value === "string") {
                                                      value = cleanText(value);
                                                    }

                                                    if (
                                                      source.includes("contact.phoneNumber") ||
                                                      source.includes("billingContact.phoneNumber")
                                                    ) {
                                                      logger.info("Phone Old Format:", value);

                                                      value = await lookupPhoneNumber(value); // ✅ await added

                                                      logger.info("Formatted Phone:", value);
                                                    }

                                                    logger.info("destination:", destination);

                                                    function checkDateType(stringDate) {
                                                      const date = new Date(stringDate);
                                                      return !isNaN(date.getTime());
                                                    }

                                                    function overrideEstimateDate(value) {
                                                      const parsedDate = new Date(value);

                                                      if (isNaN(parsedDate.getTime())) {
                                                        logger.error("Invalid date:", value);
                                                        return;
                                                      }

                                                      logger.info("parsedDate", parsedDate);

                                                      if (estimatedDate === "Date picker") {
