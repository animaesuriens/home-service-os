category: Marketing and Sales System
flow:
  name: 15 PaintScout All Data Sync to HubSpot
  description: ""
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: recursiveTrigger
        component:
          isPublic: true
          key: recursive-flow
          version: LATEST
      description: ""
      inputs:
        defaultCursor:
          type: template
          value: "1"
        runOnDeploy:
          type: value
          value: "false"
      isTrigger: true
      name: HTTP
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            const axios = require("axios");


            module.exports = async ({ logger, configVars }, stepResults) => {
              try {
                const airtableConnection =
                  configVars["Airtable Connection"]?.fields?.apiKey;
                const peopleTable = configVars["People Table"];
                const projectManagement = configVars["Project Management Base"];

                if (!airtableConnection) throw new Error("Missing Airtable connection");

                if (!projectManagement) throw new Error("Missing Project Management Base");
                if (!peopleTable) throw new Error("Missing People Table");

                const baseId = projectManagement;
                const tableIdOrName = peopleTable;
                const apiKey = airtableConnection;

                const baseUrl = `https://api.airtable.com/v0/${baseId}/${tableIdOrName}`;
                let allRecords = [];
                let offset = null;

                do {
                  const response = await axios.get(baseUrl, {
                    headers: {
                      Authorization: `Bearer ${apiKey}`,
                      "Content-Type": "application/json",
                    },
                    params: {
                      offset: offset,
                    },
                  });

                  const records = response.data?.records || [];
                  allRecords = allRecords.concat(records);
                  offset = response.data?.offset;

                  logger.info(
                    `Fetched ${records.length} records from Airtable People Table. Total: ${allRecords.length}`,
                  );
                } while (offset);

                logger.info(`✅ Fetched ${allRecords.length} total owners from Airtable`);
                return allRecords;
              } catch (error) {
                logger.info(error);
              }
            };
      name: Get All Owners
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            const axios = require("axios");


            module.exports = async ({ logger, configVars }, stepResults) => {
              try {
                const airtableConnection = configVars["Airtable Connection"]?.fields?.apiKey;
                const leadIntakeConversion = configVars["Lead Intake Conversion Table"];
                const projectManagement = configVars["Project Management Base"];

                if (!airtableConnection) throw new Error("Missing Airtable connection");

                if (!projectManagement) throw new Error("Missing Project Management Base");
                if (!leadIntakeConversion) throw new Error("Missing People Table");

                const baseId = projectManagement;
                const tableIdOrName = leadIntakeConversion;
                const apiKey = airtableConnection;

                const baseUrl = `https://api.airtable.com/v0/${baseId}/${tableIdOrName}`;
                let allRecords = [];
                let offset = null;

                do {
                  const response = await axios.get(baseUrl, {
                    headers: {
                      Authorization: `Bearer ${apiKey}`,
                      "Content-Type": "application/json",
                    },
                    params: {
                      offset: offset,
                    },
                  });

                  const records = response.data?.records || [];
                  allRecords = allRecords.concat(records);
                  offset = response.data?.offset;

                  logger.info(
                    `Fetched ${records.length} records from Airtable People Table. Total: ${allRecords.length}`,
                  );
                } while (offset);

                logger.info(`✅ Fetched ${allRecords.length} total owners from Airtable`);
                return allRecords;
              } catch (error) {
                logger.info(error);
              }
            };
      name: Get Project Types
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            const axios = require("axios");


            module.exports = async ({ logger, configVars }, stepResults) => {
              try {
                const airtableConnection =
                  configVars["Airtable Connection"]?.fields?.apiKey;
                const companiesTable = "Companies";
                const projectManagement = configVars["Project Management Base"];

                if (!airtableConnection) throw new Error("Missing Airtable connection");

                if (!projectManagement) throw new Error("Missing Project Management Base");
                if (!companiesTable) throw new Error("Missing People Table");

                const baseId = projectManagement;
                const tableIdOrName = companiesTable;
                const apiKey = airtableConnection;

                const baseUrl = `https://api.airtable.com/v0/${baseId}/${tableIdOrName}`;
                let allRecords = [];
                let offset = null;

                do {
                  const response = await axios.get(baseUrl, {
                    headers: {
                      Authorization: `Bearer ${apiKey}`,
                      "Content-Type": "application/json",
                    },
                    params: {
                      offset: offset,
                    },
                  });

                  const records = response.data?.records || [];
                  allRecords = allRecords.concat(records);
                  offset = response.data?.offset;

                  logger.info(
                    `Fetched ${records.length} records from Airtable People Table. Total: ${allRecords.length}`,
                  );
                } while (offset);

                logger.info(`✅ Fetched ${allRecords.length} total owners from Airtable`);
                return allRecords;
              } catch (error) {
                logger.info(error);
              }
            };
      name: Get All Companies
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >-
            const axios = require("axios");


            module.exports = async ({ logger, configVars }, stepResults) => {
                try {
                    const allQuotes = await getAllQuotes(logger, configVars);
                    return { data: allQuotes };

                } catch (error) {
                    logger.error(`❌ Error fetching quotes: ${error.response?.status} - ${error.message}`);
                    if (error.response?.data) {
                        logger.error(JSON.stringify(error.response.data, null, 2));
                    }
                    return {
                        error: error.message,
                        status: error.response?.status || 500
                    };
                }
            };



            /**
             * Fetch all PaintScout quotes (paginated)
             */
            const getAllQuotes = async (logger, configVars) => {
                const access_token = configVars["PaintScout Connection"]?.token?.access_token;
                if (!access_token) throw new Error("Missing PaintScout access token");

                const baseUrl = "https://openapi.paintscout.com/v2/quotes";

                let page = 1;
                const perPage = 50;
                let allQuotes = [];

                while (true) {
                    const response = await axios.get(baseUrl, {
                        headers: {
                            Authorization: `Bearer ${access_token}`,
                            "Content-Type": "application/json",
                        },
                        params: {
                            page,
                            query:"sent&query=accepted&query=viewed&query=declined",
                            perPage,
                            sort: "created",
                            sortDir: "desc",
                        },
                    });

                    const quotes = response.data?.rows || [];
                    const total = response.data?.totalRows || 0;

                    logger.info(`Total quotes reported by API: ${total}`);
                    logger.info(`Fetched page ${page} with ${quotes.length} quotes`);

                    allQuotes = allQuotes.concat(quotes);

                    // Stop if there are no more pages
                    if (page * perPage >= total || quotes.length === 0) break;

                    page++;
                }

                logger.info(`✅ Fetched ${allQuotes.length} total quotes from PaintScout`);

                let uniqueContactSourceIds = new Set();
                let uniqueContactEmails = new Set();

                allQuotes?.forEach((quote) => {
                    if (quote?.contact?.source?.id) {
                        uniqueContactSourceIds.add(quote.contact.source.id);
                    } 
                    if (quote?.contact?.email) {
                        uniqueContactEmails.add(quote.contact.email);
                    }
                });

                const contactSourceIds = [...uniqueContactSourceIds];
                const contactEmails = [...uniqueContactEmails];

                return {
                    contactSourceIds: contactSourceIds,
                    contactEmails: contactEmails,
                    quotes: allQuotes,
                    total:allQuotes?.length
                };
            };
      name: Get All PS Quotes
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            const axios = require("axios");


            module.exports = async ({ logger, configVars }, stepResults) => {
                try {
                    const allContacts = await getAllContacts(logger, configVars);
                    return { data: allContacts };

                } catch (error) {
                    logger.error(`❌ Error fetching contacts: ${error.response?.status} - ${error.message}`);
                    if (error.response?.data) {
                        logger.error(JSON.stringify(error.response.data, null, 2));
                    }
                    return {
                        error: error.message,
                        status: error.response?.status || 500
                    };
                }
            };



            /**
             * Fetch all PaintScout contacts (paginated)
             */
            const getAllContacts = async (logger, configVars) => {
                const access_token = configVars["PaintScout Connection"]?.token?.access_token;
                if (!access_token) throw new Error("Missing PaintScout access token");

                const baseUrl = "https://openapi.paintscout.com/v2/contacts";

                let page = 1;
                const perPage = 50;
                let allContacts = [];

                while (true) {
                    const response = await axios.get(baseUrl, {
                        headers: {
                            Authorization: `Bearer ${access_token}`,
                            "Content-Type": "application/json",
                        },
                        params: {
                            page,
                            perPage,
                            sort: "created",
                            sortDir: "desc"
                        },
                    });

                    const contacts = response.data?.rows || [];
                    const total = response.data?.totalRows || 0;

                    logger.info(`Total contacts reported by API: ${total}`);
                    logger.info(`Fetched page ${page} with ${contacts.length} contacts`);

                    allContacts = allContacts.concat(contacts);

                    // Stop if no more data
                    if (page * perPage >= total || contacts.length === 0) break;

                    page++;
                }

                logger.info(`✅ Fetched ${allContacts.length} total contacts from PaintScout`);

                // Return all contacts directly
                return {
                    contacts: allContacts,
                    total: allContacts.length
                };
            };
      name: Get All PS Contacts
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              let contactList = stepResults?.getAllPsContacts?.results?.contacts || [];

              // ----------------------------
              // Build HubSpot upsert payload
              // ----------------------------
              let hubspotPayload = contactList.map(contact => {
                const payload = {
                  properties: {
                    firstname: contact.firstName || "",
                    lastname: contact.lastName || "",
                    email: contact.email || "",
                    phone: contact.phoneNumber || "",
                    address: contact.address || "",
                    city: contact.city || "",
                    state: contact.state || "",
                    zip: contact.zip || ""
                  }
                };

                if (contact?.source?.id) {
                  payload.id = contact.source.id;
                }

                return payload;
              });



              return {
                contactList,
                hubspotPayload,
                totalContacts: contactList.length
              };
            };
      name: HS Payload Contact
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            const axios = require('axios');


            module.exports = async ({ logger, configVars }, stepResults) => {
              const hsToken = configVars["HubSpot Private App Connection"]?.fields?.accessToken;
              if (!hsToken) throw new Error("Missing HubSpot access token");

              let payloadList = stepResults?.hsPayloadContact?.results?.hubspotPayload;

              if (!payloadList || !Array.isArray(payloadList) || payloadList.length === 0) {
                logger.info("No contacts to process.");
                return { status: "Skipped", message: "No payload found" };
              }

              // Helper: Basic Email Regex to catch obvious bad data like "test111"
              const isValidEmail = (email) => {
                return String(email)
                  .toLowerCase()
                  .match(
                    /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/
                  );
              };

              // 1. Deduplicate & Validate Data
              const uniqueInputsMap = new Map();
              const invalidEmails = [];

              payloadList.forEach(item => {
                const properties = item.properties || {};
                const email = properties.email;
                const hubspotId = item.id ? String(item.id) : undefined;

                if (hubspotId) {
                  uniqueInputsMap.set(`id:${hubspotId}`, {
                    id: hubspotId,
                    idProperty: "id",
                    properties
                  });
                } else if (email && isValidEmail(email)) {
                  uniqueInputsMap.set(`email:${email}`, {
                    id: email,
                    idProperty: "email",
                    properties
                  });
                } else if (email) {
                  invalidEmails.push(email);
                }
              });

              if (invalidEmails.length > 0) {
                logger.info(`Skipped ${invalidEmails.length} invalid email formats: ${invalidEmails.join(', ')}`);
              }

              const allInputs = Array.from(uniqueInputsMap.values());
              const updateInputs = allInputs.filter(i => i.idProperty === 'id');
              const upsertInputs = allInputs.filter(i => i.idProperty === 'email');

              if (allInputs.length === 0) {
                logger.info("No valid contacts found after validation.");
                return { status: "Skipped", message: "No valid contacts found" };
              }

              // 2. Helper function to chunk array
              const chunkArray = (array, size) => {
                const chunked = [];
                for (let i = 0; i < array.length; i += size) {
                  chunked.push(array.slice(i, i + size));
                }
                return chunked;
              };

              // 3. Process chunks sequentially
              const CHUNK_SIZE = 100;
              const aggregatedResults = [];
              const failedBatches = [];
              
              // Updates by record ID (per-contact GET + PATCH, fallback to CREATE)
              if (updateInputs.length > 0) {
                const updateBatches = chunkArray(updateInputs, CHUNK_SIZE);
                logger.info(`Processing ${updateInputs.length} ID-targeted updates in ${updateBatches.length} batches.`);
                for (let i = 0; i < updateBatches.length; i++) {
                  const currentBatch = updateBatches[i];
                  logger.info(`Update payload batch ${i + 1}: ${JSON.stringify(currentBatch)}`);
                  for (let j = 0; j < currentBatch.length; j++) {
                    const { id, properties } = currentBatch[j];
                    try {
                      // Verify existence
                      await axios.get(
                        `https://api.hubapi.com/crm/v3/objects/contacts/${id}`,
                        {
                          headers: {
                            'Authorization': `Bearer ${hsToken}`,
                            'Content-Type': 'application/json'
                          }
                        }
                      );
                      // Update existing
                      const patchResp = await axios.patch(
                        `https://api.hubapi.com/crm/v3/objects/contacts/${id}`,
                        { properties },
                        {
                          headers: {
                            'Authorization': `Bearer ${hsToken}`,
                            'Content-Type': 'application/json'
                          }
                        }
                      );
                      if (patchResp.data) {
                        aggregatedResults.push(patchResp.data);
                      }
                    } catch (error) {
                      const status = error.response?.status;
                      if (status === 404) {
                        // Not found: only create/update via email when valid; otherwise skip to prevent no-email contacts
                        const candidateEmail = properties?.email;
                        if (!candidateEmail || !isValidEmail(candidateEmail)) {
                          const msg = `ID ${id} not found and missing/invalid email; skipping create`;
                          logger.error(msg);
                          failedBatches.push({
                            batchIndex: i + 1,
                            error: msg,
                            details: [{ reason: 'missing_or_invalid_email', id }]
                          });
                        } else {
                          try {
                            const createResp = await axios.post(
                              'https://api.hubapi.com/crm/v3/objects/contacts',
                              { properties },
                              {
                                headers: {
                                  'Authorization': `Bearer ${hsToken}`,
                                  'Content-Type': 'application/json'
                                }
                              }
                            );
                            if (createResp.data) {
                              aggregatedResults.push(createResp.data);
                            }
                          } catch (createErr) {
                            const msg = String(createErr.response?.data?.message || createErr.message || '');
                            const details = createErr.response?.data?.errors;
                            const m = msg.match(/Existing ID:\s*(\d+)/i);
                            if (m) {
                              const existingId = m[1];
                              try {
                                const patchResp = await axios.patch(
                                  `https://api.hubapi.com/crm/v3/objects/contacts/${existingId}`,
                                  { properties },
                                  {
                                    headers: {
                                      'Authorization': `Bearer ${hsToken}`,
                                      'Content-Type': 'application/json'
                                    }
                                  }
                                );
                                if (patchResp.data) {
                                  aggregatedResults.push(patchResp.data);
                                }
                              } catch (patchErr) {
                                const patchMsg = String(patchErr.response?.data?.message || patchErr.message || '');
                                const patchDetails = patchErr.response?.data?.errors;
                                logger.error(`Patch existing after create conflict failed in ID-batch ${i + 1}: ${patchMsg}`, patchDetails);
                                failedBatches.push({
                                  batchIndex: i + 1,
                                  error: patchMsg,
                                  details: patchDetails
                                });
                              }
                            } else {
                              logger.error(`Create failed in ID-batch ${i + 1}: ${msg}`, details);
                              failedBatches.push({
                                batchIndex: i + 1,
                                error: msg,
                                details
                              });
                            }
                          }
                        }
                      } else {
                        const errorMessage = error.response?.data?.message || error.message;
                        const errorDetails = error.response?.data?.errors;
                        const msg = String(errorMessage || '');
                        let primaryId;
                        let dupId;
                        const m1 = msg.match(/Cannot set .* on (\d+)\.\s+(\d+)\s+already has that value/i);
                        if (m1) {
                          primaryId = m1[2];
                          dupId = String(id);
                        } else {
                          const m2 = msg.match(/Existing ID:\s*(\\d+)/i);
                          if (m2) {
                            primaryId = m2[1];
                            dupId = String(id);
                          }
                        }
                        if (primaryId && dupId) {
                          try {
                            const mergeResp = await axios.post(
                              'https://api.hubapi.com/crm/v3/objects/contacts/merge',
                              { primaryObjectId: String(primaryId), objectIdToMerge: String(dupId) },
                              {
                                headers: {
                                  'Authorization': `Bearer ${hsToken}`,
                                  'Content-Type': 'application/json'
                                }
                              }
                            );
                            if (mergeResp.data) {
                              aggregatedResults.push(mergeResp.data);
                            }
                          } catch (mergeErr) {
                            const mergeMessage = mergeErr.response?.data?.message || mergeErr.message;
                            const mergeDetails = mergeErr.response?.data?.errors;
                            logger.error(`Merge failed in ID-batch ${i + 1}: ${mergeMessage}`, mergeDetails);
                            failedBatches.push({
                              batchIndex: i + 1,
                              error: mergeMessage,
                              details: mergeDetails
                            });
                          }
                        } else {
                          logger.error(`Update failed in ID-batch ${i + 1}: ${errorMessage}`, errorDetails);
                          failedBatches.push({
                            batchIndex: i + 1,
                            error: errorMessage,
                            details: errorDetails
                          });
                        }
                      }
                    }
                  }
                  logger.info(`Update batch ${i + 1}/${updateBatches.length} completed.`);
                }
              }

              // Email-based flow: SEARCH → UPDATE or CREATE; MERGE duplicates by email
              if (upsertInputs.length > 0) {
                const upsertBatches = chunkArray(upsertInputs, CHUNK_SIZE);
                logger.info(`Processing ${upsertInputs.length} email-based operations in ${upsertBatches.length} batches.`);
                for (let i = 0; i < upsertBatches.length; i++) {
                  const currentBatch = upsertBatches[i];
                  logger.info(`Email payload batch ${i + 1}: ${JSON.stringify(currentBatch)}`);
                  for (let j = 0; j < currentBatch.length; j++) {
                    const { id: email, properties } = currentBatch[j];
                    try {
                      // Search by email
                      const searchResp = await axios.post(
                        'https://api.hubapi.com/crm/v3/objects/contacts/search',
                        {
                          filterGroups: [
                            {
                              filters: [
                                { propertyName: 'email', operator: 'EQ', value: email }
                              ]
                            }
                          ],
                          limit: 100,
                          properties: ['email', 'createdate']
                        },
                        {
                          headers: {
                            'Authorization': `Bearer ${hsToken}`,
                            'Content-Type': 'application/json'
                          },
                          params: {
                            archived: true
                          }
                        }
                      );
                      const matches = (searchResp.data && searchResp.data.results) ? searchResp.data.results : [];
                      if (matches.length === 0) {
                        // Create
                        try {
                          const createResp = await axios.post(
                            'https://api.hubapi.com/crm/v3/objects/contacts',
                            { properties },
                            {
                              headers: {
                                'Authorization': `Bearer ${hsToken}`,
                                'Content-Type': 'application/json'
                              }
                            }
                          );
                          if (createResp.data) {
                            aggregatedResults.push(createResp.data);
                          }
                        } catch (createErr) {
                          const msg = String(createErr.response?.data?.message || createErr.message || '');
                          const details = createErr.response?.data?.errors;
                          const m = msg.match(/Existing ID:\s*(\d+)/i);
                          if (m) {
                            const existingId = m[1];
                            try {
                              const patchResp = await axios.patch(
                                `https://api.hubapi.com/crm/v3/objects/contacts/${existingId}`,
                                { properties },
                                {
                                  headers: {
                                    'Authorization': `Bearer ${hsToken}`,
                                    'Content-Type': 'application/json'
                                  }
                                }
                              );
                              if (patchResp.data) {
                                aggregatedResults.push(patchResp.data);
                              }
                            } catch (patchErr) {
                              const patchMsg = String(patchErr.response?.data?.message || patchErr.message || '');
                              const patchDetails = patchErr.response?.data?.errors;
                              logger.error(`Patch existing after create conflict failed in email-batch ${i + 1}: ${patchMsg}`, patchDetails);
                              failedBatches.push({
                                batchIndex: i + 1,
                                error: patchMsg,
                                details: patchDetails
                              });
                            }
                          } else {
                            logger.error(`Create failed in email-batch ${i + 1}: ${msg}`, details);
                            failedBatches.push({
                              batchIndex: i + 1,
                              error: msg,
                              details
                            });
                          }
                        }
                      } else {
                        // If multiple results, merge duplicates (same email)
                        let sorted = matches.filter(m => m.properties?.email === email);
                        if (sorted.length > 1) {
                          sorted = sorted.sort((a, b) => {
                            const aDate = new Date(a.properties?.createdate || 0).getTime();
                            const bDate = new Date(b.properties?.createdate || 0).getTime();
                            if (aDate !== bDate) return aDate - bDate;
                            // fallback to id numeric comparison
                            return Number(a.id) - Number(b.id);
                          });
                          const primaryId = sorted[0].id;
                          for (let k = 1; k < sorted.length; k++) {
                            const dupId = sorted[k].id;
                            try {
                              await axios.post(
                                'https://api.hubapi.com/crm/v3/objects/contacts/merge',
                                { primaryObjectId: primaryId, objectIdToMerge: dupId },
                                {
                                  headers: {
                                    'Authorization': `Bearer ${hsToken}`,
                                    'Content-Type': 'application/json'
                                  }
                                }
                              );
                            } catch (mergeErr) {
                              const errorMessage = mergeErr.response?.data?.message || mergeErr.message;
                              const errorDetails = mergeErr.response?.data?.errors;
                              logger.error(`Merge failed (primary ${primaryId}, dup ${dupId}) in email-batch ${i + 1}: ${errorMessage}`, errorDetails);
                              failedBatches.push({
                                batchIndex: i + 1,
                                error: errorMessage,
                                details: errorDetails
                              });
                            }
                          }
                          // Update merged primary
                          try {
                            const patchResp = await axios.patch(
                              `https://api.hubapi.com/crm/v3/objects/contacts/${primaryId}`,
                              { properties },
                              {
                                headers: {
                                  'Authorization': `Bearer ${hsToken}`,
                                  'Content-Type': 'application/json'
                                }
                              }
                            );
                            if (patchResp.data) {
                              aggregatedResults.push(patchResp.data);
                            }
                          } catch (patchErr) {
                            const errorMessage = patchErr.response?.data?.message || patchErr.message;
                            const errorDetails = patchErr.response?.data?.errors;
                            logger.error(`Patch after merge failed in email-batch ${i + 1}: ${errorMessage}`, errorDetails);
                            failedBatches.push({
                              batchIndex: i + 1,
                              error: errorMessage,
                              details: errorDetails
                            });
                          }
                        } else {
                          // Single match → update
                          const targetId = matches[0].id;
                          const patchResp = await axios.patch(
                            `https://api.hubapi.com/crm/v3/objects/contacts/${targetId}`,
                            { properties },
                            {
                              headers: {
                                'Authorization': `Bearer ${hsToken}`,
                                'Content-Type': 'application/json'
                              }
                            }
                          );
                          if (patchResp.data) {
                            aggregatedResults.push(patchResp.data);
                          }
                        }
                      }
                    } catch (error) {
                      const errorMessage = error.response?.data?.message || error.message;
                      const errorDetails = error.response?.data?.errors;
                      logger.error(`Email-based operation failed in batch ${i + 1}: ${errorMessage}`, errorDetails);
                      failedBatches.push({
                        batchIndex: i + 1,
                        error: errorMessage,
                        details: errorDetails
                      });
                    }
                  }
                  logger.info(`Email batch ${i + 1}/${upsertBatches.length} completed.`);
                }
              }

              // 4. Return summary
              return { 
                status: failedBatches.length > 0 ? "Partial Success" : "Success",
                processedCount: aggregatedResults.length,
                failedBatchCount: failedBatches.length,
                invalidEmailCount: invalidEmails.length,
                hubspotResponse: aggregatedResults,
                errors: failedBatches
              };
            };
      name: Bulk upsert contact
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            const axios = require("axios");


            module.exports = async ({ logger, configVars }) => {
                const access_token = configVars["HubSpot Private App Connection"]?.fields?.accessToken;
                if (!access_token) throw new Error("Missing HubSpot access token");

                const headers = {
                    Authorization: `Bearer ${access_token}`,
                    "Content-Type": "application/json",
                };

                const properties = [
                    "email",
                    "hs_object_id",
                    "firstname",
                    "lastname",
                    "phone",
                    "address",
                    "city",
                    "state",
                    "zip",
                    "company",
                    "mobilephone"
                ];

                let allFetchedContacts = new Map(); // store unique contacts
                let after = undefined; // for pagination

                try {
                    do {
                        const url = new URL("https://api.hubapi.com/crm/v3/objects/contacts");
                        url.searchParams.set("limit", "100"); // max 100 per request
                        url.searchParams.set("properties", properties.join(","));
                        if (after) url.searchParams.set("after", after);

                        const response = await axios.get(url.toString(), { headers });
                        const contacts = response.data.results || [];

                        contacts.forEach(contact => {
                            allFetchedContacts.set(contact.id, contact);
                        });

                        logger.info(`Fetched ${contacts.length} contacts from HubSpot.`);

                        after = response.data.paging?.next?.after;
                    } while (after);

                } catch (error) {
                    logger.error(
                        `Error fetching all contacts from HubSpot: ${
                            error.response
                                ? `Status ${error.response.status}, Data: ${JSON.stringify(error.response.data)}`
                                : error.message
                        }`
                    );
                }

                return Array.from(allFetchedContacts.values());
            };
      name: Get All HS Contacts
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            const axios = require("axios");


            module.exports = async ({ logger, configVars }, stepResults) => {
              const access_token = configVars["HubSpot Private App Connection"]?.fields?.accessToken;
              if (!access_token) throw new Error("Missing HubSpot access token");

              const hsHeaders = {
                Authorization: `Bearer ${access_token}`,
                "Content-Type": "application/json",
              };

              // -----------------------------
              // 1. Get all deal properties
              // -----------------------------
              const propertiesUrl = "https://api.hubapi.com/crm/v3/properties/deals";
              const propResponse = await axios.get(propertiesUrl, { headers: hsHeaders });
              const properties = propResponse?.data?.results || [];

              // Filter unwanted groups
              const propNames = properties
                .filter(
                  (property) =>
                    property.groupName !== "dealstages" &&
                    property.groupName !== "deal_activity"
                )
                .map((property) => property.name);

              // Required defaults
              if (!propNames.includes("dealname")) propNames.push("dealname");
              if (!propNames.includes("pipeline")) propNames.push("pipeline");

              logger.info(`Total deal properties to fetch: ${propNames.length}`);

              // -----------------------------
              // 2. Fetch ALL deals (Paginated)
              // -----------------------------
              let allDeals = [];
              let after = undefined; // pagination cursor
              const limit = 100;

              while (true) {
                const url = new URL("https://api.hubapi.com/crm/v3/objects/deals");
                url.searchParams.set("limit", limit);
                url.searchParams.set("properties", propNames.join(","));

                if (after) {
                  url.searchParams.set("after", after);
                }

                const res = await axios.get(url.toString(), { headers: hsHeaders });

                const pageDeals = res?.data?.results || [];
                allDeals.push(...pageDeals);

                logger.info(`Fetched ${pageDeals.length} deals. Total so far: ${allDeals.length}`);

                if (!res?.data?.paging?.next?.after) break; // No more pages
                after = res.data.paging.next.after;
              }

              logger.info(`Fetched ALL deals: ${allDeals.length}`);

              // -----------------------------
              // 3. Return everything
              // -----------------------------
              return {
                total: allDeals.length,
                deals: allDeals
              };
            };
      name: Get all HS Deals
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: null
        errorHandlerType: ignore
        ignoreFinalError: null
        maxAttempts: null
        usesExponentialBackoff: null
      inputs:
        code:
          type: value
          value: >
            const axios = require("axios");


            module.exports = async ({ logger, configVars }, stepResults) => {
              // -----------------------------
              // 0. Load Required Inputs
              // -----------------------------
              const hsContactList = stepResults?.getAllHsContacts?.results;
              const ownerList = stepResults?.getAllOwners?.results;
              const projectTypeList = stepResults?.getProjectTypes?.results;
              let contactList = hsContactList
              let psQuotes = stepResults?.getAllPsQuotes?.results?.quotes;
              const hubspotDealList = stepResults?.getAllHsDeals?.results?.deals;

              const mapping = configVars["PS Quote Data to HS Properties Mapping"];
              const estimatedDate = configVars["Estimate Date Type"];

              const sent = configVars["Bid Sent"];
              const accepted = configVars["Customer Accepted Proposal"];
              const declined = configVars["Declined Stage"];

              const hsToken = configVars["HubSpot Private App Connection"]?.fields?.accessToken;
              if (!hsToken) throw new Error("Missing HubSpot access token");

              const psToken = configVars["PaintScout Connection"]?.token?.access_token;
              if (!psToken) throw new Error("Missing PaintScout access token");

              const hsHeaders = {
                Authorization: `Bearer ${hsToken}`,
                "Content-Type": "application/json"
              };

              const psHeaders = {
                Authorization: `Bearer ${psToken}`,
                "Content-Type": "application/json"
              };

              // -----------------------------
              // Helper Functions
              // -----------------------------
              function findOwnerDetails(ownerEmail) {
                return ownerList?.find((o) => o?.fields?.["Work Email"] === ownerEmail);
              }

              function findContactDetails(email, contactId) {
                let c = contactList?.find((c) => c?.properties?.email === email);
                if (!c) {
                  c = contactList?.find((c) => c?.id == contactId);
                }
                return c;
              }

              function getNestedValue(obj, path) {
                return path.split(".").reduce((acc, key) => acc?.[key], obj);
              }

              function cleanText(html) {
                if (typeof html !== "string") return html;
                return html
                  .replace(/<\/p>\s*<p>/g, "\n")
                  .replace(/<br\s*\/?>/gi, "\n")
                  .replace(/<p>\s*<\/p>/g, "")
                  .replace(/<[^>]+>/g, "")
                  .replace(/\n+/g, "\n")
                  .trim();
              }

              const convertUnixToISO = (unix) =>
                new Date(Math.floor(unix)).toISOString().split(".")[0] + "Z";

              const dealStage = (psStatus) => {
                const stageMap = {
                  sent,
                  accepted,
                  viewed: sent,
                  declined
                };
                return stageMap[psStatus.toLowerCase()];
              };

              function overrideEstimateDate(value) {
                const d = new Date(value);
                if (isNaN(d.getTime())) return;
                return estimatedDate === "Date picker"
                  ? d.toISOString().split("T")[0]
                  : d.toISOString();
              }

              function ovverideDealName(mappedFields, owner, configVars, logger) {
                let dealData = mappedFields || {};
                let ownerATData = owner || {};

                const JobNumberFormat = (dealData, ownerATData, configVars, logger) =>{
                  let jobNumberFormat = configVars?.["Job/Estimate Number"] || [];
                  let currentJobNumber = dealData?.["jobestimate_number"] || "";
                  let rawEstimateNumber = dealData?.["raw_paintscout_estimate_number"] || "";
                

                  // ✅ New logic: if current exists and raw is empty, return current and skip
                  // if (currentJobNumber && !rawEstimateNumber) {
                  //   return currentJobNumber;
                  // }

                  let job_name = "";

                  const cleanStringHS = (str) => str?.replace("(hs)", "")?.trim() || "";
                  const cleanStringAT = (str) => str?.replace("(at)", "")?.trim() || "";

                  const reservedWordReplacer = (str) =>
                    str?.replace("[space]", " ")?.replace("[no_space]", "")?.trim() || "";

                  for (let item of jobNumberFormat) {
                    //logger.info(item);

                    let field = item?.field || "";
                    let separator = item?.separator || "";

                    if (field?.includes("(hs)")) {
                      job_name += dealData?.[cleanStringHS(field)] || "";
                      job_name += reservedWordReplacer(separator);
                    }

                    if (field?.includes("(at)")) {
                      job_name += ownerATData?.[cleanStringAT(field)] || "";
                      job_name += reservedWordReplacer(separator);
                    }
                  }
                  return job_name;
                }

                const GenerateDealName = (dealData, jobestimate_number, configVars, logger) =>{
                  const dealNameFormat = configVars?.["Deal Name Format"] || [];
                  const jobNumber = jobestimate_number|| "";
                  const dealId = dealData?.id || "";

                  const formatDate = (dateStr) => {
                    const date = new Date(dateStr);
                    return isNaN(date) ? dateStr : `${(date.getMonth() + 1).toString().padStart(2, '0')}${date.getDate().toString().padStart(2, '0')}${date.getFullYear().toString().slice(-2)}`;
                  };

                  const deal_name = dealNameFormat.reduce((acc, { source, destination }) => {
                    let value = source === "jobestimate_number" ? jobNumber : dealData?.[source] || "";
                    value = /\d{4}-\d{2}-\d{2}/.test(value) ? formatDate(value) : value;

                    if (!value) return acc; // Skip if value is falsy
                    
                    return acc + value + (destination || "");
                  }, "").replace(/\[space\]/g, " ").replace(/\[no_space\]/g, "").trim();


                  // logger.info('deal_name:',deal_name)
                  // logger.info('dealNameFormat:',dealNameFormat)
                  return deal_name;
                }

                

                let jobestimate_number = JobNumberFormat(dealData, ownerATData?.fields, configVars, logger)
                //logger.info('jobestimate_number:',jobestimate_number)

                let dealName = GenerateDealName(dealData, jobestimate_number, configVars, logger)
                //logger.info('dealName:',dealName)



                return dealName
                
              }

              function getProjectType (quoteType) {
                let projectType = projectTypeList?.find((pt) => pt?.fields?.Input?.includes(quoteType) || "")
                return projectType?.fields?.Output || ""
              }

              // -----------------------------
              // 1. Filter PS Quotes that already exist in HubSpot
              // -----------------------------
              psQuotes = psQuotes.filter((quote) => {
                const matchSource = hubspotDealList?.find((deal) =>
                  quote?.source?.id?.includes(deal?.properties?.["hs_object_id"])
                );
                const matchNumber = hubspotDealList?.find(
                  (deal) => deal?.properties?.jobestimate_number == quote?.number
                );
                return !matchSource && !matchNumber;
              });

              logger.info(`Quotes to sync: ${psQuotes.length}`);

              // -----------------------------
              // 2. Convert each PS quote → HubSpot Deal Payload
              // -----------------------------
              const dealPayloads = psQuotes?.map((ps) => {
                const owner = findOwnerDetails(ps?.owner?.email);
                const ownerId = owner?.fields?.["HS User ID"] ?? "";
                //logger.info('owner:',owner)

                const contact = findContactDetails(ps?.contact?.email, ps?.contact?.source?.id);
                const contactId = contact?.id ?? null;

                const mappedFields = mapping.reduce((acc, { source, destination }) => {
                  let val = getNestedValue(ps, source);

                  if (source.includes("dates")) val = convertUnixToISO(val);
                  if (source.includes("Note") && typeof val === "string") val = cleanText(val);

                  if (destination?.includes("estimate_date") && !isNaN(new Date(val))) {
                    val = overrideEstimateDate(val);
                  }

                  if (val !== undefined && val !== null && val !== "") acc[destination] = val;
                  return acc;
                }, {});

                const LogMessage = configVars["Mass Import Log Message"]

                mappedFields["job_timeline_notes"] = LogMessage;
                mappedFields["dealstage"] = dealStage(ps?.status);
                mappedFields["project_type"] = getProjectType(ps?.quoteType?.label);
                mappedFields["hubspot_owner_id"] = ownerId;
                mappedFields["contract_type"] = "Original Contract";
                mappedFields["paintscout_quote_url_internal"] = `https://app.paintscout.com/quotes/edit/${ps.id}`;
                mappedFields["dealname"] = ovverideDealName(mappedFields, owner, configVars, logger);


                return {
                  properties: mappedFields,
                  contactId,
                  associations:
                    contactId
                      ? [
                          {
                            to: { id: contactId },
                            types: [
                              {
                                associationCategory: "HUBSPOT_DEFINED",
                                associationTypeId: 3 // deal → contact
                              }
                            ]
                          }
                        ]
                      : [],
                };
              });

              logger.info(`Prepared ${dealPayloads.length} deal payloads.`);

              // -----------------------------
              // 3. SPLIT DEALS: withAssoc vs withoutAssoc
              // -----------------------------
              //const dealsWithAssoc = dealPayloads.filter((d) => d.contactId);
              //const dealsWithoutAssoc = dealPayloads.filter((d) => !d.contactId);

              const dealsWithAssoc = dealPayloads.filter((d) => d.contactId).slice(0, 50);
              const dealsWithoutAssoc = dealPayloads.filter((d) => !d.contactId).slice(0, 50);

              logger.info(`Deals WITH contact: ${dealsWithAssoc.length}`);
              logger.info(`Deals WITHOUT contact: ${dealsWithoutAssoc.length}`);


              function removeReadOnlyProps(props) {
                const readOnlyKeys = [
                  "hs_tcv",
                  "hs_acv",
                  "hs_arr",
                  "hs_mrr",
                  "hs_ltv",
                  "hs_lastmodifieddate",
                  "createdate",
                  "hs_created_by_user_id",
                  "hubspot_owner_assigneddate",
                  "hs_object_id",
                ];

                const cleaned = { ...props };
                for (const key of readOnlyKeys) {
                  if (cleaned[key] !== undefined) {
                    delete cleaned[key];
                  }
                }
                return cleaned;
              }

              // -----------------------------
              // 4. BATCH CREATE deals WITH association (100 per batch)
              // -----------------------------
              async function batchCreateDeals(payloads) {
                const created = [];
                const batches = [];

                for (let i = 0; i < payloads.length; i += 100) {
                  batches.push(payloads.slice(i, i + 100));
                }

                for (const batch of batches) {
                  const body = {
                    inputs: batch.map(({ properties, associations }) => ({
                      properties: removeReadOnlyProps(properties),
                      associations
                    }))
                  };

                  try {
                    const res = await axios.post(
                      "https://api.hubapi.com/crm/v3/objects/deals/batch/create",
                      body,
                      { headers: hsHeaders }
                    );
                    const results = res?.data?.results || [];

                    created.push(...results);
                  } catch (err) {
                    logger.error("❌ HubSpot batch create failed: " + JSON.stringify(err.response?.data));
                  }
                }

                return created;
              }

              const createdWithAssoc = await batchCreateDeals(dealsWithAssoc);

              // -----------------------------
              // 5. CREATE deals WITHOUT association (1 by 1)
              // -----------------------------
              const createdWithoutAssoc = [];

              for (const d of dealsWithoutAssoc) {
                try {
                  const res = await axios.post(
                    "https://api.hubapi.com/crm/v3/objects/deals",
                    { properties: removeReadOnlyProps(d.properties) },
                    { headers: hsHeaders }
                  );

                  const newDeal = { ...res.data };
                  createdWithoutAssoc.push(newDeal);

                  logger.info(`Created NO-ASSOC deal: ${newDeal.id}`);
                } catch (err) {
                  logger.error("❌ Failed creating no-assoc deal: " + JSON.stringify(err.response?.data));
                }
              }

              const allCreatedDeals = [...createdWithAssoc, ...createdWithoutAssoc];

              logger.info(`TOTAL created deals: ${allCreatedDeals.length}`);

              // -----------------------------
              // 6. UPDATE PAINTSCOUT
              // -----------------------------
              const updatedPs = [];

              for (const deal of allCreatedDeals) {
                try {
                  let resApi = await axios.put(
                    `https://openapi.paintscout.com/v2/quotes/${deal?.properties?.paintscout_quote_id}`,
                    {
                      source: {
                        id: deal.id,
                        provider: "hubspot"
                      }
                    },
                    { headers: psHeaders }
                  );
                  let psData = resApi?.data
                  let firstName = psData.contact.firstName;
                  let lastName = psData.contact.lastName;
                  let phone = psData.contact.phoneNumber;
                  let address = psData.contact.address;
                  let email = psData.contact.email;
                  let city = psData.contact.city;
                  let state = psData.contact.state;
                  let zip = psData.contact.zip;
                  let ccName = deal?.properties?.dealname
                  updatedPs.push({
                    psQuoteId: deal?.properties?.paintscout_quote_id,
                    hubspotDealId: deal.id,
                    urls: resApi?.data?.urls,
                    companyCamPayload:{
                      "name": ccName,
                      "address": {
                        "street_address_1": address,
                        "city": city,
                        "state": state,
                        "postal_code": zip,
                        "country": "US"
                      },
                      "primary_contact": {
                        "name": `${firstName} ${lastName}`,
                        "email": email,
                        "phone_number": phone
                      }
                    },
                    dealData:deal,
                    psData:psData
                  });

                  logger.info(`Updated PaintScout quote ${deal?.properties?.paintscout_quote_id} → HubSpot ${deal.id}`);
                } catch (err) {
                  logger.error(
                    `❌ Failed updating PS quote ${deal?.properties?.paintscout_quote_id}: ${JSON.stringify(err.response?.data)}`
                  );
                }
              }

              // -----------------------------
              // 7. Final Return
              // -----------------------------
              return {
                createdDealsCount: allCreatedDeals.length,
                createdDeals: allCreatedDeals,
                updatedPaintScoutQuotes: updatedPs
              };
            };
      name: PS Quote x HS Deal Sync
