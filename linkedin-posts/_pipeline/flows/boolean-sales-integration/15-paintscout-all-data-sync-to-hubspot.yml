    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            /**
             * CompanyCam Project Creation & HubSpot Sync Script
             * 
             * This script:
             * 1. Creates projects in CompanyCam for each item in dataList
             * 2. Optionally assigns users to projects based on the owner email
             * 3. Updates HubSpot deals with CompanyCam project information
             */

            module.exports = async ({ logger, configVars }, stepResults) => {
                const active = configVars['Assign Company Cam to Project Owner'];
                const companyCamConnection = configVars['CompanyCam API Connection']?.token?.access_token;
                if (!companyCamConnection) throw new Error("Missing CompanyCam access token");

                const access_token = configVars["HubSpot Private App Connection"]?.fields?.accessToken;
                if (!access_token) throw new Error("Missing HubSpot access token");

                const dataList = stepResults?.psQuoteXHsDealSync?.results?.updatedPaintScoutQuotes || [];

                // CompanyCam API base URL
                const CC_BASE_URL = 'https://api.companycam.com/v2';

                // Results array to track all operations
                const results = [];

                // Cache for CompanyCam users (to avoid multiple API calls)
                let companyCamUsers = null;

                /**
                 * Fetch all users from CompanyCam
                 */
                async function fetchCompanyCamUsers() {
                    if (companyCamUsers !== null) {
                        return companyCamUsers;
                    }

                    try {
                        const allUsers = [];
                        let page = 1;
                        const perPage = 100;
                        let hasMore = true;

                        while (hasMore) {
                            const response = await fetch(`${CC_BASE_URL}/users?page=${page}&per_page=${perPage}`, {
                                method: 'GET',
                                headers: {
                                    'Authorization': `Bearer ${companyCamConnection}`,
                                    'Accept': 'application/json'
                                }
                            });

                            if (!response.ok) {
                                throw new Error(`Failed to fetch CompanyCam users: ${response.status} ${response.statusText}`);
                            }

                            const users = await response.json();
                            allUsers.push(...users);

                            // If we got less than perPage users, we've reached the end
                            hasMore = users.length === perPage;
                            page++;
                        }

                        companyCamUsers = allUsers;
                        logger.info(`Fetched ${companyCamUsers.length} CompanyCam users`);
                        return companyCamUsers;
                    } catch (error) {
                        logger.error(`Error fetching CompanyCam users: ${error.message}`);
                        throw error;
                    }
                }

                /**
                 * Find a CompanyCam user by email
                 */
                async function findUserByEmail(email) {
                    if (!email) return null;

                    const users = await fetchCompanyCamUsers();
                    return users.find(user =>
                        user.email?.toLowerCase() === email.toLowerCase()
                    );
                }

                /**
                 * Create a project in CompanyCam
                 */
                async function createCompanyCamProject(payload) {
                    const response = await fetch(`${CC_BASE_URL}/projects`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${companyCamConnection}`,
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorBody = await response.text();
                        throw new Error(`Failed to create CompanyCam project: ${response.status} ${response.statusText} - ${errorBody}`);
                    }

                    return await response.json();
                }

                /**
                 * Assign a user to a CompanyCam project
                 */
                async function assignUserToProject(projectId, userId, assignerEmail) {
                    const response = await fetch(`${CC_BASE_URL}/projects/${projectId}/assigned_users/${userId}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${companyCamConnection}`,
                            'Accept': 'application/json',
                            'X-CompanyCam-User': assignerEmail
                        }
                    });

                    if (!response.ok) {
                        const errorBody = await response.text();
                        throw new Error(`Failed to assign user to project: ${response.status} ${response.statusText} - ${errorBody}`);
                    }

                    return await response.json();
                }

                /**
                 * Update a HubSpot deal with CompanyCam project data
                 */
                async function updateHubSpotDeal(dealId, properties) {
                    const response = await fetch(`https://api.hubapi.com/crm/v3/objects/deals/${dealId}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${access_token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ properties })
                    });

                    if (!response.ok) {
                        const errorBody = await response.text();
                        throw new Error(`Failed to update HubSpot deal: ${response.status} ${response.statusText} - ${errorBody}`);
                    }

                    return await response.json();
                }

                // -----------------------------
                // 🚀 PARALLEL + RETRY HELPERS
                // -----------------------------
                const delay = (ms) => new Promise((res) => setTimeout(res, ms));

                async function retryableRequest(fn, retries = 3, wait = 800) {
                    try {
                        return await fn();
                    } catch (err) {
                        if (retries === 0) throw err;
                        await delay(wait);
                        return retryableRequest(fn, retries - 1, wait * 1.5);
                    }
                }

                async function runParallelInBatches(tasks, batchSize = 15) {
                    const results = [];
                    for (let i = 0; i < tasks.length; i += batchSize) {
                        const batch = tasks.slice(i, i + batchSize);
                        const resolved = await Promise.allSettled(
                            batch.map((t) => t())
                        );
                        results.push(...resolved);
                    }
                    return results;
                }


               // -----------------------------
                // 🚀 PARALLEL PROCESSING
                // -----------------------------

                const tasks = dataList.map((item) => async () => {
                    const result = {
                        psQuoteId: item.psQuoteId,
                        hubspotDealId: item.hubspotDealId,
                        success: false,
                        companyCamProjectId: null,
                        userAssigned: false,
                        hubspotUpdated: false,
                        error: null
                    };

                    try {
                        if (!item.companyCamPayload) {
                            result.error = 'No companyCamPayload found';
                            return result;
                        }

                        // Step 1: Create CompanyCam project
                        logger.info(`Creating CompanyCam project for quote: ${item.psQuoteId}`);
                        const ccData = await retryableRequest(() =>
                            createCompanyCamProject(item.companyCamPayload)
                        );

                        const ccProjectId = ccData.id;
                        const ccProjectUrl = ccData.project_url;
                        const ccPublicUrl = ccData.public_url;

                        result.companyCamProjectId = ccProjectId;
                        logger.info(`Created CompanyCam project: ${ccProjectId}`);

                        // Step 2: Assign user (if active)
                        const isActive = active === true || active === 'true';
                        if (isActive) {
                            const ownerEmail = item.psData?.owner?.email;

                            if (ownerEmail) {
                                logger.info(`Looking for CompanyCam user with email: ${ownerEmail}`);
                                const ccUser = await retryableRequest(() =>
                                    findUserByEmail(ownerEmail)
                                );

                                if (ccUser) {
                                    logger.info(`Found CompanyCam user: ${ccUser.id} (${ccUser.email})`);
                                    await retryableRequest(() =>
                                        assignUserToProject(ccProjectId, ccUser.id, ownerEmail)
                                    );
                                    result.userAssigned = true;
                                    logger.info(`Assigned user ${ccUser.id} to project ${ccProjectId}`);
                                } else {
                                    logger.warn(`No CompanyCam user found with email: ${ownerEmail}`);
                                }
                            } else {
                                logger.warn(`No owner email found for quote: ${item.psQuoteId}`);
                            }
                        }

                        // Step 3: Update HubSpot deal
                        const quoteData = item.psData;
                        const quoteId = quoteData?.id;
                        const quoteNumber = quoteData?.number;
                        const quoteUrl = item.urls?.quote;
                        const quoteWorkOrderUrl = item.urls?.workOrder;

                        const hubspotPayload = {
                            companycam_project_url: ccProjectUrl,
                            companycam_public_url: ccPublicUrl,
                            companycam_project_id: ccProjectId,
                            paintscout_quote_url_internal: `https://app.paintscout.com/quotes/edit/${quoteId}`,
                            paintscout_quote_url_external: quoteUrl,
                            work_order_url: quoteWorkOrderUrl,
                            paintscout_quote_id: quoteId,
                            raw_paintscout_estimate_number: quoteNumber,
                        };

                        logger.info(`Updating HubSpot deal: ${item.hubspotDealId}`);
                        await retryableRequest(() =>
                            updateHubSpotDeal(item.hubspotDealId, hubspotPayload)
                        );
                        result.hubspotUpdated = true;
                        logger.info(`Updated HubSpot deal: ${item.hubspotDealId}`);

                        result.success = true;

                    } catch (error) {
                        result.error = error.message;
                        logger.error(`Error processing item ${item.psQuoteId}: ${error.message}`);
                    }

                    return result;
                });

                // Run in parallel batches
                const parallelResults = await runParallelInBatches(tasks, 20);

                // Collect results
                parallelResults.forEach((r) => {
                    if (r.status === "fulfilled") {
                        results.push(r.value);
                    }
                });


                // Summary logging
                const successCount = results.filter(r => r.success).length;
                const failCount = results.filter(r => !r.success).length;
                logger.info(`Processing complete: ${successCount} successful, ${failCount} failed`);

                return {
                    companyCamConnection,
                    dataList,
                    results,
                    summary: {
                        total: results.length,
                        success: successCount,
                        failed: failCount
                    }
                };
            };
      name: CompanyCam Sync X HubSpot Deal
