sourceFile: boolean-sales-integration-export.yml
category: Marketing and Sales System
flow:
  name: 00 Register Instance
  description: ""
  isSynchronous: true
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: instanceDeploy
        component:
          isPublic: true
          key: management-triggers
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Instance Deploy
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: |
            module.exports = async ({ logger, configVars }, stepResults) => {
              return { data: configVars };
            };
      name: TNT Settings
    - action:
        key: createObject
        component:
          isPublic: true
          key: collection-tools
          version: LATEST
      description: ""
      inputs:
        keyValueInput:
          type: complex
          value:
            - name:
                type: value
                value: event
              type: value
              value: register
            - name:
                type: value
                value: uniqueId
              type: reference
              value: tntSettings.results.TNT - Blacklist Settings.tntTrigger
            - name:
                type: value
                value: instanceWebhookUrl
              type: reference
              value: instanceDeploy.results.webhookUrls.13 TNT Contact Flow
      name: Contact Tags Event
    - action:
        key: createObject
        component:
          isPublic: true
          key: collection-tools
          version: LATEST
      description: ""
      inputs:
        keyValueInput:
          type: complex
          value:
            - name:
                type: value
                value: event
              type: value
              value: register
            - name:
                type: value
                value: uniqueId
              type: reference
              value: tntSettings.results.Declined Stage
            - name:
                type: value
                value: instanceWebhookUrl
              type: reference
              value: instanceDeploy.results.webhookUrls.14 Cancelled Deal Sync
      name: Deal Stage Changes
    - action:
        key: create
        component:
          isPublic: true
          key: collection-tools
          version: LATEST
      description: ""
      inputs:
        items:
          type: complex
          value:
            - type: reference
              value: contactTagsEvent.results
            - type: reference
              value: dealStageChanges.results
      name: Create List
    - action:
        key: loopOverItems
        component:
          isPublic: true
          key: loop
          version: LATEST
      description: ""
      inputs:
        items:
          type: reference
          value: createList.results
      name: Loop Over Items
      steps:
        - action:
            key: httpPost
            component:
              isPublic: true
              key: http
              version: LATEST
          description: ""
          inputs:
            connection:
              type: configVar
              value: ""
            data:
              type: reference
              value: loopOverItems.currentItem
            debugRequest:
              type: value
              value: "false"
            headers:
              type: complex
              value: []
            ignoreSslErrors:
              type: value
              value: "false"
            includeFullResponse:
              type: value
              value: "false"
            maxRetries:
              type: value
              value: "0"
            queryParams:
              type: complex
              value: []
            responseType:
              type: value
              value: json
            retryDelayMS:
              type: value
              value: "0"
            retryOnAllErrors:
              type: value
              value: "false"
            timeout:
              type: value
              value: ""
            url:
              type: configVar
              value: HubSpot Route Registration URL
            useExponentialBackoff:
              type: value
              value: "false"
          name: Register webhooks
