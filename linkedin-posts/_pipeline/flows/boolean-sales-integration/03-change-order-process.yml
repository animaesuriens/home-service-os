            module.exports = async ({ logger, configVars }, stepResults) => {

              // From PaintScout
              let quoteData = stepResults.trigger.results.body.data
              let totalPrice = quoteData.totals.afterDiscount
              let totalHours = quoteData.totals.hours
              let totalLabor = quoteData.totals.laborPrice
              let totalMaterials = quoteData.totals.materialsPrice
              let additionalLabor = quoteData.totals?.additionalWorkLaborPrice || 0
              let additionalMaterial = quoteData.totals?.additionalWorkMaterialsPrice || 0
              let discountPrice = quoteData.discount?.total

              // From Deals
              let amount = stepResults.sumDealAmounts.results
              let estimated_hours = stepResults.sumDealHours.results
              let laborAmount = stepResults.sumDealLabor.results 
