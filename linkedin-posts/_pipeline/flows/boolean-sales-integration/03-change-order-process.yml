              // let materials_difference = Number(totalMaterials - materialsAmount + additionalMaterial)
              // let discount_difference = Number(discountPrice - discount_amount) || 0

               function roundToTwo(num) {
                const rounded = Number(num.toFixed(2));
                return Object.is(rounded, -0) ? 0 : rounded; // turn -0 into 0
              }

              let amount_difference     = roundToTwo(totalPrice - amount);
              let hours_difference      = roundToTwo(totalHours - estimated_hours);
              let labor_difference      = roundToTwo(totalLabor - laborAmount + additionalLabor);
              let materials_difference  = roundToTwo(totalMaterials - materialsAmount + additionalMaterial);
              let discount_difference   = roundToTwo(discountPrice - discount_amount) || 0;


              return { 
