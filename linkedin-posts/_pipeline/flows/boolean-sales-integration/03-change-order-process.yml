sourceFile: boolean-sales-integration-export.yml
category: Marketing and Sales System
flow:
  name: 03 Change Order Process
  description: 03 Change Order Process
  isSynchronous: true
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: crossFlow
        component:
          isPublic: true
          key: cross-flow
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Trigger
    - action:
        key: split
        component:
          isPublic: true
          key: text-manipulation
          version: LATEST
      description: ""
      inputs:
        separator:
          type: value
          value: ","
        text:
          type: reference
          value: trigger.results.body.data.source.id
      name: Split Sources
    - action:
        key: length
        component:
          isPublic: true
          key: collection-tools
          version: LATEST
      description: ""
      inputs:
        listInput:
          type: reference
          value: splitSources.results
      name: Source IDs Count
    - action:
        key: rawRequest
        component:
          isPublic: true
          key: hubspot
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 30
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 2
        usesExponentialBackoff: false
      inputs:
        connection:
          type: configVar
          value: HubSpot Private App Connection
        data:
          type: value
          value: ""
        debugRequest:
          type: value
          value: "false"
        fileData:
          type: complex
          value: []
        fileDataFileNames:
          type: complex
          value: []
        formData:
          type: complex
          value: []
        headers:
          type: complex
          value: []
        maxRetries:
          type: value
          value: "0"
        method:
          type: value
          value: GET
        queryParams:
          type: complex
          value: []
        responseType:
          type: value
          value: json
        retryAllErrors:
          type: value
          value: "false"
        retryDelayMS:
          type: value
          value: "0"
        timeout:
          type: value
          value: ""
        url:
          type: value
          value: /crm/v3/properties/deals?archived=false
        useExponentialBackoff:
          type: value
          value: "false"
      name: Get Deal Properties
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {

              let properties = stepResults.getDealProperties.results.results
              let propNames = properties
                .filter(prop => prop.groupName !== "deal_activity" && prop.groupName !== "dealstages")
                .map(prop => prop.name)

              return propNames;
            };
      name: List Deal Properties Label
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {

              let properties = stepResults.getDealProperties.results.results
              let propNames = properties
                .filter(prop => prop.groupName !== "deal_activity" && prop.groupName !== "dealstages")
                .map(prop => prop)

              return propNames;
            };
      name: List Deal Properties Object
    - action:
        key: rawRequest
        component:
          isPublic: true
          key: hubspot
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 30
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 2
        usesExponentialBackoff: false
      inputs:
        connection:
          type: configVar
          value: HubSpot Private App Connection
        data:
          type: template
          value: |
            {
              "limit": 1,
              "properties": {{$listDealPropertiesLabel.results}},
              "filterGroups": [
                {
                  "filters": [
                    {
                      "propertyName": "hs_object_id",
                      "value": "{{$trigger.results.body.data.originalDeal}}",
                      "operator": "EQ"
                    }
                  ]
                }
              ]
            }
        debugRequest:
          type: value
          value: "false"
        fileData:
          type: complex
          value: []
        fileDataFileNames:
          type: complex
          value: []
        formData:
          type: complex
          value: []
        headers:
          type: complex
          value:
            - name:
                type: value
                value: Content-Type
              type: value
              value: application/json
        maxRetries:
          type: value
          value: "0"
        method:
          type: value
          value: POST
        queryParams:
          type: complex
          value: []
        responseType:
          type: value
          value: json
        retryAllErrors:
          type: value
          value: "false"
        retryDelayMS:
          type: value
          value: "0"
        timeout:
          type: value
          value: ""
        url:
          type: value
          value: /crm/v3/objects/deals/search
        useExponentialBackoff:
          type: value
          value: "false"
      name: Get Deal
    - action:
        key: readAssociations
        component:
          isPublic: true
          key: hubspot
          version: LATEST
      description: ""
      errorConfig:
        delaySeconds: 30
        errorHandlerType: retry
        ignoreFinalError: false
        maxAttempts: 2
        usesExponentialBackoff: false
      inputs:
        debugRequest:
          type: value
          value: "false"
        fromObjectType:
          type: value
          value: Deal
        hubspotConnection:
          type: configVar
          value: HubSpot Private App Connection
        timeout:
          type: value
          value: ""
        toId:
          type: reference
          value: trigger.results.body.data.originalDeal
        toObjectType:
          type: value
          value: Contacts
      name: Get Contact Association
    - action:
