sourceFile: boolean-marketing-integration-export.yml
category: Marketing and Sales System
flow:
  name: 03.2 Customer-Selected Marketing Source -> Multi-Source Conversion
  description: ""
  isSynchronous: true
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: crossFlow
        component:
          isPublic: true
          key: cross-flow
          version: LATEST
      description: ""
      inputs: {}
      isTrigger: true
      name: Trigger
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: Marketing Source Exist
          steps:
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {

                      let triggerData = stepResults.trigger.results.body.data || ""
                      let source = triggerData.properties?.customer_selected_marketing_source || triggerData.properties?.primary_marketing_source || []
                      let convert = source.includes(';') ? source.split(';') : source.split(',')

                      const trimmed = convert.map(type => String(type).trim())

                      return trimmed;
                    };
              name: Convert Sources
            - action:
                key: loopOverItems
                component:
                  isPublic: true
                  key: loop
                  version: LATEST
              description: ""
              inputs:
                items:
                  type: reference
                  value: convertSources.results
              name: Loop Over Sources
              steps:
                - action:
                    key: runCode
                    component:
                      isPublic: true
                      key: code
                      version: LATEST
                  description: ""
                  inputs:
                    code:
                      type: value
                      value: >
                        module.exports = async ({ logger, configVars },
                        stepResults) => {
                          let data = stepResults.loopOverSources.currentItem;
                          let payload = {
                              "performUpsert": {
                                "fieldsToMergeOn": [
                                  "Customer Facing Label"
                                ]
                              },
                              "records": [
                                {
                                  "fields": {
                                    "Customer Facing Label": data
                                  }
                                }
                              ]
                            };

                          return payload;
                        };
                  name: Generate Payload
                - action:
                    key: rawRequest
                    component:
                      isPublic: true
                      key: airtable
                      version: LATEST
                  description: ""
                  errorConfig:
                    delaySeconds: 5
                    errorHandlerType: retry
                    ignoreFinalError: true
                    maxAttempts: 2
                    usesExponentialBackoff: false
                  inputs:
                    connection:
                      type: configVar
                      value: Airtable Connection Token
                    data:
                      type: reference
                      value: generatePayload.results
                    fileData:
                      type: complex
                      value: []
                    fileDataFileNames:
                      type: complex
                      value: []
                    formData:
                      type: complex
                      value: []
                    headers:
                      type: complex
                      value:
                        - name:
                            type: value
                            value: Content-Type
                          type: value
                          value: application/json
                    maxRetries:
                      type: value
                      value: "0"
                    method:
                      type: value
                      value: PATCH
                    queryParams:
                      type: complex
                      value: []
                    responseType:
                      type: value
                      value: json
                    retryAllErrors:
                      type: value
                      value: "false"
                    retryDelayMS:
                      type: value
                      value: "0"
                    timeout:
                      type: value
                      value: ""
                    url:
                      type: template
                      value: /v0/{{#Project Management Base}}/{{#Sources Table}}
                    useExponentialBackoff:
                      type: value
                      value: "false"
                  name: Get Source
            - action:
                key: map
                component:
                  isPublic: true
                  key: collection-tools
                  version: LATEST
              description: ""
              inputs:
                contextInput:
                  type: value
                  value: ""
                filterCodeInput:
                  type: value
                  value: (item, index) => { return true; }
                listInput:
                  type: reference
                  value: loopOverSources.results
                transformCodeInput:
                  type: value
                  value: |-
                    (item, index) => {    
                        
                        return item.data.records[0]; 

                    }
              name: Flatten by Record Data
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >+
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {

                      const data = stepResults.flattenByRecordData.results
                      const sortedData = data
                        .map((item, index) => ({ item, index })) // Attach original index
                        .sort((a, b) => {
                            return b.item.fields["Priority Ranking"] - a.item.fields["Priority Ranking"];
                        })
                        .map(({ item }) => item.fields["Internal Label"]); // Remove index after sorting

                      const multiAttribution = sortedData.toString().replace(/\,/g, ';')
                      const primary = sortedData[0]  

                      return {
                        primary,
                        multiAttribution
                      }
                    };

              name: Sort by Priority Ranking
        - name: Else
          steps:
            - action:
                key: writeLog
                component:
                  isPublic: true
                  key: log
                  version: LATEST
              description: ""
              inputs:
                level:
                  type: value
                  value: info
                message:
                  type: value
                  value: No Sources Exist
              name: Write Log Message
            - action:
                key: stopExecution
                component:
                  isPublic: true
                  key: stop-execution
                  version: LATEST
              description: ""
              inputs:
                contentType:
                  type: value
                  value: application/json
                headers:
                  type: complex
                  value: []
                jsonBody:
                  type: value
                  value: ""
                statusCode:
                  type: value
                  value: "204"
              name: Stop Execution
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: Marketing Source Exist
              type: complex
              value:
                - and
                - - exists
                  - name: ""
                    type: reference
                    value: trigger.results.body.data.properties.customer_selected_marketing_source
                - - isNotEmpty
                  - name: ""
                    type: reference
                    value: trigger.results.body.data.properties.customer_selected_marketing_source
                  - name: ""
                    type: value
                    value: ""
      name: Marketing Source Branch
