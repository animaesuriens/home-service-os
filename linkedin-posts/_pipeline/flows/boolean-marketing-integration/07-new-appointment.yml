                          inputs:
                            code:
                              type: value
                              value: >-
                                module.exports = async ({ logger, configVars },
                                stepResults) => {
                                  let contactId = stepResults.outputContact.results.id;
                                  let contact = stepResults.psContactPayload.results
                                  let trigger = stepResults.overridePayload?.results;
                                  let newDeal = stepResults.outputDeal.results;

                                  let originalDeal = trigger.dealData ? trigger.dealData : newDeal;
                                  let currentProjectType = stepResults.lookupProjectTypes.currentItem;

                                  let estimatorEmail = trigger["estimatorEmail"];
                                  let startsAt = trigger["startsAt"];
                                  let firstName = trigger["jobFirstName"];
                                  let lastName = trigger["jobLastName"];
                                  let phoneNumber = trigger["jobPhone"] || trigger["billingPhone"] ||"";
                                  let address = trigger["jobStreet"];
                                  let email = stepResults.extractEmail.results?.[0] || "";
                                  let city = trigger["jobCity"];
                                  let state = trigger["jobState"];
                                  let zip = trigger["jobPostal"];
                                  let jobDescription = trigger["jobDescription"];
                                  let dealId = newDeal["id"];
                                  let jobIdentifier = originalDeal.properties?.["job_identifier"] || "";
                                  let projectType = originalDeal.properties?.["paintscout_quote_type_label"] || newDeal.properties?.["paintscout_quote_type_label"] || "";
                                  let templateType = originalDeal.properties?.["paintscout_quote_template_label"] || newDeal.properties?.["paintscout_quote_template_label"] || "";
                                  let company = trigger["company"];

                                  //const contact = stepResults.callPaintscoutDefaultIdentifier.results?.contact || {};
                                  const billingContact = stepResults.callPaintscoutDefaultIdentifier.results?.billing || {};
                                  const jobAddress = stepResults.callPaintscoutDefaultIdentifier.results?.jobAddress || {};

                                  // Initialize payload from defaults
                                  let payload = {
                                    contact,
                                    billingContact,
                                    jobAddress
                                  };

                                  // Convert to UNIX time (seconds)
                                  const convertToUnix = (date) => Math.floor(new Date(date).getTime());
                                  const startsAtUnix = startsAt ? convertToUnix(startsAt) : convertToUnix(new Date());

                                  // Add additional payload fields
                                  payload.dates = {
                                    quote: startsAtUnix
                                  };
                                  //payload.quoteType = projectType
                                  payload.quoteType = {
                                    label: projectType
                                  };
                                  payload.quoteTemplate = {
                                    label: templateType
                                  };
                                  payload.owner = {
                                    email: estimatorEmail
                                  };
                                  payload.contact.source = {
                                    id: contactId
                                  };
                                  payload.jobAddress.identifier = jobIdentifier;
                                  payload.source = {
                                    id: dealId
                                  };
                                  payload.estimatorNotes = jobDescription;

                                  // Fallback maps
                                  const contactFallbacks = {
                                    firstName,
                                    lastName,
                                    company,
                                    email,
                                    phoneNumber,
                                    address,
                                    city,
                                    state,
                                    zip
                                  };

                                  const jobAddressFallbacks = {
                                    address,
                                    city,
                                    state,
                                    zip
                                  };

                                  const billingFallbacks = {
                                    firstName,
                                    lastName,
                                    email,
                                    phoneNumber,
                                    address,
                                    city,
                                    state,
                                    zip
                                  };

                                  // Fallback helper
                                  const applyFallbacks = (target, fallbacks) => {
                                    for (const key in fallbacks) {
                                      if (!target[key]) {
                                        target[key] = fallbacks[key];
                                      }
                                    }
                                  };

                                  applyFallbacks(payload.contact, contactFallbacks);
                                  applyFallbacks(payload.jobAddress, jobAddressFallbacks);
                                  applyFallbacks(payload.billingContact, billingFallbacks);

                                  return payload;
                                };
