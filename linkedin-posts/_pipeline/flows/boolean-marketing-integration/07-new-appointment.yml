                                  let firstName = trigger["jobFirstName"];
                                  let lastName = trigger["jobLastName"];
                                  let phone = trigger["jobPhone"] || trigger["billingPhone"] ||"";
                                  let address = trigger["jobStreet"];
                                  let email = stepResults.extractEmail.results?.[0] || "";
                                  let city = trigger["jobCity"];
                                  let state = trigger["jobState"];
                                  let zip = trigger["jobPostal"];
                                  let projectType = stepResults?.lookupProjectTypes?.currentItem
                                  let ccName = firstName + " " + lastName + " " + projectType


                                  // Map the variables into the payload
                                  let payload = {
                                    "name": ccName,
                                    "address": {
                                      "street_address_1": address,
                                      "city": city,
                                      "state": state,
                                      "postal_code": zip,
                                      "country": "US"
                                    },
                                    "primary_contact": {
                                      "name": `${firstName} ${lastName}`,
                                      "email": email,
                                      "phone_number": phone
                                    }
                                  }

                                  return payload;
                                };
