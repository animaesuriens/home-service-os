  - elements:
      - type: htmlElement
        value: >
          <!doctype html>

          <html lang="en">

          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>YCBM Glossary</title>
            <style>
              .ycbm-glossary {
                font-family: Arial, sans-serif;
                margin: 20px;
                background: #f9fafb;
                color: #333;
                max-width: 700px;
              }

              .ycbm-glossary__title {
                font-size: 20px !important;
                 margin-bottom: 10px !important;
            color: #000000 !important;
            font-weight: 700 !important;

              }

              .ycbm-glossary__description {
                color: #666;
                margin-top: 0;
                line-height: 1.5;
              }

              .ycbm-glossary__card {
                background: #fff;
                border-radius: 8px;
                padding: 16px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.05);
              }

              .ycbm-glossary__list {
                margin: 0;
              }

              .ycbm-glossary__term {
                font-family: monospace;
                background: #f3f4f6;
                padding: 6px 10px;
                border-radius: 6px;
                display: inline-block;
              }

              .ycbm-glossary__definition {
                margin: 8px 0 16px;
                color: #555;
              }

              .ycbm-glossary__example {
                background: #f4f4f4;
                padding: 10px;
                border-radius: 6px;
                overflow-x: auto;
                white-space: pre-wrap;
                line-height: 1.4;
              }

              .ycbm-glossary__footer {
                margin-top: 16px;
                color: #888;
                font-size: 13px;
              }
            </style>
          </head>

          <body>
            <main class="ycbm-glossary">
             
              <section class="ycbm-glossary__card" aria-label="Glossary">
           <p class="ycbm-glossary__title">YCBM Customer Facing Feature</p>
              <p class="ycbm-glossary__description">
                Short reference for variables used in the YCBM customer-facing self-booking flow.
              </p>

                <dl class="ycbm-glossary__list">
                  <dt class="ycbm-glossary__term">{CUSTOMER}</dt>
                  <dd class="ycbm-glossary__definition">Customer First Name from HubSpot Contact Data.</dd>

                  <dt class="ycbm-glossary__term">{CUSTOMER_PHONE}</dt>
                  <dd class="ycbm-glossary__definition">Customer Phone Number from HubSpot Contact Data.</dd>

                  <dt class="ycbm-glossary__term">{CONTACT_OWNER}</dt>
                  <dd class="ycbm-glossary__definition">Reference for the customer-facing YCBM "From" name.</dd>

                  <dt class="ycbm-glossary__term">{YCBM_LINK}</dt>
                  <dd class="ycbm-glossary__definition">Short URL of the YCBM pre-filled link.</dd>

                  <dt class="ycbm-glossary__term">{COMPANY_NAME}</dt>
                  <dd class="ycbm-glossary__definition">The "From Name" for Customer Confirmation. This can be found in the Communicator page.</dd>
                </dl>

                <div>
                  <p><strong>Example usage in a template:</strong></p>
                  <pre class="ycbm-glossary__example">
          Hello {CUSTOMER}, This is from {CONTACT_OWNER} at {COMPANY_NAME}. 

          Your phone number is {CUSTOMER_PHONE}.

          Click the link below to schedule your calendar appointment:
          {YCBM_LINK}
                  </pre>
                </div>
              </section>
            </main>
          </body>

          </html>
      - type: configVar
        value: Customer Facing YCBM Text Template
      - type: configVar
        value: Customer Facing YCBM Booking Link
      - type: configVar
        value: Auto Mapped Estimator
      - type: htmlElement
        value: <h1>Business Hours Auto Reply</h1>
      - type: configVar
        value: Do you want to auto reply during business hours?
      - type: configVar
        value: Time Zone
      - type: configVar
        value: Open Hour
      - type: configVar
        value: Open Business Response Email Template
      - type: configVar
        value: Custom CC Email
      - type: configVar
        value: Custom BCC Email
      - type: configVar
        value: Open Business Response Text Template
      - type: configVar
        value: Do you want to auto reply after business hours?
      - type: configVar
        value: Close Business Response Email Template
      - type: configVar
        value: Close Business Response Text Template
    name: Email and Text Confirmation
    tagline: ""
    userLevelConfigured: false
  - elements:
      - type: htmlElement
        value: <h1>CSR Notification Template</h1>
      - type: configVar
        value: Error Email Template
      - type: htmlElement
        value: <h1>YCBM Email</h1>
      - type: configVar
        value: YCBM Email notification template
    name: Email Notification Template
    tagline: ""
    userLevelConfigured: true
