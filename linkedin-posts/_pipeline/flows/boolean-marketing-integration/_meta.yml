sourceFile: boolean-marketing-integration-export.yml
category: Marketing and Sales System
name: Boolean Marketing Integration
description: This integration connects YouCanBook.Me, CompanyCam, HubSpot, and
  PaintScout to create a unified workflow for booking, quoting, and follow-ups.
  It streamlines appointment scheduling, generates detailed quotes, organizes
  project photos, and automates follow-up tasks, enhancing efficiency and client
  communication throughout the sales process.
