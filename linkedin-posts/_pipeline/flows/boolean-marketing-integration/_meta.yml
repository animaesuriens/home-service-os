      - type: htmlElement
        value: <h1>Applications</h1>
      - type: configVar
        value: HubSpot Private App Connection
      - type: htmlElement
        value: |-
          <p>
            Include the following to the Private App scopes:
          </p><br>

          <p style="
              font-family:'Courier New', courier;
              font-size:12px;
              background-color:#000;      /* try #1e1e1e for a softer dark */
              color:#fba026;
              display:inline-block;
              padding:8px 12px;
              margin:0;
              border-radius:6px;
              box-shadow:0 2px 6px rgba(0,0,0,0.5);
          ">
            <code>crm.objects.companies.read</code>&nbsp;
            <code>crm.objects.companies.write</code>&nbsp;
            <code>crm.objects.contacts.read</code>&nbsp;
            <code>crm.objects.contacts.write</code>&nbsp;
            <code>crm.objects.custom.read</code>&nbsp;
            <code>crm.objects.deals.read</code>&nbsp;
            <code>crm.objects.deals.write</code>&nbsp;
            <code>crm.objects.owners.read</code>&nbsp;
            <code>crm.objects.users.read</code>&nbsp;
            <code>crm.schemas.companies.read</code>&nbsp;
            <code>crm.schemas.contacts.read</code>&nbsp;
            <code>crm.schemas.custom.read</code>&nbsp;
            <code>crm.schemas.deals.read</code>&nbsp;
            <code>forms</code>&nbsp;
            <code>oauth</code>&nbsp;
            <code>files</code>&nbsp;
            <code>files.ui_hidden.read</code>
          </p>
