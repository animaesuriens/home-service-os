sourceFile: boolean-marketing-integration-export.yml
category: Marketing and Sales System
flow:
  name: 12 Contact Level Booking Link
  description: ""
  isSynchronous: true
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: webhook
        component:
          isPublic: true
          key: webhook-triggers
          version: LATEST
      description: ""
      inputs:
        body:
          type: value
          value: ""
        contentType:
          type: value
          value: application/json
        headers:
          type: complex
          value: []
        statusCode:
          type: value
          value: "200"
      isTrigger: true
      name: HTTP
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: Contact ID Found
          steps:
            - action:
                key: invokeFlow
                component:
                  isPublic: true
                  key: cross-flow
                  version: LATEST
              description: ""
              inputs:
                data:
                  type: template
                  value: |-
                    {
                    "contact_id":"{{$http.results.queryParameters.contact_id}}"
                    }
                flowName:
                  type: value
                  value: 15 - Message Transpiler
              name: Process Converter
            - action:
                key: httpPost
                component:
                  isPublic: true
                  key: http
                  version: LATEST
              description: ""
              inputs:
                connection:
                  type: configVar
                  value: ""
                data:
                  type: reference
                  value: processConverter.results.generatedTextPayload.text_payload
                debugRequest:
                  type: value
                  value: "false"
                headers:
                  type: complex
                  value:
                    - name:
                        type: value
                        value: Content-type
                      type: value
                      value: application/json
                ignoreSslErrors:
                  type: value
                  value: "false"
                includeFullResponse:
                  type: value
                  value: "false"
                maxRetries:
                  type: value
                  value: "0"
                queryParams:
                  type: complex
                  value: []
                responseType:
                  type: value
                  value: json
                retryDelayMS:
                  type: value
                  value: "0"
                retryOnAllErrors:
                  type: value
                  value: "false"
                timeout:
                  type: value
                  value: ""
                url:
                  type: configVar
                  value: Text Sender Webhook URL
                useExponentialBackoff:
                  type: value
                  value: "false"
              name: Send Text to Customer
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {

                        // Extract the necessary data from the webhook trigger (if needed)
                        const invokeUrl = stepResults.trigger?.results?.invokeUrl; // Use optional chaining
                        const portalId = configVars["HubSpot Portal ID"];
                        const contactData = stepResults?.processConverter?.results?.latestDeal?.contactData || {};
                        const contactId = contactData?.hs_object_id;

                        // Generate the redirection location
                        const location = `https://app.hubspot.com/contacts/${portalId}/contact/${contactId}`;

                        // Log for debugging
                        logger.log(`Webhook URL invoked: ${invokeUrl}`);
                        logger.log(`Step results: ${JSON.stringify(stepResults, null, 2)}`);
                        logger.log(`Redirecting to: ${location}`);

                        // Return redirection response
                        return {
                          data: "Redirecting you...",
                          statusCode: 303,
                          headers: {
                            Location: location, // Redirect to the dynamically generated URL
                          },
                        };
                    };
              name: Response
        - name: Else
          steps:
            - action:
                key: writeLog
                component:
                  isPublic: true
                  key: log
                  version: LATEST
              description: No contact id found
              inputs:
                level:
                  type: value
                  value: info
                message:
                  type: value
                  value: No contact id found
              name: No contact id found
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: Contact ID Found
              type: complex
              value:
                - and
                - - exists
                  - name: ""
                    type: reference
                    value: http.results.queryParameters.contact_id
      name: Branch on Expression
