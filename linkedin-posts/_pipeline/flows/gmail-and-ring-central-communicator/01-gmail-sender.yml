sourceFile: gmail-and-ring-central-communicator-export.yml
category: Marketing and Sales System
flow:
  name: 01 Gmail Sender
  description: ""
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: webhook
        component:
          isPublic: true
          key: webhook-triggers
          version: LATEST
      description: ""
      inputs:
        body:
          type: value
          value: "{}"
        contentType:
          type: value
          value: application/json
        headers:
          type: complex
          value: []
        statusCode:
          type: value
          value: "200"
      isTrigger: true
      name: Trigger
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              const token = configVars['Gmail Sender Authentication']?.token?.access_token;

              if (!token) {
                throw new Error("Access token not found in configVars.");
              }

              try {
                const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                  method: 'GET',
                  headers: {
                    Authorization: `Bearer ${token}`,
                    Accept: 'application/json'
                  }
                });

                if (!response.ok) {
                  const errorBody = await response.text();
                  throw new Error(`Failed to fetch user info. Status: ${response.status}, Body: ${errorBody}`);
                }

                const userInfo = await response.json();

                logger.debug("User Info:", userInfo);

                return {
                  data: {
                    email: userInfo.email,
                    userInfo
                  }
                };

              } catch (error) {
                logger.error("Error retrieving user info:", error.message);
                return {
                  data: {
                    error: error.message
                  }
                };
              }
            };
      name: Get User Info
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >-
            module.exports = async ({ logger, configVars }, stepResults) => {
              logger.info(stepResults.trigger.results.body.data);
              logger.info(typeof stepResults.trigger.results.body.data);

              let parsedData;

              try {
                parsedData = typeof stepResults.trigger.results.body.data === 'string'
                  ? JSON.parse(stepResults.trigger.results.body.data)
                  : stepResults.trigger.results.body.data;
              } catch (error) {
                logger.error("Error parsing data:", error);
                throw new Error("Failed to parse data");
              }

              return { data: parsedData };
            };
      name: String or JSON Checker
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              const currentUser = stepResults?.getUserInfo?.results?.email || "";
              const fromEmail = stepResults?.trigger?.results?.body?.data?.from || "";
              const to = stepResults?.trigger?.results?.body?.data?.to || "";
              const cc = stepResults?.trigger?.results?.body?.data?.cc || "";
              const bcc = stepResults?.trigger?.results?.body?.data?.bcc || "";
              const subject = stepResults?.trigger?.results?.body?.data?.subject || "";
              const body = stepResults?.trigger?.results?.body?.data?.body || "";

              if (!to) {
                throw new Error("Recipient (To) address is required.");
              }

              // Dynamically build headers
              let headers = `From: "${fromEmail}" <${currentUser}>\nTo: ${to}`;
              if (cc) headers += `\nCc: ${cc}`;
              if (bcc) headers += `\nBcc: ${bcc}`;
              headers += `\nSubject: ${subject}\nContent-Type: text/html; charset="UTF-8"`;

              const emailContent = `${headers}\n\n${body}`;

              const encodedEmailContent = Buffer.from(emailContent, 'utf-8').toString('base64');

              logger.debug("Raw Email Content:\n" + emailContent);
              logger.debug("Base64 Encoded Email:\n" + encodedEmailContent);

              return {
                rawEmail: emailContent,
                base64Email: encodedEmailContent
              };
            };
      name: Generate Receiver Info
    - action:
        key: rawRequest
        component:
          isPublic: true
          key: google-gmail
          version: LATEST
      description: ""
      inputs:
        connection:
          type: configVar
          value: Gmail Sender Authentication
        data:
          type: template
          value: |-
            {
              "raw": "{{$generateReceiverInfo.results.base64Email}}"
            }
        debugRequest:
          type: value
          value: "false"
        fileData:
          type: complex
          value: []
        fileDataFileNames:
          type: complex
          value: []
        formData:
          type: complex
          value: []
        headers:
          type: complex
          value:
            - name:
                type: value
                value: Content-Type
              type: value
              value: application/json
        maxRetries:
          type: value
          value: "0"
        method:
          type: value
          value: POST
        queryParams:
          type: complex
          value: []
        responseType:
          type: value
          value: json
        retryAllErrors:
          type: value
          value: "false"
        retryDelayMS:
          type: value
          value: "0"
        timeout:
          type: value
          value: ""
        url:
          type: template
          value: /v1/users/{{$getUserInfo.results.email}}/messages/send
        useExponentialBackoff:
          type: value
          value: "false"
      name: Send Message
