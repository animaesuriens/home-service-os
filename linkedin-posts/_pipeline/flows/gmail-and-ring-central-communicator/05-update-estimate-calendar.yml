sourceFile: gmail-and-ring-central-communicator-export.yml
category: Marketing and Sales System
flow:
  name: 05 Update Estimate Calendar
  description: ""
  isSynchronous: false
  endpointSecurityType: customer_optional
  steps:
    - action:
        key: webhook
        component:
          isPublic: true
          key: webhook-triggers
          version: LATEST
      description: ""
      inputs:
        body:
          type: value
          value: ""
        contentType:
          type: value
          value: ""
        headers:
          type: complex
          value: []
        statusCode:
          type: value
          value: ""
      isTrigger: true
      name: Trigger
    - action:
        key: formatDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: ""
      inputs:
        dateTime:
          type: reference
          value: trigger.results.body.data.startsAt
        format:
          type: value
          value: YYYY-MM-DDTHH:mm:ssZ
        timeZone:
          type: reference
          value: trigger.results.body.data.timeZone
      name: Start UTC
    - action:
        key: formatDateTime
        component:
          isPublic: true
          key: datetime
          version: LATEST
      description: ""
      inputs:
        dateTime:
          type: reference
          value: trigger.results.body.data.endsAt
        format:
          type: value
          value: YYYY-MM-DDTHH:mm:ssZ
        timeZone:
          type: reference
          value: trigger.results.body.data.timeZone
      name: End UTC
    - action:
        key: runCode
        component:
          isPublic: true
          key: code
          version: LATEST
      description: ""
      inputs:
        code:
          type: value
          value: >
            module.exports = async ({ logger, configVars }, stepResults) => {
              // Extract variables
              const calendarId = stepResults?.trigger?.results?.body?.data?.estimatorEmail;
              const startUtc = stepResults?.startUtc?.results;
              const endUtc = stepResults?.endUtc?.results;
              const accessToken = configVars["Google Calendar Connection"]?.token?.access_token;

              if (!calendarId || !startUtc || !endUtc || !accessToken) {
                throw new Error("Missing one or more required inputs: calendarId, startUtc, endUtc, or accessToken");
              }

              // Build request URL
              const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?timeMin=${encodeURIComponent(startUtc)}&timeMax=${encodeURIComponent(endUtc)}&singleEvents=true&orderBy=startTime`;

              logger.debug(`Fetching events from calendar: ${calendarId} from ${startUtc} to ${endUtc}`);

              // Send API request
              const response = await fetch(url, {
                method: "GET",
                headers: {
                  Authorization: `Bearer ${accessToken}`,
                  Accept: "application/json"
                }
              });

              if (!response.ok) {
                const errorText = await response.text();
                logger.error(`Google Calendar API error: ${response.status} - ${errorText}`);
                throw new Error(`Failed to fetch calendar events: ${response.status}`);
              }

              const data = await response.json();

              const filteredEvents = data.items.filter(event => {
                const eventStart = new Date(event.start?.dateTime || event.start?.date).getTime();
                const eventEnd = new Date(event.end?.dateTime || event.end?.date).getTime();
                const targetStart = new Date(startUtc).getTime();
                const targetEnd = new Date(endUtc).getTime();

                return eventStart === targetStart && eventEnd === targetEnd;
              });



              return {
                data: {
                  events: filteredEvents,
                  count: filteredEvents.length
                }
              };
            };
      name: Search Event
    - action:
        key: branchOnExpression
        component:
          isPublic: true
          key: branch
          version: LATEST
      branches:
        - name: EVENT FOUND
          steps:
            - action:
                key: runCode
                component:
                  isPublic: true
                  key: code
                  version: LATEST
              description: ""
              inputs:
                code:
                  type: value
                  value: >-
                    module.exports = async ({ logger, configVars }, stepResults)
                    => {
                      const triggerData = stepResults.trigger.results?.body?.data || {};
                      const eventCurrentDescription = stepResults.searchEvent.results?.events?.[0]?.description || "";

                      const {
                          companyCamAppLink = "",
                          companyCamProjectLink = "",
                          quoteInternalLink = "",
                          quoteExternalLink = ""
                        } = triggerData;

                        const descriptionLinks = [
                          "🔗 Project & Quote Links",
                          "",
                          `📸 CompanyCam (App):`,
                          companyCamAppLink,
                          "",
                          `🌐 CompanyCam (Web):`,
                          companyCamProjectLink,
                          "",
                          `🧾 PaintScout (Internal Quote):`,
                          quoteInternalLink,
                          "",
                          `📤 PaintScout (Client View):`,
                          quoteExternalLink
                        ].join("<br/>");



                        if(eventCurrentDescription?.includes("{LINKS}")){

                          if(eventCurrentDescription?.includes("🔗 Project & Quote Links")){
                            return eventCurrentDescription
                          }
                          return String(eventCurrentDescription?.replace("{LINKS}", descriptionLinks))
                        }

                      
                      const newDescription = eventCurrentDescription?.includes("🔗 Project & Quote Links")
                        ? eventCurrentDescription // avoid duplication
                        : `${eventCurrentDescription}\n\n${descriptionLinks}`;

                      return String(newDescription);
                    };
              name: Construct Description
            - action:
                key: updateEvent
                component:
                  isPublic: true
                  key: google-calendar
                  version: LATEST
              description: ""
              errorConfig:
                delaySeconds: null
                errorHandlerType: ignore
                ignoreFinalError: null
                maxAttempts: null
                usesExponentialBackoff: null
              inputs:
                attendees:
                  type: reference
                  value: searchEvent.results.events.0.attendees
                calendarId:
                  type: reference
                  value: trigger.results.body.data.estimatorEmail
                connection:
                  type: configVar
                  value: Google Calendar Connection
                description:
                  type: reference
                  value: constructDescription.results
                endTime:
                  type: reference
                  value: endUtc.results
                eventId:
                  type: reference
                  value: searchEvent.results.events.0.id
                eventLocation:
                  type: reference
                  value: searchEvent.results.events.0.location
                remindMethod:
                  type: value
                  value: ""
                remindMinutes:
                  type: value
                  value: ""
                sendUpdates:
                  type: value
                  value: ""
                startTime:
                  type: reference
                  value: startUtc.results
                summary:
                  type: reference
                  value: searchEvent.results.events.0.summary
                timeZone:
                  type: reference
                  value: trigger.results.body.data.timeZone
                useDefaultReminder:
                  type: value
                  value: "true"
              name: Update Event
        - name: Else
          steps:
            - action:
                key: writeLog
                component:
                  isPublic: true
                  key: log
                  version: LATEST
              description: ""
              inputs:
                level:
                  type: value
                  value: info
                message:
                  type: value
                  value: NO EVENT FOUND
              name: NO EVENT FOUND
            - action:
                key: stopExecution
                component:
                  isPublic: true
                  key: stop-execution
                  version: LATEST
              description: ""
              inputs:
                contentType:
                  type: value
                  value: application/json
                headers:
                  type: complex
                  value: []
                jsonBody:
                  type: value
                  value: ""
                statusCode:
                  type: value
                  value: "200"
              name: Stop Execution
      description: ""
      inputs:
        conditions:
          type: complex
          value:
            - name: EVENT FOUND
              type: complex
              value:
                - and
                - - greaterThan
                  - name: ""
                    type: reference
                    value: searchEvent.results.count
                  - name: ""
                    type: value
                    value: "0"
      name: Branch on Expression
