<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root { --brand-primary: {{PRIMARY_COLOR}}; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* =========== MAKE (dark purple) =========== */
    body.make {
      background: linear-gradient(160deg, #1a0e26 0%, #2a1541 40%, #1e1035 100%);
    }
    body.make .header {
      padding: 40px 60px 20px;
    }
    body.make .platform-badge {
      display: inline-block;
      background: var(--brand-primary);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    body.make .title {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    body.make .canvas { flex: 1; position: relative; overflow: hidden; }
    body.make .connectors {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    .make-lane {
      position: absolute;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      z-index: 0;
    }
    .make-lane-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .make-node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      width: 200px;
    }
    .make-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--brand-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 20px rgba(123, 45, 142, 0.35);
      border: 3px solid rgba(255,255,255,0.15);
    }
    .make-node.trigger .make-circle {
      width: 80px;
      height: 80px;
      box-shadow: 0 0 30px rgba(123, 45, 142, 0.5), 0 0 60px rgba(123, 45, 142, 0.2);
      border-color: rgba(255,255,255,0.3);
    }
    .make-label {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      text-align: center;
      line-height: 1.3;
      max-width: 180px;
    }

    /* =========== ZAPIER (light orange) =========== */
    body.zapier {
      background: #fef7f2;
    }
    body.zapier .header {
      padding: 40px 60px 24px;
    }
    body.zapier .platform-badge {
      display: inline-block;
      background: var(--brand-primary);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    body.zapier .title {
      font-size: 32px;
      font-weight: 700;
      color: #2d2d2d;
      line-height: 1.2;
    }
    body.zapier .canvas { flex: 1; position: relative; overflow: hidden; }
    body.zapier .connectors {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    .zapier-lane {
      position: absolute;
      border-radius: 12px;
      background: rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.04);
      z-index: 0;
    }
    .zapier-lane-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.25);
    }

    .zapier-card {
      position: absolute;
      width: 200px;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      border: 1px solid #f0e8e2;
      z-index: 2;
    }
    .zapier-card.trigger {
      border-left: 4px solid var(--brand-primary);
    }
    .zapier-card.action {
      border-left: 4px solid #d4ccc6;
    }
    .zap-icon-wrap {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .zapier-card.trigger .zap-icon-wrap {
      background: var(--brand-primary);
    }
    .zapier-card.action .zap-icon-wrap {
      background: #f5f0ec;
    }
    .zap-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
    }
    .zap-step-type {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--brand-primary);
    }
    .zapier-card.action .zap-step-type {
      color: #999;
    }
    .zap-label {
      font-size: 12px;
      font-weight: 600;
      color: #2d2d2d;
      line-height: 1.3;
    }

    /* =========== N8N (dark green) =========== */
    body.n8n {
      background: #232323;
    }
    body.n8n .header {
      padding: 40px 60px 20px;
    }
    body.n8n .platform-badge {
      display: inline-block;
      background: var(--brand-primary);
      color: #1a1a1a;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    body.n8n .title {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    body.n8n .canvas { flex: 1; position: relative; overflow: hidden; }
    body.n8n .canvas::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    body.n8n .connectors {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }

    .n8n-lane {
      position: absolute;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      z-index: 0;
    }
    .n8n-lane-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .n8n-node {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #2d2d2d;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 12px 16px;
      width: 200px;
      z-index: 2;
    }
    .n8n-node.trigger {
      border-color: var(--brand-primary);
      box-shadow: 0 0 16px rgba(159, 215, 160, 0.15);
    }
    .n8n-icon {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 6px;
      background: #383838;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .n8n-node.trigger .n8n-icon {
      background: var(--brand-primary);
    }
    .n8n-label {
      font-size: 12px;
      font-weight: 600;
      color: #e0e0e0;
      line-height: 1.3;
    }
    .n8n-node .n8n-connector-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      border: 2px solid #444;
    }
    .n8n-node .n8n-connector-dot.out {
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
    }
    .n8n-node .n8n-connector-dot.in {
      left: -6px;
      top: 50%;
      transform: translateY(-50%);
    }
    .n8n-node.trigger .n8n-connector-dot {
      background: var(--brand-primary);
      border-color: var(--brand-primary);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="platform-badge">{{PLATFORM_NAME}}</div>
    <div class="title">{{TITLE}}</div>
  </div>
  <div class="canvas" id="canvas">
    <svg class="connectors" id="connectors" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <script>
    var nodesData = {{NODES_JSON}};
    var edgesData = {{EDGES_JSON}};
    var actorsData = {{ACTORS_JSON}};
    var graphWidth = {{GRAPH_WIDTH}};
    var graphHeight = {{GRAPH_HEIGHT}};
    var platform = '{{PLATFORM_NAME}}'.toLowerCase();
    var primaryColor = '{{PRIMARY_COLOR}}';
    var canvas = document.getElementById('canvas');
    var svg = document.getElementById('connectors');

    document.body.classList.add(platform);

    // --- Compute scale and offset to fit ELK graph in canvas ---
    var cRect = canvas.getBoundingClientRect();
    var canvasW = cRect.width;
    var canvasH = cRect.height;
    var scale = Math.min(canvasW / graphWidth, canvasH / graphHeight) * 0.85;
    var offsetX = (canvasW - graphWidth * scale) / 2;
    var offsetY = (canvasH - graphHeight * scale) / 2;

    function tx(x) { return offsetX + x * scale; }
    function ty(y) { return offsetY + y * scale; }
    function ts(s) { return s * scale; }

    // --- Icon mapping (same as existing diagram.html) ---
    function getIcon(label) {
      var l = label.toLowerCase();
      if (/form|submit|web\s*form/.test(l)) return '\u{1F4CB}';
      if (/email|mail|welcome/.test(l)) return '\u{2709}\uFE0F';
      if (/calendar|schedul|book|appointment/.test(l)) return '\u{1F4C5}';
      if (/invoice|bill|payment/.test(l)) return '\u{1F4B0}';
      if (/estimate|quote|proposal|pricing/.test(l)) return '\u{1F4DD}';
      if (/time|clock|hour|shift/.test(l)) return '\u{23F0}';
      if (/report|dashboard|analytic/.test(l)) return '\u{1F4CA}';
      if (/expense|receipt/.test(l)) return '\u{1F9FE}';
      if (/contract|sign|document|addendum/.test(l)) return '\u{1F4C4}';
      if (/deal|sale|close|won/.test(l)) return '\u{1F91D}';
      if (/job|project|work order/.test(l)) return '\u{1F528}';
      if (/crew|team|staff|tech/.test(l)) return '\u{1F477}';
      if (/track|status|progress|monitor/.test(l)) return '\u{1F4CD}';
      if (/sync|connect|integrat|match/.test(l)) return '\u{1F504}';
      if (/text|sms|message/.test(l)) return '\u{1F4AC}';
      if (/phone|call/.test(l)) return '\u{1F4F1}';
      if (/calculat|comput|sum|total|revis/.test(l)) return '\u{1F522}';
      if (/send|deliver/.test(l)) return '\u{1F4E4}';
      if (/notif|alert|remind/.test(l)) return '\u{1F514}';
      if (/assign|route|distribut/.test(l)) return '\u{1F465}';
      if (/scor|qualif|rate|rank/.test(l)) return '\u{2B50}';
      if (/contact|crm|hubspot|lead/.test(l)) return '\u{1F464}';
      if (/creat|new|add|generat/.test(l)) return '\u{2795}';
      if (/updat|edit|modif|chang|label|categor/.test(l)) return '\u{270F}\uFE0F';
      if (/check|verif|valid|confirm|approv/.test(l)) return '\u{2705}';
      if (/standard|format|transform|map|extract/.test(l)) return '\u{1F527}';
      if (/error|fail|issue/.test(l)) return '\u{26A0}\uFE0F';
      if (/compan|org|account/.test(l)) return '\u{1F3E2}';
      return '\u{26A1}';
    }

    // --- Label shortening ---
    function shorten(label) {
      var stop = ['the','a','an','and','or','for','to','in','on','at','by','from','with','of',
                  'is','are','your','their','its','this','that','based','using','via','through',
                  'into','onto','next','available','potential','any','all','each','every',
                  'existing','original','revised','personalized','new'];
      var words = label.split(/\s+/).filter(function(w) {
        return stop.indexOf(w.toLowerCase()) === -1;
      });
      return words.slice(0, 4).join(' ');
    }

    // --- SVG helpers ---
    var ns = 'http://www.w3.org/2000/svg';
    function svgPath(d, color, width, opacity) {
      var p = document.createElementNS(ns, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', color);
      p.setAttribute('stroke-width', String(width));
      p.setAttribute('opacity', String(opacity));
      return p;
    }

    // Build a lookup of node positions by id for edge drawing
    var nodeMap = {};
    nodesData.forEach(function(n) { nodeMap[n.id] = n; });

    // ================================================================
    //  RENDER SWIMLANE BACKGROUNDS
    // ================================================================
    actorsData.forEach(function(actor) {
      var lane, label;
      if (platform === 'make') {
        lane = document.createElement('div');
        lane.className = 'make-lane';
        label = document.createElement('div');
        label.className = 'make-lane-label';
      } else if (platform === 'zapier') {
        lane = document.createElement('div');
        lane.className = 'zapier-lane';
        label = document.createElement('div');
        label.className = 'zapier-lane-label';
      } else {
        lane = document.createElement('div');
        lane.className = 'n8n-lane';
        label = document.createElement('div');
        label.className = 'n8n-lane-label';
      }
      lane.style.left = tx(actor.x) + 'px';
      lane.style.top = ty(actor.y) + 'px';
      lane.style.width = ts(actor.width) + 'px';
      lane.style.height = ts(actor.height) + 'px';
      label.textContent = actor.name;
      lane.appendChild(label);
      canvas.appendChild(lane);
    });

    // ================================================================
    //  RENDER NODES (platform-specific)
    // ================================================================
    if (platform === 'make') {
      nodesData.forEach(function(node) {
        var div = document.createElement('div');
        div.className = node.index === 0 ? 'make-node trigger' : 'make-node';
        // Center node on the ELK position
        var nodeW = ts(node.width);
        div.style.left = tx(node.x) + 'px';
        div.style.top = ty(node.y) + 'px';
        div.style.width = nodeW + 'px';

        var circle = document.createElement('div');
        circle.className = 'make-circle';
        circle.style.width = ts(72) + 'px';
        circle.style.height = ts(72) + 'px';
        circle.style.fontSize = ts(28) + 'px';
        circle.textContent = node.index === 0 ? '\u{26A1}' : getIcon(node.label);

        if (node.index === 0) {
          circle.style.width = ts(80) + 'px';
          circle.style.height = ts(80) + 'px';
        }

        var lbl = document.createElement('div');
        lbl.className = 'make-label';
        lbl.textContent = shorten(node.label);
        lbl.style.fontSize = ts(13) + 'px';
        lbl.style.maxWidth = nodeW + 'px';

        div.appendChild(circle);
        div.appendChild(lbl);
        canvas.appendChild(div);
      });
    }

    else if (platform === 'zapier') {
      nodesData.forEach(function(node) {
        var card = document.createElement('div');
        card.className = node.index === 0 ? 'zapier-card trigger' : 'zapier-card action';
        card.style.left = tx(node.x) + 'px';
        card.style.top = ty(node.y) + 'px';
        card.style.width = ts(node.width) + 'px';
        card.style.height = ts(node.height) + 'px';

        var iconWrap = document.createElement('div');
        iconWrap.className = 'zap-icon-wrap';
        iconWrap.style.width = ts(40) + 'px';
        iconWrap.style.height = ts(40) + 'px';
        iconWrap.style.minWidth = ts(40) + 'px';
        iconWrap.style.fontSize = ts(20) + 'px';
        iconWrap.textContent = node.index === 0 ? '\u{26A1}' : getIcon(node.label);

        var content = document.createElement('div');
        content.className = 'zap-content';

        var stepType = document.createElement('div');
        stepType.className = 'zap-step-type';
        stepType.textContent = node.index === 0 ? 'Trigger' : 'Action ' + node.index;
        stepType.style.fontSize = ts(9) + 'px';

        var label = document.createElement('div');
        label.className = 'zap-label';
        label.textContent = shorten(node.label);
        label.style.fontSize = ts(12) + 'px';

        content.appendChild(stepType);
        content.appendChild(label);
        card.appendChild(iconWrap);
        card.appendChild(content);
        canvas.appendChild(card);
      });
    }

    else if (platform === 'n8n') {
      nodesData.forEach(function(node) {
        var div = document.createElement('div');
        div.className = node.index === 0 ? 'n8n-node trigger' : 'n8n-node';
        div.style.left = tx(node.x) + 'px';
        div.style.top = ty(node.y) + 'px';
        div.style.width = ts(node.width) + 'px';
        div.style.height = ts(node.height) + 'px';

        var icon = document.createElement('div');
        icon.className = 'n8n-icon';
        icon.style.width = ts(36) + 'px';
        icon.style.height = ts(36) + 'px';
        icon.style.minWidth = ts(36) + 'px';
        icon.style.fontSize = ts(20) + 'px';
        icon.textContent = node.index === 0 ? '\u{26A1}' : getIcon(node.label);

        var lbl = document.createElement('div');
        lbl.className = 'n8n-label';
        lbl.textContent = shorten(node.label);
        lbl.style.fontSize = ts(12) + 'px';

        // Connector dots
        if (node.index < nodesData.length - 1) {
          var dotOut = document.createElement('div');
          dotOut.className = 'n8n-connector-dot out';
          div.appendChild(dotOut);
        }
        if (node.index > 0) {
          var dotIn = document.createElement('div');
          dotIn.className = 'n8n-connector-dot in';
          div.appendChild(dotIn);
        }

        div.appendChild(icon);
        div.appendChild(lbl);
        canvas.appendChild(div);
      });
    }

    // ================================================================
    //  RENDER SVG CONNECTORS
    // ================================================================
    edgesData.forEach(function(edge) {
      var source = nodeMap[edge.sourceId];
      var target = nodeMap[edge.targetId];
      if (!source || !target) return;

      // Check if ELK provided sections with start/end points
      if (edge.sections && edge.sections.length > 0) {
        edge.sections.forEach(function(section) {
          var sp = section.startPoint;
          var ep = section.endPoint;
          if (!sp || !ep) return;

          // Use the section's start/end points (these are in ELK coordinate space)
          // For intra-lane edges, ELK gives us relative coords
          // We need to find which lane the source/target belong to and add lane offset
          var sx = tx(source.x + sp.x);
          var sy = ty(source.y + sp.y);
          var ex = tx(target.x + ep.x);
          var ey = ty(target.y + ep.y);

          // Build path with bend points
          var d;
          if (section.bendPoints && section.bendPoints.length > 0) {
            d = 'M ' + sx + ' ' + sy;
            section.bendPoints.forEach(function(bp) {
              var bx = tx(source.x + bp.x);
              var by = ty(source.y + bp.y);
              d += ' L ' + bx + ' ' + by;
            });
            d += ' L ' + ex + ' ' + ey;
          } else {
            // Simple bezier between start and end
            var midY = (sy + ey) / 2;
            d = 'M ' + sx + ' ' + sy + ' C ' + sx + ' ' + midY + ' ' + ex + ' ' + midY + ' ' + ex + ' ' + ey;
          }
          svg.appendChild(svgPath(d, primaryColor, 2, 0.4));
        });
      } else {
        // No sections provided — compute bezier from source to target node centers
        var sx, sy, ex, ey;
        var srcCX = tx(source.x + source.width / 2);
        var srcCY = ty(source.y + source.height / 2);
        var tgtCX = tx(target.x + target.width / 2);
        var tgtCY = ty(target.y + target.height / 2);

        var dx = tgtCX - srcCX;
        var dy = tgtCY - srcCY;

        // Determine main direction and use edge of node
        if (Math.abs(dx) > Math.abs(dy)) {
          // Horizontal dominant
          if (dx > 0) {
            sx = tx(source.x + source.width);
            ex = tx(target.x);
          } else {
            sx = tx(source.x);
            ex = tx(target.x + target.width);
          }
          sy = srcCY;
          ey = tgtCY;
          var cp = Math.abs(sx - ex) * 0.4;
          var d = 'M ' + sx + ' ' + sy +
                  ' C ' + (sx + (dx > 0 ? cp : -cp)) + ' ' + sy +
                  ' ' + (ex + (dx > 0 ? -cp : cp)) + ' ' + ey +
                  ' ' + ex + ' ' + ey;
        } else {
          // Vertical dominant
          if (dy > 0) {
            sy = ty(source.y + source.height);
            ey = ty(target.y);
          } else {
            sy = ty(source.y);
            ey = ty(target.y + target.height);
          }
          sx = srcCX;
          ex = tgtCX;
          var midY = (sy + ey) / 2;
          var d = 'M ' + sx + ' ' + sy + ' C ' + sx + ' ' + midY + ' ' + ex + ' ' + midY + ' ' + ex + ' ' + ey;
        }

        svg.appendChild(svgPath(d, primaryColor, 2, 0.4));
      }
    });
  </script>
</body>
</html>
