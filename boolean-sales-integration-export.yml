            // Parse the response to JSON
            const data = await response.json();

            // Extract the Portal ID and Account Name (Portal Name) from the response
            const portalId = data.portalId;
            const accountName = data.portalName || `Account ${portalId}`; // Fallback to Portal ID if name is unavailable

