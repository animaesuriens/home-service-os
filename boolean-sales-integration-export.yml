      key: runCodePicklist
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: picklist
    defaultValue: ''
    description: >-
      The stage will move here when the estimate in PaintScout is marked as
      Declined.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {
            // ✅ Use the access token stored in the connection
            const accessToken = connection.fields.accessToken;

            // ✅ HubSpot API endpoint to fetch all deal pipelines (and their stages)
            const hubspotApiUrl = "https://api.hubapi.com/crm/v3/pipelines/deals";

            try {
              // 🔹 Fetch all pipelines from HubSpot
              const response = await fetch(hubspotApiUrl, {
                method: "GET",
                headers: {
                  Authorization: `Bearer ${accessToken}`,
                  "Content-Type": "application/json",
                },
              });

              if (!response.ok) {
                throw new Error(`Error fetching pipelines: ${response.statusText}`);
              }

              const data = await response.json();

              // 🔹 Flatten all deal stages from all pipelines into one list
              const options = data.results.flatMap((pipeline) =>
                pipeline.stages.map((stage) => ({
                  label: `${stage.label} (${pipeline.label})`,
                  key: stage.id,
                }))
              );

              // ✅ Return the stages in the format Prismatic expects
              return Promise.resolve({
                result: options,
              });
            } catch (error) {
              // 🔹 Log and return a safe empty fallback
              context.logger?.info(`Error fetching HubSpot deal stages: ${error.message}`);
              return Promise.resolve({
                result: [],
              });
            }
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: ''
