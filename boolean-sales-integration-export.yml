            const AIRTABLE_BASE_ID = AT[0];
            const AIRTABLE_TABLE_ID = AT[1];

            /**
             * Fetch HubSpot deal properties
             */
            async function fetchHubSpotFields() {
              try {
                const response = await fetch(
                  "https://api.hubapi.com/crm/v3/properties/deals",
                  {
                    method: "GET",
                    headers: { Authorization: `Bearer ${accessToken}` },
                  }
                );

                const data = await response.json();

                const dealFields = (data.results || []).filter(
                (p) => dealGroupName.includes(p.groupName)
                );

                return (
                  dealFields?.map((property) => ({
                    title: `${property.label} (HubSpot Field)`,
                    const: property.name + "(hs)",
                  })) || []
                );
              } catch (error) {
                console.error("Error fetching HubSpot fields:", error);
                return [];
              }
            }

            /**
             * Fetch Airtable fields
             */
            async function fetchAirtableFields() {
              try {
                const response = await fetch(
                  `https://api.airtable.com/v0/meta/bases/${AIRTABLE_BASE_ID}/tables`,
                  {
                    method: "GET",
                    headers: { Authorization: `Bearer ${AIRTABLE_ACCESS_TOKEN}` },
                  }
                );

                const data = await response.json();
                const table = data.tables.find((t) => t.id === AIRTABLE_TABLE_ID);

                if (!table) {
                  console.error(`Table with ID ${AIRTABLE_TABLE_ID} not found.`);
                  return [];
                }

                return (
                  table.fields?.map((field) => ({
                    title: `${field.name} (Airtable Field)`,
                    const: field.name + "(at)",
                  })) || []
                );
              } catch (error) {
                console.error("Error fetching Airtable fields:", error);
                return [];
              }
            }

            // Fetch both HubSpot and Airtable fields concurrently
            const [hubspotFields, airtableFields] = await Promise.all([
              fetchHubSpotFields(),
              fetchAirtableFields(),
            ]);

            // Merge both field lists
            const allFields = [...hubspotFields, ...airtableFields];

            /**
