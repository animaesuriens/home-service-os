              ];

              // 🔹 Fetch HubSpot contact "tags" property options dynamically
              let tagOptions = [];
              try {
                  const response = await fetch(
                      `https://api.hubapi.com/crm/v3/properties/contacts/tags`,
                      {
                          headers: {
                              Authorization: `Bearer ${access_token}`,
                              "Content-Type": "application/json",
                          },
                      }
                  );
                  const json = await response.json();
                  tagOptions = (json?.options || []).map((opt) => opt.label || opt.value);
              } catch (err) {
                  context.logger?.info(
                      "Failed to fetch HubSpot tags, fallback to empty array",
                      err
                  );
              }

              // 🔹 Build JSON schema
              const schema = {
                  type: "object",
                  properties: {
                      icon: {
