                let totalHours = quoteData.totals.hours
                let totalLabor = quoteData.totals.laborPrice
                let totalMaterials = quoteData.totals.materialsPrice
                let additionalLabor = quoteData.totals?.additionalWorkLaborPrice || 0
                let additionalMaterial = quoteData.totals?.additionalWorkMaterialsPrice || 0
                let discountPrice = quoteData.discount?.total

                // From Deals
                let amount = stepResults.sumDealAmounts.results
                let estimated_hours = stepResults.sumDealHours.results
                let laborAmount = stepResults.sumDealLabor.results 
                let materialsAmount = stepResults.sumDealMaterials.results
                let discount_amount = stepResults.sumDealDiscount.results

                // Old Code
                // Reason Number() funtion still returns exponential value which causes an issue
                // let amount_difference = Number(totalPrice - amount)
                // let hours_difference = Number(totalHours - estimated_hours)
                // let labor_difference = Number(totalLabor - laborAmount + additionalLabor)
                // let materials_difference = Number(totalMaterials - materialsAmount + additionalMaterial)
                // let discount_difference = Number(discountPrice - discount_amount) || 0

                 function roundToTwo(num) {
                  const rounded = Number(num.toFixed(2));
                  return Object.is(rounded, -0) ? 0 : rounded; // turn -0 into 0
                }

                let amount_difference     = roundToTwo(totalPrice - amount);
                let hours_difference      = roundToTwo(totalHours - estimated_hours);
                let labor_difference      = roundToTwo(totalLabor - laborAmount + additionalLabor);
                let materials_difference  = roundToTwo(totalMaterials - materialsAmount + additionalMaterial);
                let discount_difference   = roundToTwo(discountPrice - discount_amount) || 0;


                return { 
                  coAmount: amount_difference,
                  coHours: hours_difference,
                  coLabor: labor_difference,
                  coMaterials: materials_difference,
                  coDiscount: discount_difference,
                  // difference: Number(amount_difference + hours_difference + labor_difference + materials_difference)
                  difference: Number(amount_difference) // we only need amount to check if CO needs to be created
                };
