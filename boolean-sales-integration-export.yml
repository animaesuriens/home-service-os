              module.exports = async ({ logger, configVars }, stepResults) => {
                  try {
                      const allQuotes = await getAllQuotes(logger, configVars);
                      return { data: allQuotes };

                  } catch (error) {
                      logger.error(`❌ Error fetching quotes: ${error.response?.status} - ${error.message}`);
                      if (error.response?.data) {
                          logger.error(JSON.stringify(error.response.data, null, 2));
                      }
                      return {
                          error: error.message,
                          status: error.response?.status || 500
                      };
                  }
              };


              /**
               * Fetch all PaintScout quotes (paginated)
               */
              const getAllQuotes = async (logger, configVars) => {
                  const access_token = configVars["PaintScout Connection"]?.token?.access_token;
                  if (!access_token) throw new Error("Missing PaintScout access token");

                  const baseUrl = "https://openapi.paintscout.com/v2/quotes";

                  let page = 1;
                  const perPage = 50;
                  let allQuotes = [];

                  while (true) {
                      const response = await axios.get(baseUrl, {
                          headers: {
                              Authorization: `Bearer ${access_token}`,
                              "Content-Type": "application/json",
                          },
                          params: {
                              page,
                              query:"sent&query=accepted&query=viewed&query=declined",
                              perPage,
                              sort: "created",
                              sortDir: "desc",
                          },
                      });

                      const quotes = response.data?.rows || [];
                      const total = response.data?.totalRows || 0;

                      logger.info(`Total quotes reported by API: ${total}`);
                      logger.info(`Fetched page ${page} with ${quotes.length} quotes`);

                      allQuotes = allQuotes.concat(quotes);

                      // Stop if there are no more pages
                      if (page * perPage >= total || quotes.length === 0) break;

                      page++;
                  }

                  logger.info(`✅ Fetched ${allQuotes.length} total quotes from PaintScout`);

                  let uniqueContactSourceIds = new Set();
                  let uniqueContactEmails = new Set();

                  allQuotes?.forEach((quote) => {
                      if (quote?.contact?.source?.id) {
                          uniqueContactSourceIds.add(quote.contact.source.id);
                      } 
                      if (quote?.contact?.email) {
                          uniqueContactEmails.add(quote.contact.email);
                      }
                  });

                  const contactSourceIds = [...uniqueContactSourceIds];
                  const contactEmails = [...uniqueContactEmails];

                  return {
                      contactSourceIds: contactSourceIds,
                      contactEmails: contactEmails,
                      quotes: allQuotes,
                      total:allQuotes?.length
                  };
              };
