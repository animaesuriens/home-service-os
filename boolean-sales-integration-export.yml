                      - action:
                          key: runCode
                          component:
                            isPublic: true
                            key: code
                            version: LATEST
                        description: ''
                        inputs:
                          code:
                            type: value
                            value: >-
                              module.exports = async ({ logger, configVars },
                              stepResults) => {
                                const quoteData = stepResults.trigger.results.body.data
                                const originalDealData = stepResults.getDeal.results?.results?.[0] || ""
                                const coCount = stepResults.getCoCount?.results?.count
                                const dealStage = stepResults.dealStageLogic.results
                                const dealPropertiesObject = stepResults.listDealPropertiesObject.results
                                const originalProps = pickOriginalProperties(originalDealData, dealPropertiesObject);

                                // Extract data from associations with safeguards
                                const contactId = stepResults.getContactAssociation?.results?.results?.[0]?.to?.[0]?.id || "";
                                const companyId = stepResults.getCompanyAssociation?.results?.results?.[0]?.to?.[0]?.id || "";
                                const coData = stepResults.coHoursAndAmount?.results || {};

                                const overrideProps = {
                                  contract_type:   "Addendum - Change Order",
                                  change_order_type: "Sales",
                                  dealname: originalDealData.properties?.dealname.trim() + "_CO-" + coCount,
                                  ready_to_process_send_to_production: "Yes",
                                  dealstage: dealStage,

                                  // change order amounts
                                  amount:                           coData.coAmount         || 0,
                                  hours___contract:                 coData.coHours          || 0,
                                  labor_expense___contract:         coData.coLabor          || 0,
                                  material_expense___contract:      coData.coMaterials      || 0,
                                  discount_amount:                  coData.coDiscount       || 0,

                                  // quoteData → billing
                                  billing_city:                     quoteData?.billingContact?.city      || "",
                                  billing_contact_email:            quoteData?.billingContact?.email     || "",
                                  billing_contact_first_name:       quoteData?.billingContact?.firstName || "",
                                  billing_contact_last_name:        quoteData?.billingContact?.lastName  || "",
                                  billing_contact_phone:            quoteData?.billingContact?.phoneNumber || "",
                                  billing_street_address:           quoteData?.billingContact?.address   || "",
                                  billing_state:                    quoteData?.billingContact?.state     || "",
                                  billing_postal_code:              quoteData?.billingContact?.zip       || "",

                                  // quoteData → job contact
                                  job_contact_first_name:           quoteData?.contact?.firstName || "",
                                  job_contact_last_name:            quoteData?.contact?.lastName  || "",
                                  job_contact_email:                quoteData?.contact?.email     || "",
                                  job_contact_phone:                quoteData?.contact?.phoneNumber || "",

                                  // quoteData → job address
                                  job_identifier:                   quoteData?.jobAddress?.identifier || "",
                                  job_site_street_address:          quoteData?.jobAddress?.address    || "",
                                  job_site_city:                    quoteData?.jobAddress?.city       || "",
                                  job_site_state:                   quoteData?.jobAddress?.state      || "",
                                  job_site_postal_code:             quoteData?.jobAddress?.zip        || "",

                                  // quoteData → totals & URLs
                                  paintscout_estimate_amount:       quoteData?.totals?.afterDiscount    || 0,
                                  tax:                              quoteData?.tax?.total               || 0,
                                  description:                      originalDealData.properties?.description  || "",
                                  hubspot_owner_id:                 originalDealData.properties?.hubspot_owner_id || ""
                                }

                                const properties    = { ...originalProps, ...overrideProps };

                                // Filter out undefined properties
                                const filteredProperties = Object.fromEntries(
                                  Object.entries(properties).filter(([key, value]) => value != "" && value != null)
                                );

                                // Build the payload
                                const payload = {
                                  associations: [
                                    {
                                      types: [
                                        {
                                          associationCategory: "HUBSPOT_DEFINED",
                                          associationTypeId: 3, // Contact association
                                        },
                                      ],
                                      to: {
                                        id: contactId,
                                      },
                                    },
                                    ...(companyId
                                      ? [
                                          {
                                            types: [
                                              {
                                                associationCategory: "HUBSPOT_DEFINED",
                                                associationTypeId: 341, // Company association
                                              },
                                            ],
                                            to: {
                                              id: companyId,
                                            },
                                          },
                                        ]
                                      : []),
                                  ],
                                  properties: filteredProperties,
                                };

                                // Log the payload for debugging
                                logger.info("Payload for HubSpot API:", JSON.stringify(payload, null, 2));

                                return payload;
                              };



                              function pickOriginalProperties(originalDealData,
                              propDefs) {
                                const base = originalDealData.properties || {};
                                return propDefs.reduce((acc, d) => {
                                  const { name, calculated, modificationMetadata } = d;
                                  const { readOnlyValue, readOnlyDefinition } = modificationMetadata;
                                  const val = base[name];

                                  // skip if  
                                  //  • calculated formula  
                                  //  • explicitly readOnlyValue  
                                  //  • or readOnlyDefinition (system timestamp fields like createdate/closedate)
                                  if (calculated || readOnlyValue || readOnlyDefinition) {
                                    return acc;
                                  }

                                  if (val !== undefined && val !== null && val !== '') {
                                    acc[name] = val;
                                  }
                                  return acc;
                                }, {});
                              }
