                        logger.log("Deal Stages:", dealStages);

                        let wonStage = configVars["Sales Won"];
                        let lostStage = configVars["Sales Lost"];
                        let condition = false; // Assume true, change to false if a stage is not Won/Lost
                        let coDealId;

                        // Iterate over each dealStage item
                        for (let dealStage of dealStages) {
                          // Split into dealId and stageId
                          let [dealId, stageId] = dealStage.split(":");
                          // Check if the stageId is neither Won nor Lost
                          if (stageId !== wonStage && stageId !== lostStage) {
                            condition = true;  // At least one stage is not Won or Lost
                            coDealId = dealId;  // Collect the dealId
                            break
                          }
                        }

                        logger.log("Deal IDs to Process:", coDealId);
                        logger.log("Condition:", condition);

                        return {
                          condition,
                          coDealId
                        };
                      };
