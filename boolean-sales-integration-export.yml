    dataType: jsonForm
    defaultValue: ''
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection }) => {
              try {

                  let dealGroupName = context?.configVars["Deal Group Name"]?.dealGroups?.map(item => item?.groupName) || []
                  let contactGroupName = context?.configVars["Contact Group Name"]?.contactGroups?.map(item => item?.groupName) || []
                  let companyGroupName = context?.configVars["Company Group Name"]?.companyGroups?.map(item => item?.groupName) || []

                  const access_token = connection.fields.accessToken;
                  const headers = { Authorization: `Bearer ${access_token}` };

                  // 1) Fetch HubSpot property lists
                  const [dealProps, contactProps, companyProps] = await Promise.all([
                      fetch("https://api.hubapi.com/crm/v3/properties/deals", {
                          headers,
                      }).then((r) => r.json()),
                      fetch("https://api.hubapi.com/crm/v3/properties/contacts", {
                          headers,
                      }).then((r) => r.json()),
                      fetch("https://api.hubapi.com/crm/v3/properties/companies", {
                          headers,
                      }).then((r) => r.json()),
                  ]);

                  const dealFields = (dealProps.results || []).filter(
                  (p) => dealGroupName.includes(p.groupName)
                  );

                  const contactFields = (contactProps.results || []).filter(
                  (p) => contactGroupName.includes(p.groupName)
                  );

                  const companyFields = (companyProps.results || []).filter(
                  (p) => companyGroupName.includes(p.groupName)
                  );

                  const ar1 = dealFields.map((p) => ({
                      title: `${p.label} (Deal)`,
                      const: p.name,
                  }));

                  const ar2 = contactFields.map((p) => ({
                      title: `${p.label} (Contact)`,
                      const: `${p.name}_contact`,
                  }));

                  const ar3 = companyFields.map((p) => ({
                      title: `${p.label} (Company)`,
                      const: `${p.name}_company`,
                  }));

                  const hubspotAccountFields = [...ar1, ...ar2, ...ar3].sort((a, b) =>
                      a.title.localeCompare(b.title)
                  );

                  // 3) Define your fixed PaintScout fields
                  const additionalFields = [
                      { title: "Company Name", const: "contact.company" },
                      { title: "Contact First Name", const: "contact.firstName" },
                      { title: "Contact Last Name", const: "contact.lastName" },
                      { title: "Contact Email", const: "contact.email" },
                      { title: "Contact Phone Number", const: "contact.phoneNumber" },
                      { title: "Contact Street", const: "contact.address" },
                      { title: "Contact City", const: "contact.city" },
                      { title: "Contact State", const: "contact.state" },
                      { title: "Contact Postal", const: "contact.zip" },
                      { title: "Billing First Name", const: "billingContact.firstName" },
                      { title: "Billing Last Name", const: "billingContact.lastName" },
                      { title: "Billing Email", const: "billingContact.email" },
                      {
                          title: "Billing Phone Number",
                          const: "billingContact.phoneNumber",
                      },
                      { title: "Billing Street", const: "billingContact.address" },
                      { title: "Billing City", const: "billingContact.city" },
                      { title: "Billing State", const: "billingContact.state" },
                      { title: "Billing Postal", const: "billingContact.zip" },
                      { title: "Job Street", const: "jobAddress.address" },
                      { title: "Job City", const: "jobAddress.city" },
                      { title: "Job Postal", const: "jobAddress.zip" },
                      { title: "Job State", const: "jobAddress.state" },
                  ];

                  // 4) Generate JSON Schema
                  const schema = {
                      type: "object",
                      properties: additionalFields.reduce((acc, { const: key }) => {
                          const propName = key.split(".").pop();
                          acc[key] = {
                              type: "array",
                              items: {
                                  type: "object",
                                  properties: {
                                      [propName]: {
                                          type: "string",
                                          oneOf: hubspotAccountFields.map((hf) => ({
                                              const: hf.const,
                                              title: hf.title,
                                          })),
                                      },
                                  },
                              },
                          };
                          return acc;
                      }, {}),
                  };

                  // 5) Generate UI Schema with ListWithDetail for per-item autocomplete
                  const uiSchema = {
                      type: "VerticalLayout",
                      elements: additionalFields.map(({ const: key, title }) => {
                          const propName = key.split(".").pop();
                          return {
                              type: "ListWithDetail",
                              scope: `#/properties/${key}`,
                              label: `PaintScout ${title}`,
                              options: {
                                  showSortButtons: true,
                                  detail: {
                                      type: "VerticalLayout",
                                      elements: [
                                          {
                                              type: "Control",
                                              scope: `#/properties/${propName}`,
                                              label: title,
                                              options: { autocomplete: true },
                                          },
                                      ],
                                  },
                              },
                          };
                      }),
                  };

                  const data = defaultValues();

                  console.log(
                      "Payload size:",
                      JSON.stringify({
                          schema,
                          uiSchema,
                          data,
                      }).length,
                      "bytes"
                  );

                  return Promise.resolve({
                      schema,
                      uiSchema,
                      data,
                  });
              } catch (error) {
                  console.log(error);
                  return {
                      schema: {},
                      uiSchema: {},
                      data: {},
                  };
