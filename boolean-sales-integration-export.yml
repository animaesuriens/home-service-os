                  (p) => dealGroupName.includes(p.groupName)
                  );


                  return (
                    dealFields?.map((property) => ({
                      title: `${property.label}`,
                      const: property.name + "",
                    })) || []
                  );
                } catch (error) {
                  console.error("Error fetching HubSpot fields:", error);
                  return [];
                }
              }
            
              let expectedPayloadFields = await fetchHubSpotFields();
            
              // Define schema with YouCanBook.Me fields and concatenation character
