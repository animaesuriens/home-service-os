                                                    const quoteStatus = psData.status || "";
                                                    const quoteDate = Number(psData.dates.quote) || 0; // Ensure quoteDate is a number
                                                    const quotePrice = psData.totals.price || 0;
                                                    const sentStage = configVars["Bid Sent"];
                                                    const acceptedStage = configVars["Customer Accepted Proposal"];
                                                    const bidScheduledStage = configVars["Bid Scheduled"];
                                                    const inProgressStage = configVars["Bid in Progress"];
                                                    const dealData = stepResults.getDeal.results;
                                                    const currentStage = dealData.properties.dealstage;

                                                    logger.log("Current Stage: ", currentStage)
                                                    logger.log("Current Status: ", quoteStatus)


                                                    let status = bidScheduledStage; // Default to Bid Scheduled

                                                    // Get today's date in epoch format at midnight
                                                    const todayEpoch = new Date().setHours(0, 0, 0, 0);

                                                    if (quoteStatus === "accepted") {
                                                      status = acceptedStage;
                                                    } else if (quoteStatus === "sent" || quoteStatus === "viewed") {
                                                      if (currentStage ==  bidScheduledStage || currentStage ==  inProgressStage) {
                                                        status = sentStage;
                                                      } else {
                                                        status = currentStage
                                                      }
                                                    } else {
                                                      // Flow Implementation using Epoch Comparison
                                                      if (quoteDate >= todayEpoch) {
                                                        // Quote Date is today or in the future
                                                        status = bidScheduledStage;
                                                      } else {
                                                        // Quote Date is before today
                                                        if (quotePrice > 0) {
                                                          status = inProgressStage;
                                                        } else {
                                                          status = bidScheduledStage;
                                                        }
                                                      }
                                                    }

                                                    logger.log(`Quote Date (Epoch): ${quoteDate}`);
                                                    logger.log(`Today (Epoch): ${todayEpoch}`);
                                                    logger.log(`Quote Price: ${quotePrice}`);
                                                    logger.log(`Determined Status: ${status}`);

                                                    // Return the status
                                                    return status;
                                                  };
