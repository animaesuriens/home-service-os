                            type: value
                            value: >
                              module.exports = async ({ logger, configVars },
                              stepResults) => {

                                let quoteData = stepResults?.trigger?.results?.body?.data
                                let ownerFirstName = quoteData?.owner?.firstName
                                let ownerEmail = quoteData?.owner?.email
                                let portalId = configVars["HubSpot Portal ID"]
                                let bcc = `${portalId}@bcc.hubspot.com`
                                let quoteNumber = quoteData?.number
                                let quoteUrl = quoteData?.urls?.quote
                                let quoteAfterDiscountAmount = quoteData?.totals?.afterDiscount
                                let workOrderUrl = quoteData?.urls?.workOrder
                                let dealData = stepResults?.createDealCo?.results
                                let dealId = dealData?.id
                                let originalDealData = stepResults?.getDeal?.results
                                let originalAmount = Number(parseFloat(originalDealData?.results[0]?.properties?.amount || 0).toFixed(2));
                                let newAmount = Number(parseFloat(dealData?.properties?.amount || 0).toFixed(2));
                                let changeOrderAmount = Number(parseFloat(dealData?.properties?.amount - originalDealData?.results[0]?.properties?.amount || 0).toFixed(2))

                                let payload = {
                                  "from": "Automation Alert - PaintScout to HubSpot",
                                  "to": ownerEmail,
                                  // "to": "rod@helloboolean.com",
                                  "cc": "",
                                  "bcc": bcc,
                                  "subject": `New Change Order Created for ${quoteNumber}`,
                                  "body": `<body>

                              <div class="container">
                                  <p>Hello <span class="highlight">${ownerFirstName}</span>,</p>

                                  <p>We just created a separate Change Order deal in HubSpot for the difference between the original PaintScout Quote and the current PaintScout Quote Amount.</p>

                                  <p>
                                      <strong>Original Contract Amount:</strong> $${originalAmount} <br>
                                      <strong>Change Order Deal Amount:</strong> $${newAmount} <br>
                                      <strong>Total Contract Amount:</strong> $${quoteAfterDiscountAmount}
                                  </p>

                                  <div class="links">
                                      <strong>Links:</strong><br>
                                      <a href="https://app.hubspot.com/contacts/${portalId}/deal/${originalDealData.results[0].id}">Original HubSpot Deal</a> <br>
                                      <a href="https://app.hubspot.com/contacts/${portalId}/deal/${dealId}">New HubSpot Deal</a><br>
                                      <a href="${quoteUrl}">PaintScout Quote</a>
                                  </div>

                                  <h3>Why am I receiving this?</h3>
                                  <p>Every time a quote is sent in PaintScout, the system checks the stage of the associated deal in HubSpot:</p>

                                  <ul>
                                      <li><strong>If the deal is in the Won Stage:</strong>
                                          <ul>
                                              <li>The system compares the current value of that quote to the current value of the deal in HubSpot.</li>
                                              <li>If the amounts are the same, nothing happens.</li>
                                              <li>If the amounts are different, a change order deal is created to represent that difference.</li>
                                          </ul>
                                      </li>
                                      <li><strong>If the deal is NOT in the Won Stage:</strong>
                                          <ul>
                                              <li>The system overwrites the existing deal amounts and information with the latest details from the quote.</li>
                                          </ul>
                                      </li>
                                  </ul>

                                  <div class="footer">
                                      Thanks!<br>
                                      <strong>Boolean Automation Team</strong>
                                  </div>
                              </div>


                              </body>

                              `,

                              quoteData,

                              originalDealData,

                              dealData
                                }
                                
                                return payload;
                              };
