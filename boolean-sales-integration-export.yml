defaultInstanceProfile: Default Instance Profile
definitionVersion: 7
description: >-
  This integration connects PaintScout and HubSpot to streamline quote
  management and sales processes. It automatically syncs PaintScout quotes with
  HubSpot, providing seamless access to detailed project estimates and client
  data for efficient follow-ups and improved sales tracking.
documentation: ''
endpointType: flow_specific
flows:
  - description: ''
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: true
    name: 00 Register Instance
    steps:
      - action:
          key: instanceDeploy
          component:
            isPublic: true
            key: management-triggers
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: Instance Deploy
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                return { data: configVars };
              };
        name: TNT Settings
      - action:
          key: createObject
          component:
            isPublic: true
            key: collection-tools
            version: LATEST
        description: ''
        inputs:
          keyValueInput:
            type: complex
            value:
              - name:
                  type: value
                  value: event
                type: value
                value: register
              - name:
                  type: value
                  value: uniqueId
                type: reference
                value: tntSettings.results.TNT - Blacklist Settings.tntTrigger
              - name:
                  type: value
                  value: instanceWebhookUrl
                type: reference
                value: instanceDeploy.results.webhookUrls.13 TNT Contact Flow
        name: Contact Tags Event
      - action:
          key: createObject
          component:
            isPublic: true
            key: collection-tools
            version: LATEST
        description: ''
        inputs:
          keyValueInput:
            type: complex
            value:
              - name:
                  type: value
                  value: event
                type: value
                value: register
              - name:
                  type: value
                  value: uniqueId
                type: reference
                value: tntSettings.results.Declined Stage
              - name:
                  type: value
                  value: instanceWebhookUrl
                type: reference
                value: instanceDeploy.results.webhookUrls.14 Cancelled Deal Sync
        name: Deal Stage Changes
      - action:
          key: create
          component:
            isPublic: true
            key: collection-tools
            version: LATEST
        description: ''
        inputs:
          items:
            type: complex
            value:
              - type: reference
                value: contactTagsEvent.results
              - type: reference
                value: dealStageChanges.results
        name: Create List
      - action:
          key: loopOverItems
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          items:
            type: reference
            value: createList.results
        name: Loop Over Items
        steps:
          - action:
              key: httpPost
              component:
                isPublic: true
                key: http
                version: LATEST
            description: ''
            inputs:
              connection:
                type: configVar
                value: ''
              data:
                type: reference
                value: loopOverItems.currentItem
              debugRequest:
                type: value
                value: 'false'
              headers:
                type: complex
                value: []
              ignoreSslErrors:
                type: value
                value: 'false'
              includeFullResponse:
                type: value
                value: 'false'
              maxRetries:
                type: value
                value: '0'
              queryParams:
                type: complex
                value: []
              responseType:
                type: value
                value: json
              retryDelayMS:
                type: value
                value: '0'
              retryOnAllErrors:
                type: value
                value: 'false'
              timeout:
                type: value
                value: ''
              url:
                type: configVar
                value: HubSpot Route Registration URL
              useExponentialBackoff:
                type: value
                value: 'false'
            name: Register webhooks
  - description: PaintScout > HubSpot | Process Quote - Estimate > Deal Sync
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 01 PaintScout > HubSpot | Process Quote - Estimate > Deal Sync
    steps:
      - action:
          key: schedule
          component:
            isPublic: true
            key: schedule-triggers
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: Trigger
        schedule:
          meta:
            scheduleType: minute
            timeZone: ''
          type: value
          value: '*/2 * * * *'
      - action:
          key: convertToEpoch
          component:
            isPublic: true
            key: datetime
            version: LATEST
        description: ''
        inputs:
          dateTimeInput:
            type: configVar
            value: Sync Deals After X Date
          displayEpochInSeconds:
            type: value
            value: 'false'
        name: Estimate Date To Sync
      - action:
          key: adjustDateTime
          component:
            isPublic: true
            key: datetime
            version: LATEST
        description: ''
        inputs:
          dateTimeInput:
            type: reference
            value: trigger.results.startedAt
          daysInput:
            type: value
            value: ''
          hoursInput:
            type: value
            value: ''
          minutesInput:
            type: value
            value: '-6'
          secondsInput:
            type: value
            value: ''
        name: Time X Minutes Ago
      - action:
          key: convertToEpoch
          component:
            isPublic: true
            key: datetime
            version: LATEST
        description: ''
        inputs:
          dateTimeInput:
            type: reference
            value: timeXMinutesAgo.results
          displayEpochInSeconds:
            type: value
            value: 'false'
        name: Time X Minutes Ago to Epoch
      - action:
          key: listQuotes
          component:
            isPublic: false
            key: paintScoutApi
            version: LATEST
        description: ''
        errorConfig:
          delaySeconds: 10
          errorHandlerType: retry
          ignoreFinalError: false
          maxAttempts: 2
          usesExponentialBackoff: false
        inputs:
          connection:
            type: configVar
            value: PaintScout Connection
          page:
            type: value
            value: '1'
          perPage:
            type: value
            value: '20'
          query:
            type: value
            value: query=sent&query=accepted&query=viewed&query=declined
          sort:
            type: value
            value: updated
          sortDir:
            type: value
            value: desc
        name: List Quotes
      - action:
          key: loopOverItems
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          items:
            type: reference
            value: listQuotes.results.rows
        name: Loop Over Quotes
        steps:
          - action:
              key: getQuote
              component:
                isPublic: false
                key: paintScoutApi
                version: LATEST
            description: ''
            errorConfig:
              delaySeconds: 5
              errorHandlerType: retry
              ignoreFinalError: false
              maxAttempts: 2
              usesExponentialBackoff: false
            inputs:
              connection:
                type: configVar
                value: PaintScout Connection
              id:
                type: reference
                value: loopOverQuotes.currentItem.id
            name: Get Quote
          - action:
              key: runCode
              component:
                isPublic: true
                key: code
                version: LATEST
            description: ''
            inputs:
              code:
                type: value
                value: >
                  module.exports = async ({ logger, configVars }, stepResults)
                  => {
                    let timestamp = stepResults?.getQuote?.results?.timestamp?.updated;
                    let quote = stepResults?.getQuote?.results?.dates?.quote;

                    let sent = stepResults?.getQuote?.results?.statusHistory?.sent?.timestamp;
                    let accepted = stepResults?.getQuote?.results?.statusHistory?.accepted?.timestamp;
                    let viewed = stepResults?.getQuote?.results?.statusHistory?.viewed?.timestamp;
                    let declined = stepResults?.getQuote?.results?.statusHistory?.declined?.timestamp;

                    let estimateDateToSync = stepResults?.estimateDateToSync?.results;
                    let timeXMinutesAgoToEpoch = stepResults?.timeXMinutesAgoToEpoch?.results;

                    const condition1 =
                      timestamp > timeXMinutesAgoToEpoch &&
                      quote > estimateDateToSync;

                    const condition2 =
                      sent > timeXMinutesAgoToEpoch ||
                      accepted > timeXMinutesAgoToEpoch ||
                      viewed > timeXMinutesAgoToEpoch ||
                      declined > timeXMinutesAgoToEpoch;

                    const result = condition1 || condition2;

                    return {
                      timestamp,
                      quote,
                      sent,
                      accepted,
                      viewed,
                      declined,
                      estimateDateToSync,
                      timeXMinutesAgoToEpoch,
                      result
                    };
                  };
            name: Time Stamp
          - action:
              key: branchOnExpression
              component:
                isPublic: true
                key: branch
                version: LATEST
            branches:
              - name: Past 6 Minutes
                steps:
                  - action:
                      key: writeLog
                      component:
                        isPublic: true
                        key: log
                        version: LATEST
                    description: ''
                    inputs:
                      level:
                        type: value
                        value: info
                      message:
                        type: value
                        value: Test
                    name: Write Log Message 4
                  - action:
                      key: runCode
                      component:
                        isPublic: true
                        key: code
                        version: LATEST
                    description: ''
                    inputs:
                      code:
                        type: value
                        value: >
                          module.exports = async ({ logger, configVars },
                          stepResults) => {
                            let estimatedDataToSync = stepResults?.estimateDateToSync?.results
                            let timeXMinutesAgo = stepResults?.timeXMinutesAgo?.results
                            let timeXMinutesAgoToEpoch = stepResults?.timeXMinutesAgoToEpoch?.results
                            let getQuote = stepResults?.getQuote?.results
                            return { 
                              estimatedDataToSync,
                              timeXMinutesAgo,
                              timeXMinutesAgoToEpoch,
                              getQuote
                             };
                          };
                    name: Process Payload
                  - action:
                      key: invokeFlow
                      component:
                        isPublic: true
                        key: cross-flow
                        version: LATEST
                    description: ''
                    inputs:
                      data:
                        type: reference
                        value: processPayload.results
                      flowName:
                        type: value
                        value: 01.1 Proccess Deal Sync
                    name: Invoke Flow
              - name: Else
                steps:
                  - action:
                      key: writeLog
                      component:
                        isPublic: true
                        key: log
                        version: LATEST
                    description: ''
                    inputs:
                      level:
                        type: value
                        value: info
                      message:
                        type: value
                        value: Not applicable for update.
                    name: Write Log Message 2
            description: ''
            inputs:
              conditions:
                type: complex
                value:
                  - name: Past 6 Minutes
                    type: complex
                    value:
                      - and
                      - - isTrue
                        - name: ''
                          type: reference
                          value: timeStamp.results.result
            name: Timestamp Branch
  - description: PaintScout > HubSpot | Process Quote - Estimate > Deal Sync
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: true
    name: 01.1 Proccess Deal Sync
    steps:
      - action:
          key: crossFlow
          component:
            isPublic: true
            key: cross-flow
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: Trigger
      - action:
          key: branchOnExpression
          component:
            isPublic: true
            key: branch
            version: LATEST
        branches:
          - name: Not Declined
            steps:
              - action:
                  key: writeLog
                  component:
                    isPublic: true
                    key: log
                    version: LATEST
                description: ''
                inputs:
                  level:
                    type: value
                    value: info
                  message:
                    type: reference
                    value: trigger.results.body.data.getQuote
                name: Quote Data
              - action:
                  key: branchOnExpression
                  component:
                    isPublic: true
                    key: branch
                    version: LATEST
                branches:
                  - name: If Accepted
                    steps:
                      - action:
                          key: rawRequest
                          component:
                            isPublic: true
                            key: hubspot
                            version: LATEST
                        description: >-
                          Unenroll contact to the sales follow-up sequence
                          created in HubSpot.
                        errorConfig:
                          delaySeconds: 10
                          errorHandlerType: retry
                          ignoreFinalError: true
                          maxAttempts: 2
                          usesExponentialBackoff: false
                        inputs:
                          connection:
                            type: configVar
                            value: HubSpot Private App Connection
                          data:
                            type: template
                            value: |-
                              {
                              "fields": [
                                  {
                                    "objectTypeId": "0-1",
