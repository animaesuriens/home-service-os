            steps:
              - action:
                  key: runCode
                  component:
                    isPublic: true
                    key: code
                    version: LATEST
                description: Contact hubspot note activity
                inputs:
                  code:
                    type: value
                    value: >
                      module.exports = async ({ logger, configVars },
                      stepResults) => {
                        try {
                          let body = stepResults?.http?.results?.body?.data;
                          let from_phone = stepResults?.hubspotPhoneFormatterFrom?.results;
                          let accessKey = configVars["HubSpot Private App Connection"].fields.accessToken;
                          let contact = stepResults?.getContact?.results?.results[0];
                          let contactId = contact?.id;

                          if (!accessKey) throw new Error("Missing HubSpot access token.");
                          if (!contactId) throw new Error("Contact ID not found.");

                          let noteContent = `From: ${from_phone|| "Unknown Sender"}<br/>To: ${body?.to || "Unknown Recipient"}<br/>Message: ${body?.text || "No message provided"}`;

                          const unixTimestamp = Math.floor(Date.now()); // ✅ UNIX timestamp in milliseconds

                          // 🔹 Step 1: Create a NOTE in HubSpot for Contact
                          const noteResponse = await fetch("https://api.hubapi.com/crm/v3/objects/notes", {
                            method: "POST",
                            headers: {
                              "Content-Type": "application/json",
                              Authorization: `Bearer ${accessKey}`,
                            },
                            body: JSON.stringify({
                              properties: {
                                hs_note_body: noteContent, // ✅ Corrected: Use hs_note_body
                                hs_timestamp: unixTimestamp, // ✅ Required: UNIX timestamp
                              },
                            }),
                          });

                          const noteData = await noteResponse.json();
                          if (!noteResponse.ok) {
                            throw new Error(`HubSpot API Error (NOTE Creation): ${noteData.message || "Unknown error"}`);
                          }

                          let noteId = noteData.id;
                          logger.info("✅ Note Created Successfully", noteData);

                          // 🔹 Step 2: Associate NOTE with CONTACT
                          const associateResponse = await fetch(
                            `https://api.hubapi.com/crm/v3/associations/note/contact/batch/create`,
                            {
                              method: "POST",
                              headers: {
                                "Content-Type": "application/json",
                                Authorization: `Bearer ${accessKey}`,
                              },
                              body: JSON.stringify({
                                inputs: [
                                  {
                                    from: { id: noteId },
                                    to: { id: contactId },
                                    type: "note_to_contact", // ✅ Corrected: Association Type to contact
                                  },
                                ],
                              }),
                            }
                          );

                          const associateData = await associateResponse.json();
                          if (!associateResponse.ok) {
                            throw new Error(`HubSpot API Error (Association): ${associateData.message || "Unknown error"}`);
                          }

                          logger.info("✅ Note Successfully Associated with Contact", associateData);

                          return {
                            data: {
                              note: noteData,
                              association: associateData,
                            },
                          };

                        } catch (error) {
                          logger.error("❌ Error:", error.message);
                          return { error: error.message };
                        }
                      };
