configPages:
  - elements:
      - type: htmlElement
        value: >
          <!doctype html>

          <html lang="en">

          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>V77 – Sales Integration (BETA)</title>
          </head>

          <body style="font-family: Arial, Helvetica, sans-serif;
          line-height:1.5; margin:24px; color:#111">
            <header style="margin-bottom:18px;">
              <h1 style="margin:0 0 6px 0; font-size:22px;">📣 New BETA Version Published 📣</h1>
              <div style="font-size:14px; color:#333">
                <strong>Version:</strong> V77 – Sales Integration<br>
                <strong>Date:</strong> 10/06/2025 MDT
              </div>
            </header>

            <main>
              <section style="margin-bottom:20px;">
                <h2 style="margin:0 0 8px 0; font-size:18px;">Feature: Config Wizard – PaintScout Default Values Settings</h2>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Problem</h3>
                <ul style="margin:0 0 0 18px; padding:0;">
                  <li style="margin:6px 0;">🔸 On Page 5 of the Config Wizard (<strong>“PaintScout Default Values Settings”</strong>), the process could not proceed when HubSpot properties contained too many fields, resulting in the error: <em>“Maximum call stack size exceeded.”</em></li>
                </ul>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Solution</h3>
                <ul style="margin:0 0 0 18px; padding:0;">
                  <li style="margin:6px 0;">🔸 Added multi-pick list options for <strong>Deal Group Name</strong>, <strong>Contact Group Name</strong>, and <strong>Company Group Name</strong>.</li>
                  <li style="margin:6px 0;">🔸 Users can now select which properties under these group names should appear in the dropdown on Page 5.</li>
                </ul>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Test</h3>
                <p style="margin:0;">🔸 Verified during development. The API response for fetching properties in Flow 5 was successfully filtered and no longer triggers the error.</p>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Notes</h3>
                <p style="margin:0;">🔸 This is a <strong>beta version</strong>. PGN Paragon will be used for beta testing.</p>
              </section>
            </main>

            <footer style="margin-top:20px; font-size:13px; color:#444">
              <em>Generated: 10/06/2025 MDT</em>
            </footer>
          </body>

          </html>
