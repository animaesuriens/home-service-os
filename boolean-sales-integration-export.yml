        branches:
          - name: Deal Found
            steps:
              - action:
                  key: runCode
                  component:
                    isPublic: true
                    key: code
                    version: LATEST
                description: ''
                inputs:
                  code:
                    type: value
                    value: >-
                      module.exports = async ({ logger, configVars },
                      stepResults) => {
                        const deal = stepResults?.getDeal?.results || {};
                        const contact = stepResults?.getContact?.results || {};
                        const company = stepResults?.getCompany?.results || {};

                        let config = configVars["HubSpot Objects to PaintScout Quote"];
                        if (typeof config === "string") {
                          config = JSON.parse(config);
                        }

                        const entities = { deal, contact, company };
                        const result = {};

                        for (const [section, fields] of Object.entries(config)) {
                          result[section] = {};

                          for (const [fieldName, fallbacks] of Object.entries(fields)) {
                            let value = "";

                            for (const fallback of fallbacks) {
                              const key = Object.values(fallback)[0]; // e.g., "email_contact" or "job_contact_email"
                              const candidate = getFieldValue(key, entities);
                              if (candidate && candidate.trim() !== "") {
                                value = candidate;
                                break;
                              }
                            }

                            result[section][fieldName] = value;
                          }
                        }

                        logger.log("PaintScout Payload:", result);
                        return result;
                      };


                      function getFieldValue(key, { deal, contact, company }) {
                        if (key.endsWith("_contact")) {
                          const field = key.replace(/_contact$/, "");
                          return contact?.properties?.[field] || "";
                        }

                        if (key.endsWith("_company")) {
                          const field = key.replace(/_company$/, "");
                          return company?.properties?.[field] || "";
                        }

                        // Default to deal
                        return deal?.properties?.[key] || "";
                      }
