      - type: htmlElement
        value: |-
          <details>
            <summary><strong>Short Code Setup</strong></summary>
            <p>
              Defines the mapping between internal field names and YCBM short codes.<br><br>
              <ul>
                <li><strong>Each key</strong> should match a key used in the <em>Notification Payload</em> (e.g., <code>jobFirstName</code>).</li>
                <li><strong>Each value</strong> should be the YCBM short code without the bracket (e.g., <code>FNAME</code>).</li>
              </ul>
              <strong>Example:</strong>
              <pre><code>{
            "jobFirstName": "FNAME",
            "jobEmail": "EMAIL"
          }</code></pre>
            </p>
          </details>
      - type: configVar
        value: Short Code Setup
      - type: htmlElement
        value: |-
          <details>
            <summary><strong>Notification Payload</strong></summary>
            <p>
              Defines the data structure used when processing YCBM bookings.<br><br>
              <ul>
                <li><strong>Each key</strong> is a user-friendly label (e.g., shown in a UI mapping dropdown).</li>
                <li><strong>Each value</strong> is the internal YCBM field key (e.g., <code>jobFirstName</code>).</li>
              </ul>
              <strong>Example:</strong>
              <pre><code>{
            "Job First Name": "jobFirstName",
            "Job Last Name": "jobLastName"
          }</code></pre>
            </p>
          </details>
      - type: configVar
        value: Notification Payload
      - type: htmlElement
        value: <h1>Marketing Vendor Setup</h1>
      - type: htmlElement
        value: >-
          <details>
            <summary><strong>Multiple Lead Payload</strong></summary>
            <p>
              Defines the JSON structure for mapping multiple leads from a marketing vendor.<br><br>
              <ul>
          <li>Each key represents the vendor name, e.g.
          <code>go_high_level</code>.</li>
                <li>Each value is the sample data that the vendor's sent through webhook via JSON.</li>
              </ul>
              <strong>Example JSON data:</strong>
              <pre><code>{
            "firstName": "John",
            "lastName": "Doe",
            "ghl_source": "johndoe@example.com"
          }</code></pre>
            </p>
          </details>
      - type: configVar
        value: Multiple Lead Payload
      - type: htmlElement
        value: |-
          <details>
            <summary><strong>Vendor Unique Identifier</strong></summary>
            <p>
              JSON form defining how to extract the unique identifier from the incoming marketing vendor JSON payload.<br><br>
              This is used to match each lead submission to the correct marketing vendor setup.
              <br><br>
              <strong>Expected Format:</strong>
              <table border="1" cellpadding="6" cellspacing="0" style="border-collapse: collapse;">
                <thead>
                  <tr>
                    <th>Key</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><code>vendor_id</code></td>
                    <td><code>vendor_unique_key</code></td>
                  </tr>
                </tbody>
              </table>

              <br>
              You would notice that in the <strong>Multiple Lead Payload</strong> field, there should be a key that represents the <code>vendor_unique_key</code> that identifies which vendor the JSON belongs to.

              <br><br>
              <strong>Example Mapping:</strong>
              <table border="1" cellpadding="6" cellspacing="0" style="border-collapse: collapse;">
                <thead>
                  <tr>
                    <th>Key (Vendor Name)</th>
                    <th>Value (Unique Key in Payload)</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><code>go_high_level</code></td>
                    <td><code>ghl_source</code></td>
                  </tr>
                </tbody>
              </table>
            </p>
          </details>
