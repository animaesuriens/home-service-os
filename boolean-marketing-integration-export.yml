                                  dealProps.job_site_street_address,
                                  contactData.address,
                                  dealProps.billing_street_address,
                                  ""
                                );
                                payload.jobCity = ifempty(
                                  dealProps.job_site_city,
                                  contactData.city,
                                  dealProps.billing_city,
                                  ""
                                );
                                payload.jobState = ifempty(
                                  dealProps.job_site_state,
                                  contactData.state,
                                  dealProps.billing_state,
                                  ""
                                );
                                payload.jobPostal = ifempty(
                                  dealProps.job_site_postal_code,
                                  contactData.zip,
                                  dealProps.billing_postal_code,
                                  ""
                                );
                                payload.billingFirstName = ifempty(
                                  dealProps.billing_contact_first_name,
                                  contactData.firstname,
                                  dealProps.job_contact_first_name
                                );
                                payload.billingLastName  = ifempty(
                                  dealProps.billing_contact_last_name,
                                  contactData.lastname,
                                  dealProps.job_contact_last_name
                                );
                                payload.billingEmail     = ifempty(
                                  dealProps.billing_contact_email,
                                  contactData.email,
                                  dealProps.job_contact_email
                                );
                                payload.billingStreet  = ifempty(
                                  dealProps.billing_street_address,
                                  companyData.address,
                                  contactData.address,
                                  dealProps.job_site_street_address
                                );
                                payload.billingCity   = ifempty(
                                  dealProps.billing_city,
                                  companyData.city,
                                  contactData.city,
                                  dealProps.job_site_city
                                );
                                payload.billingState   = ifempty(
                                  dealProps.billing_state,
                                  companyData.state,
                                  contactData.state,
                                  dealProps.job_site_state
                                );
                                payload.billingPostal  = ifempty(
                                  dealProps.billing_postal_code,
                                  companyData.zip,
                                  contactData.zip,
                                  dealProps.job_site_postal_code
                                );
                                payload.company = ifempty(
                                  dealProps.company_name,
                                  companyData.name
                                );
                                payload.companyName = ifempty(
                                  dealProps.company_name,
                                  companyData.name
                                );

                                const [
                                  teamPhone,
                                  jobPhone,
                                  billingPhone
                                ] = await Promise.all([
                                  lookupPhoneNumber(ownerData.fields["Phone Number"] || ""),
                                  lookupPhoneNumber(
                                    ifempty(
                                      dealProps.job_contact_phone,
                                      contactData.mobilephone,
                                      contactData.phone,
                                      ""
                                    )
                                  ),
                                  lookupPhoneNumber(
                                    ifempty(
                                      dealProps.billing_contact_phone,
                                      contactData.mobilephone,
                                      contactData.phone,
                                      dealProps.job_contact_phone
                                    )
                                  )
                                ]);

                                payload.teamPhone = teamPhone;
                                payload.jobPhone = jobPhone;
                                payload.billingPhone = billingPhone;

                                // Apply shortcode mapping
                                const withCalendarData = applyShortcodes(payload, shortCodes);
                                logger.log("Final payload:", payload);
                                logger.log("Shortcoded payload:", withCalendarData);

                                // Build your final URL
                                const encodedData = new URLSearchParams(withCalendarData).toString();
                                const location    = `${ycbmUrl}?${encodedData}`;

                                return {
                                  location,
                                  noCalendar: payload
                                };
                              };


                              // Helper: translate your field keys into the YCBM
                              shortcode names

                              function applyShortcodes(dealData, shortcodeMap) {
                                const output = {};
                                for (const [key, value] of Object.entries(dealData)) {
                                  const sc = shortcodeMap[key];
                                  if (sc && value != null && value !== "") {
                                    output[sc] = value;
                                  }
                                }
                                return output;
                              }
