                        const lastName = trigger["jobLastName"];
                        const dealStage = trigger["dealStage"] || configVars["Bid Scheduled"]
                        const projectType = stepResults.lookupProjectType.results || ""
                        // loop through each property key/value
                        for (const [key, value] of Object.entries(initialPayload.properties)) {
                          if (typeof value !== 'string') continue;

                          const lowerKey = key.toLowerCase();

                          // if the key contains "email", extract the first email found
                          if (lowerKey.includes('email')) {
                            const emails = extractEmails(value);
                            initialPayload.properties[key] = emails.length > 0 ? emails[0] : '';
                            logger.log(`Normalized ${key}:`, initialPayload.properties[key]);
                          }

                          // if the key contains "phone", normalize to E.164
                          if (lowerKey.includes('phone')) {
                            const normalized = normalizePhone(value);
                            initialPayload.properties[key] = normalized || '';
                            logger.log(`Normalized ${key}:`, initialPayload.properties[key]);
