                                        propertyName: "email",
                                        operator: "EQ",
                                        value: email,
                                      },
                                    ],
                                  },
                                ],
                                properties, // request only these properties
                                limit: 1,
                              }),
                            });

                            if (!response.ok) throw new Error(`Failed to search contact by email: ${response.statusText}`);
                            const data = await response.json();
                            contact = data.results?.[0] || null;
                          } else {
                            throw new Error("No contactId or email provided");
                          }

