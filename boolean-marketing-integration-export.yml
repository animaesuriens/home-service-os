                        let firstName = ycbmData["jobFirstName"] || "Unknown";
                        let lastName = ycbmData["jobLastName"] || "";
                        let address = `${ycbmData["jobStreet"] || ""}, ${ycbmData["jobCity"] || ""}, ${ycbmData["jobState"] || ""} ${ycbmData["jobPostal"] || ""}`.trim();
                        let company = ycbmData["company"] || "N/A";
                        let phone = ycbmData["jobPhone"] || "N/A";
                        let email = ycbmData["jobEmail"] || "N/A";

                        // Construct a detailed description
                        let fullDescription = `
                          ${description}\n\n
                          Client: ${firstName} ${lastName}\n
                          Company: ${company}\n
                          Phone: ${phone}\n
                          Email: ${email}\n
                          Location: ${address}\n
                          Scheduled By: ${ycbmData["appointmentScheduledBy"] || "Unknown"}
                        `.trim();

                        // Define the payload for the Google Calendar event
                        let payload = {
                          "summary": summary,
                          "start": {
