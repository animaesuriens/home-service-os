                  <pre class="ycbm-glossary__example">
          Hello {CUSTOMER}, This is from {CONTACT_OWNER} at {COMPANY_NAME}. 

          Your phone number is {CUSTOMER_PHONE}.

          Click the link below to schedule your calendar appointment:
          {YCBM_LINK}
                  </pre>
