        name: Deal Properties
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const deal_id = stepResults?.trigger?.results?.queryParameters?.deal_id;
                const access_token = configVars['HubSpot Private App Connection']?.fields?.accessToken;
                const deal_properties = stepResults?.dealProperties?.results
                const propertiesParam = deal_properties?.join(",") || "";
                if (!deal_id) {
                  logger.error("Deal ID is missing.");
                  return { error: "Missing deal_id" };
                }

                const authHeaders = {
                  Authorization: `Bearer ${access_token}`,
                  "Content-Type": "application/json"
                };

                try {
                  //
                  // 🔹 Get deal details along with associations limited to 1
                  //
                  const dealUrl = `https://api.hubapi.com/crm/v3/objects/deals/${deal_id}?properties=${propertiesParam}&associations=contacts,companies&limit=1`;
                  const dealResp = await fetch(dealUrl, { headers: authHeaders });
                  const dealData = await dealResp.json();

                  const contactId = dealData?.associations?.contacts?.results?.[0]?.id ?? null;
                  const companyId = dealData?.associations?.companies?.results?.[0]?.id ?? null;

                  logger.info(`Primary Contact => ${contactId || "None"}`);
                  logger.info(`Primary Company => ${companyId || "None"}`);

                  //
                  // 🔹 Parallel fetch: contact + company full details (first only)
                  //
                  const requests = [];

                  if (contactId) {
                    requests.push(
                      fetch(`https://api.hubapi.com/crm/v3/objects/contacts/${contactId}?properties=firstname,lastname,email,phone,address,city,state,zip,company,mobilephone`, {
                        headers: authHeaders
                      }).then(res => res.json())
                    );
                  } else {
                    requests.push(Promise.resolve(null));
                  }

                  if (companyId) {
                    requests.push(
                      fetch(`https://api.hubapi.com/crm/v3/objects/companies/${companyId}?properties=name,domain,website`, {
                        headers: authHeaders
                      }).then(res => res.json())
                    );
                  } else {
                    requests.push(Promise.resolve(null));
                  }

                  const [contactDetails, companyDetails] = await Promise.all(requests);

                  return {
                    deal: dealData,
                    contact: contactDetails,
                    company: companyDetails,
                    deal_properties
                  };

                } catch (error) {
                  logger.error(error);
                  return { error: error.message };
                }
              };
