            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |


              module.exports = async ({ logger, configVars }, stepResults) => {
                const dealStage = stepResults?.http?.results?.body?.data?.dealStage;
                const hubspotToken = configVars["HubSpot Private App Connection"]?.fields?.accessToken;
                const marketingPipelineId = configVars['HubSpot Marketing Pipeline'];

                // Fetch pipeline stages dynamically from HubSpot
                const res = await fetch(`https://api.hubapi.com/crm/v3/pipelines/deals/${marketingPipelineId}`, {
                  headers: {
                    Authorization: `Bearer ${hubspotToken}`,
                    "Content-Type": "application/json",
                  },
                });

                if (!res.ok) {
                  throw new Error(`Failed to fetch pipeline: ${res.status} ${res.statusText}`);
                }

                const pipelineData = await res.json();
                const stages = pipelineData?.stages?.map(stage => stage.id) || [];

                const isMarketingPipelineStage = stages.includes(dealStage);

                return {
                  data: {
                    dealStage,
                    marketingPipelineId,
                    isMarketingPipelineStage,
                    pipelineData
                  },
                };
              };
        name: Check Deal Stage
