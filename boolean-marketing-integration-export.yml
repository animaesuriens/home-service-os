            version: LATEST
        description: Search Contact by email
        errorConfig:
          delaySeconds: 10
          errorHandlerType: retry
          ignoreFinalError: true
          maxAttempts: 1
          usesExponentialBackoff: false
        inputs:
          additionalProperties:
            type: complex
            value: []
          archived:
            type: value
            value: 'false'
          associationsList:
            type: complex
            value: []
          contactEmail:
            type: reference
            value: trigger.results.body.data.properties.email
          contactId:
            type: value
            value: ''
          hubspotConnection:
            type: configVar
            value: HubSpot Private App Connection
          timeout:
            type: value
            value: ''
        name: Search Contact by email
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                let dealById = stepResults?.searchContactById?.results
                let dealByEmail = stepResults?.searchContactByEmail?.results?.results?.[0] || {}

                if(dealById?.id){
                  return dealById
                }
                return dealByEmail
              };
        name: Select Executed Step Result
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const overridePayload = stepResults?.overridePayload?.results || {};
                const contactData = stepResults?.selectExecutedStepResult?.results || {};

                const formatPhone = (phone) => {
                  if (!phone) return phone;

                  // Skip if already formatted correctly
                  if (phone.startsWith("+1 (") || phone.includes("(")) return phone;

                  // Extract only digits
                  const digits = phone.replace(/\D/g, "");

                  // If it starts with 1 and has at least 11 digits
                  if (digits.startsWith("1") && digits.length >= 11) {
                    const area = digits.slice(1, 4);
                    const prefix = digits.slice(4, 7);
                    const line = digits.slice(7, 11);
                    return `+1 (${area}) ${prefix}-${line}`;
                  }

                  // If exactly 10 digits
                  if (digits.length === 10) {
                    const area = digits.slice(0, 3);
                    const prefix = digits.slice(3, 6);
                    const line = digits.slice(6, 10);
                    return `+1 (${area}) ${prefix}-${line}`;
                  }

                  return phone;
                };

                // Merge objects with overridePayload taking priority
                const merged = {
                  ...contactData,
                  ...overridePayload,
                  properties: {
                    ...contactData?.properties,
                    ...overridePayload?.properties,
                  },
                };

                // Set of emojis to check against
                const iconOptions = new Set([
                  "🧨","🔥","⚡️","💥","🚨","❌","⭕️","🛑","⚫️","🔴","🔵","🟢","🟡","🟣","🟤",
                  "😀","😅","😂","🤣","😊","😍","😎","🥳","😭","😡","😴","🤔","😇",
                  "💪","👍","👎","👏","🙏","🤝","👊","✌️","👌","🤙",
                  "🌞","🌙","⭐️","🌈","☁️","🌧️","⛈️","🌪️","🌊","🌋",
                  "💎","💰","💼","📱","💻","📸","🎯","🎁","🚀","🏆",
                ]);

                // Function to check if string contains any emoji from iconOptions
                const hasListedEmoji = (str) => {
                  if (typeof str !== "string") return false;
                  for (const icon of iconOptions) {
                    if (str.includes(icon)) return true;
                  }
                  return false;
                };

                // Remove firstName / lastName from properties if they contain emojis
                logger.info('contactData:',contactData)
                if (hasListedEmoji(contactData?.properties?.firstname)) {
                  delete merged?.properties?.firstname;
                }
                if (hasListedEmoji(contactData?.properties?.lastname)) {
                  delete merged?.properties?.lastname;
                }

                // Format any phone-like field inside merged.properties
                if (merged?.properties) {
                  for (const key in merged.properties) {
                    if (key.toLowerCase().includes("phone")) {
                      merged.properties[key] = formatPhone(merged.properties[key]);
                    }
                  }
                }

                // Remove read-only HubSpot fields
                const readOnlyFields = [
                  "hs_object_id",
                  "createdate",
                  "hs_lastmodifieddate",
                  "hs_all_contact_vids",
                  "hs_additional_emails",
                  "hs_is_contact",
                  "hs_object_source",
                ];

                for (const field of readOnlyFields) {
                  delete merged.properties?.[field];
                }

                return { data: merged };
              };
        name: Merged Payload
      - action:
          key: branchOnExpression
          component:
            isPublic: true
            key: branch
            version: LATEST
