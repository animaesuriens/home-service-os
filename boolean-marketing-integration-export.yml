              module.exports = async ({ logger, configVars }, stepResults) => {
                let properties = stepResults.retrieveDealProperties.results.results;
                // This is an assumption based on the context of your request.
                // Replace this with the actual source for automation_required
                const automation_required = ["automation_required"];

                logger.info(properties)
                // Filter properties
                let propNames = properties
                  .filter(
                    (prop) =>
                      // Exclude "deal_activity" group
                      prop.groupName !== "deal_activity" &&
                      // Include "dealstage" and "pipeline" properties explicitly,
                      // OR exclude "dealstages" group,
                      // OR include if the groupName is in the automation_required array
                      (
                        prop.name === "dealstage" ||
                        prop.name === "pipeline" ||
                        prop.groupName !== "dealstages" ||
                        automation_required.includes(prop.groupName) // <-- ADDED OR CONDITION HERE
                      )
                  )
