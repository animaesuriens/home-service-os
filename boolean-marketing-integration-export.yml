    description: >-
      A label used to categorize and organize deal properties into groups for
      easier tracking, reporting, and management. The group names entered here
      will also appear as selectable options in the ‘HubSpot Objects to
      PaintScout Quote’ mapping dropdown.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {
            const access_token = connection.fields.accessToken;
            const headers = { Authorization: `Bearer ${access_token}` };

            // Fetch deal group names
            const dealGroupResponse = await fetch("https://api.hubapi.com/crm/v3/properties/deals/groups", {
              headers,
            }).then((r) => r.json());

            // Extract group names from response
            const dealGroupNames = (dealGroupResponse?.results || []).map(group => group.name);

            // Build schema with dropdown
           const schema = {
               type: "object",
               properties: {
                   dealGroups: {
                       type: "array",
                       items: {
                           type: "object",
                           properties: {
                               groupName: {
                                   type: "string",
                                   enum: dealGroupNames,
                               },
                           },
                       },
                   },
               },
           };

            const uiSchema = {
                type: "VerticalLayout",
                elements: [
                    {
                        type: "Control",
                        scope: "#/properties/dealGroups",
                        options: { elementLabelProp: "groupName" },
                    },
                ],
            };
            // Example default data
            const data = {
                dealGroups: [
                    { groupName: "job_properties" },
                    { groupName: "deal_revenue" },
                    { groupName: "dealinformation" }
                ],
            };

            return Promise.resolve({
              schema,
              uiSchema,
              data,
            });
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
