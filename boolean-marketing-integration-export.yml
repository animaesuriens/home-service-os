  - dataSource:
      key: runCodeJsonForm
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    description: >-
      Maps fields from the Multiple Lead Payload JSON to both HubSpot Contact
      and Deal records — typically used when the payload is coming from a
      HubSpot form submission. This ensures that relevant contact details are
      also passed to the associated deal.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {

              const {
              fields: { accessToken },
              } = connection;

              // Fetch HubSpot deal properties
              const contactPropertiesResponse = await fetch(
              "https://api.hubapi.com/crm/v3/properties/contacts",
              { method: "GET", headers: { Authorization: `Bearer ${accessToken}` } }
              );

              let contactGroupName = context?.configVars["Contact Group Name"]?.contactGroups?.map(item => item?.groupName) || []
              let dealGroupName = context?.configVars["Deal Group Name"]?.dealGroups?.map(item => item?.groupName) || []

              const contactData = await contactPropertiesResponse.json();
              const contactProperties = (contactData.results || []).filter(
              (p) => contactGroupName.includes(p.groupName)
              );
              
              const hubSpotContact = contactProperties
                  //.filter((property) => property.groupName !== "emailinformation" && property.groupName !== "contactlcs" && property.groupName !== "analyticsinformation")
                  .map((property) => ({
                  title: property.label + ' (Contact Property)',
                  const: property.name,
                  }))
                  .sort((a, b) => (a.title < b.title ? -1 : 1));

              const dealPropertiesResponse = await fetch(
              "https://api.hubapi.com/crm/v3/properties/deals",
              { method: "GET", headers: { Authorization: `Bearer ${accessToken}` } }
              );

              const dealData = await dealPropertiesResponse.json();
              const dealProperties = (dealData.results || []).filter(
              (p) => dealGroupName.includes(p.groupName)
              );

              const hubSpotDeal = dealProperties
                  //.filter((property) => property.groupName !== "dealstages" && property.groupName !== "deal_activity")
                  .map((property) => ({
                  title: property.label + ' (Deal Property)',
                  const: property.name,
                  }))
                  .sort((a, b) => (a.title < b.title ? -1 : 1));
              
              const schema = {
                  type: "array",
                  items: {
                      type: "object",
                      properties: {
                          source: {
                              type: "string",
                              oneOf: hubSpotContact,
                          },
                          destination: {
                              type: "string",
                              oneOf: hubSpotDeal,
                          },
                      },
                      required: ["source", "destination"],
                  },
              };

              const uiSchema = {
                  type: "Control",
                  label: "Properties",
                  scope: "#",
                  options: {
                      layout: "Accordion",
                      detail: {
                          type: "HorizontalLayout",
                          elements: [
                              {
                                  type: "Control",
                                  scope: "#/properties/source",
                                  options: {
                                      autocomplete: true,
                                  },
                                  label: "Contact Properties",
                              },
                              {
                                  type: "Control",
                                  scope: "#/properties/destination",
                                  options: {
                                      autocomplete: true,
                                  },
                                  label: "Deal Properties",
                              },
                          ],
                      },
                  },
              };



             // Example data demonstrating the mapping
              const data = [
              { source: "firstname", destination: "job_contact_first_name" },
              { source: "lastname", destination: "job_contact_last_name" },
              { source: "phone", destination: "job_contact_phone" },
              { source: "email", destination: "job_contact_email" },
              { source: "address", destination: "job_site_street_address" },
              { source: "city", destination: "job_site_city" },
              { source: "state", destination: "job_site_state" },
              { source: "zip", destination: "job_site_postal_code" },
              { source: "what_can_we_do_for_you", destination: "customer_selected_project_type" },
              { source: "how_did_you_find_us", destination: "customer_selected_marketing_source" },
              { source: "job_description", destination: "description" },
              { source: "firstname", destination: "billing_contact_first_name" },
              { source: "lastname", destination: "billing_contact_last_name" },
              { source: "phone", destination: "billing_contact_phone" },
              { source: "email", destination: "billing_contact_email" },
              { source: "address", destination: "billing_street_address" },
              { source: "city", destination: "billing_city" },
              { source: "state", destination: "billing_state" },
              { source: "zip", destination: "billing_postal_code" }
              ];


              return Promise.resolve({
                  schema,
                  uiSchema,
                  data,
              });
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: ''
