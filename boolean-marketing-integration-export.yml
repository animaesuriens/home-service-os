                          component:
                            isPublic: true
                            key: code
                            version: LATEST
                        description: ''
                        inputs:
                          code:
                            type: value
                            value: >
                              const axios = require("axios");


                              module.exports = async ({ logger, configVars },
                              stepResults) => {
                                try {
                                  const contactId = stepResults?.getContact?.results.id;
                                  const accessToken = configVars["HubSpot Private App Connection"]?.fields?.accessToken;
                                  const marketingPipeline = configVars["HubSpot Marketing Pipeline"]
                                  const marketingLost = configVars["Lead Closed Lost"]
                                  
                                  if (!contactId || !accessToken) {
                                    throw new Error("Missing contactId or accessToken");
                                  }

                                  // 1️⃣ Get associated deal IDs
                                  const url = `https://api.hubapi.com/crm/v4/objects/contacts/${contactId}/associations/deals`;
                                  const response = await axios.get(url, {
                                    headers: {
                                      Authorization: `Bearer ${accessToken}`,
                                      "Content-Type": "application/json",
                                    },
                                  });

                                  const associations = response.data.results || [];
                                  const dealIds = associations.map((a) => a.toObjectId);

                                  if (dealIds.length === 0) {
                                    return {
                                      data: {
                                        contactId,
                                        dealIds: [],
                                        dealIdString: "",
                                        hasDeals: false,
                                      },
                                    };
                                  }

                                  // 2️⃣ Fetch deal details in chunks (HubSpot max 100 IDs per request)
                                  const chunkSize = 100;
                                  let allDeals = [];

                                  for (let i = 0; i < dealIds.length; i += chunkSize) {
                                    const chunk = dealIds.slice(i, i + chunkSize);
                                    const body = {
                                      properties: ["dealname", "pipeline", "dealstage", "hs_lastmodifieddate"],
                                      inputs: chunk.map((id) => ({ id: String(id) })),
                                    };

                                    try {
                                      const dealsRes = await axios.post(
                                        "https://api.hubapi.com/crm/v3/objects/deals/batch/read",
                                        body,
                                        {
                                          headers: {
                                            Authorization: `Bearer ${accessToken}`,
                                            "Content-Type": "application/json",
                                          },
                                        }
                                      );

                                      allDeals.push(...(dealsRes.data.results || []));
                                    } catch (batchErr) {
                                      logger.error("Batch fetch error:", batchErr.response?.data || batchErr.message);
                                    }
                                  }

                                  // 3️⃣ Filter for marketing deals only, excluding lost deals
                                  const filteredDeals = allDeals.filter((deal) => {
                                    const { pipeline, dealstage } = deal.properties || {};
                                    return pipeline === marketingPipeline && dealstage !== marketingLost;
                                  });

                                  // 4️⃣ Sort by latest modified date
                                  const sortedDeals = filteredDeals.sort(
                                    (a, b) =>
                                      new Date(b.properties.createdate) - new Date(a.properties.createdate)
                                  );

                                  const latestDealIds = sortedDeals.map((d) => d.id);

                                  // ✅ Return same structure as before
                                  return {
                                    data: {
                                      contactId,
                                      dealIds: latestDealIds,
                                      dealIdString: latestDealIds.join(","),
                                      hasDeals: latestDealIds.length > 0,
                                    },
                                  };
                                } catch (error) {
                                  logger.error(`Failed to check deals for contact: ${error.message}`);
                                  return {
                                    data: {
                                      error: error.message,
                                    },
                                  };
                                }
                              };
