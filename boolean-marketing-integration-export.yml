                        // const initialPayload = stepResults.initialDealPayload.results;
                        const trigger = stepResults.overridePayload?.results
                        const initialPayload = stepResults?.initialDealPayload?.results || {};
                        const { primary, multiAttribution } = stepResults.lookupSources.results;
                        const { id, properties } = stepResults.outputContact.results
