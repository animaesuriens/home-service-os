        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    description: >-
      Maps fields from a vendor’s Multiple Lead Payload JSON to HubSpot Contact
      properties. Use this mapping to specify which parts of the incoming vendor
      data should populate the corresponding fields on a HubSpot Contact record.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {

              const {
              fields: { accessToken },
              } = connection;

              let contactGroupName = context?.configVars["Contact Group Name"]?.contactGroups?.map(item => item?.groupName) || []
              // Fetch HubSpot deal properties
              const propertiesResponse = await fetch(
              "https://api.hubapi.com/crm/v3/properties/contacts",
              { method: "GET", headers: { Authorization: `Bearer ${accessToken}` } }
              );

              const propertiesData = await propertiesResponse.json();
              const properties = (propertiesData.results || []).filter(
              (p) => contactGroupName.includes(p.groupName)
              );

              const hubspotAccountFields = properties
                  .map((property) => ({
                  title: property.label,
                  const: property.name,
                  }))
                  .sort((a, b) => (a.title < b.title ? -1 : 1));

              
             function extractKeys(obj, parentKey = "") {
                  let keys = [];

                  for (const key in obj) {
                      if (Object.hasOwnProperty.call(obj, key)) {
                          let newKey = parentKey ? `${parentKey}.${key}` : key;

                          if (typeof obj[key] === "object" && obj[key] !== null) {
                              if (Array.isArray(obj[key])) {
                                  if (key === "field_data") {
                                      // Special handling for Facebook lead data
                                      obj[key].forEach(field => {
                                          if (field.name) {
                                              keys.push({
                                                  label: `field_data.${field.name}`,
                                                  value: `field_data.${field.name}`
                                              });
                                          }
                                      });
                                  } else {
                                      obj[key].forEach((item, index) => {
                                          if (typeof item === "object" && item !== null) {
                                              keys.push(...extractKeys(item, `${newKey}[${index}]`));
                                          } else {
                                              keys.push({ label: `${newKey}[${index}]`, value: `${newKey}[${index}]` });
                                          }
                                      });
                                  }
                              } else {
                                  keys.push(...extractKeys(obj[key], newKey));
                              }
                          } else {
                              keys.push({ label: newKey, value: newKey });
                          }
                      }
                  }
                  return keys;
              }

              let expectedPayloadFields = []
              for(let item of contextValue){
                  let itemResult = extractKeys(JSON.parse(item.value))
                  let results = itemResult.map((property) => ({
                      title: item.key + '.' + property.label,
                      const: item.key + '.' + property.value,
                  })).sort((a, b) => (a.title < b.title ? -1 : 1));
                  expectedPayloadFields.push(...results)
              }

              const schema = {
                  type: "array",
                  items: {
                      type: "object",
                      properties: {
                          source: {
                              type: "string",
                              oneOf: expectedPayloadFields,
                          },
                          destination: {
                              type: "string",
                              oneOf: hubspotAccountFields,
                          },
                      },
                      required: ["source", "destination"],
                  },
              };

              const uiSchema = {
                  type: "Control",
                  label: "Properties",
                  scope: "#",
                  options: {
                      layout: "Accordion",
                      detail: {
                          type: "HorizontalLayout",
                          elements: [
                              {
                                  type: "Control",
                                  scope: "#/properties/source",
                                  options: {
                                      autocomplete: true,
                                      allowFreeform: true
                                  },
                                  label: "Vendor Data",
                              },
                              {
                                  type: "Control",
                                  scope: "#/properties/destination",
                                  options: {
                                      autocomplete: true,
                                  },
                                  label: "Hubspot Contact Properties",
                              },
                          ],
                      },
                  },
              };



             // Example data demonstrating the mapping
              const data = [];


              return Promise.resolve({
                  schema,
                  uiSchema,
                  data,
              });
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: Multiple Lead Payload
