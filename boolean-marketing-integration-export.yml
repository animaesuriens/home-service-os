          component:
            isPublic: true
            key: code
            version: LATEST
        description: From Airtable
        inputs:
          code:
            type: value
            value: >-
              const axios = require('axios');


              module.exports = async ({ logger, configVars }, stepResults) => {
                // Configurable table names & base
                const baseId = configVars["Project Management Base"];
                const peopleTable = configVars["People Table"];
                const { apiKey } = configVars["Airtable Connection Token"].fields;
                const data = stepResults.overridePayload?.results || {}

              const {
                estimatorEmail
              } = data;
                // Initialize Airtable client
                const airtableClient = axios.create({
                  baseURL: `https://api.airtable.com/v0/${baseId}`,
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                  },
                });

                const owners = await getAllRecords(airtableClient, peopleTable, `{Work Email} = "${estimatorEmail}"`);

                // Return as named lists
                return owners?.[0] || "" ;
              };



              // Retry settings (in seconds)

              const RETRY_DELAYS = [3, 3, 3];


              /**
               * Sleeps for the given milliseconds.
               */
              function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
              }


              /**
               * Retries an async operation according to RETRY_DELAYS.
               *
               * @param {Function} operationFn - A function that returns a promise.
               * @param {number[]} delays - Array of delays in seconds between retries.
               */
              async function retryOperation(operationFn, delays = RETRY_DELAYS)
              {
                let lastError;
                for (const delay of delays) {
                  try {
                    return await operationFn();
                  } catch (err) {
                    lastError = err;
                    console.warn(`Request failed: ${err.message}. Retrying in ${delay}s...`);
                    await sleep(delay * 1000);
                  }
                }
                throw lastError;
              }


              async function getAllRecords(client, tableName, filterFormula =
              null) {
                const pageSize = 100;
                let offset = null;
                const all = [];

                do {
                  let url = `/${encodeURIComponent(tableName)}?pageSize=${pageSize}`;
                  if (filterFormula) {
                    url += `&filterByFormula=${encodeURIComponent(filterFormula)}`;
                  }
                  if (offset) {
                    url += `&offset=${encodeURIComponent(offset)}`;
                  }

                  const resp = await retryOperation(() => client.get(url));
                  const { records, offset: nextOffset } = resp.data;

                  all.push(...records);
                  console.log(`Fetched ${records.length} from ${tableName}; next offset: ${nextOffset || 'none'}`);
                  offset = nextOffset;
                } while (offset);

                return all;
              }
