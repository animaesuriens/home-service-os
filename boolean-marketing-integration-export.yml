            type: value
            value: ''
          contactId:
            type: reference
            value: trigger.results.body.data.id
          hubspotConnection:
            type: configVar
            value: HubSpot Private App Connection
          timeout:
            type: value
            value: ''
        name: Search Contact by id
      - action:
          key: getContact
