  - dataSource:
      key: runCodeJsonForm
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    description: Choose the deal stage where you want Cancelled Appointments to be moved.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection }) => {
            const {
              fields: { accessToken },
            } = connection;

            const hubspotApiUrl = 'https://api.hubapi.com/crm/v3/pipelines/deals';

            try {
              // Fetch all pipelines
              const response = await fetch(hubspotApiUrl, {
                method: 'GET',
                headers: {
                  'Authorization': `Bearer ${accessToken}`,
                  'Content-Type': 'application/json'
                }
              });

              if (!response.ok) {
                throw new Error(`Error fetching pipelines: ${response.statusText}`);
              }

              const data = await response.json();

              // Combine all stages from all pipelines
              const options = data?.results?.flatMap(pipeline =>
                pipeline?.stages?.map(stage => ({
                  title: `${pipeline?.label ?? 'Unknown Pipeline'} - ${stage?.label ?? 'Unknown Stage'}`,
                  const: stage?.id ?? ''
                })) ?? []
              ) ?? [];

              // Detect the "Sales Lost" stage (case-insensitive)
              const defaultOption = options.find(opt => {
                const label = opt?.title?.toLowerCase() || "";
                return (
                  label.includes('sales') &&label.includes('lost')
                );
              });
              context.logger.log("defaultOption->", defaultOption);
              context.logger.log("options->", options);
              const defaultKey = defaultOption.const || null;

              // ✅ Return JSON form schema, UI schema, and data
              return Promise.resolve({
                schema: {
                  type: "object",
                  title:"",
                  properties: {
                    dealStage: {
                      type: "string",
                      oneOf: options
                    }
                  }
                },
                uiSchema: {
                  type: "VerticalLayout",
                  elements: [
                    {
                      type: "Control",
                      scope: "#/properties/dealStage",
                      options: {
                        autocomplete: true
                      }
                    }
                  ]
                },
                data: {
                  dealStage: defaultKey
                }
              });

            } catch (error) {
              context.logger.log(`Error fetching HubSpot deal stages: ${error.message}`);
              return Promise.resolve({
                schema: {
                  type: "object",
                  properties: {
                    error: {
                      type: "string",
                      title: "Error",
                      default: "Failed to load deal stages.",
                    }
                  }
                }
              });
            }
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: ''
    key: Deal Stage for Cancelled Appointments
    orgOnly: false
  - dataSource:
      key: runCodeJsonForm
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    description: Choose the lost reason when an appointment is cancelled.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection }) => {
            const {
              fields: { accessToken },
            } = connection;

            const hubspotApiUrl = 'https://api.hubapi.com/crm/v3/properties/deals';

            try {
              // Fetch all deal properties
              const response = await fetch(hubspotApiUrl, {
                method: 'GET',
                headers: {
                  'Authorization': `Bearer ${accessToken}`,
                  'Content-Type': 'application/json'
                }
              });

              if (!response.ok) {
                throw new Error(`Error fetching deal properties: ${response.statusText}`);
              }

              const data = await response.json();

              // Find the "lost_reason" property
              const lostReasonProperty = data.results.find(
                prop => prop.name === 'lost_reason'
              );

              if (!lostReasonProperty || !lostReasonProperty.options) {
                throw new Error('Lost reason property not found or has no options.');
              }

              // Map lost_reason options into form oneOf format
              const options = lostReasonProperty.options.map(opt => ({
                title: opt.label || opt.value,
                const: opt.value
              }));

              // Get first option as default (optional)
              const defaultKey = options[0]?.const || null;

              // ✅ Return JSON form schema
              return Promise.resolve({
                schema: {
                  type: "object",
                  title: "",
                  properties: {
                    lostReason: {
                      type: "string",
                      oneOf: options
                    }
                  }
                },
                uiSchema: {
                  type: "VerticalLayout",
                  elements: [
                    {
                      type: "Control",
                      scope: "#/properties/lostReason",
                      options: {
                        autocomplete: true
                      }
                    }
                  ]
                },
                data: {
                  lostReason: defaultKey
                }
              });

            } catch (error) {
              context.logger.log(`Error fetching lost reasons: ${error.message}`);
              return Promise.resolve({
                schema: {
                  type: "object",
                  properties: {
                    error: {
                      type: "string",
                      title: "Error",
                      default: "Failed to load lost reason options.",
                    }
                  }
                }
              });
            }
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: ''
    key: Lost Reason for Cancelled Appointments
    orgOnly: false
