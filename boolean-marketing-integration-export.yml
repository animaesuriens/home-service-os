  - dataSource:
      key: runCodeJsonForm
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    description: >-
      Maps YouCanBook.Me (YCBM) booking fields to HubSpot Deal properties. Use
      this to define how data collected during the YCBM booking (e.g., job
      information, project types, etc.) should be pushed into a new or existing
      HubSpot Deal.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |+
          module.exports = async (context, { connection, contextValue }) => {
            const {
              fields: { accessToken },
            } = connection;

            let dealGroupName = context?.configVars["Deal Group Name"]?.dealGroups?.map(item => item?.groupName) || []

            // Fetch HubSpot deal properties
            const propertiesResponse = await fetch(
              "https://api.hubapi.com/crm/v3/properties/deals",
              { method: "GET", headers: { Authorization: `Bearer ${accessToken}` } }
            );

            const propertiesData = await propertiesResponse.json();

            const properties = (propertiesData.results || []).filter((p) => dealGroupName.includes(p.groupName));

            //old filter
            //const properties = propertiesData.results || [];
            // const filteredProperties = properties.filter(
            //   (property) => property.groupName !== "dealstages" && property.groupName !== "deal_activity"
            // );

            const hubspotAccountFields = properties
              .map((property) => ({
                title: property.label,
                const: property.name,
              }))
              .sort((a, b) => (a.title < b.title ? -1 : 1));

            let ycbmFields = JSON.parse(contextValue)
            function generateFieldsFromJson(json) {
            return Object.entries(json).map(([title, constValue]) => {
              return { title, const: constValue };
              });
            }
            const youCanBookMeFields = generateFieldsFromJson(ycbmFields)

            // Define schema with YouCanBook.Me fields and concatenation character
            const schema = {
              type: "array",
              items: {
                type: "object",
                properties: {
                  source: {
                    type: "string",
                    oneOf: youCanBookMeFields,
                  },
                  destination: {
                    type: "string",
                    oneOf: hubspotAccountFields,
                  },
                },
                required: ["source", "destination"],
              },
            };

            // UI Schema for rendering the mapping configuration
            const uiSchema = {
              type: "Control",
              label: "YouCanBook.Me to HubSpot Deal Mapper",
              scope: "#",
              options: {
                layout: "Accordion",
                detail: {
                  type: "HorizontalLayout",
                  elements: [
                    {
                      type: "Control",
                      scope: "#/properties/source",
                      options: {
                        autocomplete: true,
                        allowFreeform: true
                      },
                      label: "YouCanBook.Me Fields",
                    },
                    {
                      type: "Control",
                      scope: "#/properties/destination",
                      options: {
                        autocomplete: true,
                      },
                      label: "HubSpot Deal Properties",
                    },
                  ],
                },
              },
            };

            // Example data demonstrating the mapping
          const data = [
            { source: "appointmentType", destination: "appointment_type" },
            { source: "startsAt", destination: "estimate_date" },
            { source: "jobFirstName", destination: "job_contact_first_name" },
            { source: "jobLastName", destination: "job_contact_last_name" },
            { source: "jobPhone", destination: "job_contact_phone" },
            { source: "jobEmail", destination: "job_contact_email" },
            { source: "jobStreet", destination: "job_site_street_address" },
            { source: "jobCity", destination: "job_site_city" },
            { source: "jobState", destination: "job_site_state" },
            { source: "jobPostal", destination: "job_site_postal_code" },
            { source: "billingFirstName", destination: "billing_contact_first_name" },
            { source: "billingLastName", destination: "billing_contact_last_name" },
            { source: "billingPhone", destination: "billing_contact_phone" },
            { source: "billingEmail", destination: "billing_contact_email" },
            { source: "billingStreet", destination: "billing_street_address" },
            { source: "billingCity", destination: "billing_city" },
            { source: "billingState", destination: "billing_state" },
            { source: "billingPostal", destination: "billing_postal_code" },
            { source: "source", destination: "customer_selected_marketing_source" },
            { source: "jobDescription", destination: "description" },
            { source: "identifier", destination: "job_identifier" },
            { source: "projectTimeline", destination: "job_timeline_notes" },
            { source: "appointmentScheduledBy", destination: "scheduled_by" },
            { source: "previousCustomer", destination: "previous_customer" },
            { source: "projectType", destination: "customer_selected_project_type" },
            { source: "projectTag", destination: "tags" },
            { source: "houseYear", destination: "house_built_before_1978" },
            { source: "referredBy", destination: "referral_name" },
            { source: "company", destination: "company_name" },
            { source: "ycmbBookingId", destination: "ycbm_booking_id" },
          ];

            return Promise.resolve({
              schema,
              uiSchema,
              data,
            });
          };


      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: Notification Payload
    key: YCBM to HS Deal Fields
