                          const alreadyFormatted = /^\+1\s?\(\d{3}\)\s?\d{3}-\d{4}$/.test(rawPhone);
                          if (alreadyFormatted) return rawPhone;

                          // Keep only digits
                          let digits = rawPhone.replace(/\D/g, "");

                          // Ensure we have at least 10 digits
                          if (digits.length < 10) return rawPhone;

                          // Ensure it starts with country code 1
                          if (!digits.startsWith("1")) {
                            digits = "1" + digits;
