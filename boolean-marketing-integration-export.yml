                      type: "Control",
                      scope: "#/properties/source",
                      options: {
                        autocomplete: true,
                      },
                      label: "YouCanBook.Me Fields",
                    },
                    {
                      type: "Control",
                      options: {
                        autocomplete: true,
                      },
                      scope: "#/properties/destination",
                      label: "HubSpot Contact Properties",
                    },
                  ],
                },
              },
            };

            // Example data demonstrating the mapping
          const data = [
            { source: "jobFirstName", destination: "firstname" },
            { source: "jobLastName", destination: "lastname" },
            { source: "jobPhone", destination: "phone" },
            { source: "jobEmail", destination: "email" },
            { source: "jobStreet", destination: "address" },
            { source: "jobCity", destination: "city" },
            { source: "jobState", destination: "state" },
            { source: "jobPostal", destination: "zip" },
            { source: "source", destination: "customer_selected_marketing_source" },
            { source: "jobDescription", destination: "job_description" },
          ];

            return Promise.resolve({
              schema,
              uiSchema,
              data,
            });
          };
