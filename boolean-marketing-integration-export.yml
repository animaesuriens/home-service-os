                              component:
                                isPublic: true
                                key: hubspot
                                version: LATEST
                            description: >-
                              Retrieves detailed information about a specific
                              contact in HubSpot. This includes core contact
                              properties such as name, email, phone number,
                              company association, lifecycle stage, and any
                              custom fields. It is commonly used to manage and
                              analyze individual contacts, track interactions,
                              and personalize communication strategies within
                              the HubSpot CRM.
                            errorConfig:
                              delaySeconds: 10
                              errorHandlerType: retry
                              ignoreFinalError: true
                              maxAttempts: 1
                              usesExponentialBackoff: false
                            inputs:
                              additionalProperties:
                                type: complex
                                value:
                                  - type: value
                                    value: email
                                  - type: value
                                    value: firstname
                                  - type: value
                                    value: lastname
