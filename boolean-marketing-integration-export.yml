                        let dealData = stepResults?.searchLatestOpenDeal?.results?.dealData;

                        // ✅ Recursive function to clean placeholder values
                        function cleanPlaceholders(obj) {
                          if (Array.isArray(obj)) {
                            return obj.map(cleanPlaceholders);
                          } else if (obj !== null && typeof obj === "object") {
                            return Object.fromEntries(
                              Object.entries(obj).map(([key, value]) => [key, cleanPlaceholders(value)])
                            );
                          } else if (typeof obj === "string" && /^\{.*\}$/.test(obj)) {
                            // If value is a string wrapped in {}
                            return null;
                          }
                          return obj;
                        }

                        // ✅ Function to format US phone numbers
                        function formatPhoneNumber(rawPhone) {
                          if (!rawPhone) return rawPhone;

                          // Skip if already formatted like +1 (XXX) XXX-XXXX
                          const alreadyFormatted = /^\+1\s?\(\d{3}\)\s?\d{3}-\d{4}$/.test(rawPhone);
