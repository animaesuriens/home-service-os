                                                      let emailSubject = stepResults.findTemplate?.results[0]?.fields['Email Subject'];
                                                      let portalId = stepResults.loopOverEngagements.currentItem.portalId;
                                                      let leadData = stepResults.utilities.results;
                                                      let ownerData = stepResults.getOwner.results[0];
                                                      let customerEmail = leadData.customerEmail;
                                                      let contactPhone = leadData.contactPhone;
                                                      let customerFirstName = leadData.customerFirstName;
                                                      let ownerFirstName = ownerData.fields["First Name"];
                                                      let ownerLastName = ownerData.fields["Last Name"];
                                                      let ownerFullName = `${ownerFirstName} ${ownerLastName}`;
                                                      let ownerEmail = ownerData.fields["Work Email"] || configVars["Resource Coordinator - Default Notification Email"];
                                                      let jobTitle = ownerData.fields["Job Title"] || "";
                                                      let companyName = ownerData.fields["Company"] || "";
                                                      let companyAddressLine1 = ownerData.fields["Company Address Line 1"] || "";
                                                      let companyAddressLine2 = ownerData.fields["Company Address Line 2"] || "";
                                                      //let phoneNumber = ownerData.fields["Phone Number"] || "";
                                                      let phoneNumber = configVars['Company Phone Number']
                                                      let bcc = `${portalId}@bcc.hubspot.com`;
                                                      let from = `${ownerFirstName} @ ${companyName}`;
                                                      let cc = ownerEmail;
                                                      // let contactData = stepResults.getContact.results
                                                    
                                                      // Replace variables in templates and handle newlines for HTML
                                                      const variables = {
                                                          "{customerFirstName}": customerFirstName,
                                                          "{emailSubject}": emailSubject,
                                                          "{smsContent}": smsContent,
                                                          "{emailContent}": emailContent,
                                                          "{portalId}": portalId,
                                                          "{customerEmail}": customerEmail,
                                                          "{ownerFirstName}": ownerFirstName,
                                                          "{ownerLastName}": ownerLastName,
                                                          "{ownerFullName}": ownerFullName,
                                                          "{ownerEmail}": ownerEmail,
                                                          "{jobTitle}": jobTitle,
                                                          "{companyName}": companyName,
                                                          "{companyAddressLine1}": companyAddressLine1,
                                                          "{companyAddressLine2}": companyAddressLine2,
                                                          "{phoneNumber}": phoneNumber,
                                                          "{bcc}": bcc,
                                                          "{from}": from,
                                                          "{cc}": cc,
                                                          "{signature}": [
                                                            ownerFullName,
                                                            jobTitle,
                                                            companyName,
                                                            companyAddressLine1,
                                                            companyAddressLine2,
                                                            phoneNumber,
                                                          ]
                                                            .filter((part) => part.trim() !== "")
                                                            .join("<br>"),
                                                        };
                                                        
                                                    
                                                      const replacePlaceholders = (template) => {
                                                      if (!template) return "";
                                                      return template
                                                          .replace(/\n/g, "<br>") 
                                                          .replace(/\{(.*?)\}/g, (match) => variables[match] || match);
                                                      };

                                                      const replacePlaceholdersSMS = (template) => {
                                                          if (!template) return "";
                                                          return template.replace(/\{(.*?)\}/g, (match) => variables[match] || match);
                                                      };
                                                        
                                                    
                                                      smsContent = replacePlaceholdersSMS(smsContent);
                                                      emailContent = replacePlaceholders(emailContent);
                                                      emailSubject = replacePlaceholders(emailSubject);
                                                    
                                                      logger.info("message:", {
                                                        smsContent,
                                                        emailContent,
                                                        emailSubject,
                                                      });

                                                      let emailPayload = {
                                                          from,
                                                          to:customerEmail,
                                                          ownerEmail,
                                                          bcc,
                                                          subject:emailSubject,
                                                          body: emailContent
                                                      }

                                                      let smsPayload = {
                                                          from:phoneNumber,//company phone
                                                          to:contactPhone,//customer phone
                                                          text:smsContent
                                                      }
                                                    
                                                      return {
                                                        data: {
                                                          smsContent,
                                                          emailContent,
                                                          emailSubject,
                                                          emailPayload,
                                                          smsPayload
                                                        },
                                                      };
