            } = connection;

            // Define the pipeline ID you want to filter by
            const specificPipelineId = contextValue; // You can set a default ID if needed

            // HubSpot API URL to get pipelines and deal stages
            const hubspotApiUrl = 'https://api.hubapi.com/crm/v3/pipelines/deals';

            try {
              // Fetch the pipeline list from HubSpot
              const response = await fetch(hubspotApiUrl, {
                method: 'GET',
                headers: {
                  'Authorization': `Bearer ${accessToken}`,
                  'Content-Type': 'application/json'
                }
              });

              // Check if the response is ok
              if (!response.ok) {
                throw new Error(`Error fetching pipelines: ${response.statusText}`);
              }

              // Parse the response to JSON
              const data = await response.json();

              // Find the specific pipeline by ID
              const pipeline = data.results.find(pipeline => pipeline.id === specificPipelineId);

              // If the pipeline is not found, return an empty result
              if (!pipeline) {
                throw new Error(`Pipeline with ID ${specificPipelineId} not found.`);
              }

              // Extract deal stages from the specific pipeline
              const options = pipeline.stages.map(stage => ({
                label: stage.label + ` (${stage.id})`,   // The display name for the deal stage
                key: stage.id         // The unique ID for the deal stage
              }));

              // Return the result in the format expected by Prismatic
              return Promise.resolve({
                result: options,
              });

