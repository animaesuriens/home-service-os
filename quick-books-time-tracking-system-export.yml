      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: To QuickBooks Time
        inputs:
          code:
            type: value
            value: |-
              const axios = require('axios');

              module.exports = async ({ logger, configVars }, stepResults) => {
                const projectTable = configVars["Projects Table"];
                const base = configVars["Project Management Base"];
                const { apiKey } = configVars["Airtable Connection"].fields;
                const tsheetToken = configVars["QuickBooks Time Token"];

                // Initialize QuickBooks Time (TSheets) API client.
                const tsheetClient = axios.create({
                  baseURL: `https://rest.tsheets.com/api/v1`,
                  headers: {
                    Authorization: `Bearer ${tsheetToken}`,
                    'Content-Type': 'application/json'
                  }
                });

                let allJobCodes = [];
                let page = 1;
                const pageSize = 200; // maximum records per call

                while (true) {
                  try {
                    const jobCodes = await retryOperation(
                      () => retriveJobCodes(tsheetClient, '/jobcodes', page),
                      [3, 3, 3]
                    );
                    logger.log(`Retrieved ${jobCodes.length} job codes on page ${page}`);
                    
                    // Filter for active job codes
                    const activeJobCodes = jobCodes.filter(jc => jc.active === true || jc.active === "yes");
                    allJobCodes = allJobCodes.concat(activeJobCodes);
                    
                    if (jobCodes.length < pageSize) break;
                    page++;
                  } catch (err) {
                    logger.error(`Error retrieving JobCodes on page ${page}:`, err.message);
                    break;
                  }
                }
                
                allJobCodes.sort((a, b) => new Date(a.last_modified) - new Date(b.last_modified));
                logger.log("Total Active JobCodes Retrieved: ", allJobCodes.length);
                logger.log("Active JobCodes Retrieved: ", JSON.stringify(allJobCodes));

                // Initialize Airtable client.
                const airtableClient = axios.create({
                  baseURL: `https://api.airtable.com/v0/${base}`,
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                  },
                });

                // const formula = `AND({${updateTimeTracker}}="TRUE",{${includeTimeTracker}}="TRUE")`;
                // const encodedFormula = encodeURIComponent(formula);
                let allProjects = [];
                let offset = null;
                const recordPageSize = 100; // Airtable page size

                do {
                  // Build the URL with pageSize and offset (if available)
                  // let url = `/${encodeURIComponent(projectTable)}?pageSize=${pageSize}&filterByFormula=${encodedFormula}`;
                  let url = `/${encodeURIComponent(projectTable)}?pageSize=${recordPageSize}`;
                  if (offset) {
                    url += `&offset=${encodeURIComponent(offset)}`;
                  }
                  
                  try {
                    // Use retryOperation for robust API call.
                    const response = await retryOperation(
                      () => airtableClient.get(url),
                      [3, 3, 3]
                    );
                    
                    const records = response.data.records || [];
                    allProjects = allProjects.concat(records);
                    logger.log(`Retrieved ${records.length} records; offset: ${response.data.offset || "none"}`);
                    
                    offset = response.data.offset;
                  } catch (error) {
                    logger.error("Error retrieving projects:", error.message);
                    break;
                  }
                } while (offset);

                logger.log("Total Projects Retrieved:", allProjects.length);
                logger.log("Projects Retrieved:", JSON.stringify(allProjects));

                const jobcodeUpdateItems = [];


                allJobCodes.forEach(jobcode => {
                  let project = queryRequestById(allProjects, jobcode.id)
                  if (!project) {
                    jobcodeUpdateItems.push(new JobcodeUpdatePayload(jobcode));
                  }
                });


                logger.log("Total Jobcodes to Update:", jobcodeUpdateItems.length);

                // split into chunks of max 200
                const chunks = chunkArray(jobcodeUpdateItems, 200);
                const updatedJobCodes = [];

                for (const [i, chunk] of chunks.entries()) {
                  const payload = { data: chunk };
                  logger.log(`Updating chunk ${i+1}/${chunks.length} (size=${chunk.length})`);
                  const result = await retryOperation(
                    () => updateJobCodes(tsheetClient, '/jobcodes', payload),
                    [3,3,3]
                  );
                  // 1) count
                  logger.log(`Chunk ${i+1} returned ${result.length} jobcodes`);
                  // 2) verify state
                  logger.log(
                    `Chunk ${i+1} active flags:`,
                    result.map(jc => `${jc.id} → ${jc.active}`)
                  );
                  // 3) push only those that actually flipped
                  const actuallyFlipped = result.filter(jc => jc.active === "no");
                  updatedJobCodes.push(...actuallyFlipped);
                }
                
                // Sort timesheets from earliest to latest using last_modified
                logger.log("Total Jobcodes Successfully Updated:", updatedJobCodes.length);
                return updatedJobCodes;
              };

              function chunkArray(array, size) {
                const chunks = [];
                for (let i = 0; i < array.length; i += size) {
                  chunks.push(array.slice(i, i + size));
                }
                return chunks;
              }

              async function updateJobCodes(client, endpoint, payload) {
                try {
                  const response = await client.put(endpoint, payload);
                  if (!response.data || !response.data.results || !response.data.results.jobcodes) return [];
                  return Object.values(response.data.results.jobcodes);
                } catch (error) {
                  console.error(`${endpoint} update failed:`, error.response?.data || error.message);
                  throw error;
                }
              }

              async function retriveJobCodes(client, endpoint, page) {
                try {
                  const params = new URLSearchParams({ page: page, per_page: 200, active: true }).toString();
                  const response = await client.get(`${endpoint}?${params}`);
                  if (!response.data || !response.data.results || !response.data.results.jobcodes) return [];
                  return Object.values(response.data.results.jobcodes);
                } catch (error) {
                  console.error(`${endpoint} retrieval failed:`, error.response?.data || error.message);
                  throw error;
                }
              }

              //
              // --- Retry Operation Function and Sleep Helper ---
              //

              function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
              }

              /**
               * Retries an async operation using specified delays (in seconds).
               *
               * @param {Function} operationFn - The async function to execute.
               * @param {Array<number>} retryDelaysInSeconds - Delays (in seconds) between retries.
               * @returns {Promise<any>} - The result of the async function if successful.
               */
              async function retryOperation(fn, delays = [5,5,5]) {
                // try once per delay
                for (const d of delays) {
                  try {
                    return await fn();
                  } catch (err) {
                    console.warn(`Attempt failed: ${err.message}. Retrying in ${d}s...`);
                    await sleep(d * 1000);
                  }
                }
                // final attempt—if it still fails, we catch and return null
                try {
                  return await fn();
                } catch (err) {
                  console.warn(`Final attempt failed (ignored): ${err.message}`);
                  return null;    // <— swallow the error here
                }
              }

              class JobcodeUpdatePayload {
                /**
                 * @param {string|number} id - The QuickBooks Time jobcode id to update.
                 * @param {string} name - The new name for the jobcode.
                 * @param {string} [active="yes"] - The new active status ("yes" or "no").
                 */
                constructor(jobcode) {
                  this.id = jobcode.id;
                  this.active = "no";
                  this.connect_with_quickbooks = false;
                }
              }

              function queryRequestById(requests, id) {
                if (!Array.isArray(requests)) {
                  throw new Error("`requests` must be an array");
                }
                const lookup = String(id).trim();
                return requests.find(item => String(item.fields["QB Time Jobcode ID"]) === lookup) || null;
              }
        name: Update Inactive Jobcodes
