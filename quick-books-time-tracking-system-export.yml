      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: To Timelogs Airtable
        errorConfig:
          delaySeconds: 2
          errorHandlerType: retry
          ignoreFinalError: false
          maxAttempts: 1
          usesExponentialBackoff: false
        inputs:
          code:
            type: value
            value: >-
              const axios = require('axios');


              module.exports = async ({ logger, configVars }, stepResults) => {

                try {
                  // Get the time entries from stepResults.
                  const timeEntries = stepResults.retrieveAllTimeSheets?.results || [];
                  const jobCodesData = stepResults.retrieveAllActiveJobcodes?.results || []
                  const projects = stepResults.retrieveAllProjects?.results || []
                  const people = stepResults.retrieveAllPeople?.results || []
                  const breakCodeIDs = configVars["Non-Work Job Code Mapping"] || []
                  const timeLogTable = configVars["Time Logs Table"];
                  const base = configVars["Project Management Base"];
                  const { apiKey } = configVars["Airtable Connection"].fields;

                  logger.log("Break/Lunch Entry Tag(s): ", breakCodeIDs)

                  // Initialize Airtable client.
                  const airtableClient = axios.create({
                    baseURL: `https://api.airtable.com/v0/${base}`,
                    headers: {
                      Authorization: `Bearer ${apiKey}`,
                      'Content-Type': 'application/json',
                    },
                  });

                  let timeLogRecords = [];

                  // Process each time entry sequentially.
                  for (const entry of timeEntries) {
                    const jobCodeId = entry.jobcode_id;
                    const userId = entry.user_id;

                    let jobCode = filter(jobCodesData, jobCodeId)

                    let project = getProject(projects, jobCodeId)

                    // Create payloads for People and Time Logs based on retrieved data.
                    let employee = getEmployee(people, userId)

                    let timelogPayload = new TimeLogsPayload(entry, jobCode, project, employee, breakCodeIDs)

                    timeLogRecords.push(timelogPayload);
                  }

                  // Process timeLogRecords in chunks of 10.
                  const timeLogChunks = chunkArray(timeLogRecords, 10);
                  const timeLogResponses = [];
                  for (const chunk of timeLogChunks) {
                    const timeLogPayload = {
                      performUpsert: {
                        fieldsToMergeOn: ["Time Entry ID"]
                      },
                      records: chunk
                    };
                    try {
                      // Use retryOperation for bulk update.
                      const response = await retryOperation(
                        () => bulkUpdate(airtableClient, timeLogTable, timeLogPayload),
                        [3, 3, 3]
                      );
                      timeLogResponses.push(response);
                    } catch (error) {
                      logger.error("Error during bulk update for time log chunk:", error.message);
                      timeLogResponses.push({ error: error.message });
                    }
                  }
                  logger.log("Time Log API Response: ", timeLogResponses);
                  logger.log("Time Log API Response Count: ", timeLogResponses.length);
                  return timeLogResponses
                } catch(error) {
                  logger.error("Unhandled error in code block", error);
                  return { error: error.message };
                }
              };



              // --- Retry Operation Function ---


              function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
              }


              /**
               * Retry an async operation using specified delays (in seconds).
               *
               * @param {Function} operationFn - The async function to execute.
               * @param {Array<number>} retryDelaysInSeconds - Array of delays (seconds) between retries.
               * @returns {Promise<any>} - The result of the async function if successful.
               */
              async function retryOperation(operationFn, retryDelaysInSeconds =
              [5, 5, 5]) {
                let lastError;
                for (const delayInSeconds of retryDelaysInSeconds) {
                  try {
                    return await operationFn();
                  } catch (error) {
                    lastError = error;
                    console.warn(`Operation failed: ${error.message}. Retrying in ${delayInSeconds} seconds...`);
                    await sleep(delayInSeconds * 1000);
                  }
                }
                throw lastError;
              }


              // --- API Call Functions ---


              function filter(users, filterValue) {
                if (!Array.isArray(users)) {
                  throw new Error("The first argument must be an array.");
                }
                // Convert both user.id and filterValue to strings for the comparison.
                return users.find(user => String(user.id) == String(filterValue));
              }


              function getQBTJobcodeNameByValue(jobcodeMap, value) {
                if (!Array.isArray(jobcodeMap)) {
                  throw new Error("jobcodeMap must be an array");
                }
                const found = jobcodeMap.find(item => String(item.value) === String(value));
                return found ? found.key : "Jobcode used in time entry not found. Either inactive or is unmapped break code.";
              }


              function chunkArray(array, chunkSize) {
                const chunks = [];
                for (let i = 0; i < array.length; i += chunkSize) {
                  chunks.push(array.slice(i, i + chunkSize));
                }
                return chunks;
              }


              async function bulkUpdate(client, tableName, data) {
                try {
                  const response = await client.patch(`/${encodeURIComponent(tableName)}`, data);
                  return response.data || "";
                } catch (error) {
                  console.error("Bulk update failed:", error.response?.data || error.message);
                  throw error;
                }
              }


              function getEmployee(records, userId) {
                return records.find(record => 
                  record.fields?.["Time Tracking User ID"] == userId
                );
              }


              function getProject(records, jobCodeId) {
                return records.find(record => 
                  record.fields["QB Time Jobcode ID"] == jobCodeId
                );
              }



              // --- Payload Classes ---

              class TimeLogsPayload {
                constructor(timelog, jobCode, project, employee, breakCode) {
                  this.fields = {
                    "Time Entry ID": `${timelog.id}`,
                    "Hours Worked": timelog.duration ? timelog.duration / 3600 : 0
                  };

                  // Add job code fields if available.
                  if (jobCode) {
                    this.fields["QB Time Jobcode Name"] = jobCode.name || "";
                    this.fields["QB Time Jobcode ID"] = `${jobCode.id}` || "";
                  } else {
                    this.fields["QB Time Jobcode Name"] = getQBTJobcodeNameByValue(breakCode, timelog.jobcode_id)
                    this.fields["QB Time Jobcode ID"] = String(timelog.jobcode_id) || "";
                  }

                  // Clocked In (start or fallback to date).
                  this.fields["Clocked In"] = timelog.start || timelog.date || "";

                  // Clocked Out.
                  if (timelog.end) {
                    this.fields["Clocked Out"] = timelog.end;
                  }

                  // Project (array format).
                  if (project?.id) {
                    this.fields["Project"] = [project.id];
                  }

                  // Set Employee field from timelog.user_id.
                  if (employee?.id) {
                    this.fields["Employee"] = [employee.id];
                  }
                }
              }
