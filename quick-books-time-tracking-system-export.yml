                  }
                });

                // Build an array of jobcode update payloads.
                // In this example, we update jobcodes for projects that already have a "QB Time Jobcode ID".
                // We use the project's "Timetracking App Record Display Name" as the new job code name and set active status to "yes".
                const jobcodeUpdateItems = [];
                projectsData.forEach(project => {
                  if (project.fields["QB Time Jobcode ID"]) {
                    jobcodeUpdateItems.push(new JobcodeUpdatePayload(project));
                  }
                });

                logger.log("Total Jobcodes to Update:", jobcodeUpdateItems.length);

                // Chunk payloads into groups of 200
                const chunks = chunkArray(jobcodeUpdateItems, 200);
                const updatedJobCodes = [];

                for (const [i, chunk] of chunks.entries()) {
                  const payload = { data: chunk };
                  logger.log(`Updating chunk ${i + 1}/${chunks.length} (size=${chunk.length})`);
                  try {
                    const result = await retryOperation(
                      () => updateJobCodes(tsheetClient, '/jobcodes', payload),
                      [3, 3, 3]
                    );
                    logger.log(`Chunk ${i + 1} updated ${result.length} jobcodes`);
                    updatedJobCodes.push(...result);
                  } catch (err) {
                    logger.error(`Failed to update chunk ${i + 1}:`, err.message);
                    // You can decide whether to throw or continue
                  }
                }

                logger.log("Total Jobcodes Successfully Updated:", updatedJobCodes.length);
                return updatedJobCodes;
              };


              //

              // --- Helper Functions ---

              //


              async function updateJobCodes(client, endpoint, payload) {
                try {
                  const response = await client.put(endpoint, payload);
                  if (!response.data || !response.data.results || !response.data.results.jobcodes) return [];
                  return Object.values(response.data.results.jobcodes);
                } catch (error) {
                  console.error(`${endpoint} update failed:`, error.response?.data || error.message);
                  throw error;
                }
              }


              function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
              }


              async function retryOperation(operationFn, retryDelaysInSeconds =
              [5, 5, 5]) {
                let lastError;
                for (const delay of retryDelaysInSeconds) {
                  try {
                    return await operationFn();
                  } catch (error) {
                    lastError = error;
                    console.warn(`Operation failed: ${error.message}. Retrying in ${delay} seconds...`);
                    await sleep(delay * 1000);
                  }
                }
                throw lastError;
              }


              function chunkArray(array, size) {
                const chunks = [];
                for (let i = 0; i < array.length; i += size) {
                  chunks.push(array.slice(i, i + size));
                }
                return chunks;
              }


              //

              // --- Payload Class ---

              //


              class JobcodeUpdatePayload {
                /**
                 * @param {string|number} id - The QuickBooks Time jobcode id to update.
                 * @param {string} name - The new name for the jobcode.
                 * @param {string} [active="yes"] - The new active status ("yes" or "no").
                 */
                constructor(project) {
                  this.id = project.fields["QB Time Jobcode ID"];
                  this.name = project.fields["Timetracking App Record Display Name"];
                  this.active = project.fields?.["⚙️ Timetracking Job Active Status"] || true;
                  this.assigned_to_all = !project.fields?.["QB Time Jobcode Assign to All"] ? "no" : "yes"
                }
              }
