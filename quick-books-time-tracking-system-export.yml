                  if (!existing && user.email) {
                    existing = peopleData.find(
                      (rec) => rec.fields["Personal Email"] === user.email,
                    );
                  }

                  // If matched by email, just update the Time Tracking ID
                  if (existing) {
                    toUpdate.push({
                      id: existing.id,
                      fields: {
                        "Time Tracking User ID": tidStr,
                        "QB Time Username": user.username || "",
                        "Employment Status": user.active ? "Active" : "Inactive",
                      },
                    });
                    logger.log(
                      `Will update ${user.display_name} with Time Tracking ID (matched by email)`,
                    );
                    continue;
                  }

                  // If we get here, no email match was found - try by display_name
                  if (user.display_name) {
                    existing = peopleData.find((rec) => {
                      const firstName = rec.fields["First Name"];
                      const lastName = rec.fields["Last Name"];

                      if (!firstName || !lastName) return false;

                      const airtableFullName = `${firstName} ${lastName}`
                        .trim()
                        .toLowerCase();
                      const normalizedQBName = user.display_name.trim().toLowerCase();

                      return airtableFullName === normalizedQBName;
                    });
                  }

                  // If matched by name, update with Time Tracking ID and only add emails if missing
                  if (existing) {
                    const updateFields = {
                      "Time Tracking User ID": tidStr,
                      "QB Time Username": user.username || "",
                      "Employment Status": user.active ? "Active" : "Inactive",
                    };

                    // Only add emails if they don't already exist
                    if (!existing.fields["Work Email"] && user.email) {
                      updateFields["Work Email"] = user.email;
                    }
                    if (!existing.fields["Personal Email"] && user.email) {
                      updateFields["Personal Email"] = user.email;
                    }

                    toUpdate.push({
                      id: existing.id,
                      fields: updateFields,
                    });
                    logger.log(
                      `Will update ${user.display_name} with Time Tracking ID (matched by name, preserving existing emails)`,
                    );
                  } else {
                    // No match found - create new record
                    toCreate.push({
                      fields: {
                        "First Name": user.first_name || "",
                        "Last Name": user.last_name || "",
                        "Time Tracking User ID": tidStr,
                        "QB Time Username": user.username || "",
                        "Work Email": user.email || "",
                        "Personal Email": user.email || "",
                        "Employment Status": user.active ? "Active" : "Inactive",
                      },
                    });
                    logger.log(`Will create new record for ${user.display_name}`);
                  }
                }

                logger.log(
                  `Will UPDATE ${toUpdate.length} and CREATE ${toCreate.length} records.`,
                );

                // 3) Airtable HTTP client
                const airtable = axios.create({
                  baseURL: `https://api.airtable.com/v0/${baseId}/${peopleTable}`,
                  headers: {
                    Authorization: `Bearer ${apiKey}`,
                    "Content-Type": "application/json",
                  },
                });

                // 4) PATCH updates in chunks of 10
                const updateResults = [];
                for (const [i, chunk] of chunkArray(toUpdate, 10).entries()) {
                  logger.log(
                    `PATCH chunk ${i + 1}/${Math.ceil(toUpdate.length / 10)} (${chunk.length} records)`,
                  );
                  try {
                    const res = await retry(() => airtable.patch("", { records: chunk }));
                    updateResults.push(res.data);
                  } catch (e) {
                    logger.error(`Failed PATCH chunk ${i + 1}:`, e.message);
                    updateResults.push({ error: e.message });
                  }
                }

                // 5) POST creates in chunks of 10
                const createResults = [];
                for (const [i, chunk] of chunkArray(toCreate, 10).entries()) {
                  logger.log(
                    `POST chunk ${i + 1}/${Math.ceil(toCreate.length / 10)} (${chunk.length} records)`,
                  );
                  try {
                    const res = await retry(() => airtable.post("", { records: chunk }));
                    createResults.push(res.data);
                  } catch (e) {
                    logger.error(`Failed POST chunk ${i + 1}:`, e.message);
                    createResults.push({ error: e.message });
                  }
                }

                // 6) Return everything
                logger.log("Update results:", updateResults);
                logger.log("Create results:", createResults);
                return { updated: updateResults, created: createResults };
              };

              // --- Helpers (outside module) ---

              function chunkArray(array, size) {
                const chunks = [];
                for (let i = 0; i < array.length; i += size) {
                  chunks.push(array.slice(i, i + size));
                }
                return chunks;
              }

              async function retry(fn, delays = [5, 5, 5]) {
                let lastError;
                for (const d of delays) {
                  try {
                    return await fn();
                  } catch (e) {
                    lastError = e;
                    console.warn(`Operation failed: ${e.message}. Retrying in ${d}s…`);
                    await new Promise((r) => setTimeout(r, d * 1000));
                  }
                }
                throw lastError;
              }
