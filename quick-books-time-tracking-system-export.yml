  - dataType: string
    defaultValue: ''
    key: QuickBooks Time Token
    meta:
      visibleToCustomerDeployer: true
      visibleToOrgDeployer: true
    orgOnly: false
  - collectionType: keyvaluelist
    dataType: number
    defaultValue: '[]'
    description: >-
      Define which Job Code IDs in QuickBooks Time should be treated as non-work
      categories (e.g., Break, Lunch, Meeting, or other administrative codes).
      Use key-value pairs where the key is the category name and the value is
      the Job Code ID. This helps the system properly classify and manage
      non-billable or administrative time when processing time entries.
    key: Non-Work Job Code Mapping
    orgOnly: false
  - dataType: number
    defaultValue: '14'
    description: >-
      Determines the number of days prior to today to include deleted time logs
      in the sync. Note: Don't add negative symbol.
    key: How Far Back to Pull Deleted Logs
    orgOnly: false
  - dataType: boolean
    defaultValue: 'false'
    description: >-
      Enable or disable automatic deletion of time logs mapped to non-work
      categories. When enabled, the time logs associated with the Non-Work Job
      Codes will be removed from Airtable during synchronization to keep the
      time log focused actual works.
    key: Auto-Delete Non-Work Time Logs
    orgOnly: false
  - dataType: string
    defaultValue: yyyy-mm-dd
    description: >-
      Set as "none" if not needed. The automation will pick up locations only
      from this date onwards. Date input format: yyyy-mm-dd
    key: Location Last Modified Date
    orgOnly: false
