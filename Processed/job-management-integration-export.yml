        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {
            // Assuming the API token is stored in the connection under the name "eSignatures API Key"
            const apiKey = contextValue

            // eSignatures API URL to get the list of templates, including the API token in the query string
            const esignaturesApiUrl = `https://esignatures.io/api/templates?token=${apiKey}`;

            try {
              // Fetch the list of eSignature templates
              const response = await fetch(esignaturesApiUrl, {
                method: 'GET',
                headers: {
                  'Content-Type': 'application/json'
                }
              });

              // Check if the response is ok
              if (!response.ok) {
                throw new Error(`Error fetching eSignature templates: ${response.statusText}`);
              }

              // Parse the response to JSON
              const data = await response.json();

              // Map the templates to the options format required for the picklist
              const options = data.data.map(template => ({
                label: template.template_name + ` (${template.template_id})`,  // The display name for the template
                key: template.template_id       // The unique ID for the template
              }));

              // Return the result in the format expected by Prismatic
              return Promise.resolve({
                result: options,
              });

            } catch (error) {
              // Log the error and return an empty result in case of failure
              context.logger.log(`Error fetching eSignature templates: ${error.message}`);
              return Promise.resolve({
                result: [],
              });
            }
          };
