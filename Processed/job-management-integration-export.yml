                        inputs:
                          code:
                            type: value
                            value: >-
                              module.exports = async ({ logger, configVars },
                              stepResults) => {
                                  // Get contract properties from a previous step
                                  const contractData = stepResults.contractSentTrigger.results?.body?.data?.current_item
                                  const firstSender = stepResults.contractSentTrigger.results?.body?.data?.first_sender;
                                  const option =
                                    configVars["Send to Employee and Customer At The Same Time"] === "true"
                                        ? true
                                        : false;
                                
                                  if (!contractData) {
                                    logger.error("Contract data is undefined or missing.");
                                    throw new Error("Contract data is missing.");
                                  }
                                
                                  // Log the contract data for debugging
                                  logger.info(`Contract Data: ${JSON.stringify(contractData)}`);
                                
                                  // Get the mapping Config Variable for eSignature fields
                                  const mapping = configVars["Change Order Fields"]
                                  logger.info(mapping)
                                
                                  // Map contract properties to eSignature fields based on Config Var mapping
                                  const mappedFields = mapping.reduce(
                                    (acc, { source, destination }) => ({
                                      [destination]: contractData.fields[source] || null,
                                      ...acc,
                                    }),
                                    {},
                                  );
                                
                                  let signers = [
                                      {
                                          name: contractData.fields["Point of Contact"],
                                          email: contractData.fields["Addendum Point of Contact Email"],
                                          signing_order: "1",
                                          signature_request_delivery_methods: ["email"],
                                          signed_document_delivery_method: "email",
                                      },
                                  ];
                                
                                  if (firstSender && option) {
                                      signers.push(firstSender?.signer_payload);
                                  }
                                  // Define the payload for the eSignature API request
                                  const payload = {
                                    template_id: configVars["Change Order Template"],
                                    metadata: contractData.id || "",
                                    expires_in_hours: 48,
                                    signers: signers,
                                    placeholder_fields: Object.entries(mappedFields).map(([api_key, value]) => ({
                                      api_key,
                                      value: Array.isArray(value) 
                                        ? value[0] 
                                        : (typeof value === "number" 
                                            ? value.toFixed(2) 
                                            : value || "")
                                    })),
                                  };
                                
                                  let stringify = JSON.stringify(payload)
                                
                                  // Return the response data
                                  return stringify;
                                };
                                
