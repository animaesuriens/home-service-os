                        const hsData = stepResults?.cron?.results?.body?.data?.properties;
                        const associatedCompany = stepResults?.upsertCompany?.results?.data?.records[0]?.id;
                        const associatedJob = stepResults?.getAssociatedJobs?.results?.jobRecordIds || [];
                        const currentJobs = stepResults?.listRecords?.results?.[0]?.fields?.["Associated Jobs"] || [];
                        
                        // Get the mapping Config Variable
                        const mapping = configVars["HubSpot Contact to Airtable Contact Mapping"];

                        // Map properties from HubSpot to Airtable based on the config mapping
                        let mappedFields = mapping.reduce((acc, { source, destination }) => {
                          const value = hsData?.[source];
                          logger.info("value:", value);
                          if (value !== undefined && value !== null && value !== "") {
                            acc[destination] = value;
                          }
                          return acc;
                        }, {});

                        // ✅ Ensure Email field exists — if not, add with empty string
                        if (!mappedFields.Email) {
                          mappedFields.Email = "";
                        }

                        // Company mapping
                        mappedFields.Company = associatedCompany ? [associatedCompany] : [];

                        // ✅ Merge Associated Jobs without duplicates
                        if (associatedJob.length > 0 || currentJobs.length > 0) {
                          mappedFields["Associated Jobs"] = Array.from(new Set([
                            ...currentJobs,
                            ...associatedJob
                          ]));
                        }

                        return {
                          performUpsert: {
                            fieldsToMergeOn: ["Email"]
                          },
                          records: [
                            {
                              fields: mappedFields
                            }
                          ]
                        };
