    dataType: jsonForm
    defaultValue: ''
    description: >-
      Maps the fields from HubSpot Change Order Deal properties to the Airtable
      Addendums table. Use this to define how each property from a Change Order
      Deal in HubSpot should be written into an Addendum record in Airtable.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {
           // Assuming the access token is stored in the connection under the name "HubSpot Private App Connection"
              
              const access_token = connection?.fields?.accessToken;

            const propertiesResponse = await fetch(
              "https://api.hubapi.com/crm/v3/properties/deals",
              { method: "GET", headers: { Authorization: `Bearer ${access_token}` } },
            );

            const propertiesData = await propertiesResponse.json();
            const properties = propertiesData.results || [];

            const filteredProperties = properties.filter(
              (property) => property.groupName !== "dealstages" && property.groupName !== "deal_activity"
            );

            const hubspotAccountFields = filteredProperties
              .map((property) => ({
                title: property.label,
                const: property.name,
              }))
              .sort((a, b) => (a.title < b.title ? -1 : 1))


            // Pulling of Airtable fields
            const airtable = JSON.parse(contextValue)
            const baseId = airtable.baseId;
            const tableId = airtable.tableId;
            const at_token = airtable.token
            const airtableApiUrl = `https://api.airtable.com/v0/meta/bases/${baseId}/tables`;

            // Fetch table schema from Airtable using the valid access token
            const response = await fetch(airtableApiUrl, {
              method: 'GET',
              headers: {
                'Authorization': `Bearer ${at_token}`,
                'Content-Type': 'application/json',
              },
            });

            const tableData = await response.json();
            const table = tableData.tables.find((tbl) => tbl.id === tableId);

            // Map fields to the desired format (name as title, id as const)
            const airtableMappingFields = table.fields
              .filter((fld) => {
                return (
                  fld.type !== "formula" &&
                  fld.type !== "rollup" &&
                  fld.type !== "lookup" &&
                  fld.type !== "singleCollaborator" &&
                  fld.type !== "multipleCollaborators" &&
                  fld.type !== "multipleAttachments" &&
                  fld.type !== "createdTime" &&
                  fld.type !== "multipleLookupValues" &&
                  fld.type !== "autoNumber" &&
                  fld.type !== "lastModifiedTime" &&
                  fld.type !== "button" &&
                  fld.type !== "createdBy" &&
                  fld.type !== "lastModifiedBy"
                );
              })
              .map((field) => ({
                title: `${field.name} (${field.type})`,
                const: field.name,
              }))
              .sort((a, b) => (a.title < b.title ? -1 : 1));

            // const airtableMappingFields = airtableFields
            // .map((field) => ({
            //   title: field.title,
            //   const: field.const,
            // }))
            // .sort((a, b) => (a.title < b.title ? -1 : 1))

            const schema = {
              type: "array",
              items: {
                type: "object",
                properties: {
                  source: {
                    type: "string",
                    oneOf: hubspotAccountFields,
                    options: {
                      autocomplete: true
                    }
                  },
                  destination: {
                    type: "string",
                    oneOf: airtableMappingFields,
                    options: {
                      autocomplete: true
                    }
                  },
                },
                required: ["source", "destination"],
              },
            };
            /* This represents the UI Schema for the JSON form we're about to create.
            ** A UI Schema defines how this data is rendered as a form, e.g. the order of controls, their visibility, and the layout. Play around with these to see what fits!
            ** https://jsonforms.io/docs/uischema/
            */
            const uiSchema = {
              type: "Control",
              scope: "#",
              options: {
                layout: "Accordion",
                showSortButtons: true,
                detail: {
                  type: "HorizontalLayout",
                  elements: [
                    {
                      type: "Control",
                      scope: "#/properties/source",
                      options: {
                        autocomplete: true,
                      },
                      label: "Hubspot Properties",
                    },
                    {
                      type: "Control",
                      scope: "#/properties/destination",
                      options: {
                        autocomplete: true,
                      },
                      label: "Airtable Fields",
                    },
                  ],
                },
              },
            };

            const data = [
              { source: "amount", destination: "Retail Amount - CO" },
              { source: "description", destination: "Description" },
              { source: "hours___contract", destination: "CO Hours" },
              { source: "hs_object_id", destination: "CO HS Deal Record ID" },
              { source: "dealname", destination: "Addendum Deal Name" },
              { source: "job_contact_last_name", destination: "Addendum Point of Contact First Name" },
              { source: "job_contact_first_name", destination: "Addendum Point of Contact Last Name" },
              { source: "job_contact_email", destination: "Addendum Point of Contact Email" },
              { source: "job_contact_phone", destination: "Addendum Point of Contact Phone" }
            ];

            return Promise.resolve({
              schema,
              uiSchema,
              data,
            });
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: template
        value: |-
          {
          "baseId": "{{#Project Management Base}}",
          "tableId": "{{#Addendums Table}}",
          "token": "{{#Airtable Personal Token}}"
          }
    key: HubSpot Deal Properties to Airtable Addendums Fields Mapping
    orgOnly: false
