                                            // Get the mapping Config Variable
                                            const mapping = configVars?.["HubSpot Deal Properties to Airtable Jobs Fields Mapping"];

                                            // Map properties of the HubSpot data to the specified field mappings
                                            const mappedFields = mapping?.reduce((acc, { source, destination }) => {
                                              let value = hubspotData?.[source];
                                              // Find the destination field details in mappableFields
                                              const destinationField = mappableFields?.find((field) => field?.name === destination);

                                              if (source === "job_detail_badge" && !value) {
                                                  value = JobDetailBadge;
                                              }
                                              if (source === "job_difficulty_badge" && !value) {
                                                  value = JobDifficultyBadge;
                                              }
                                              if (source === "job_communication_badge" && !value) {
                                                  value = JobCommunicationBadge;
                                              }
                                                
                                                logger.info("source:", source);

                                              if (destinationField) {
                                                // Convert to number for currency/number types
                                                if ((destinationField?.type === "currency" || destinationField?.type === "number" || destinationField?.type === "rating") && value) {
                                                  value = Number(value);
                                                }

                                                // Split and wrap in an array for multipleSelects
                                                if (destinationField?.type === "multipleSelects" && value) {
                                                  value = value?.split(";")?.map((item) => item?.trim());
                                                }

                                                // Split and wrap in an array for multipleRecordLinks
                                                if (destinationField?.type === "multipleRecordLinks" && value) {
                                                  value = value?.split(";")?.map((item) => item?.trim());
                                                }

                                                // Convert acceptable date
                                                if (destinationField?.type === "date" && value) {
                                                  const date = new Date(value);
                                                  value = date?.toISOString()?.split("T")?.[0]; // Extract YYYY-MM-DD from ISO string
                                                }
                                              }

                                              // Add to accumulator if the value is not null or undefined
                                              if (value !== undefined && value !== null && value !== "") {
                                                acc[destination] = value;
                                              }

                                              return acc;
                                            }, {}) || {};

