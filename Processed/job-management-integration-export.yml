  - dataSource:
      key: runCodeJsonForm
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    description: >-
      Maps the fields from the Airtable Addendums table to HubSpot Deal
      properties. Use this to define how each field from an Addendum record in
      Airtable should be written into a Change Order Deal in HubSpot.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {
           // Assuming the access token is stored in the connection under the name "HubSpot Private App Connection"
              
            const access_token = connection?.fields?.accessToken;
            
            let dealGroupName = context?.configVars["Deal Group Name"]?.dealGroups?.map(item => item?.groupName) || []
            console.log('dealGroupName:',dealGroupName)
            
            const propertiesResponse = await fetch(
              "https://api.hubapi.com/crm/v3/properties/deals",
              { method: "GET", headers: { Authorization: `Bearer ${access_token}` } },
            );

            // const propertiesData = await propertiesResponse.json();
            // const properties = propertiesData.results || [];
            // const uniqueKeys = [...new Set(properties.map((property) => property.name))];
            // const filters = ["hs", "paint", "paintscout", "zoho"];
            // const filteredHubspotFields = properties.filter(
            //   (key) => !filters.some((prefix) => key.match(`^${prefix}_`)),
            // );

            const propertiesData = await propertiesResponse.json();
            const properties = propertiesData.results || [];
            // const filteredProperties = properties.filter(
            //   (property) =>
            //     property.groupName !== "dealstages" &&
            //     property.groupName !== "deal_activity",
            // );
            const filteredProperties = (properties || []).filter((p) => dealGroupName.includes(p.groupName));

            const hubspotDropdown = filteredProperties
              .map((property) => ({
                title: property.label,
                const: property.name,
              }))
              .sort((a, b) => (a.title < b.title ? -1 : 1));

            // Pulling of Airtable fields
            const airtable = JSON.parse(contextValue);
            const baseId = airtable.baseId;
            const jobsTableId = airtable.jobsId;
            const addendumsTableId = airtable.addendumsId;
            const objectsTableId = airtable.objectsId
            const at_token = airtable.token;
            const airtableApiUrl = `https://api.airtable.com/v0/meta/bases/${baseId}/tables`;

            // Fetch table schema from Airtable using the valid access token
            const response = await fetch(airtableApiUrl, {
              method: "GET",
              headers: {
                Authorization: `Bearer ${at_token}`,
                "Content-Type": "application/json",
              },
            });

            const tableData = await response.json();

            // Addendums Table
            const addendums = tableData.tables.find(
              (tbl) => tbl.id === addendumsTableId,
            );
            // Jobs Table
            const jobs = tableData.tables.find((tbl) => tbl.id === jobsTableId);
            // Objects Table
            const objects = tableData.tables.find(
              (tbl) => tbl.id === objectsTableId,
            );

            const addendumsFields = addendums.fields.map((field) => ({
              id: field.id,
              name: field.name,
              type: field.type,
              table: "Addendums",
            }));
            const jobsFields = jobs.fields
              .filter((field) => /sales|billing|site|source/i.test(field.name))
              .map((field) => ({
                id: field.id,
                name: field.name,
                type: field.type,
                table: "Jobs",
              }));
            const objectsFields = objects.fields.map((field) => ({
              id: field.id,
              name: field.name,
              type: field.type,
              table: "Objects",
            }));

            const airtableDropdown = addendumsFields
              .concat(jobsFields, objectsFields)
              .map((field) => ({
                title: `${field.name} - (${field.table})`,
                const: `[${field.table}]${field.name}`,
              }))
              .sort((a, b) => (a.title < b.title ? -1 : 1));

            const schema = {
              type: "array",
              items: {
                type: "object",
                properties: {
                  source: {
                    type: "string",
                    oneOf: airtableDropdown,
                    options: {
                      autocomplete: true,
                    },
                  },
                  destination: {
                    type: "string",
                    oneOf: hubspotDropdown,
                    options: {
                      autocomplete: true,
                    },
                  },
                },
              },
            };

            const uiSchema = {
              type: "Control",
              scope: "#",
              options: {
                layout: "Accordion",
                showSortButtons: true,
                detail: {
                  type: "HorizontalLayout",
                  elements: [
                    {
                      type: "Control",
                      scope: "#/properties/source",
                      options: {
                        autocomplete: true,
                      },
                      label: "Airtable Fields",
                    },
                    {
                      type: "Control",
                      scope: "#/properties/destination",
                      options: {
                        autocomplete: true,
                      },
                      label: "Hubspot Properties",
                    },
                  ],
                },
              },
            };

            const data = [
              { source: "[Addendums]Addendum Total", destination: "amount" },
              {
                source: "[Jobs]Billing Street Address",
                destination: "billing_street_address",
              },
              { source: "[Jobs]Billing City", destination: "billing_city" },
              { source: "[Jobs]Billing State", destination: "billing_state" },
              { source: "[Jobs]Billing Postal Code", destination: "billing_postal_code" },
              { source: "[Objects]Code", destination: "project_type" },
              { source: "[Addendums]CO Hours", destination: "hours___contract" },
              { source: "[Addendums]Job Number", destination: "job_number" },
              { source: "[Addendums]Project Name", destination: "dealname" },
              {
                source: "[Jobs]Billing Contact First Name",
                destination: "billing_contact_first_name",
              },
              {
                source: "[Jobs]Billing Contact Last Name",
                destination: "billing_contact_last_name",
              },
              {
                source: "[Jobs]Billing Contact Email",
                destination: "billing_contact_email",
              },
              { source: "[Jobs]Billing CCd Email(s)", destination: "billing_ccd_emails" },
              {
                source: "[Addendums]Addendum Point of Contact Phone",
                destination: "billing_contact_phone",
              },
              { source: "[Jobs]Source", destination: "source" },
              {
                source: "[Addendums]Job Record ID",
                destination: "airtable_job_record_id",
              },
              {
                source: "[Addendums]Full Job Site Address",
                destination: "job_site_street_address",
              },
              { source: "[Jobs]Sales HS User ID", destination: "hubspot_owner_id" },
              {
                source: "[Addendums]Addendum Record ID",
                destination: "airtable_awo_record_id",
              },
              {
                source: "[Addendums]Addendum Point of Contact First Name",
                destination: "job_contact_first_name",
              },
              {
                source: "[Addendums]Addendum Point of Contact Last Name",
                destination: "job_contact_last_name",
              },
              {
                source: "[Addendums]Addendum Point of Contact Email",
                destination: "job_contact_email",
              },
              {
                source: "[Addendums]Addendum Point of Contact Phone",
                destination: "job_contact_phone",
              },
              { source: "[Jobs]Job Site City", destination: "job_site_city" },
              { source: "[Jobs]Job Site Country", destination: "job_site_country" },
              { source: "[Jobs]Job Site County", destination: "job_site_county" },
              {
                source: "[Jobs]Job Site Postal Code",
                destination: "job_site_postal_code",
              },
              { source: "[Jobs]Job Site State", destination: "job_site_state" },
              {
                source: "[Jobs]Job Site Street Address",
                destination: "job_site_street_address",
              },
              { source: "[Addendums]Job Number", destination: "jobestimate_number" },
            ];

            return Promise.resolve({
              schema,
              uiSchema,
              data,
            });
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
