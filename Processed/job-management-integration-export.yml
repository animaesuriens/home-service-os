definitionVersion: 7
description: >-
  This job management integration streamlines operations by syncing won jobs,
  managing projects, and linking contacts and companies directly from HubSpot.
  It provides a centralized system for seamless data flow, ensuring efficient
  tracking and organization across all job-related processes.
documentation: ''
endpointType: flow_specific
flows:
  - description: >-
      This flow creates the trigger in Airtable and registers the Won stage ID
      in the HS router.
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 01 Register Connection
    steps:
      - action:
          key: instanceDeploy
          component:
            isPublic: true
            key: management-triggers
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: Instance Deploy - Webhook
      - action:
          key: createObject
          component:
            isPublic: true
            key: collection-tools
            version: LATEST
        description: ''
        inputs:
          keyValueInput:
            type: complex
            value:
              - name:
                  type: value
                  value: event
                type: value
                value: register
              - name:
                  type: value
                  value: uniqueId
                type: configVar
                value: Won Job Stage
              - name:
                  type: value
                  value: instanceWebhookUrl
                type: reference
                value: instanceDeployWebhook.results.webhookUrls.03 Process Deal
        name: Process Deal
      - action:
          key: create
          component:
            isPublic: true
            key: collection-tools
            version: LATEST
        description: ''
        inputs:
          items:
            type: complex
            value:
              - type: reference
                value: processDeal.results
        name: Create List
      - action:
          key: loopOverItems
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          items:
            type: reference
            value: createList.results
        name: Loop Over Items
        steps:
          - action:
              key: httpPost
              component:
                isPublic: true
                key: http
                version: LATEST
            description: ''
            inputs:
              connection:
                type: configVar
                value: ''
              data:
                type: reference
                value: loopOverItems.currentItem
              debugRequest:
                type: value
                value: 'false'
              headers:
                type: complex
                value: []
              ignoreSslErrors:
                type: value
                value: 'false'
              includeFullResponse:
                type: value
                value: 'false'
              maxRetries:
                type: value
                value: '0'
              queryParams:
                type: complex
                value: []
              responseType:
                type: value
                value: json
              retryDelayMS:
                type: value
                value: '0'
              retryOnAllErrors:
                type: value
                value: 'false'
              timeout:
                type: value
                value: ''
              url:
                type: configVar
                value: HubSpot Route Registration URL
              useExponentialBackoff:
                type: value
                value: 'false'
            name: Register Endpoint
  - description: Update People table in PaintOS with HubSpot active users.
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 02 Register HS Users
    steps:
      - action:
          key: instanceDeploy
          component:
            isPublic: true
            key: management-triggers
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: HS User IDs Trigger
      - action:
          key: rawRequest
          component:
            isPublic: true
            key: hubspot
            version: LATEST
        description: ''
        errorConfig:
          delaySeconds: 10
          errorHandlerType: retry
          ignoreFinalError: false
          maxAttempts: 5
          usesExponentialBackoff: false
        inputs:
          connection:
            type: configVar
            value: HubSpot Private App Connection
          data:
            type: value
            value: ''
          debugRequest:
            type: value
            value: 'false'
          fileData:
            type: complex
            value: []
          fileDataFileNames:
            type: complex
            value: []
          formData:
            type: complex
            value: []
          headers:
            type: complex
            value: []
          maxRetries:
            type: value
            value: '0'
          method:
            type: value
            value: GET
          queryParams:
            type: complex
            value: []
          responseType:
            type: value
            value: json
          retryAllErrors:
            type: value
            value: 'false'
          retryDelayMS:
            type: value
            value: '0'
          timeout:
            type: value
            value: ''
          url:
            type: value
            value: /crm/v3/owners/
          useExponentialBackoff:
            type: value
            value: 'false'
        name: Get Owner
      - action:
          key: loopOverItems
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          items:
            type: reference
            value: getOwner.results.results
        name: Loop Over Owners
        steps:
          - action:
              key: runCode
              component:
                isPublic: true
                key: code
                version: LATEST
            description: ''
            inputs:
              code:
                type: value
                value: >
                  module.exports = async ({ logger, configVars }, stepResults)
                  => {
                    const hubspotData = stepResults?.loopOverOwners?.currentItem;

                    const emailDomain = hubspotData?.email || "";
                    const isBooleanEmail = emailDomain.includes("helloboolean.com");

                    // Validation: must contain at least one A-Z letter
                    const isValidName = (value) => {
                      if (!value || typeof value !== "string") return false;

                      // Regex: must contain at least one alphabetical character
                      return /[A-Za-z]/.test(value);
                    };

                    // Build fields dynamically
                    const fields = {
                      "Work Email": hubspotData?.email,
                      "HS User ID": hubspotData?.id,
                      "Employment Status": isBooleanEmail ? "Inactive" : "Active"
                    };

                    // Conditionally add valid first name
                    if (isValidName(hubspotData?.firstName)) {
                      fields["First Name"] = hubspotData.firstName;
                    }

                    // Conditionally add valid last name
                    if (isValidName(hubspotData?.lastName)) {
                      fields["Last Name"] = hubspotData.lastName;
                    }

                    // helloboolean.com email → add role
                    if (isBooleanEmail) {
                      fields["Role"] = ["Automation"];
                    }

                    const payload = {
                      performUpsert: {
                        fieldsToMergeOn: ["Work Email"]
                      },
                      records: [
                        {
                          fields
                        }
                      ]
                    };

                    return payload;
                  };
            name: Generate Upsert Payload
          - action:
              key: invokeFlow
              component:
                isPublic: true
                key: cross-flow
                version: LATEST
            description: ''
            inputs:
              data:
                type: reference
                value: generateUpsertPayload.results
              flowName:
                type: value
                value: Subflow - 02 Register HS Users
            name: Invoke Flow
  - description: Update People table in PaintOS with HubSpot active users.
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: true
    name: Subflow - 02 Register HS Users
    steps:
      - action:
          key: crossFlow
          component:
            isPublic: true
            key: cross-flow
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: HS User IDs Trigger
      - action:
          key: rawRequest
          component:
            isPublic: true
            key: airtable
            version: LATEST
        description: >-
          This is to update the record in peoples table, if the error message
          says ""Cannot update more than one record for fields to merge on"
          meaning it has same value in two record, it could be two records are
          found in one email or two record found in 'HS User ID'
        errorConfig:
          delaySeconds: null
          errorHandlerType: ignore
          ignoreFinalError: null
          maxAttempts: null
          usesExponentialBackoff: null
        inputs:
          connection:
            type: configVar
            value: Airtable Connection
          data:
            type: reference
            value: hsUserIdsTrigger.results.body.data
          debugRequest:
            type: value
            value: 'false'
          fileData:
            type: complex
            value: []
          fileDataFileNames:
            type: complex
            value: []
          formData:
            type: complex
            value: []
          headers:
            type: complex
            value: []
          maxRetries:
            type: value
            value: '0'
          method:
            type: value
            value: PATCH
          queryParams:
            type: complex
            value: []
          responseType:
            type: value
            value: json
          retryAllErrors:
            type: value
            value: 'false'
          retryDelayMS:
            type: value
            value: '0'
          timeout:
            type: value
            value: ''
          url:
            type: template
            value: /v0/{{#Project Management Base}}/{{#People Table}}
          useExponentialBackoff:
            type: value
            value: 'false'
        name: HS Owner x People Table
      - action:
          key: branchOnExpression
          component:
            isPublic: true
            key: branch
            version: LATEST
        branches:
          - name: Single value option
            steps:
              - action:
                  key: runCode
                  component:
                    isPublic: true
                    key: code
                    version: LATEST
                description: ''
                inputs:
                  code:
                    type: value
                    value: >
                      module.exports = async ({ logger, configVars },
                      stepResults) => {
                        let payload = stepResults?.hsUserIdsTrigger?.results?.body?.data;

                        if (payload?.records?.length) {
                          payload.records = payload.records.map((record) => {
                            const role = record?.fields?.Role;
                            if (Array.isArray(role)) {
                              record.fields.Role = role.join(", "); // convert array to comma-separated string
                            }
                            return record;
                          });
                        }

                        return { data: payload };
                      };
                name: Over ride payload
              - action:
                  key: rawRequest
                  component:
                    isPublic: true
                    key: airtable
                    version: LATEST
                description: >-
                  This is to update the record in peoples table, if the error
                  message says ""Cannot update more than one record for fields
                  to merge on" meaning it has same value in two record, it could
                  be two records are found in one email or two record found in
                  'HS User ID'
                errorConfig:
                  delaySeconds: 10
                  errorHandlerType: retry
                  ignoreFinalError: true
                  maxAttempts: 1
                  usesExponentialBackoff: false
                inputs:
                  connection:
                    type: configVar
                    value: Airtable Connection
                  data:
                    type: reference
                    value: overRidePayload.results
                  debugRequest:
                    type: value
                    value: 'false'
                  fileData:
                    type: complex
                    value: []
                  fileDataFileNames:
                    type: complex
                    value: []
                  formData:
                    type: complex
                    value: []
                  headers:
                    type: complex
                    value: []
                  maxRetries:
                    type: value
                    value: '0'
                  method:
                    type: value
                    value: PATCH
                  queryParams:
                    type: complex
                    value: []
                  responseType:
                    type: value
                    value: json
                  retryAllErrors:
                    type: value
                    value: 'false'
                  retryDelayMS:
                    type: value
                    value: '0'
                  timeout:
                    type: value
                    value: ''
                  url:
                    type: template
                    value: /v0/{{#Project Management Base}}/{{#People Table}}
                  useExponentialBackoff:
                    type: value
                    value: 'false'
                name: HS Owner x People Table 2
          - name: Else
            steps: []
        description: ''
        inputs:
          conditions:
            type: complex
            value:
              - name: Single value option
                type: complex
                value:
                  - and
                  - - exists
                    - name: ''
                      type: reference
                      value: hsOwnerXPeopleTable.results.error.name
        name: Branch on Expression
  - description: Processing won deals to Jobs table in PaintOS
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 03 Process Deal
    steps:
      - action:
          key: webhook
          component:
            isPublic: true
            key: webhook-triggers
            version: LATEST
        description: ''
        inputs:
          body:
            type: value
            value: ''
          contentType:
            type: value
            value: application/json
          headers:
            type: complex
            value: []
          statusCode:
            type: value
            value: '202'
        isTrigger: true
        name: Process Deal Trigger
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              /*
                Access config variables by name through the configVars object. e.g.
                  const apiEndpoint = `${configVars["App Base URL"]}/api`;

                Access previous steps' results through the stepResults object. Trigger
                and step names are camelCased. If the step "Get Data from API" returned
                {"foo": "bar", "baz": 123}, you could destructure that data with:
                  const { foo, baz } = stepResults.getDataFromApi.results;

                You can return string, number or complex object data. e.g.
                  return { data: { foo: "Hello", bar: 123.45, baz: true } };
              */

              module.exports = async ({ logger, configVars }, stepResults) => {
                return { data: configVars["Job Coordinator"] };
              };
        name: Code Block
      - action:
          key: rawRequest
          component:
            isPublic: true
            key: hubspot
            version: LATEST
        description: ''
        inputs:
          connection:
            type: configVar
            value: HubSpot Private App Connection
          data:
            type: value
            value: ''
          debugRequest:
            type: value
            value: 'false'
          fileData:
            type: complex
            value: []
          fileDataFileNames:
            type: complex
            value: []
          formData:
            type: complex
            value: []
          headers:
            type: complex
            value: []
          maxRetries:
            type: value
            value: '0'
          method:
            type: value
            value: GET
          queryParams:
            type: complex
            value: []
          responseType:
            type: value
            value: json
          retryAllErrors:
            type: value
            value: 'false'
          retryDelayMS:
            type: value
            value: '0'
          timeout:
            type: value
            value: ''
          url:
            type: value
            value: /crm/v3/properties/deals?archived=false
          useExponentialBackoff:
            type: value
            value: 'false'
        name: Get Deal Properties
      - action:
          key: rawRequest
          component:
            isPublic: true
            key: hubspot
            version: LATEST
        description: ''
        inputs:
          connection:
            type: configVar
            value: HubSpot Private App Connection
          data:
            type: value
            value: ''
          debugRequest:
            type: value
            value: 'false'
          fileData:
            type: complex
            value: []
          fileDataFileNames:
            type: complex
            value: []
          formData:
            type: complex
            value: []
          headers:
            type: complex
            value: []
          maxRetries:
            type: value
            value: '0'
          method:
            type: value
            value: GET
          queryParams:
            type: complex
            value: []
          responseType:
            type: value
            value: json
          retryAllErrors:
            type: value
            value: 'false'
          retryDelayMS:
            type: value
            value: '0'
          timeout:
            type: value
            value: ''
          url:
            type: value
            value: /crm/v3/properties/companies?archived=false
          useExponentialBackoff:
            type: value
            value: 'false'
        name: Get Companies Properties
      - action:
          key: loopOverItems
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          items:
            type: reference
            value: processDealTrigger.results.body.data
        name: Loop Over Deals
        steps:
          - action:
              key: branchOnExpression
              component:
                isPublic: true
                key: branch
                version: LATEST
            branches:
              - name: If Won
                steps:
                  - action:
                      key: runCode
                      component:
                        isPublic: true
                        key: code
                        version: LATEST
                    description: >-
                      Removed File properties, to avoid issue when creating job
                      in airtable, the flow 12 handles this file field sync
                    inputs:
                      code:
                        type: value
                        value: >
                          module.exports = async ({ logger, configVars },
                          stepResults) => {
                            let properties = stepResults?.getDealProperties?.results?.results;
                            properties = properties?.filter(item => !item?.fieldType?.toLowerCase()?.includes("file"));
                            let propNames = properties?.map(prop => prop?.name);

                            return propNames;
                          };
                    name: List Deal Properties
                  - action:
                      key: runCode
                      component:
                        isPublic: true
                        key: code
                        version: LATEST
                    description: ''
                    inputs:
                      code:
