  - dataSource:
      key: runCodeJsonForm
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    description: >-
      This process maps contact fields from HubSpot to their corresponding
      fields in the Airtable Contact table to ensure accurate data
      synchronization between platforms, including common fields such as Record
      ID, First Name, Last Name, Email, Phone Number, Street Address, City,
      State/Region, Postal Code, and Company Name.
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          module.exports = async (context, { connection, contextValue }) => {
            const access_token = connection?.fields?.accessToken;
            
            let contactGroupName = context?.configVars["Contact Group Name"]?.contactGroups?.map(item => item?.groupName) || []
            console.log('contactGroupName:',contactGroupName)

            // Fetch HubSpot contact properties
            const propertiesResponse = await fetch(
              "https://api.hubapi.com/crm/v3/properties/contacts",
              {
                method: "GET",
                headers: { Authorization: `Bearer ${access_token}` },
              }
            );

            const propertiesData = await propertiesResponse.json();
            const properties = propertiesData.results || [];

            const contactFields = (properties || []).filter((p) => contactGroupName.includes(p.groupName));

            const hubspotAccountFields = contactFields
              .map((property) => ({
                title: property.label,
                const: property.name,
              }))
              .sort((a, b) => (a.title < b.title ? -1 : 1));

            // Pull Airtable data from context
            const airtable = JSON.parse(contextValue);
            const baseId = airtable.baseId;
            const tableId = airtable.tableId;
            const at_token = airtable.token;

            const airtableApiUrl = `https://api.airtable.com/v0/meta/bases/${baseId}/tables`;

            const response = await fetch(airtableApiUrl, {
              method: "GET",
              headers: {
                Authorization: `Bearer ${at_token}`,
                "Content-Type": "application/json",
              },
            });

            const tableData = await response.json();
            const table = tableData.tables.find((tbl) => tbl.id === tableId);

            const airtableMappingFields = table.fields
              .filter((fld) => {
                return (
                  fld.type !== "formula" &&
                  fld.type !== "rollup" &&
                  fld.type !== "lookup" &&
                  fld.type !== "singleCollaborator" &&
                  fld.type !== "multipleCollaborators" &&
                  fld.type !== "createdTime" &&
                  fld.type !== "multipleLookupValues" &&
                  fld.type !== "autoNumber" &&
                  fld.type !== "lastModifiedTime" &&
                  fld.type !== "button" &&
                  fld.type !== "createdBy" &&
                  fld.type !== "lastModifiedBy"
                );
              })
              .map((field) => ({
                title: `${field.name} (${field.type})`,
                const: field.name,
              }))
              .sort((a, b) => (a.title < b.title ? -1 : 1));

            const schema = {
              type: "array",
              items: {
                type: "object",
                properties: {
                  source: {
                    type: "string",
                    oneOf: hubspotAccountFields,
                    options: {
                      autocomplete: true,
                    },
                  },
                  destination: {
                    type: "string",
                    oneOf: airtableMappingFields,
                    options: {
                      autocomplete: true,
                    },
                  },
                },
                required: ["source", "destination"],
              },
            };

            const uiSchema = {
              type: "Control",
              scope: "#",
              options: {
                layout: "Accordion",
                showSortButtons: true,
                detail: {
                  type: "HorizontalLayout",
                  elements: [
                    {
                      type: "Control",
                      scope: "#/properties/source",
                      options: {
                        autocomplete: true,
                      },
                      label: "HubSpot Contact Properties",
                    },
                    {
                      type: "Control",
                      scope: "#/properties/destination",
                      options: {
                        autocomplete: true,
                      },
                      label: "Airtable Fields",
                    },
                  ],
                },
              },
            };

            const data = [
              { source: "hs_object_id", destination: "HS Record ID" },
              { source: "firstname", destination: "First Name" },
              { source: "lastname", destination: "Last Name" },
              { source: "email", destination: "Email" },
            ];

            return Promise.resolve({
              schema,
              uiSchema,
              data,
            });
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: HubSpot Private App Connection
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: template
        value: |-
          {
          "baseId": "{{#Project Management Base}}",
          "tableId": "{{#Contacts Table}}",
          "token": "{{#Airtable Personal Token}}"
          }
    key: HubSpot Contact to Airtable Contact Mapping
    orgOnly: false
