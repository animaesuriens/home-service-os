              module.exports = async ({ logger, configVars }, stepResults) => {
                let errorDetails = stepResults?.cross?.results?.body?.data
                
                let subject = configVars["Error Email Template"].filter(item => {
                  if (item.key == "subject") {
                    return item
                  }
                })[0].value

                let bodyTemplate = configVars["Error Email Template"].filter(item => {
                  if (item.key == "body") {
                    return item
                  }
                })[0].value
                
                subject = subject?.replace('{subject}','Esignature Error')
                bodyTemplate = bodyTemplate?.replace('{title}',errorDetails?.message)
