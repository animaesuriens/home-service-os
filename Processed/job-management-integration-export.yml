configPages:
  - elements:
      - type: htmlElement
        value: >
          <!doctype html>

          <html lang="en">

          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>V35 – Job Management (BETA)</title>
          </head>

          <body style="font-family: Arial, Helvetica, sans-serif;
          line-height:1.5; margin:24px; color:#111">
            <header style="margin-bottom:18px;">
              <h1 style="margin:0 0 6px 0; font-size:22px;">📣 New BETA Version Published 📣</h1>
              <div style="font-size:14px; color:#333">
                <strong>Version:</strong> V35 – Job Management<br>
                <strong>Date:</strong> 10/06/2025 MDT
              </div>
            </header>

            <main>
              <!-- Feature 1 -->
              <section style="margin-bottom:20px;">
                <h2 style="margin:0 0 8px 0; font-size:18px;">Feature: Role Field Update in People Table</h2>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Problem</h3>
                <ul style="margin:0 0 0 18px; padding:0;">
                  <li style="margin:6px 0;">
                    🔸 During the alpha test for <strong>Contact Sync Preferences</strong>, a bug was found that was unrelated to that feature.
                    The <strong>“Role”</strong> field in Airtable’s <strong>People Table</strong> was changed from a single select to a multi-select field,
                    which caused an error in <strong>Flow 02</strong> that syncs people from HubSpot to Airtable.
                  </li>
                </ul>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Solution</h3>
                <ul style="margin:0 0 0 18px; padding:0;">
                  <li style="margin:6px 0;">🔸 Updated the payload from a single string to an array containing a single string value.</li>
                </ul>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Test</h3>
                <p style="margin:0;">🔸 Verified during development. The <strong>Role</strong> value now inserts and updates successfully.</p>

                <h3 style="margin:12px 0 6px 0; font-size:16px;">Notes</h3>
                <p style="margin:0;">
                  🔸 The default option is <strong>“Always.”</strong><br>
                  🔸 No existing clients are affected by this update.<br>
                  🔸 This is a <strong>BETA version</strong> and is now available for testing with other clients.
                </p>
              </section>
            </main>

            <footer style="margin-top:20px; font-size:13px; color:#444">
              <em>Generated: 10/06/2025 MDT</em>
            </footer>
          </body>

          </html>
