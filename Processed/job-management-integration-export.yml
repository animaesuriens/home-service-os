                let emailPayload = {

                  from: configVars['The "From Name" for Automation Alerts'],
                  to: configVars['Resource Coordinator - Default Notification Email'],
                  cc: "",
                  bcc: '',
                  subject: subject,
                  body: bodyTemplate
                };

                logger.info("Generated Email Payload:", emailPayload);

                return { data: emailPayload };
              };


