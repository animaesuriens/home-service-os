          value: '*/2 * * * *'
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const mappingData = configVars?.["Airtable Addendums Fields to HubSpot Deal Properties Mapping"];

                const parsedMappingData = mappingData?.map((item) => {
                  const regex = /^\[([^\]]+)\](.+)$/;
                  const match = item?.source?.match?.(regex);
                  logger.info(item)
                  if (match) {
                    return {
                      at_table: match?.[1],
                      at_field: match?.[2]?.trim(),
                      hs_field: item?.destination,
                    };
                  }

                  return {};
                });

                return { data: parsedMappingData };
              };
