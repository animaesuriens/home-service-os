category: Marketing and Sales System
configPages:
  - elements:
      - type: htmlElement
        value: |-
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>Slack Update - v14</title>
            <style>
              /* Only class selectors — no global tag selectors */
              .su-container { max-width: 800px; margin: 20px auto; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; line-height: 1.45; }
              .su-card { border: 1px solid #e6e6e6; border-radius: 8px; padding: 18px; }
              .su-header { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
              .su-badge { font-weight: 700; font-size: 14px; padding: 6px 10px; border-radius: 6px; border: 1px solid #e6e6e6; }
              .su-title { font-size: 18px; font-weight: 700; }
              .su-meta { color: #6b7280; font-size: 13px; }

              .su-section { margin-top: 12px; }
              .su-section-title { margin-bottom: 8px; }
              .su-list { margin: 0; padding-left: 18px; }
              .su-list-item { margin-bottom: 6px; }
              .su-note { font-size: 13px; padding: 10px; border-radius: 6px; border: 1px dashed #ececec; }

              .su-code { display: block; white-space: pre-wrap; word-break: break-word; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, 'Roboto Mono', 'Courier New', monospace; font-size: 13px; padding: 12px; border-radius: 6px; margin-top: 8px; border: 1px solid #e6e6e6; }

              @media (max-width: 520px) {
                .su-container { padding: 12px; }
                .su-title { font-size: 16px; }
              }
            </style>
          </head>
          <body>
            <div class="su-container">
              <div class="su-card">
                <div class="su-header">
                  <div class="su-badge">📣 NEW UPDATE</div>
                  <div>
                    <div class="su-title">V14 – Sales and Marketing Integration</div>
                    <div class="su-meta">Date: 08/29/2025</div>
                  </div>
                </div>

                <div class="su-section">
                  <div class="su-section-title"><h3>Problem</h3></div>
                  <ul class="su-list">
                    <li class="su-list-item">🔸 When a deal is deleted in HubSpot, it is not deleted in Google Sheets.</li>
                    <li class="su-list-item">🔸 When two deals are merged in HubSpot, the changes do not reflect in Google Sheets.</li>
                    <li class="su-list-item">🔸 The tab name where data is populated was hard-coded.</li>
                    <li class="su-list-item">🔸 Associated contacts are not yet included in the mapping for deal sync.</li>
                  </ul>
                </div>

                <div class="su-section">
                  <div class="su-section-title"><h3>Solution</h3></div>
                  <ul class="su-list">
                    <li class="su-list-item">🔸 Updated backend code to fetch all deleted deals, locate them by deal ID in Google Sheets, and delete the corresponding rows.</li>
                    <li class="su-list-item">🔸 When two deals are merged, the merged deal IDs are identified, the old IDs are removed from Google Sheets, and the new merged deal is added.</li>
                    <li class="su-list-item">🔸 Updated configuration to remove the hard-coded tab name and added associated contacts to the mapping fields.</li>
                    <li class="su-list-item">🔸 Updated backend code to also retrieve associated contacts for each deal and map values based on the configured fields (only the contactinformation group properties are included).</li>
                  </ul>
                </div>

                <div class="su-section">
                  <div class="su-section-title"><h3>Test</h3></div>
                  <ul class="su-list">
                    <li class="su-list-item">🔸 Verified during development that deleting a deal in HubSpot also deletes its corresponding row in Google Sheets.</li>
                    <li class="su-list-item">🔸 Verified during development that merging two deals deletes the old deal information and adds the new merged deal.</li>
                    <li class="su-list-item">🔸 Verified during development that contacts can now be mapped in the configuration and that the correct data is retrieved during deal sync.</li>
                  </ul>
                </div>

                <div class="su-section">
                  <div class="su-section-title"><h3>Impact / Notes</h3></div>
                  <div class="su-note">
                    🔸 Deal sync is now compatible with old templates, provided the correct tab name and required labels are present on that tab.
                  </div>
                </div>
              </div>
            </div>
          </body>
          </html>
      - type: htmlElement
        value: |
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Sales & Marketing Reporting</title>
            <style>
              :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
              body { margin: 0; padding: 24px; color: #111; }
              .container { max-width: 900px; margin: 0 auto; padding: 28px; border-radius: 16px; }
              h1 { margin-top: 0; }
              .video { margin: 16px 0 24px; border-radius: 12px; overflow: hidden; }
              .meta { font-size: 14px; color: #555; }
              .section { margin: 24px 0; }
              a.btn { display: inline-block; padding: 10px 14px; border-radius: 10px; border: 1px solid #ddd; text-decoration: none; }
              a.btn:hover { border-color: #aaa; }
              ul { margin: 8px 0 0 20px; }
              code { padding: 2px 6px; border-radius: 6px; }
            </style>
          </head>
          <body>
            <main class="container">
              <header>
                <h1>Sales and Marketing Reporting Video</h1>
                <p>Overview of our HubSpot → Google Sheets reporting automation</p>
              </header>

              <section class="video section" aria-label="Sales and Marketing Reporting Video">
                <!-- Replace the <source> src with your actual video URL or file path -->
                <video controls playsinline width="100%" preload="metadata" poster="" style="display:block; width:100%; height:auto;">
                  <source src="https://storage.googleapis.com/boolean-app-381414.appspot.com/Boolean/Configuring%20the%20Sales%20and%20Marketing%20Report%20Template%20%F0%9F%93%8A.mp4" type="video/mp4" />
                  Your browser does not support the video tag.
                </video>
              </section>

              <section class="section">
                <h2>Google Drive Main Folder</h2>
                <p>
                  <a class="btn" href="https://drive.google.com/drive/u/0/folders/18TiNIKf4OgvQPhgro2p6XBYXKdM-ujab?ths=true" target="_blank" rel="noopener noreferrer">
                    Open GDrive Folder
                  </a>
                </p>
              </section>

              <section class="section">
                <h2>Description</h2>
                <p>
                  This automation continuously syncs all deals from <strong>HubSpot</strong> into a centralized <strong>Google Sheet</strong>. The sheet powers a built-in dashboard for clearer, more actionable reporting on deal statuses and related sales &amp; marketing metrics.
                </p>
                <h3>Key Capabilities</h3>
                <ul>
                  <li>Automatic HubSpot deal sync to Google Sheets (near real-time or on schedule).</li>
                  <li>Prebuilt dashboard for status tracking, pipeline visibility, and trend analysis.</li>
                  <li>Single source of truth for sales and marketing teams.</li>
                  <li>Flexible filters, charts, and summaries for quick insights.</li>
                </ul>
                <h3>Notes</h3>
                <ul>
                  <li>Ensure the HubSpot token includes the <code>owner.read</code> scope.</li>
                  <li>Use a unique Client Name so each mapping set appears correctly on the mapping page.</li>
                </ul>
              </section>
            </main>
          </body>
          </html>
