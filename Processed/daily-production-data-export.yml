                        key: airtable
                        version: LATEST
                    description: ''
                    errorConfig:
                      delaySeconds: 5
                      errorHandlerType: retry
                      ignoreFinalError: false
                      maxAttempts: 3
                      usesExponentialBackoff: false
                    inputs:
                      airtableConnection:
                        type: configVar
