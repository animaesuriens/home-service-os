                                      - name:
                                          type: value
                                          value: Project
                                        type: reference
                                        value: loopProjects.currentItem.id
                                  tableName:
                                    type: configVar
                                    value: Daily Production Data Table
                                name: Update Daily Production Data
                          - name: Else
                            steps:
                              - action:
                                  key: createRecord
                                  component:
                                    isPublic: true
                                    key: airtable
                                    version: LATEST
                                description: ''
                                inputs:
                                  airtableConnection:
                                    type: configVar
                                    value: Airtable Connection
                                  baseId:
                                    type: configVar
                                    value: Project Management Base
                                  dynamicFields:
                                    type: value
                                    value: ''
                                  recordFields:
                                    type: complex
                                    value:
                                      - name:
                                          type: value
                                          value: Date
                                        type: reference
                                        value: loopOverWorkDays.currentItem
                                      - name:
                                          type: value
                                          value: Project
                                        type: reference
                                        value: loopProjects.currentItem.id
                                  tableName:
                                    type: configVar
                                    value: Daily Production Data Table
                                name: Create Daily Production Data
                        description: ''
                        inputs:
                          conditions:
                            type: complex
                            value:
                              - name: New Work Day
                                type: complex
                                value:
                                  - and
                                  - - exists
                                    - name: ''
                                      type: reference
                                      value: getExistingDpd.results.0
                        name: New Work Day Branch
                  - action:
                      key: length
                      component:
                        isPublic: true
                        key: collection-tools
                        version: LATEST
                    description: ''
                    inputs:
                      listInput:
                        type: reference
                        value: loopOverWorkDays.results
                    name: Total Working Days
                  - action:
                      key: loopOverItems
                      component:
                        isPublic: true
                        key: loop
                        version: LATEST
                    description: ''
                    inputs:
                      items:
                        type: reference
                        value: sortExistingDpdByDate.results
                    name: Loop Over Existing DPD
                    steps:
                      - action:
                          key: branchOnExpression
                          component:
                            isPublic: true
                            key: branch
                            version: LATEST
                        branches:
                          - name: Delete DPD
                            steps: []
                          - name: Else
                            steps: []
                        description: ''
                        inputs:
                          conditions:
                            type: complex
                            value:
                              - name: Delete DPD
                                type: complex
                                value:
                                  - and
                                  - - lessThanOrEqual
                                    - name: ''
                                      type: reference
                                      value: totalWorkingDays.results
                                    - name: ''
                                      type: reference
                                      value: loopOverExistingDpd.index
