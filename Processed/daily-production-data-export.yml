                      baseId:
                        type: configVar
                        value: Project Management Base
                      dynamicFields:
                        type: value
                        value: ''
                      record:
                        type: reference
                        value: loopProjects.currentItem.id
                      recordFields:
                        type: complex
                        value:
                          - name:
                              type: value
                              value: ⚙️ Daily Production Data Records Last Updated
                            type: reference
                            value: convertEpochTimestampToDate.results
                      tableName:
                        type: configVar
                        value: Projects Table
                    name: Update Modified Date
              - name: Else
                steps: []
            description: ''
            inputs:
