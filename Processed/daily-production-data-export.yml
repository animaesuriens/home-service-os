                      - action:
                          key: branchOnExpression
                          component:
                            isPublic: true
                            key: branch
                            version: LATEST
                        branches:
                          - name: New Work Day
                            steps:
                              - action:
                                  key: updateRecord
                                  component:
                                    isPublic: true
                                    key: airtable
                                    version: LATEST
                                description: ''
                                inputs:
                                  airtableConnection:
                                    type: configVar
                                    value: Airtable Connection
                                  baseId:
                                    type: configVar
                                    value: Project Management Base
                                  dynamicFields:
                                    type: value
                                    value: ''
                                  record:
                                    type: reference
                                    value: getExistingDpd.results.0.id
