                                          usesExponentialBackoff: null
                                        inputs:
                                          data:
                                            type: reference
                                            value: aggregateDpdData.results
                                          flowName:
                                            type: value
                                            value: Process Timelog
                                        name: Process Timelog
                                  - name: Else
                                    steps: []
                                description: ''
                                inputs:
                                  conditions:
                                    type: complex
                                    value:
                                      - name: 'Yes'
                                        type: complex
                                        value:
                                          - and
                                          - - doesNotExist
                                            - name: ''
                                              type: reference
                                              value: aggregateDpdData.results.error
                                name: Payload generated succesfully?
                    description: ''
                    inputs:
                      conditions:
                        type: complex
                        value:
                          - name: 'Yes'
                            type: complex
                            value:
                              - and
                              - - dateTimeAfter
                                - name: ''
                                  type: reference
                                  value: getCurrentDateTime.results
                                - name: ''
                                  type: reference
                                  value: stopwatchEndingTime.results
                    name: Time exceeded?
          - name: Else
            steps: []
        description: ''
        inputs:
          conditions:
            type: complex
            value:
              - name: 'Yes'
                type: complex
                value:
                  - and
                  - - exists
                    - name: ''
                      type: reference
                      value: listTimeLogs.results.0.id
        name: Records fetched?
