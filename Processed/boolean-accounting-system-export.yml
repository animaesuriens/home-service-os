                                let vendorData = stepResults.loopOverBills.currentItem["VendorRef"];
                                let vendorId = vendorData?.value;
                                let vendorName = vendorData?.name;

                                let payload = {
                                  performUpsert: {
                                    fieldsToMergeOn: ["QBO Vendor ID"],
                                  },
                                  records: [
                                    {
                                      fields: {
                                        "QBO Vendor ID": vendorId,
                                        Status: "Whitelist",
                                        "Display Name": vendorName,
