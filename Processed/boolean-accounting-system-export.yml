                          ignoreFinalError: null
                          maxAttempts: null
                          usesExponentialBackoff: null
                        inputs:
                          connection:
                            type: configVar
                            value: QuickBooks Connection
                          data:
                            type: reference
                            value: createCustomerPayload.results
                          debugRequest:
                            type: value
                            value: 'false'
                          fileData:
                            type: complex
                            value: []
                          formData:
                            type: complex
                            value: []
                          headers:
                            type: complex
                            value:
                              - name:
                                  type: value
                                  value: Content-Type
                                type: value
                                value: application/json
                          maxRetries:
                            type: value
                            value: '0'
                          method:
                            type: value
                            value: POST
                          queryParams:
                            type: complex
                            value: []
                          responseType:
                            type: value
                            value: json
                          retryAllErrors:
                            type: value
                            value: 'false'
                          retryDelayMS:
                            type: value
                            value: '0'
                          timeout:
                            type: value
                            value: ''
                          url:
                            type: value
                            value: customer
                          useExponentialBackoff:
                            type: value
                            value: 'false'
                        name: Create Customer
                      - action:
                          key: branchOnExpression
                          component:
                            isPublic: true
                            key: branch
                            version: LATEST
                        branches:
                          - name: 'Yes'
                            steps:
                              - action:
