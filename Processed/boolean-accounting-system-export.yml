defaultInstanceProfile: Default Instance Profile
definitionVersion: 7
description: >-
  This integrates with QuickBooks Online to simplify invoicing, track expenses,
  and manage subcontractor payments. By connecting job and project data to
  financial processes, it ensures accurate billing, expense allocation, and
  streamlined payment workflows for efficient business operations.
documentation: ''
endpointType: flow_specific
flows:
  - description: >-
      This flow creates the trigger in Airtable and registers the Won stage ID
      in the HS router.
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 01 Register Connection
    steps:
      - action:
          key: instanceDeploy
          component:
            isPublic: true
            key: management-triggers
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: Instance Deploy - Webhook
      - action:
          key: listWebhooks
          component:
            isPublic: true
            key: airtable
            version: LATEST
        description: ''
        inputs:
          airtableConnection:
            type: configVar
            value: Airtable Connection
          baseId:
            type: configVar
            value: Project Management Base
        name: List Webhooks
      - action:
          key: loopOverItems
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          items:
            type: reference
            value: listWebhooks.results
        name: Loop Over Webhooks
        steps:
          - action:
              key: deleteWebhook
              component:
                isPublic: true
                key: airtable
                version: LATEST
            description: ''
            inputs:
              airtableConnection:
                type: configVar
                value: Airtable Connection
              baseId:
                type: configVar
                value: Project Management Base
              webhookId:
                type: reference
                value: loopOverWebhooks.currentItem.id
            name: Delete Webhook
  - description: Upsert QBO Parent Customer Linked to Jobs
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 02 Upsert QBO Parent Customer Linked to Jobs
    steps:
      - action:
          key: schedule
          component:
            isPublic: true
            key: schedule-triggers
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: Trigger
        schedule:
          meta:
            scheduleType: minute
            timeZone: ''
          type: value
          value: '*/30 * * * *'
      - action:
          key: listRecords
          component:
            isPublic: true
            key: airtable
            version: LATEST
        description: ''
        errorConfig:
          delaySeconds: 5
          errorHandlerType: retry
          ignoreFinalError: true
          maxAttempts: 2
          usesExponentialBackoff: false
        inputs:
          airtableConnection:
            type: configVar
            value: Airtable Connection
          baseId:
            type: configVar
            value: Project Management Base
          fields:
            type: complex
            value: []
          filterByFormula:
            type: template
            value: >-
              AND({{{#⚙️ Update Customer QBO Field - Jobs}}} = "TRUE", {Job
              Status} != "Closed", {{{#⚙️Include in QBO Customer Customer Upsert
              Automation Field - Jobs}}} = "TRUE")
          tableName:
            type: configVar
            value: Jobs Table
          view:
            type: value
            value: ''
        name: List Jobs
      - action:
          key: loopOverItems
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          items:
            type: reference
            value: listJobs.results
        name: Loop Over Jobs
        steps:
          - action:
              key: invokeFlow
              component:
                isPublic: true
                key: cross-flow
                version: LATEST
            description: Invoke flow
            inputs:
              data:
                type: reference
                value: loopOverJobs.currentItem
              flowName:
                type: value
                value: 02.1 Process Job
            name: Process Job
          - action:
              key: convertToString
              component:
                isPublic: true
                key: change-data-format
                version: LATEST
            description: ''
            inputs:
              value:
                type: reference
                value: processJob.results
            name: Process Job Result
          - action:
              key: branchOnExpression
              component:
                isPublic: true
                key: branch
                version: LATEST
            branches:
              - name: 'Yes'
                steps:
                  - action:
                      key: getCustomerById
                      component:
                        isPublic: true
                        key: quickbooks
                        version: LATEST
                    description: ''
                    errorConfig:
                      delaySeconds: null
                      errorHandlerType: ignore
                      ignoreFinalError: null
                      maxAttempts: null
                      usesExponentialBackoff: null
                    inputs:
                      debug:
                        type: value
                        value: 'false'
                      id:
                        type: reference
                        value: processJobResult.results
                      quickbooksConnection:
                        type: configVar
                        value: QuickBooks Connection
                    name: Get Customer By Id
                  - action:
                      key: branchOnExpression
                      component:
                        isPublic: true
                        key: branch
                        version: LATEST
                    branches:
                      - name: 'Yes'
                        steps:
                          - action:
                              key: getCurrentDateTime
                              component:
                                isPublic: true
                                key: datetime
                                version: LATEST
                            description: ''
                            inputs:
                              displayEpochInSeconds:
                                type: value
                                value: 'false'
                            name: Get Current Timedate
                          - action:
                              key: runCode
                              component:
                                isPublic: true
                                key: code
                                version: LATEST
                            description: ''
                            inputs:
                              code:
                                type: value
                                value: >
                                  module.exports = async ({ logger, configVars
                                  }, stepResults) => {
                                    let date = new Date(stepResults.getCurrentTimedate.results);

                                    date.setSeconds(date.getSeconds() + 3);
                                    return { data: date };
                                  };
                            name: Add seconds to Timedate
                          - action:
                              key: updateRecord
                              component:
                                isPublic: true
                                key: airtable
                                version: LATEST
                            description: ''
                            errorConfig:
                              delaySeconds: 10
                              errorHandlerType: retry
                              ignoreFinalError: false
                              maxAttempts: 3
                              usesExponentialBackoff: false
                            inputs:
                              airtableConnection:
                                type: configVar
                                value: Airtable Connection
                              baseId:
                                type: configVar
                                value: Project Management Base
                              dynamicFields:
                                type: value
                                value: ''
                              record:
                                type: reference
                                value: loopOverJobs.currentItem.id
                              recordFields:
                                type: complex
                                value:
                                  - name:
                                      type: value
                                      value: QBO Parent Customer ID
                                    type: reference
                                    value: processJobResult.results
                                  - name:
                                      type: value
                                      value: ⚙️ QBO Customer Last Sync
                                    type: reference
                                    value: addSecondsToTimedate.results
                                  - name:
                                      type: value
                                      value: ⚙️ Boolean Automation System Status
                                    type: value
                                    value: ' '
                              tableName:
                                type: configVar
                                value: Jobs Table
                            name: Update Record
                          - action:
                              key: runCode
                              component:
                                isPublic: true
                                key: code
                                version: LATEST
                            description: ''
                            inputs:
                              code:
                                type: value
                                value: >
                                  module.exports = async ({ logger, configVars
                                  }, stepResults) => {
                                    const job = stepResults.loopOverJobs.currentItem;

                                    const payload = {
                                      recordType: "Job",
                                      id: job.id,
                                    };

                                    return { data: payload };
                                  };
                            name: Cross Flow Payload
                          - action:
                              key: invokeFlow
                              component:
                                isPublic: true
                                key: cross-flow
                                version: LATEST
                            description: Invoke flow
                            inputs:
                              data:
                                type: reference
                                value: crossFlowPayload.results
                              flowName:
                                type: value
                                value: 04 Sync QBO Customer
                            name: Sync QB Parent Customer
                      - name: Else
                        steps:
                          - action:
                              key: updateRecord
                              component:
                                isPublic: true
                                key: airtable
                                version: LATEST
                            description: ''
                            errorConfig:
                              delaySeconds: 10
                              errorHandlerType: retry
                              ignoreFinalError: false
                              maxAttempts: 3
                              usesExponentialBackoff: false
                            inputs:
                              airtableConnection:
                                type: configVar
                                value: Airtable Connection
                              baseId:
                                type: configVar
                                value: Project Management Base
                              dynamicFields:
                                type: value
                                value: ''
                              record:
                                type: reference
                                value: loopOverJobs.currentItem.id
                              recordFields:
                                type: complex
                                value:
                                  - name:
                                      type: value
                                      value: ⚙️ Boolean Automation System Status
                                    type: value
                                    value: >-
                                      Invalid Customer ID. Customer not found in
                                      QBO.
                              tableName:
                                type: configVar
                                value: Jobs Table
                            name: Update Record (Error)
                    description: ''
                    inputs:
                      conditions:
                        type: complex
                        value:
                          - name: 'Yes'
                            type: complex
                            value:
                              - and
                              - - doesNotExist
                                - name: ''
                                  type: reference
                                  value: getCustomerById.results.error
                    name: Customer Found
              - name: Else
                steps:
                  - action:
                      key: updateRecord
                      component:
                        isPublic: true
                        key: airtable
                        version: LATEST
                    description: ''
                    errorConfig:
                      delaySeconds: 10
                      errorHandlerType: retry
                      ignoreFinalError: false
                      maxAttempts: 3
                      usesExponentialBackoff: false
                    inputs:
                      airtableConnection:
                        type: configVar
                        value: Airtable Connection
                      baseId:
                        type: configVar
                        value: Project Management Base
                      dynamicFields:
                        type: value
                        value: ''
                      record:
                        type: reference
                        value: loopOverJobs.currentItem.id
                      recordFields:
                        type: complex
                        value:
                          - name:
                              type: value
                              value: ⚙️ Boolean Automation System Status
                            type: value
                            value: Error while Processing the Job. No ID returned.
                      tableName:
                        type: configVar
                        value: Jobs Table
                    name: Update Record (Error) 2
            description: ''
            inputs:
              conditions:
                type: complex
                value:
                  - name: 'Yes'
                    type: complex
                    value:
                      - and
                      - - isNotEmpty
                        - name: ''
                          type: reference
                          value: processJobResult.results
                        - name: ''
                          type: value
                          value: ''
            name: Is a valid ID?
  - description: ''
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: true
    name: 02.1 Process Job
    steps:
      - action:
          key: crossFlow
          component:
            isPublic: true
            key: cross-flow
            version: LATEST
        description: ''
        inputs: {}
        isTrigger: true
        name: Trigger
      - action:
          key: branchOnExpression
          component:
            isPublic: true
            key: branch
            version: LATEST
        branches:
          - name: 'Yes'
            steps:
              - action:
                  key: writeLog
                  component:
                    isPublic: true
                    key: log
                    version: LATEST
                description: ''
                inputs:
                  level:
                    type: value
                    value: info
                  message:
                    type: value
                    value: QBO Customer Parent ID exists.
                name: Log Message
              - action:
                  key: stopExecution
                  component:
                    isPublic: true
                    key: stop-execution
                    version: LATEST
                description: ''
                inputs:
                  contentType:
                    type: value
                    value: application/json
                  headers:
                    type: complex
                    value: []
                  jsonBody:
                    type: reference
                    value: trigger.results.body.data.fields.QBO Parent Customer ID
                  statusCode:
                    type: value
                    value: '200'
                name: Stop Execution
          - name: Else
            steps:
              - action:
                  key: runCode
                  component:
                    isPublic: true
                    key: code
                    version: LATEST
                description: ''
                inputs:
                  code:
                    type: value
                    value: >
                      module.exports = async ({ logger, configVars },
                      stepResults) => {
                        let qboParentCustomerName =
                          stepResults.trigger.results.body.data.fields["QBO Parent Customer Name"];
                        let query = `SELECT * FROM Customer WHERE DisplayName = '${qboParentCustomerName.replace(/'/g, "\\'")}'`;

                        let encodedQuery = encodeURIComponent(query);

                        return { data: `/query?query=${encodedQuery}` };
                      };
                name: Get Query Url
              - action:
                  key: rawRequest
                  component:
                    isPublic: true
                    key: quickbooks
                    version: LATEST
                description: 'By: QBO Parent Customer Name'
                errorConfig:
                  delaySeconds: 10
                  errorHandlerType: retry
                  ignoreFinalError: false
                  maxAttempts: 2
                  usesExponentialBackoff: false
                inputs:
                  connection:
                    type: configVar
                    value: QuickBooks Connection
                  data:
                    type: value
                    value: ''
                  debugRequest:
                    type: value
                    value: 'true'
                  fileData:
                    type: complex
                    value: []
                  formData:
                    type: complex
                    value: []
                  headers:
                    type: complex
                    value: []
                  maxRetries:
                    type: value
                    value: '0'
                  method:
                    type: value
                    value: GET
                  queryParams:
                    type: complex
                    value: []
                  responseType:
                    type: value
                    value: json
                  retryAllErrors:
                    type: value
                    value: 'false'
                  retryDelayMS:
                    type: value
                    value: '0'
                  timeout:
                    type: value
                    value: ''
                  url:
                    type: reference
                    value: getQueryUrl.results
                  useExponentialBackoff:
                    type: value
                    value: 'false'
                name: Get Customer
              - action:
                  key: branchOnExpression
                  component:
                    isPublic: true
                    key: branch
                    version: LATEST
                branches:
                  - name: 'Yes'
                    steps:
                      - action:
                          key: writeLog
                          component:
                            isPublic: true
                            key: log
                            version: LATEST
                        description: ''
                        inputs:
                          level:
                            type: value
                            value: info
                          message:
                            type: value
                            value: Customer Matched by QBO Parent Customer Name
                        name: Log Message 2
                      - action:
                          key: stopExecution
                          component:
                            isPublic: true
                            key: stop-execution
                            version: LATEST
                        description: ''
                        inputs:
                          contentType:
                            type: value
                            value: application/json
                          headers:
                            type: complex
                            value: []
                          jsonBody:
                            type: reference
                            value: getCustomer.results.QueryResponse.Customer[0].Id
                          statusCode:
                            type: value
                            value: '200'
                        name: Stop Execution 2
                  - name: Else
                    steps:
                      - action:
                          key: branchOnExpression
                          component:
                            isPublic: true
                            key: branch
                            version: LATEST
                        branches:
                          - name: 'Yes'
                            steps:
                              - action:
                                  key: runCode
                                  component:
                                    isPublic: true
                                    key: code
                                    version: LATEST
                                description: ''
                                inputs:
                                  code:
                                    type: value
                                    value: >
                                      module.exports = async ({ logger,
                                      configVars }, stepResults) => {
                                        let preAutomDisplayName =
                                          stepResults.trigger.results.body.data.fields[
                                            "Pre-Automation QBO Customer Display Name"
                                          ];
                                        let query = `SELECT * FROM Customer WHERE DisplayName = '${preAutomDisplayName.replace(/'/g, "\\'")}'`;

                                        let encodedQuery = encodeURIComponent(query);

                                        return { data: `/query?query=${encodedQuery}` };
                                      };
                                name: Get Query Url 2
                              - action:
                                  key: rawRequest
                                  component:
                                    isPublic: true
                                    key: quickbooks
                                    version: LATEST
                                description: 'By: Pre-Automation QBO Customer Display Name'
                                errorConfig:
                                  delaySeconds: 10
                                  errorHandlerType: retry
                                  ignoreFinalError: false
                                  maxAttempts: 2
                                  usesExponentialBackoff: false
                                inputs:
                                  connection:
                                    type: configVar
                                    value: QuickBooks Connection
                                  data:
                                    type: value
                                    value: ''
                                  debugRequest:
                                    type: value
                                    value: 'true'
                                  fileData:
                                    type: complex
                                    value: []
                                  formData:
                                    type: complex
                                    value: []
                                  headers:
                                    type: complex
                                    value: []
                                  maxRetries:
                                    type: value
                                    value: '0'
                                  method:
                                    type: value
                                    value: GET
                                  queryParams:
                                    type: complex
                                    value: []
                                  responseType:
                                    type: value
                                    value: json
                                  retryAllErrors:
                                    type: value
                                    value: 'false'
                                  retryDelayMS:
                                    type: value
                                    value: '0'
                                  timeout:
                                    type: value
                                    value: ''
                                  url:
                                    type: reference
                                    value: getQueryUrl2.results
                                  useExponentialBackoff:
                                    type: value
                                    value: 'false'
                                name: Get Customer 2
                              - action:
                                  key: branchOnExpression
                                  component:
                                    isPublic: true
                                    key: branch
                                    version: LATEST
                                branches:
                                  - name: 'Yes'
                                    steps:
                                      - action:
                                          key: writeLog
                                          component:
                                            isPublic: true
                                            key: log
                                            version: LATEST
                                        description: ''
                                        inputs:
                                          level:
                                            type: value
                                            value: info
                                          message:
                                            type: value
                                            value: >-
                                              Customer Matched by Pre-Automation QBO
                                              Customer Display Name
                                        name: Log Message 3
                                      - action:
                                          key: stopExecution
                                          component:
                                            isPublic: true
                                            key: stop-execution
                                            version: LATEST
                                        description: ''
                                        inputs:
                                          contentType:
                                            type: value
                                            value: application/json
                                          headers:
                                            type: complex
                                            value: []
                                          jsonBody:
                                            type: reference
                                            value: >-
                                              getCustomer2.results.QueryResponse.Customer[0].Id
                                          statusCode:
                                            type: value
                                            value: '200'
                                        name: Stop Execution 3
                                  - name: Else
                                    steps: []
                                description: ''
                                inputs:
                                  conditions:
                                    type: complex
                                    value:
                                      - name: 'Yes'
                                        type: complex
                                        value:
                                          - and
                                          - - exists
                                            - name: ''
                                              type: reference
                                              value: >-
                                                getCustomer2.results.QueryResponse.Customer[0].Id
                                name: Customer Match Found? 2
                          - name: Else
                            steps: []
                        description: Pre Automation Display Name Exists?
                        inputs:
                          conditions:
                            type: complex
                            value:
                              - name: 'Yes'
                                type: complex
                                value:
                                  - and
                                  - - exists
                                    - name: ''
                                      type: reference
                                      value: >-
                                        trigger.results.body.data.fields.Pre-Automation
                                        QBO Customer Display Name
                                  - - isNotEmpty
                                    - name: ''
                                      type: reference
                                      value: >-
                                        trigger.results.body.data.fields.Pre-Automation
                                        QBO Customer Display Name
                                    - name: ''
                                      type: value
                                      value: ''
                        name: Pre Auto DName Exists?
                      - action:
