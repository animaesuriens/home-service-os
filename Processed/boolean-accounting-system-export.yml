            type: value
            value: PATCH
          queryParams:
            type: complex
            value: []
          responseType:
            type: value
            value: json
          retryAllErrors:
            type: value
            value: 'false'
          retryDelayMS:
            type: value
            value: '0'
          timeout:
            type: value
