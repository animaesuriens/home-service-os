        name: Find Associated Job
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: Parse QBO Bill To field
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const billAddr = stepResults.trigger.results.body.data.invoice.BillAddr;

                if (!billAddr) {
                  return { data: "" };
                }

                const createBillTo = (billAddr) => {
                  const addressParts = [
                    billAddr.Line1,
                    billAddr.Line2
                      ? `${billAddr.City}, ${billAddr.CountrySubDivisionCode} ${billAddr.PostalCode}`
                      : `${billAddr.City}, ${billAddr.CountrySubDivisionCode} ${billAddr.PostalCode}`,
                    billAddr.Country,
                  ];

                  return addressParts.filter(Boolean).join("\n");
                };

                const billTo = createBillTo(billAddr);

                return { data: billTo };
              };
        name: Bill to String
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const invoice = stepResults.trigger.results.body.data.invoice;
                const job = stepResults?.findAssociatedJob?.results?.[0];
                const mapper = configVars["QBO to AT Custom Fields Mapper"] || [];
                const billTo = stepResults.billToString.results;

                const customFields = mapper.reduce((acc, field) => {
                  const matchingItem = invoice.CustomField?.find(
                    (item) => item.Name === field.source,
                  );
                  if (matchingItem) {
                    const valueKey = `${matchingItem.Type.replace(/Type/g, "")}Value`;
                    const values = {
                      definitionId: matchingItem.DefinitionId,
                      valueType: matchingItem.Type,
                      value: matchingItem[valueKey],
                    };
                    acc[field.destination] = JSON.stringify(values);
                  }
                  return acc;
                }, {});

                const payload = {
                  performUpsert: {
                    fieldsToMergeOn: ["QBO Invoice ID"],
                  },
                  records: [
                    {
                      fields: {
                        "Associated QBO Customer Name": invoice?.CustomerRef?.name,
                        "Associated QBO Customer ID": invoice?.CustomerRef?.value,
                        "QBO Invoice ID": parseInt(invoice.Id),
                        "Invoice Number": invoice.DocNumber,
                        "⚙️ Automation Status":
                          "Created/updated from flow 20.1 - Process Invoice",
                        Job: job ? [job.id] : [],
                        "Bill To": billTo,
                        ...(invoice.ShipAddr?.Line1 && { "Ship To": invoice.ShipAddr.Line1 }),
                        ...customFields,
                        "QBO Sync Token": invoice.SyncToken,
                        "Due Date": invoice.DueDate,
                        "Invoice Date": invoice.TxnDate,
                        "QBO Invoice Balance": invoice.Balance,
                        ...(invoice.CustomerMemo && {
                          "Customer Memo": invoice.CustomerMemo.value,
                        }),
                      },
                    },
                  ],
                };

                return { data: payload };
              };
        name: Invoice Payload
      - action:
          key: rawRequest
          component:
            isPublic: true
            key: airtable
            version: LATEST
        description: ''
        errorConfig:
          delaySeconds: 10
          errorHandlerType: retry
          ignoreFinalError: false
          maxAttempts: 3
          usesExponentialBackoff: false
        inputs:
          connection:
            type: configVar
