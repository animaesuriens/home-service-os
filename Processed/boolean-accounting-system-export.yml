                const isItemBased = !!currentLine.ItemBasedExpenseLineDetail;
                const lineItemDetail = isItemBased
                  ? currentLine.ItemBasedExpenseLineDetail
                  : currentLine.AccountBasedExpenseLineDetail;

                const customerRef = lineItemDetail?.CustomerRef || null;

                const payload = {
                  performUpsert: {
                    fieldsToMergeOn: ["QBO Expense ID", "Line ID", "Type"],
                  },
                  records: [
                    {
                      fields: {
                        Date: bill.TxnDate,
                        Vendor: vendor ? [vendor.id] : [],
                        "Vendor Notes": vendor.fields?.["Display Name"] || "",
                        Amount: currentLine.Amount || 0,
                        "QBO Expense ID": bill.Id,
                        Item: isItemBased ? itemId : [],
                        Account: isItemBased ? [incomeAccountId] : [accountData.id],
                        "QBO Document Number": bill.DocNumber,
                        "QBO Last Modified Time": bill.MetaData?.LastUpdatedTime,
                        Notes: bill.PrivateNote,
                        "QBO Expense Detail Type": isItemBased
                          ? "ItemBasedExpenseLineDetail"
                          : "AccountBasedExpenseLineDetail",
                        "⚙️ Deduplicate Unique Lookup ID": `${customerRef?.value || 0}:${currentLine.Amount || 0}`,
