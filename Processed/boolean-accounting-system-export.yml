            const {
              fields: { apiKey },
            } = connection;

            // Pulling Airtable fields
            const airtable = JSON.parse(contextValue);
            const baseId = airtable.baseId;
            const tableId = airtable.tableId;
            const airtableApiUrl = `https://api.airtable.com/v0/meta/bases/${baseId}/tables`;

            try {
              // Fetch table schema from Airtable using the valid access token
              const response = await fetch(airtableApiUrl, {
                method: "GET",
                headers: {
                  Authorization: `Bearer ${apiKey}`,
                  "Content-Type": "application/json",
                },
              });

              if (!response.ok) {
                throw new Error(`Failed to fetch table schema: ${response.statusText}`);
              }

              const tableData = await response.json();
              const table = tableData.tables?.find((tbl) => tbl.id === tableId);
              if (!table) {
                throw new Error(`Table with ID ${tableId} not found in base ${baseId}.`);
              }

              // Map fields to the desired format
              const airtableMappingFields = table.fields
                .filter((fld) => {
                  return (
                    fld.type !== "singleCollaborator" &&
                    fld.type !== "multipleCollaborators" &&
                    fld.type !== "multipleAttachments" &&
                    fld.type !== "createdTime" &&
                    fld.type !== "multipleLookupValues" &&
                    fld.type !== "autoNumber" &&
                    fld.type !== "lastModifiedTime" &&
                    fld.type !== "button" &&
                    fld.type !== "createdBy" &&
                    fld.type !== "lastModifiedBy"
                  );
                })
                .map((field) => ({
                  label: `${field.name} (id: ${field.id})`,
                  key: field.id,
                }))
                .sort((a, b) => a.label.localeCompare(b.label));

              // Return the picklist options
              return {
                result: airtableMappingFields,
              };
            } catch (error) {
              // Log error for debugging
              console.error(`Error: ${error.message}`);
              throw error;
            }
          };
