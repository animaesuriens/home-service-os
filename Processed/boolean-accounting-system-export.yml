                inputs:
                  code:
                    type: value
                    value: >
                      module.exports = async ({ logger, configVars },
                      stepResults) => {
                        const job = stepResults.trigger.results.body.data?.job;
                        const atInvoiceId = stepResults.findInvoice.results?.[0]?.id;
                        const topLevelPayment = stepResults.getPayment.results.Payment;
                        const lineLevelPayment = stepResults.loopOverLines.currentItem;

                        const payload = {
                          performUpsert: {
                            fieldsToMergeOn: ["Payment ID", "Payment Line Index"],
                          },
                          records: [
                            {
                              fields: {
                                Job: job ? [job.id] : [],
                                Invoice: atInvoiceId ? [atInvoiceId] : [],
                                "Payment Date": topLevelPayment.TxnDate,
                                "Payment Amount": lineLevelPayment.Amount,
                                "Type/Source": "QuickBooks",
                                "Payment ID": topLevelPayment.Id,
                                "Payment Line Index": stepResults.loopOverLines.index,
                                Notes: topLevelPayment?.PrivateNote,
                              },
                            },
                          ],
                        };

                        return { data: payload };
                      };
                name: Upsert Payload
              - action:
                  key: rawRequest
                  component:
                    isPublic: true
                    key: airtable
                    version: LATEST
                description: ''
                errorConfig:
                  delaySeconds: 10
                  errorHandlerType: retry
                  ignoreFinalError: false
                  maxAttempts: 3
                  usesExponentialBackoff: false
                inputs:
                  connection:
                    type: configVar
                    value: Airtable Connection
                  data:
                    type: reference
                    value: upsertPayload.results
                  debugRequest:
                    type: value
                    value: 'false'
                  fileData:
                    type: complex
                    value: []
                  fileDataFileNames:
                    type: complex
                    value: []
                  formData:
                    type: complex
                    value: []
                  headers:
                    type: complex
                    value: []
                  maxRetries:
                    type: value
                    value: '0'
                  method:
                    type: value
                    value: PATCH
                  queryParams:
                    type: complex
                    value: []
                  responseType:
                    type: value
                    value: json
                  retryAllErrors:
                    type: value
                    value: 'false'
                  retryDelayMS:
                    type: value
                    value: '0'
                  timeout:
                    type: value
                    value: ''
                  url:
                    type: template
                    value: >-
                      /v0/{{#Project Management Base}}/{{#Customer Transactions
                      Table}}
                  useExponentialBackoff:
                    type: value
                    value: 'false'
                name: Upsert Customer Transactions
