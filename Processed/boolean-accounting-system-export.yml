  - dataSource:
      key: runCodeJsonForm
      component:
        isPublic: true
        key: code
        version: LATEST
    dataType: jsonForm
    defaultValue: ''
    inputs:
      code:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: |
          const axios = require("axios");

          module.exports = async (context, { connection, contextValue }) => {
            // QuickBooks setup
            const qbo_conn = context.configVars["QuickBooks Connection"];
            const qbo_token = qbo_conn?.token?.access_token;
            const qbo_companyId = qbo_conn?.context?.realmId;

            const qbBaseUrl = `https://quickbooks.api.intuit.com/v3/company/${qbo_companyId}/query?query=`;
            const qbQuery = `SELECT * FROM Invoice WHERE Id = '${context.configVars["Invoice Example ID"]}'`;
            const encodedQbQuery = encodeURIComponent(qbQuery);

            let qbo_fieldsDropdown = [];

            try {
              const qbResponse = await axios.get(qbBaseUrl + encodedQbQuery, {
                headers: {
                  Authorization: `Bearer ${qbo_token}`,
                  Accept: "application/json",
                },
              });

              const qbInvoice = qbResponse.data?.QueryResponse?.Invoice?.[0];

              if (qbInvoice?.CustomField?.length > 0) {
                qbo_fieldsDropdown = qbInvoice.CustomField.map((field) => ({
                  title: `${field.Name} (${field.Type})`,
                  const: field.Name,
                }));
              } else {
                context.logger.info("No CustomFields found in QuickBooks invoice.");
              }
            } catch (error) {
              context.logger.error(
                "Error fetching QuickBooks data:",
                error.response?.data || error.message,
              );
            }

            // If no QBO fields, provide placeholder so the mapper won't break because it has no records.
            if (qbo_fieldsDropdown.length === 0) {
              qbo_fieldsDropdown = [
                {
                  title: "No QuickBooks fields found",
                  const: "__NO_QBO_FIELDS__",
                },
              ];
            }

            // Airtable setup
            const at_conn = context.configVars["Airtable Connection"];
            const at_token = at_conn?.fields?.apiKey;
            const at_baseId = context.configVars["Project Management Base"];
            const at_invoicesTableId = context.configVars["Invoices Table"];

            const airtableApiUrl = `https://api.airtable.com/v0/meta/bases/${at_baseId}/tables`;

            let at_fieldsDropdown = [];

            try {
              const atResponse = await axios.get(airtableApiUrl, {
                headers: {
                  Authorization: `Bearer ${at_token}`,
                  "Content-Type": "application/json",
                },
              });

              const at_tables = atResponse.data;
              const at_invoicesTable = at_tables.tables.find(
                (tbl) => tbl.id === at_invoicesTableId,
              );

              if (at_invoicesTable?.fields?.length > 0) {
                at_fieldsDropdown = at_invoicesTable.fields.map((field) => ({
                  title: field.name,
                  const: field.name,
                }));
              } else {
                context.logger.info("No fields found in Airtable Invoices table.");
              }
            } catch (error) {
              context.logger.error(
                "Error fetching Airtable data:",
                error.response?.data || error.message,
              );
            }

            // If no Airtable fields, idem as above.
            if (at_fieldsDropdown.length === 0) {
              at_fieldsDropdown = [
                {
                  title: "No Airtable fields found",
                  const: "__NO_AT_FIELDS__",
                },
              ];
            }

            // Schema and UI
            const schema = {
              type: "array",
              items: {
                type: "object",
                properties: {
                  source: {
                    type: "string",
                    oneOf: qbo_fieldsDropdown,
                    options: {
                      autocomplete: true,
                    },
                  },
                  destination: {
                    type: "string",
                    oneOf: at_fieldsDropdown,
                    options: {
                      autocomplete: true,
                    },
                  },
                },
                required: ["source", "destination"],
              },
            };

            const uiSchema = {
              type: "Control",
              label: "QuickBooks Online / Airtable Invoices Field Mapper",
              scope: "#",
              options: {
                layout: "Accordion",
                detail: {
                  type: "HorizontalLayout",
                  elements: [
                    {
                      type: "Control",
                      scope: "#/properties/source",
                      options: {
                        autocomplete: true,
                      },
                      label: "QuickBooks Online Fields",
                    },
                    {
                      type: "Control",
                      scope: "#/properties/destination",
                      options: {
                        autocomplete: true,
                      },
                      label: "Airtable Fields",
                    },
                  ],
                },
              },
            };

            // Default empty data
            const data = [];

            return {
              schema,
              uiSchema,
              data,
            };
          };
      connection:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: configVar
        value: ''
      contextValue:
        meta:
          orgOnly: true
          visibleToCustomerDeployer: false
          visibleToOrgDeployer: false
        type: value
        value: ''
    key: QBO to AT Custom Fields Mapper
    orgOnly: false
