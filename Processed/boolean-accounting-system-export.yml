        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const job = stepResults.getJob.results.fields;
                const lines = stepResults.getInvoiceLines.results;
                const includeTaxCodeRef = configVars["Include TaxCodeRef"];

                const linesPayload = lines.map((line) => {
                  const taxCode =
                    includeTaxCodeRef && line.fields["Line Item Sales Tax ID"]
                      ? {
                          TaxCodeRef: {
                            value: line.fields["Line Item Sales Tax ID"],
                          },
                        }
                      : "";

                  return {
                    DetailType: "SalesItemLineDetail",
                    Amount: line.fields["Line Item Total Before Tax"],
                    Description: String(line.fields["Description"]),
                    LineNum: line.fields["Line Item Number"]?.toString(),
                    // ProjectRef: {
                    //   value: job["QBO Parent Customer ID"],
                    // },
                    // -> We're not yet sure about which field should this be filled with.
                    // CurrencyRef might not be needed as for now.
                    SalesItemLineDetail: {
                      ItemRef: {
                        value: line.fields["Line Item Item ID"]?.[0] ?? "",
                      },
                      ...taxCode,
                      ClassRef: {
                        value: Array.isArray(line.fields["Line Item Class ID"])
                          ? line.fields["Line Item Class ID"][0]
                          : line.fields["Line Item Class ID"],
                      },
                      ...(line.fields["Line Item Service Date"] && {
                        ServiceDate: line.fields["Line Item Service Date"],
                      }),
                      Qty: line.fields["Line Item Qty"],
                      UnitPrice: line.fields["Line Item Rate"],
                    },
                  };
                });

                linesPayload.sort((a, b) => a.LineNum - b.LineNum);

                return { data: linesPayload };
              };
        name: Create Lines Array
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const fieldsMapping = configVars["QBO to AT Custom Fields Mapper"];

                // Only do this if we actually have stuff coming in the mapper.
                if (!fieldsMapping || fieldsMapping.length === 0) {
                  return { data: [] };
                }

                const qboCustomFields =
                  stepResults.getPreferences.results.Preferences.SalesFormsPrefs.CustomField.flatMap(
                    (entry) => entry.CustomField,
                  );
                const invoice = stepResults.getInvoice.results.fields;

                const customFields = fieldsMapping.map((field) => {
                  let match = qboCustomFields.find((a) => a.StringValue === field.source);
                  let suffix = match.Type.replace(/Type$/, "");

                  return {
                    DefinitionId: match.Name.slice(-1),
                    Type: match.Type,
                    [`${suffix}Value`]: invoice[field.destination],
                  };
                });

                return { data: customFields };
              };
        name: Fill Custom Fields
      - action:
