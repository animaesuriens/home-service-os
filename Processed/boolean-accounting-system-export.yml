                type: value
                value: ''
              url:
                type: template
                value: /payment/{{$loopOverPayments.currentItem.TxnId}}
              useExponentialBackoff:
                type: value
                value: 'false'
            name: Get Payment
          - action:
              key: runCode
              component:
                isPublic: true
                key: code
                version: LATEST
            description: ''
            inputs:
              code:
                type: value
                value: >
                  module.exports = async ({ logger, configVars }, stepResults)
                  => {
                    const payment = stepResults.getPayment.results.Payment;
                    const lines = payment.Line;

                    //only keep lines that are related to an Invoice
                    const filteredLines = lines.filter(
                      (line) =>
                        line.LinkedTxn &&
                        line.LinkedTxn.length > 0 &&
                        line.LinkedTxn[0].TxnType === "Invoice",
                    );

                    return { data: filteredLines };
                  };
            name: Filter Lines
          - action:
              key: loopOverItems
              component:
                isPublic: true
                key: loop
                version: LATEST
            description: ''
            inputs:
              items:
                type: reference
                value: filterLines.results
            name: Loop Over Lines
