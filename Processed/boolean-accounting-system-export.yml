  - description: ''
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 15 Fetch customers from QBO
    steps:
      - action:
          key: webhook
          component:
            isPublic: true
            key: webhook-triggers
            version: LATEST
        description: ''
        inputs:
          body:
            type: value
            value: ''
          contentType:
            type: value
            value: ''
          headers:
            type: complex
            value: []
          statusCode:
            type: value
            value: ''
        isTrigger: true
        name: Trigger
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const filter = configVars["Active Customers Only"];

                let query = "SELECT * FROM Customer WHERE Active IN (true, false)";

                if (filter === "true") {
                  query = `SELECT * FROM Customer WHERE active=true`;
                }

                return { data: encodeURIComponent(query) };
              };
        name: Build Query
      - action:
          key: saveExecutionValue
          component:
            isPublic: true
            key: persist-data
            version: LATEST
        description: ''
        inputs:
          dynamicValues:
            type: complex
            value: []
          keyInput:
            type: value
            value: index
          valueInput:
            type: value
            value: '1'
        name: Start Index
      - action:
          key: loopNTimes
          component:
            isPublic: true
            key: loop
            version: LATEST
        description: ''
        inputs:
          iterationCount:
            type: value
            value: '200'
        name: Loop N Times
        steps:
          - action:
              key: getExecutionValue
              component:
                isPublic: true
                key: persist-data
                version: LATEST
            description: ''
            inputs:
              defaultValueInput:
                type: value
                value: '0'
              keyInput:
                type: value
                value: index
            name: Get Index
          - action:
              key: runCode
              component:
                isPublic: true
                key: code
                version: LATEST
            description: ''
            inputs:
              code:
                type: value
                value: >
                  module.exports = async ({ logger, configVars }, stepResults)
                  => {
                    const index = stepResults.getIndex.results;

                    const queryParameters = ` STARTPOSITION ${index} MAXRESULTS 100`;

                    return { data: encodeURIComponent(queryParameters) };
                  };
            name: Query Parameters
          - action:
              key: rawRequest
              component:
                isPublic: true
                key: quickbooks
                version: LATEST
            description: ''
            inputs:
              connection:
                type: configVar
                value: QuickBooks Connection
              data:
                type: value
                value: ''
              debugRequest:
                type: value
                value: 'false'
