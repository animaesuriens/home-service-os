                    value: >
                      module.exports = async ({ logger, configVars },
                      stepResults) => {
                        const invoice = stepResults.createInvoice.results;
                        const customerData = stepResults.updateParentCustomer.results.Customer

                        const billAddr = invoice.BillAddr;

                        if (!billAddr) {
                          return { data: null };
                        }

                        const lines = [];
                        
                        if (customerData.GivenName || customerData.FamilyName) {
                          lines.push(`${customerData.GivenName ?? ''} ${customerData.FamilyName ?? ''}`.trim());
                        }
                        if (customerData.CompanyName) lines.push(customerData.CompanyName);
                        if (billAddr.Line1) lines.push(billAddr.Line1);
                        if (billAddr.Line2) lines.push(billAddr.Line2);
                        if (billAddr.Line3) lines.push(billAddr.Line3);

                        const billToAddress = lines.join("\n");

                        return {
                          data: billToAddress,
                        };
                      };
