                                    type: reference
                                    value: >-
                                      createBill.results.Bill.Line.0.AccountBasedExpenseLineDetail.CustomerRef.value
                              tableName:
                                type: configVar
                                value: Expenses Table
                            name: Update Record - Success
                      - name: Else
                        steps:
                          - action:
                              key: runCode
                              component:
                                isPublic: true
                                key: code
                                version: LATEST
                            description: ''
                            inputs:
                              code:
                                type: value
                                value: >
                                  module.exports = async ({ logger, configVars
                                  }, stepResults) => {
                                    const response = stepResults.createBill.results.error.message;

                                    const errorDetails = JSON.parse(response);

                                    const parsedError = errorDetails.data.Fault.Error.map(
                                      (error) => error.Detail,
                                    ).join(" - ");

                                    return { data: parsedError };
                                  };
                            name: Parse Create Bill Error
                          - action:
                              key: updateRecord
