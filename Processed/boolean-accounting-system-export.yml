      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: Open invoices w/ balance
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const token = configVars["QuickBooks Connection"].token.access_token;
                const realmId = configVars["QuickBooks Connection"].context.realmId;

                const baseUrl = `https://quickbooks.api.intuit.com/v3/company/${realmId}/query`;
                const maxResults = 50;
                const openInvoicesOnly = configVars["Fetch Open Invoices Only"] === "true";

                // Removing the trigger data extraction as requested.
                // Defaulting startPosition to 1 since we are no longer reading from trigger state.
                // Note: This assumes pagination is handled externally or only the first page is needed/expected.
                const startPosition = 1;

                try {
                  let queryConditions = [];

                  // Calculate the timestamp for 48 hours ago
                  const hoursBack = 48;
                  const targetDate = new Date();
                  targetDate.setHours(targetDate.getHours() - hoursBack);
                  
                  // Validate that the date is valid
                  if (isNaN(targetDate.getTime())) {
                      throw new Error("Failed to calculate a valid target date for invoice filtering.");
                  }
                  
                  const formattedDate = targetDate.toISOString();

                  queryConditions.push(`MetaData.LastUpdatedTime >= '${formattedDate}'`);
                  logger.info(
                    `Fetching invoices modified in the last ${hoursBack} hours (since ${formattedDate})`
                  );

                  // Only filter by balance if openInvoicesOnly is true
                  if (openInvoicesOnly) {
                    queryConditions.push("Balance > '0'");
                    queryConditions.push("TotalAmt > '0'");
                    logger.info("Filtering for open invoices only (Balance > 0)");
                  }

                  // Build the WHERE clause only if there are conditions
                  const whereClause =
                    queryConditions.length > 0
                      ? `WHERE ${queryConditions.join(" AND ")} `
                      : "";

                  // Add ORDERBY MetaData.LastUpdatedTime to ensure consistent ordering
                  const query = `SELECT * FROM Invoice ${whereClause}ORDERBY MetaData.LastUpdatedTime STARTPOSITION ${startPosition} MAXRESULTS ${maxResults}`;
                  const url = `${baseUrl}?query=${encodeURIComponent(query)}`;

                  logger.info(`Fetching invoices from position ${startPosition}`);

                  const response = await fetch(url, {
                    method: "GET",
                    headers: {
                      Authorization: `Bearer ${token}`,
                      Accept: "application/json",
                      "Content-Type": "application/json",
                    },
                  });

                  if (!response.ok) {
                    throw new Error(
                      `QuickBooks API error: ${response.status} ${response.statusText}`,
                    );
                  }

                  const data = await response.json();
                  const invoices = data.QueryResponse?.Invoice || [];

                  logger.info(`Fetched ${invoices.length} invoices`);

                  // Calculate the next position (null if no more results)
                  const hasMoreResults =
                    invoices.length > 0 && invoices.length === maxResults;
                  const nextPosition = hasMoreResults
                    ? startPosition + invoices.length
                    : null;

                  return {
                    data: {
                      invoices: invoices,
                      startPosition: startPosition,
                      nextPosition: nextPosition,
                    },
                  };
                } catch (error) {
                  logger.error(`Error fetching invoices: ${error.message}`);
                  throw error;
                }
              };
        name: Fetch QBO Invoices
