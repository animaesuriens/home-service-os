category: Marketing and Sales System
configPages:
  - elements:
      - type: configVar
        value: Hubspot Contact Activity Logger URL
    name: Connections
    tagline: ''
  - elements:
      - type: htmlElement
        value: <h1>Calendar</h1>
      - type: configVar
        value: Google Calendar Connection
      - type: htmlElement
        value: <h1>Email Notification</h1>
      - type: configVar
        value: Gmail Sender Authentication
      - type: htmlElement
        value: <h1>Ring Central Connection</h1>
      - type: configVar
        value: RingCentral Connect Platform API Connection
    name: Email Connection
    tagline: ''
    userLevelConfigured: true
defaultInstanceProfile: Default Instance Profile
definitionVersion: 7
description: >-
  This integration connects Gmail and RingCentral to automate communication
  workflows by receiving data and triggering actions based on the information
  received. It ensures seamless data transfer between email and phone systems,
  streamlining task management and enhancing responsiveness.
documentation: ''
endpointType: flow_specific
flows:
  - description: ''
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 01 Gmail Sender
    steps:
      - action:
          key: webhook
          component:
            isPublic: true
            key: webhook-triggers
            version: LATEST
        description: ''
        inputs:
          body:
            type: value
            value: '{}'
          contentType:
            type: value
            value: application/json
          headers:
            type: complex
            value: []
          statusCode:
            type: value
            value: '200'
        isTrigger: true
        name: Trigger
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const token = configVars['Gmail Sender Authentication']?.token?.access_token;

                if (!token) {
                  throw new Error("Access token not found in configVars.");
                }

                try {
                  const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                    method: 'GET',
                    headers: {
                      Authorization: `Bearer ${token}`,
                      Accept: 'application/json'
                    }
                  });

                  if (!response.ok) {
                    const errorBody = await response.text();
                    throw new Error(`Failed to fetch user info. Status: ${response.status}, Body: ${errorBody}`);
                  }

                  const userInfo = await response.json();

                  logger.debug("User Info:", userInfo);

                  return {
                    data: {
                      email: userInfo.email,
                      userInfo
                    }
                  };

                } catch (error) {
                  logger.error("Error retrieving user info:", error.message);
                  return {
                    data: {
                      error: error.message
                    }
                  };
                }
              };
        name: Get User Info
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |-
              module.exports = async ({ logger, configVars }, stepResults) => {
                logger.info(stepResults.trigger.results.body.data);
                logger.info(typeof stepResults.trigger.results.body.data);

                let parsedData;

                try {
                  parsedData = typeof stepResults.trigger.results.body.data === 'string'
                    ? JSON.parse(stepResults.trigger.results.body.data)
                    : stepResults.trigger.results.body.data;
                } catch (error) {
                  logger.error("Error parsing data:", error);
                  throw new Error("Failed to parse data");
                }

                return { data: parsedData };
              };
        name: String or JSON Checker
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                const currentUser = stepResults?.getUserInfo?.results?.email || "";
                const fromEmail = stepResults?.trigger?.results?.body?.data?.from || "";
                const to = stepResults?.trigger?.results?.body?.data?.to || "";
                const cc = stepResults?.trigger?.results?.body?.data?.cc || "";
                const bcc = stepResults?.trigger?.results?.body?.data?.bcc || "";
                const subject = stepResults?.trigger?.results?.body?.data?.subject || "";
                const body = stepResults?.trigger?.results?.body?.data?.body || "";

                if (!to) {
                  throw new Error("Recipient (To) address is required.");
                }

                // Dynamically build headers
                let headers = `From: "${fromEmail}" <${currentUser}>\nTo: ${to}`;
                if (cc) headers += `\nCc: ${cc}`;
                if (bcc) headers += `\nBcc: ${bcc}`;
                headers += `\nSubject: ${subject}\nContent-Type: text/html; charset="UTF-8"`;

                const emailContent = `${headers}\n\n${body}`;

                const encodedEmailContent = Buffer.from(emailContent, 'utf-8').toString('base64');

                logger.debug("Raw Email Content:\n" + emailContent);
                logger.debug("Base64 Encoded Email:\n" + encodedEmailContent);

                return {
                  rawEmail: emailContent,
                  base64Email: encodedEmailContent
                };
              };
        name: Generate Receiver Info
      - action:
          key: rawRequest
          component:
            isPublic: true
            key: google-gmail
            version: LATEST
        description: ''
        inputs:
          connection:
            type: configVar
            value: Gmail Sender Authentication
          data:
            type: template
            value: |-
              {
                "raw": "{{$generateReceiverInfo.results.base64Email}}"
              }
          debugRequest:
            type: value
            value: 'false'
          fileData:
            type: complex
            value: []
          fileDataFileNames:
            type: complex
            value: []
          formData:
            type: complex
            value: []
          headers:
            type: complex
            value:
              - name:
                  type: value
                  value: Content-Type
                type: value
                value: application/json
          maxRetries:
            type: value
            value: '0'
          method:
            type: value
            value: POST
          queryParams:
            type: complex
            value: []
          responseType:
            type: value
            value: json
          retryAllErrors:
            type: value
            value: 'false'
          retryDelayMS:
            type: value
            value: '0'
          timeout:
            type: value
            value: ''
          url:
            type: template
            value: /v1/users/{{$getUserInfo.results.email}}/messages/send
          useExponentialBackoff:
            type: value
            value: 'false'
        name: Send Message
  - description: ''
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 02 Create Available Event Calendar
    steps:
      - action:
          key: webhook
          component:
            isPublic: true
            key: webhook-triggers
            version: LATEST
        description: ''
        inputs:
          body:
            type: value
            value: ''
          contentType:
            type: value
            value: ''
          headers:
            type: complex
            value: []
          statusCode:
            type: value
            value: '202'
        isTrigger: true
        name: Trigger
      - action:
          key: rawRequest
          component:
            isPublic: true
            key: google-calendar
            version: LATEST
        description: ''
        inputs:
          connection:
            type: configVar
            value: Google Calendar Connection
          data:
            type: template
            value: |-
              {
                "summary": "OPEN",
                "description": "Open Calendar",
                "start": {
                  "dateTime": "{{$trigger.results.body.data.startsAt}}"
                },
                "end": {
                  "dateTime": "{{$trigger.results.body.data.endsAt}}"
                },
                "transparency": "transparent"
              }
          debugRequest:
            type: value
            value: 'false'
          fileData:
            type: complex
            value: []
          fileDataFileNames:
            type: complex
            value: []
          formData:
            type: complex
            value: []
          headers:
            type: complex
            value:
              - name:
                  type: value
                  value: Content-Type
                type: value
                value: application/json
          maxRetries:
            type: value
            value: '0'
          method:
            type: value
            value: POST
          queryParams:
            type: complex
            value: []
          responseType:
            type: value
            value: json
          retryAllErrors:
            type: value
            value: 'false'
          retryDelayMS:
            type: value
            value: '0'
          timeout:
            type: value
            value: ''
          url:
            type: template
            value: /calendars/{{$trigger.results.body.data.estimatorEmail}}/events
          useExponentialBackoff:
            type: value
            value: 'false'
        name: Create Open Calendar
  - description: ''
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 03 RC Text Sender
    steps:
      - action:
          key: webhook
          component:
            isPublic: true
            key: webhook-triggers
            version: LATEST
        description: ''
        inputs:
          body:
            type: value
            value: ''
          contentType:
            type: value
            value: application/json
          headers:
            type: complex
            value: []
          statusCode:
            type: value
            value: '200'
        isTrigger: true
        name: Trigger
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: This will check the required object keys {from}, {to} and {message}
        inputs:
          code:
            type: value
            value: |
              /*
                Access config variables by name through the configVars object. e.g.
                  const apiEndpoint = `${configVars["App Base URL"]}/api`;

                Access previous steps' results through the stepResults object. Trigger
                and step names are camelCased. If the step "Get Data from API" returned
                {"foo": "bar", "baz": 123}, you could destructure that data with:
                  const { foo, baz } = stepResults.getDataFromApi.results;

                You can return string, number or complex object data. e.g.
                  return { data: { foo: "Hello", bar: 123.45, baz: true } };
              */

              module.exports = async ({ logger, configVars }, stepResults) => {

                const requiredKeys = ["from", "to", "text"];
                const jsonObject = stepResults.trigger.results.body.data
                function hasAllKeys(obj, requiredKeys) {
                  return requiredKeys.every(key => obj.hasOwnProperty(key));
                }
                return { data: hasAllKeys(jsonObject, requiredKeys) };
              };
        name: Json Format Checker
      - action:
          key: branchOnExpression
          component:
            isPublic: true
            key: branch
            version: LATEST
        branches:
          - name: Has all required object
            steps:
              - action:
                  key: formatPhoneAction
                  component:
                    isPublic: false
                    key: phoneFormatter
                    version: LATEST
                description: ''
                inputs:
                  phone:
                    type: reference
                    value: trigger.results.body.data.from
                name: Format Sender Number
              - action:
                  key: formatPhoneAction
                  component:
                    isPublic: false
                    key: phoneFormatter
                    version: LATEST
                description: ''
                inputs:
                  phone:
                    type: reference
                    value: trigger.results.body.data.to
                name: Format Recipient Number
              - action:
                  key: createSmsMessage
                  component:
                    isPublic: false
                    key: ringCentral
                    version: LATEST
                description: ''
                inputs:
                  accountId:
                    type: value
                    value: '~'
                  connection:
                    type: configVar
                    value: RingCentral Connect Platform API Connection
                  extensionId:
                    type: value
                    value: '~'
                  from:
                    type: reference
                    value: formatSenderNumber.results.phone
                  text:
                    type: reference
                    value: trigger.results.body.data.text
                  to:
                    type: reference
                    value: formatRecipientNumber.results.phone
                name: Create Sms Message
          - name: Else
            steps:
              - action:
                  key: writeLog
                  component:
                    isPublic: true
                    key: log
                    version: LATEST
                description: Log Wrong Json Format
                inputs:
                  level:
                    type: value
                    value: info
                  message:
                    type: value
                    value: Wrong Json Format
                name: Wrong Json Format
        description: ''
        inputs:
          conditions:
            type: complex
            value:
              - name: Has all required object
                type: complex
                value:
                  - and
                  - - isTrue
                    - name: ''
                      type: reference
                      value: jsonFormatChecker.results
        name: Branch on Expression
  - description: ''
    endpointSecurityType: customer_optional
    isAgentFlow: false
    isSynchronous: false
    name: 05 Update Estimate Calendar
    steps:
      - action:
          key: webhook
          component:
            isPublic: true
            key: webhook-triggers
            version: LATEST
        description: ''
        inputs:
          body:
            type: value
            value: ''
          contentType:
            type: value
            value: ''
          headers:
            type: complex
            value: []
          statusCode:
            type: value
            value: ''
        isTrigger: true
        name: Trigger
      - action:
          key: formatDateTime
          component:
            isPublic: true
            key: datetime
            version: LATEST
        description: ''
        inputs:
          dateTime:
            type: reference
            value: trigger.results.body.data.startsAt
          format:
            type: value
            value: YYYY-MM-DDTHH:mm:ssZ
          timeZone:
            type: reference
            value: trigger.results.body.data.timeZone
        name: Start UTC
      - action:
          key: formatDateTime
          component:
            isPublic: true
            key: datetime
            version: LATEST
        description: ''
        inputs:
          dateTime:
            type: reference
            value: trigger.results.body.data.endsAt
          format:
            type: value
            value: YYYY-MM-DDTHH:mm:ssZ
          timeZone:
            type: reference
            value: trigger.results.body.data.timeZone
        name: End UTC
      - action:
          key: runCode
          component:
            isPublic: true
            key: code
            version: LATEST
        description: ''
        inputs:
          code:
            type: value
            value: |
              module.exports = async ({ logger, configVars }, stepResults) => {
                // Extract variables
                const calendarId = stepResults?.trigger?.results?.body?.data?.estimatorEmail;
                const startUtc = stepResults?.startUtc?.results;
                const endUtc = stepResults?.endUtc?.results;
                const accessToken = configVars["Google Calendar Connection"]?.token?.access_token;

                if (!calendarId || !startUtc || !endUtc || !accessToken) {
                  throw new Error("Missing one or more required inputs: calendarId, startUtc, endUtc, or accessToken");
                }

                // Build request URL
                const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events?timeMin=${encodeURIComponent(startUtc)}&timeMax=${encodeURIComponent(endUtc)}&singleEvents=true&orderBy=startTime`;

                logger.debug(`Fetching events from calendar: ${calendarId} from ${startUtc} to ${endUtc}`);

                // Send API request
                const response = await fetch(url, {
                  method: "GET",
                  headers: {
                    Authorization: `Bearer ${accessToken}`,
                    Accept: "application/json"
                  }
                });

                if (!response.ok) {
                  const errorText = await response.text();
                  logger.error(`Google Calendar API error: ${response.status} - ${errorText}`);
                  throw new Error(`Failed to fetch calendar events: ${response.status}`);
                }

                const data = await response.json();

                const filteredEvents = data.items.filter(event => {
                  const eventStart = new Date(event.start?.dateTime || event.start?.date).getTime();
                  const eventEnd = new Date(event.end?.dateTime || event.end?.date).getTime();
                  const targetStart = new Date(startUtc).getTime();
                  const targetEnd = new Date(endUtc).getTime();

                  return eventStart === targetStart && eventEnd === targetEnd;
                });



                return {
                  data: {
                    events: filteredEvents,
                    count: filteredEvents.length
                  }
                };
              };
        name: Search Event
      - action:
          key: branchOnExpression
          component:
            isPublic: true
            key: branch
            version: LATEST
        branches:
          - name: EVENT FOUND
            steps:
              - action:
                  key: runCode
                  component:
                    isPublic: true
                    key: code
                    version: LATEST
                description: ''
                inputs:
                  code:
                    type: value
                    value: >-
                      module.exports = async ({ logger, configVars },
                      stepResults) => {
                        const triggerData = stepResults.trigger.results?.body?.data || {};
                        const eventCurrentDescription = stepResults.searchEvent.results?.events?.[0]?.description || "";

                        const {
                            companyCamAppLink = "",
                            companyCamProjectLink = "",
                            quoteInternalLink = "",
                            quoteExternalLink = ""
                          } = triggerData;

                          const descriptionLinks = [
                            "🔗 Project & Quote Links",
                            "",
                            `📸 CompanyCam (App):`,
                            companyCamAppLink,
                            "",
                            `🌐 CompanyCam (Web):`,
                            companyCamProjectLink,
                            "",
                            `🧾 PaintScout (Internal Quote):`,
                            quoteInternalLink,
                            "",
                            `📤 PaintScout (Client View):`,
                            quoteExternalLink
                          ].join("<br/>");



                          if(eventCurrentDescription?.includes("{LINKS}")){

                            if(eventCurrentDescription?.includes("🔗 Project & Quote Links")){
                              return eventCurrentDescription
                            }
                            return String(eventCurrentDescription?.replace("{LINKS}", descriptionLinks))
                          }

                        
                        const newDescription = eventCurrentDescription?.includes("🔗 Project & Quote Links")
                          ? eventCurrentDescription // avoid duplication
                          : `${eventCurrentDescription}\n\n${descriptionLinks}`;

                        return String(newDescription);
                      };
                name: Construct Description
              - action:
                  key: updateEvent
                  component:
                    isPublic: true
                    key: google-calendar
                    version: LATEST
                description: ''
                errorConfig:
                  delaySeconds: null
                  errorHandlerType: ignore
                  ignoreFinalError: null
                  maxAttempts: null
                  usesExponentialBackoff: null
                inputs:
                  attendees:
                    type: reference
                    value: searchEvent.results.events.0.attendees
                  calendarId:
                    type: reference
                    value: trigger.results.body.data.estimatorEmail
                  connection:
                    type: configVar
                    value: Google Calendar Connection
                  description:
                    type: reference
                    value: constructDescription.results
                  endTime:
                    type: reference
                    value: endUtc.results
                  eventId:
                    type: reference
                    value: searchEvent.results.events.0.id
                  eventLocation:
                    type: reference
                    value: searchEvent.results.events.0.location
                  remindMethod:
                    type: value
                    value: ''
                  remindMinutes:
                    type: value
                    value: ''
                  sendUpdates:
                    type: value
                    value: ''
                  startTime:
                    type: reference
                    value: startUtc.results
                  summary:
                    type: reference
                    value: searchEvent.results.events.0.summary
                  timeZone:
                    type: reference
                    value: trigger.results.body.data.timeZone
                  useDefaultReminder:
                    type: value
                    value: 'true'
                name: Update Event
          - name: Else
            steps:
              - action:
                  key: writeLog
                  component:
                    isPublic: true
                    key: log
                    version: LATEST
                description: ''
                inputs:
                  level:
                    type: value
                    value: info
                  message:
                    type: value
                    value: NO EVENT FOUND
                name: NO EVENT FOUND
              - action:
                  key: stopExecution
                  component:
                    isPublic: true
                    key: stop-execution
                    version: LATEST
                description: ''
                inputs:
                  contentType:
                    type: value
                    value: application/json
                  headers:
                    type: complex
                    value: []
                  jsonBody:
                    type: value
                    value: ''
                  statusCode:
                    type: value
                    value: '200'
                name: Stop Execution
        description: ''
        inputs:
          conditions:
            type: complex
            value:
              - name: EVENT FOUND
                type: complex
                value:
                  - and
                  - - greaterThan
                    - name: ''
                      type: reference
                      value: searchEvent.results.count
                    - name: ''
                      type: value
                      value: '0'
        name: Branch on Expression
labels:
